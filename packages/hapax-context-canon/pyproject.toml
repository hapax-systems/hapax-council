[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hapax-context-canon"
version = "0.1.0"
description = "Typed, content-addressed context carriers and non-authorizing projection verification"
readme = "README.md"
requires-python = ">=3.12"
license = "LicenseRef-PolyForm-Strict-1.0.0"
license-files = ["LICENSE.txt"]
authors = [{ name = "Hapax (Oudepode)", email = "hapax@oudepode.studio" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = ["pydantic==2.13.4", "python-toon==0.1.3"]

[project.urls]
Repository = "https://github.com/hapax-systems/hapax-council"

[project.optional-dependencies]
dev = ["pytest>=9.0.2", "ruff>=0.15.0"]

[tool.hatch.build.targets.wheel]
only-include = ["src/hapax/context_canon"]
sources = ["src"]

[tool.hatch.build.targets.sdist]
include = [
    "src/hapax/context_canon/**",
    "tests/**",
    "README.md",
    "LICENSE.txt",
    "pyproject.toml",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
