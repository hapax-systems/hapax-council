[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentgov"
version = "0.1.0"
description = "Computational constitutional governance for AI agent systems"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Ryan Lee", email = "rylklee@gmail.com" }]
keywords = [
    "governance",
    "consent",
    "agents",
    "multi-agent",
    "information-flow",
    "access-control",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = ["pyyaml>=6.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "hypothesis>=6.0", "ruff>=0.4", "pyright>=1.1"]

[project.urls]
Homepage = "https://github.com/ryanklee/hapax-council"
Documentation = "https://github.com/ryanklee/hapax-council/tree/main/packages/agentgov"
Repository = "https://github.com/ryanklee/hapax-council"

[tool.hatch.build.targets.wheel]
packages = ["src/agentgov"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "standard"

[tool.pytest.ini_options]
testpaths = ["tests"]
