  - condition: If Brutus identifies a specific class of 'next actions' that, by their very nature, cannot
      be framed without implying a subjective judgment of an individual's past performance.
    met: false
    reasoning: Brutus did not identify a *specific class* of 'next actions' that *cannot* be framed objectively.
      Instead, he argued that the distinction is 'tenuous and difficult to maintain consistently' in general.
      Furthermore, his concession that a 'subset of 'next actions' can indeed be framed as purely objective'
