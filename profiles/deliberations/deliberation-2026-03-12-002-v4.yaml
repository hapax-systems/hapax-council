      X with Y'' or ''Schedule 1:1 about X''), agree on the same boundary (specify actions but not language),
      and their refutation conditions are parallel - both would be refuted if either policy required scripts
      or prohibited mentioning conversations. There are no implementation differences or unexplored distinctions
      between their positions.'
