# Layer B — hard-pin private monitor streams to the Yeti headphone sink
#
# CONSTITUTIONAL INVARIANT
#   The L-12 broadcast bus only carries broadcast-bound audio. Private
#   monitor streams (`hapax-private*`, `hapax-notification-private*`) MUST
#   route to the Yeti headphone monitor and MUST NEVER reach broadcast.
#   Memory: feedback_l12_equals_livestream_invariant.
#
# WHAT THIS RULE DOES
#   For any stream whose `node.name` matches the private-monitor family,
#   force `target.object` to the Blue Yeti monitor sink. Combined with
#   `node.dont-fallback = true`, if the Yeti is absent the stream stays
#   unrouted (fail-closed) rather than falling back to the next-best
#   sink — which on this host is the L-12 broadcast bus.
#
#   `node.dont-reconnect = true` keeps the link from being restored to
#   anything other than the explicit target on next policy sweep.
#   `node.dont-move = true` refuses any session-policy retarget after
#   creation. `node.linger = true` keeps the loopback alive across
#   target hardware changes (waiting silently for Yeti to reappear
#   instead of being destroyed). `priority.session = -1` deprioritises
#   these nodes for any default-sink-elevation policy.
#
# CONFIGURABLE TARGET
#   The Yeti node name is hard-coded here as the operator's known-good
#   monitor sink. If that ever changes, edit the `target.object` literal
#   on each rule. The runtime guard (Layer C) does NOT need editing —
#   it identifies broadcast targets by the FORBIDDEN-list, not by the
#   allowed Yeti target, so a different monitor sink stays valid.
#
# WHY THE THREE LAYERS COEXIST
#   Layer A (55-hapax-private-no-restore.conf) — neutralises stale state.
#   Layer B (this file)                       — pins config-defined route.
#   Layer C (scripts/hapax-private-broadcast-leak-guard) — runtime backstop.
#
#   Layer A+B are config-time defenses. They prevent the leak from being
#   re-introduced by stream-restore or session-policy. Layer C is the
#   operational backstop for the case where neither config layer fires
#   (e.g., new node name not yet covered, WirePlumber bug bypassing
#   restore-stream rules, manual `pw-link` connect by something else).
#
# REFERENCES
#   - Research:    /tmp/usb-hardening-research-2026-05-02.md §4.3
#   - Doc:         docs/governance/private-broadcast-leak-guard.md
#   - Topology:    config/audio-topology.yaml § private-monitor-output
#   - Yeti sink:   alsa_output.usb-Blue_Microphones_Yeti_Stereo_Microphone_REV8-00.analog-stereo

stream.rules = [
    {
        matches = [
            { node.name = "hapax-private-playback" }
            { node.name = "hapax-notification-private-playback" }
            { node.name = "hapax-private-monitor-capture" }
            { node.name = "hapax-notification-private-monitor-capture" }
            { node.name = "~hapax-private.*" }
            { node.name = "~hapax-notification-private.*" }
        ]
        actions = {
            update-props = {
                target.object = "alsa_output.usb-Blue_Microphones_Yeti_Stereo_Microphone_REV8-00.analog-stereo"
                node.target = "alsa_output.usb-Blue_Microphones_Yeti_Stereo_Microphone_REV8-00.analog-stereo"
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                priority.session = -1
            }
        }
    }
]

# Belt-and-braces node.rules — the loopback `output.loopback.*` nodes
# spawned for `role.assistant` / `role.notification` should never have
# `target.object` mutated to a broadcast sink either. The role retarget
# (55-hapax-voice-role-retarget.conf, currently disabled) routes the
# Assistant role into the broadcast voice-fx-capture chain by design.
# Notification role is fail-closed onto hapax-notification-private —
# pin that here so a stale state cannot redirect it.
node.rules = [
    {
        matches = [
            { node.name = "output.loopback.sink.role.notification" }
        ]
        actions = {
            update-props = {
                target.object = "hapax-notification-private"
                node.target = "hapax-notification-private"
                node.dont-fallback = true
                node.dont-reconnect = true
            }
        }
    }
]
