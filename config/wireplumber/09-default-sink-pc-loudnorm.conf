# Default-sink policy — PC loudnorm filter-chain as primary.
#
# 2026-04-21: per-source normalisation audit (docs/research/
# 2026-04-21-per-ward-opacity-audit.md et al.) found that PC apps
# (browser, media players, Discord, notifications) were writing to
# alsa_output.pci-0000_73_00.6.analog-stereo directly, bypassing
# hapax-pc-loudnorm's sc4m + hard_limiter filter-chain and summing on
# the L-12 at raw levels.
#
# This rule elevates hapax-pc-loudnorm's priority.session ABOVE
# the Ryzen alsa sink (priority 1500 via 10-default-sink-ryzen.conf),
# so WirePlumber auto-selects it as the default for any stream that
# doesn't pin a specific target. hapax-pc-loudnorm.playback.target
# remains the Ryzen analog-stereo, so the physical signal path is
# unchanged — apps get normalised before hitting the hardware.
#
# Precedence:
#   hapax-pc-loudnorm  (this file)           priority.session = 2500
#   alsa Ryzen analog  (10-default-sink-ryzen)            = 1500
#   Yeti headphone jack (10-default-sink-ryzen)           =  100
#   alsa default enumerated order                         ~    0
#
# Streams that pin a specific target.object (hapax-voice-fx-capture,
# hapax-livestream, hapax-s4-content, etc.) are unaffected by this
# rule; it only changes the default-sink selection for streams that
# do not name a target.

monitor.pipewire.rules = [
    {
        matches = [
            { node.name = "hapax-pc-loudnorm" }
        ]
        actions = {
            update-props = {
                priority.session = 2500
                priority.driver = 2500
            }
        }
    }
]

node.rules = [
    {
        matches = [
            { node.name = "hapax-pc-loudnorm" }
        ]
        actions = {
            update-props = {
                priority.session = 2500
                priority.driver = 2500
            }
        }
    }
]
