# Hapax Polyend instrument routing — activity-reveal-ward P5.
#
# Matches Polyend-class USB devices by vendor id (0x1fc9) and keeps the
# UAC source out of default-source policy. The source is an instrument
# feed, not an operator microphone, and should be consumed only by the
# declared hapax-polyend-loudnorm path.

monitor.alsa.rules = [
  {
    matches = [
      {
        device.vendor.id = "0x1fc9"
      }
    ]
    actions = {
      update-props = {
        node.dont-reconnect = true
        priority.driver = 100
        priority.session = 100
      }
    }
  }
]
