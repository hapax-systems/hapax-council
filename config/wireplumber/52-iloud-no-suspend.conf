# iLoud Micro Monitor (BT A2DP) — no-suspend policy
#
# Operator pain point 2026-04-21: iLoud BT drops during silence. Root
# cause: WirePlumber's default session.suspend-timeout-seconds = 5
# suspends the PW session after 5s of no stream activity, which stops
# A2DP codec transmission, which lets BlueZ drop the transport, which
# lets iLoud hit its own internal auto-standby. Cascade.
#
# This conf pins the iLoud session forever-alive. Combined with the
# silent keep-alive stream (hapax-iloud-keepalive.service), the A2DP
# transport never goes quiet and the speaker never disconnects.
#
# Device match: by MAC in the bluez node name.

monitor.bluez.rules = [
    {
        matches = [
            { node.name = "~bluez_output.EB_06_EF_26_3F_AE.*" }
            { device.name = "~bluez_card.EB_06_EF_26_3F_AE" }
        ]
        actions = {
            update-props = {
                session.suspend-timeout-seconds = 0
            }
        }
    }
]
