# Layer A — disable WirePlumber stream-restore for private monitor streams
#
# CONSTITUTIONAL INVARIANT
#   The L-12 broadcast bus only carries broadcast-bound audio. Private
#   monitor streams (`hapax-private*`, `hapax-notification-private*`) MUST
#   route to the Yeti headphone monitor and MUST NEVER reach broadcast.
#   Memory: feedback_l12_equals_livestream_invariant.
#
# TODAY'S INCIDENT (2026-05-02)
#   `hapax-usb-topology-witness` repeatedly observed an unclassified edge
#   `hapax-private-playback -> alsa_output.usb-ZOOM_Corporation_L-12...
#   .analog-surround-40`. WirePlumber's stream-restore re-applied a stale
#   per-device target rule from a pre-TB-dock-topology-change boot snapshot,
#   so the private playback loopback was being re-targeted at the L-12
#   broadcast sink on every PipeWire/WirePlumber restart. Manual
#   `pw-link -d` cleared it but it re-emerged after each restart.
#
# WHAT THIS RULE DOES
#   For any stream whose `node.name` matches the private-monitor family,
#   tell the restore-stream policy to ignore any saved `target.object` /
#   `target.node` and any saved volume/mute/channel state. The stream
#   comes up with config-defined target only.
#
# WHY IT IS NOT SUFFICIENT BY ITSELF
#   This only neutralises stale state. Layer B (56-hapax-private-pin-yeti.conf)
#   pins the actual target and forbids fallback to any sink other than
#   Yeti. Layer C (scripts/hapax-private-broadcast-leak-guard) is the
#   runtime backstop that breaks any forbidden private→broadcast link
#   detected on the live PipeWire graph.
#
# REFERENCES
#   - Research: /tmp/usb-hardening-research-2026-05-02.md §4
#   - Doc:      docs/governance/private-broadcast-leak-guard.md
#   - WP docs:  https://pipewire.pages.freedesktop.org/wireplumber/policies/linking.html
#   - WP NEWS:  https://github.com/PipeWire/wireplumber/blob/master/NEWS.rst (0.5.x)

wireplumber.settings = {
    restore-stream.rules = [
        {
            matches = [
                { node.name = "hapax-private-playback" }
                { node.name = "hapax-notification-private-playback" }
                { node.name = "hapax-private-monitor-capture" }
                { node.name = "hapax-notification-private-monitor-capture" }
                { node.name = "~hapax-private.*" }
                { node.name = "~hapax-notification-private.*" }
            ]
            actions = {
                update-props = {
                    state.restore-target = false
                    state.restore-props = false
                    state.restore = false
                }
            }
        }
    ]
}
