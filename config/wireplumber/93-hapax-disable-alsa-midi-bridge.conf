# Disable WirePlumber's ALSA MIDI bridge for the Hapax workstation.
#
# Hapax MIDI control uses ALSA sequencer ports directly through
# python-rtmidi/mido. Keeping WirePlumber's `monitor.alsa-midi` bridge
# active creates an extra PipeWire MIDI node that can repeatedly chase
# stale RtMidi sequencer client ids (for example `spa.alsa: can't get
# port info 131.0`) during the dynamic audio-router's Evil Pet / S-4
# control loop.
#
# This does not disable ALSA audio monitoring (`monitor.alsa`) or the
# role-based audio policy; it only prevents PipeWire from exporting a
# duplicate ALSA sequencer bridge the application stack does not consume.

wireplumber.profiles = {
  main = {
    monitor.alsa-midi = disabled
  }
}
