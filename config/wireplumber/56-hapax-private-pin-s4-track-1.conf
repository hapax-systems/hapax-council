# Layer B — hard-pin the specified private TTS monitor stream to mk5 Phones.
#
# The current route for assistant private TTS monitor audio is MOTU UltraLite
# mk5 Phones AUX10/AUX11. Notification-private is intentionally not audible
# on mk5 until a bounded activation task gives it separate route authority.
# S-4 is a broadcast insert path here, not a private-monitor endpoint.
#
# Layer A (55-hapax-private-no-restore.conf) neutralises stale restore state.
# Layer B (this file) pins the explicit playback target.
# Layer C (scripts/hapax-private-broadcast-leak-guard) breaks forbidden
# private-to-broadcast edges at runtime.
#
# Fail-closed posture:
#   - The playback target is the exact mk5 ALSA sink.
#   - WirePlumber may not fall back, reconnect, or move to a default sink.
#   - The reconciler owns the port-level links to playback_AUX10/AUX11.

stream.rules = [
    {
        matches = [
            { node.name = "hapax-private-playback" }
        ]
        actions = {
            update-props = {
                target.object = "alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0"
                node.target = "alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0"
                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                priority.session = -1
            }
        }
    }
]

# Notification role is fail-closed onto hapax-notification-private, with no
# audible monitor bridge, so a stale state cannot redirect it into mk5,
# broadcast, default multimedia, or private TTS AUX10/AUX11.
node.rules = [
    {
        matches = [
            { node.name = "output.loopback.sink.role.notification" }
        ]
        actions = {
            update-props = {
                target.object = "hapax-notification-private"
                node.target = "hapax-notification-private"
                node.dont-fallback = true
                node.dont-reconnect = true
            }
        }
    }
]
