# Layer B — hard-pin private monitor streams to MPC Live III.
#
# The HN-readiness route for assistant/notification private monitor audio is
# MPC Live III USB input AUX8/AUX9. S-4 is downstream/MIDI in this path, not a
# required host-side class-compliant audio target.
#
# Layer A (55-hapax-private-no-restore.conf) neutralises stale restore state.
# Layer B (this file) pins the explicit playback target.
# Layer C (scripts/hapax-private-broadcast-leak-guard) breaks forbidden
# private-to-broadcast edges at runtime.
#
# Fail-closed posture:
#   - The playback target is the exact MPC Live III ALSA sink.
#   - WirePlumber may not fall back, reconnect, or move to a default sink.
#   - The reconciler owns the port-level links to playback_AUX8/AUX9.

stream.rules = [
    {
        matches = [
            { node.name = "hapax-private-playback" }
            { node.name = "hapax-notification-private-playback" }
        ]
        actions = {
            update-props = {
                target.object = "alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output"
                node.target = "alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output"
                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                priority.session = -1
            }
        }
    }
]

# Notification role is fail-closed onto hapax-notification-private, so a stale
# state cannot redirect it.
node.rules = [
    {
        matches = [
            { node.name = "output.loopback.sink.role.notification" }
        ]
        actions = {
            update-props = {
                target.object = "hapax-notification-private"
                node.target = "hapax-notification-private"
                node.dont-fallback = true
                node.dont-reconnect = true
            }
        }
    }
]
