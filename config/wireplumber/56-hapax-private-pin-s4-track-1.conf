# Layer B (Option C) — hard-pin private monitor streams to the S-4 USB IN
#
# OPTION C — TRACK-FENCED PRIVATE MONITOR VIA S-4
#   This file SUPERSEDES the prior `56-hapax-private-pin-yeti.conf` policy
#   per the spec amendment at
#   `docs/superpowers/specs/2026-05-02-hapax-private-monitor-track-fenced-via-s4.md`.
#   The operator-locked resolution (2026-05-02T~17:00Z) routes private Hapax
#   TTS into the S-4 USB IN slot that feeds the new `HAPAX-PRIVATE-MONITOR`
#   S-4 internal track. The S-4's per-track output destination is the
#   compartmentalization fence:
#
#     - The private-monitor track's OUTPUT lands on S-4 analog OUT 1/2,
#       which the operator has patched into their non-broadcast monitor
#       sink (operator confirmation 2026-05-02T~17:00Z).
#     - The S-4 USB OUT pair is reserved for broadcast roles (music
#       modulation companion, voice modulation companion, sampler
#       companion) and is forbidden as a private target by the runtime
#       leak guard.
#     - The S-4 analog OUT 1/2 patch is operator-side hardware action;
#       this WirePlumber rule only governs the software side (USB IN
#       pin). The S-4 internal scene programming that wires
#       `Track 1: input = USB IN <pair>, output = analog OUT 1/2,
#       slots = <Bypass · Mosaic · Ring · Deform · Vast or operator-
#       chosen wet character>` is a separate operator/firmware action,
#       NOT in the scope of this WirePlumber config.
#
# CONSTITUTIONAL INVARIANT
#   The L-12 broadcast bus only carries broadcast-bound audio. Private
#   monitor streams (`hapax-private*`, `hapax-notification-private*`)
#   MUST route to a private-fenced destination and MUST NEVER reach
#   broadcast. Memory: feedback_l12_equals_livestream_invariant. The
#   privacy invariant is enforced at TRACK-OUTPUT level: any S-4 track
#   routed to analog OUT 1/2 is private; any S-4 track routed to USB
#   OUT pair (or any other broadcast-bound capture surface) is broadcast.
#
# WHAT THIS RULE DOES
#   For any stream whose `node.name` matches the private-monitor family,
#   force `target.object` to the S-4 multichannel-output sink (the USB IN
#   slot that the S-4 internal scene has been programmed to route into
#   the private-monitor Track 1). Combined with `node.dont-fallback = true`,
#   if the S-4 is absent the stream stays unrouted (fail-closed) rather
#   than falling back to the next-best sink — which on this host is the
#   L-12 broadcast bus.
#
#   `node.autoconnect = false` is intentionally paired with the explicit
#   target. The target documents the bounded hotplug destination; disabling
#   autoconnect prevents WirePlumber from retrying the absent S-4 target
#   continuously while the source-controlled reconciler/state witness owns
#   activation.
#
#   `node.dont-reconnect = true` keeps the link from being restored to
#   anything other than the explicit target on next policy sweep.
#   `node.dont-move = true` refuses any session-policy retarget after
#   creation. `node.linger = true` keeps the loopback alive across
#   target hardware changes (waiting silently for S-4 to reappear
#   instead of being destroyed). `priority.session = -1` deprioritises
#   these nodes for any default-sink-elevation policy.
#
# CONFIGURABLE TARGET
#   The S-4 sink node name is hard-coded here as the operator's known-
#   good Torso S-4 USB output (which is the host-side sink end of the
#   S-4 multichannel pair — playback into the S-4 USB IN slots that the
#   S-4 internal scene then routes per-track). If the S-4 firmware /
#   USB enumeration name ever changes, edit the `target.object` literal
#   on each rule. The runtime guard (Layer C) does NOT need editing —
#   it identifies broadcast targets by the FORBIDDEN-list, not by the
#   allowed S-4 target, so a different USB IN sink stays valid.
#
# WHY THE THREE LAYERS COEXIST
#   Layer A (55-hapax-private-no-restore.conf) — neutralises stale state.
#   Layer B (this file)                       — pins config-defined route.
#   Layer C (scripts/hapax-private-broadcast-leak-guard) — runtime backstop.
#
#   Layer A+B are config-time defenses. They prevent the leak from being
#   re-introduced by stream-restore or session-policy. Layer C is the
#   operational backstop for the case where neither config layer fires
#   (e.g., new node name not yet covered, WirePlumber bug bypassing
#   restore-stream rules, manual `pw-link` connect by something else).
#
# REFERENCES
#   - Spec:     docs/superpowers/specs/2026-05-02-hapax-private-monitor-track-fenced-via-s4.md
#   - Doc:      docs/governance/option-c-private-track-fenced-routing.md
#   - Topology: config/audio-topology.yaml § s4-private-monitor-track-input
#   - S-4 sink: alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output
#   - Cc-task:  ~/Documents/Personal/20-projects/hapax-cc-tasks/active/private-hapax-s4-track-fenced-implementation.md

stream.rules = [
    {
        matches = [
            { node.name = "hapax-private-playback" }
            { node.name = "hapax-notification-private-playback" }
            { node.name = "hapax-private-monitor-capture" }
            { node.name = "hapax-notification-private-monitor-capture" }
            { node.name = "~hapax-private.*" }
            { node.name = "~hapax-notification-private.*" }
        ]
        actions = {
            update-props = {
                target.object = "alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output"
                node.target = "alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output"
                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                priority.session = -1
            }
        }
    }
]

# Belt-and-braces node.rules — the loopback `output.loopback.*` nodes
# spawned for `role.assistant` / `role.notification` should never have
# `target.object` mutated to a broadcast sink either. The role retarget
# (55-hapax-voice-role-retarget.conf, currently disabled) routes the
# Assistant role into the broadcast voice-fx-capture chain by design.
# Notification role is fail-closed onto hapax-notification-private —
# pin that here so a stale state cannot redirect it.
node.rules = [
    {
        matches = [
            { node.name = "output.loopback.sink.role.notification" }
        ]
        actions = {
            update-props = {
                target.object = "hapax-notification-private"
                node.target = "hapax-notification-private"
                node.dont-fallback = true
                node.dont-reconnect = true
            }
        }
    }
]
