## MPC Live III ALSA headroom — absorb async USB timing jitter
#
# MPC runs at 44100 Hz native, same as PipeWire graph.  No rate
# conversion needed, but 24-channel async USB on Bus 003 (4 hub
# layers) still needs headroom for timing jitter under sustained
# playback.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.usb-Akai_Professional_MPC_LIVE_III*" }
    ]
    actions = {
      update-props = {
        api.alsa.headroom = 2048
        api.alsa.period-size = 512
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_input.usb-Akai_Professional_MPC_LIVE_III*" }
    ]
    actions = {
      update-props = {
        api.alsa.headroom = 2048
        api.alsa.period-size = 512
      }
    }
  }
]
