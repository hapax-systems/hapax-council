# MOTU UltraLite mk5 — pin pro-audio multichannel profile.
#
# The mk5 is the central analog I/O hub of the post-L-12/MPC topology. The
# pro-audio profile exposes the raw multichannel surface with discrete AUX
# ports (instead of the UCM "HiFi" split stereo nodes), giving stable
# per-channel endpoints for the analog routing:
#
#   pro-output (playback):  AUX2/3 = Line out 3/4  -> S-4 line in 1/2 (dry voice send)
#                           AUX0/1 = Main out 1/2   (operator monitor)
#                           AUX10/11 = Phones 1/2   (private/headphone monitor)
#   pro-input  (capture):   AUX0   = Mic/Line/Inst in 1  (Rode Wireless Pro)
#                           AUX2/3 = Line in 3/4   <- S-4 line out 1/2 (wet voice return)
#
# 48 kHz to match the broadcast spine (hapax-livestream-tap / broadcast-master);
# suspend disabled so the endpoints persist across idle and hotplug. Mirrors the
# retired 14-hapax-l12-pro-audio.conf mechanism.

monitor.alsa.rules = [
    {
        matches = [
            { device.name = "~alsa_card.usb-MOTU_UltraLite-mk5.*" }
        ]
        actions = {
            update-props = {
                device.profile = "pro-audio"
                audio.rate = 48000
                audio.allowed-rates = [ 48000 ]
                session.suspend-timeout-seconds = 0
            }
        }
    }
]
