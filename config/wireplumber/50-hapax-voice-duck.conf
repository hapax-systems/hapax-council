# Hapax media-role policy settings
#
# The concrete role loopback nodes are generated from config/audio-topology.yaml
# into config/pipewire/generated/pipewire/role-*.conf and deployed as PipeWire
# role-*.conf fragments. This WirePlumber file must not define
# libpipewire-module-loopback components or loopback.sink.role.* providers;
# doing so creates duplicate output.loopback.sink.role.* nodes and makes the
# livestream/private boundary ambiguous.

wireplumber.settings = {
  # Streams without an explicit media.role are routed to the generated
  # Multimedia role sink.
  node.stream.default-media-role = "Multimedia"

  # Duck level: 0.3 = 30% of original volume when a higher-priority
  # role stream is active.
  linking.role-based.duck-level = 0.3
}

wireplumber.components = [
  {
    name = loopback.sink.role.assistant
    type = virtual/sink
    node.name = "loopback.sink.role.assistant"
    policy.role-based.preferred-target = "hapax-private"
    provides = loopback.sink.role.assistant
  }
  {
    name = loopback.sink.role.broadcast
    type = virtual/sink
    node.name = "loopback.sink.role.broadcast"
    policy.role-based.preferred-target = "hapax-voice-fx-capture"
    provides = loopback.sink.role.broadcast
  }
]
