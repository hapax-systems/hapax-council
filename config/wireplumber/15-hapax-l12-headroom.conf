## L-12 ALSA headroom — absorb USB isochronous timing jitter
#
# Bus 003 carries L-12 (14ch), MPC (24ch), and M8 through 4 hub
# layers on USB 2.0. Isochronous scheduling conflicts produce
# crackling every 3-5 minutes. Headroom gives the USB driver more
# buffer slack to absorb late packets without discontinuities.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_input.usb-ZOOM_Corporation_L-12*" }
    ]
    actions = {
      update-props = {
        api.alsa.headroom = 1024
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_output.usb-ZOOM_Corporation_L-12*" }
    ]
    actions = {
      update-props = {
        api.alsa.headroom = 1024
      }
    }
  }
]
