# Default sink policy — Ryzen HDA analog stereo.
#
# All PC audio that doesn't pin a specific target.object must land on
# Ryzen HDA (local monitoring), NOT on L-12 or MPC. The L-12 and MPC
# are broadcast-path devices — only explicitly routed filter-chains
# should send to them. Unrouted audio hitting L-12 directly bypasses
# MPC and reaches broadcast unprocessed.
#
# 2026-05-12: Source now matches the live runtime policy. An earlier
# source copy still described L-12 as the expected default sink, while
# the installed file correctly deprioritized L-12 to avoid bypassing
# the governed MPC/L-12 path.
#
# Replaces the 50-presonus-default.conf that was disabled 2026-04-21
# as part of the 24c zombie-conf sweep.

monitor.alsa.rules = [
    {
        matches = [
            { node.name = "alsa_output.pci-0000_73_00.6.analog-stereo" }
        ]
        actions = {
            update-props = {
                priority.session = 1500
                priority.driver = 1500
            }
        }
    }
    {
        matches = [
            { node.name = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40" }
        ]
        actions = {
            update-props = {
                priority.session = 200
                priority.driver = 200
            }
        }
    }
]

# Explicitly de-prioritize the Yeti's output (headphone jack) so it
# never auto-wins default-sink selection. Yeti is a mic first; its
# playback capability is a jack for monitoring, not broadcast-path.
monitor.alsa.rules += [
    {
        matches = [
            { node.name = "~alsa_output.usb-Blue_Microphones_Yeti.*" }
        ]
        actions = {
            update-props = {
                priority.session = 100
                priority.driver = 100
            }
        }
    }
]
