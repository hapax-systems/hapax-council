# Default sink policy — fail-closed PC loudnorm.
#
# All PC audio that doesn't pin a specific target.object must land on the
# fail-closed PC loudnorm sink, NOT on L-12, MPC, S-4, M8, HDMI, Yeti, iLoud,
# or any other physical output. The only live MPC software channels are:
#   - music/SoundCloud -> AUX0/AUX1
#   - public livestream TTS -> AUX2/AUX3
#   - private TTS -> AUX8/AUX9
#
# Every other workstation/default/multimedia path is under-specified and must
# fail closed until a bounded activation task grants it live route authority.
#
# 2026-05-20: MPC Live III was observed as the Pulse/WirePlumber default sink.
# That made default/unclassified app audio able to hit MPC directly even though
# the named role routes were correct. This rule makes the fail-closed sink the
# only intended default and explicitly deprioritizes physical/broadcast devices.
#
# Replaces the 50-presonus-default.conf that was disabled 2026-04-21
# as part of the 24c zombie-conf sweep.

node.rules = [
    {
        matches = [
            { node.name = "hapax-pc-loudnorm" }
        ]
        actions = {
            update-props = {
                priority.session = 2200
                priority.driver = 1200
            }
        }
    }
    {
        matches = [
            { node.name = "input.loopback.sink.role.multimedia" }
        ]
        actions = {
            update-props = {
                priority.session = 2100
                priority.driver = 1100
            }
        }
    }
]

monitor.alsa.rules = [
    {
        matches = [
            { node.name = "alsa_output.pci-0000_73_00.6.analog-stereo" }
        ]
        actions = {
            update-props = {
                priority.session = 100
                priority.driver = 100
            }
        }
    }
    {
        matches = [
            { node.name = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40" }
            { node.name = "~alsa_output.usb-Akai_Professional_MPC_LIVE_III*" }
            { node.name = "~alsa_output.usb-Torso_Electronics_S-4*" }
            { node.name = "~alsa_output.usb-Dirtywave_M8*" }
        ]
        actions = {
            update-props = {
                priority.session = 10
                priority.driver = 10
            }
        }
    }
]

# Explicitly de-prioritize opportunistic operator/device outputs so they never
# auto-win default-sink selection. They are not route authority.
monitor.alsa.rules += [
    {
        matches = [
            { node.name = "~alsa_output.usb-Blue_Microphones_Yeti.*" }
            { node.name = "~bluez_output.*" }
            { node.name = "~alsa_output.pci-0000_.*.hdmi-stereo" }
        ]
        actions = {
            update-props = {
                priority.session = 10
                priority.driver = 10
            }
        }
    }
]
