# Default sink policy — Ryzen HDA analog stereo.
#
# All PC audio that doesn't pin a specific target.object must land on
# Ryzen HDA → L-12 CH11/12 → AUX B → Evil Pet. Without this, WP
# auto-selects whatever appears first in the card enumeration order,
# which after the 24c retirement + hapax-livestream null-sink rewrite
# landed on the Yeti's built-in headphone jack (Yeti = mic with
# built-in headphone out, treated as a sink by WP).
#
# Replaces the 50-presonus-default.conf that was disabled 2026-04-21
# as part of the 24c zombie-conf sweep.

monitor.alsa.rules = [
    {
        matches = [
            { node.name = "~alsa_output.pci-0000_73_00.6.analog-stereo" }
        ]
        actions = {
            update-props = {
                priority.session = 1500
                priority.driver = 1500
            }
        }
    }
]

# Explicitly de-prioritize the Yeti's output (headphone jack) so it
# never auto-wins default-sink selection. Yeti is a mic first; its
# playback capability is a jack for monitoring, not broadcast-path.
monitor.alsa.rules += [
    {
        matches = [
            { node.name = "~alsa_output.usb-Blue_Microphones_Yeti.*" }
        ]
        actions = {
            update-props = {
                priority.session = 100
                priority.driver = 100
            }
        }
    }
]
