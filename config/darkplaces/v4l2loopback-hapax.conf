# hapax: merged v4l2loopback config.
# Existing 4 devices (compositor output + OBS + 2 YouTube ingest) PLUS
# DarkPlaces and 3 RTSP->v4l2loopback ingest devices for Pi-hosted cameras:
#   Pi-4 BRIO → /dev/video60
#   Pi-5 C920 → /dev/video61
#   Pi-1 BRIO synths synthetic ingest → /dev/video62
# DarkPlaces Screwm tower renderer → /dev/video52
#
# This standalone migration config is kept for Screwm-only installs. The
# workspace-wide config/modprobe.d/v4l2loopback-hapax.conf is authoritative on
# the production host because it also owns the per-camera sharing devices.
#
# exclusive_caps=0 on /dev/video42 (StudioCompositor) allows OBS to
# reconnect independently after compositor restarts or v4l2sink hangs.
# OBS Virtual Camera (/dev/video10) stays exclusive_caps=1 so nothing
# else grabs it during OBS session.
# DarkPlaces (/dev/video52) uses exclusive_caps=0 so one writer and one
# compositor reader can negotiate the loopback normally.
options v4l2loopback devices=8 video_nr=10,42,50,51,52,60,61,62 card_label="OBS_Virtual_Camera,StudioCompositor,YouTube0,YouTube1,DarkPlaces,hapax-rtsp-pi4-brio,hapax-rtsp-pi5-c920,hapax-rtsp-pi1-brio-synths" exclusive_caps=1,0,0,0,0,1,1,1 max_buffers=8
