# hapax: merged v4l2loopback config.
# Existing 5 devices (compositor output + OBS + 3 YouTube ingest) PLUS
# 2 new RTSP→v4l2loopback ingest devices for Pi-hosted cameras:
#   Pi-4 BRIO → /dev/video60
#   Pi-5 C920 → /dev/video61
# DarkPlaces Screwm tower renderer → /dev/video70
#
# This file supersedes /etc/modprobe.d/v4l2loopback.conf (saved as .bak).
# modprobe.d alphabetical order means v4l2loopback-hapax.conf wins last.
#
# exclusive_caps=0 on /dev/video42 (StudioCompositor) allows OBS to
# reconnect independently after compositor restarts or v4l2sink hangs.
# OBS Virtual Camera (/dev/video10) stays exclusive_caps=1 so nothing
# else grabs it during OBS session.
# DarkPlaces (/dev/video70) uses exclusive_caps=1 so only the compositor reads it.
options v4l2loopback devices=9 video_nr=10,42,50,51,52,60,61,62,70 card_label="OBS_Virtual_Camera,StudioCompositor,YouTube0,YouTube1,YouTube2,hapax-rtsp-pi4-brio,hapax-rtsp-pi5-c920,hapax-rtsp-pi1-brio-synths,DarkPlaces" exclusive_caps=1,0,0,0,0,1,1,1,1 max_buffers=8
