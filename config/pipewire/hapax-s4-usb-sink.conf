# S-4 USB device profile pin — dual-fx-routing Phase 1
#
# Pins the Elektron Torso S-4 USB audio device to the ``pro-audio``
# ALSA profile so all 10 channels (L+R inputs across 4 tracks plus
# spare buses) are exposed as separate PipeWire nodes. Without this
# rule, the default ``analog-stereo`` profile collapses everything to
# a single stereo pair and the dual-FX router can't address tracks
# 1-4 independently.
#
# This is a wireplumber-style monitor.alsa.rules block. It works in
# either ~/.config/pipewire/pipewire.conf.d/ or
# ~/.config/wireplumber/wireplumber.conf.d/ on PipeWire 1.x +
# wireplumber 0.5.x (shared config loader). The repo convention is
# config/pipewire/; deploy with:
#
#   cp config/pipewire/hapax-s4-usb-sink.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY (with the S-4 plugged in via USB):
#
#   pactl list short cards | grep -i torso
#   pactl list cards | grep -A 3 'Active Profile' | grep -i 'pro-audio'
#   pw-dump | jq '.[] | select(.info.props["alsa.card_name"] | tostring | test("S-4")) | .info.props["device.profile.name"]'
#
# DEVICE PATTERN
#
# The match pattern uses ``alsa_card.usb-Torso_Electronics_S-4*`` —
# wildcarding so a future serial-number suffix or rev letter doesn't
# break the rule. If the device name differs on operator's actual
# hardware (different USB controller, different firmware), adjust the
# match pattern after running:
#
#   pactl list short cards | grep -i 'usb-' | awk '{print $2}'
#
# REFERENCE
#
# - Plan: docs/superpowers/plans/2026-04-20-dual-fx-routing-plan.md §Phase 1
# - Routing map: config/voice-paths.yaml (Phase 2)
# - Path router: agents/hapax_daimonion/voice_path.py (Phase 3)
# - Sister conf: config/pipewire/hapax-s4-loopback.conf
#   (evilpet-s4 Phase 1 — stereo content path; complementary, not
#   redundant: this conf exposes the device's pro-audio capability,
#   the loopback conf wires its stereo output into the livestream)

monitor.alsa.rules = [
    {
        matches = [
            { device.name = "~alsa_card.usb-Torso_Electronics_S-4*" }
        ]
        actions = {
            update-props = {
                # Pin the device to its pro-audio profile so the
                # full channel inventory is exposed as separate
                # PipeWire nodes (one per track) rather than the
                # default analog-stereo pair.
                api.alsa.use-acp = false
                device.profile = "pro-audio"
                # Promote priority so the operator's wireplumber
                # session selects this device's pro-audio output as
                # a routable destination by default. The voice-path
                # router targets this device by node name; priority
                # only affects "default sink" selection in
                # pavucontrol / OBS picker.
                priority.session = 1500
                priority.driver = 1500
            }
        }
    }
]
