# Hapax CVS #145 — backing ducker, controller-driven (formerly YouTube-over-24c).
#
# Creates a virtual sink ``hapax-backing-ducked`` that backing audio
# sources (DAW return, synth strip, MPC pad bus — historically the
# PreSonus Studio 24c analog mix back when the 24c was active) target.
# A filter-chain input-gain node is exposed so the Python
# ``AudioDuckingController`` can set the backing gain directly when
# YouTube audio is active — the Python FSM chooses the gain target
# from its state machine and writes via
# ``wpctl set-volume @hapax-backing-ducked@ <0..1>``.
#
# This is the COUNTERPART of ``voice-over-ytube-duck.conf``. That preset
# ducks the YouTube bed under operator voice (amplitude-triggered sidechain
# compressor). This preset is driven by the Python state machine, which
# reads both VAD and YT audio-activity state to decide the direction. They
# coexist because they act on different sinks:
#
#   hapax-ytube-ducked     — YouTube / React audio bed  (gets ducked on VAD)
#   hapax-backing-ducked   — Backing mix (DAW/synth/pads) (gets ducked on YT)
#
# Historical: the backing mix used to come from a PreSonus Studio 24c
# analog output. The 24c hardware was decommissioned (2026-05); the
# bidirectional ducker concept is still load-bearing, so the sink was
# renamed from ``hapax-24c-ducked`` → ``hapax-backing-ducked`` to drop
# the dead hardware reference. See ``docs/runbooks/audio-topology.md
# § 5 Ducking rules`` for the full direction matrix.
#
# INSTALL
#
#   cp config/pipewire/hapax-backing-ducked.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pactl list short sinks | grep hapax-backing-ducked
#
# DRIVEN BY
#
#   AudioDuckingController (agents/studio_compositor/audio_ducking.py)
#   Feature flag: HAPAX_AUDIO_DUCKING_ACTIVE=1 (default OFF — preset is
#   safe to install without flipping the controller on; the sink will
#   just sit at unity gain until the flag flips)
#
# ROUTE MEDIA THROUGH THE SINK
#
#   Select ``Hapax Backing Ducker`` as the output for backing sources
#   (DAW returns, synth strips, etc.) via per-application audio selection.
#
# RESET TO UNITY
#
#   wpctl set-volume @hapax-backing-ducked@ 1.0
#
# REMOVE
#
#   rm ~/.config/pipewire/pipewire.conf.d/hapax-backing-ducked.conf
#   systemctl --user restart pipewire pipewire-pulse wireplumber

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-backing-ducker"
            node.description = "Hapax Backing Ducker (driven by AudioDuckingController)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # Simple controllable-gain nodes per channel. The
                    # Python controller writes the desired linear gain
                    # via ``wpctl set-volume @hapax-backing-ducked@ <g>``
                    # (coarse) or via ``pw-cli set-param`` on the node
                    # Props (fine).
                    {
                        type = builtin
                        name = gain_l
                        label = copy
                    }
                    {
                        type = builtin
                        name = gain_r
                        label = copy
                    }
                ]
                links = [ ]
                inputs  = [ "gain_l:In" "gain_r:In" ]
                outputs = [ "gain_l:Out" "gain_r:Out" ]
            }

            capture.props = {
                node.name = "hapax-backing-ducked"
                node.description = "Hapax Backing Ducker (input — route backing sources here)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-backing-ducker-playback"
                node.description = "Hapax Backing Ducker (output — routes to default stereo)"
                node.passive = true
            }
        }
    }
]
