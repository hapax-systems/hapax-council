# TTS → S-4 audio send path — dynamic-audio-env DA-7
#
# Creates a virtual sink ``hapax-tts-s4-send`` that routes TTS audio
# to the Torso S-4 USB audio input for self-modulation processing.
# The S-4 applies its internal FX (pitch, reverb, delay, grain) and
# returns processed audio on its USB output, captured by the sister
# config ``hapax-s4-loopback.conf`` into the broadcast chain.
#
# SIGNAL FLOW
#
#   hapax-daimonion TTS output
#       │
#       ▼
#   hapax-tts-s4-send (loopback capture sink)
#       │
#       ▼
#   hapax-tts-s4-playback → S-4 USB audio input (pro-audio track 1)
#       │
#       (S-4 internal FX processing)
#       │
#       ▼
#   S-4 USB output → hapax-s4-content → hapax-livestream-tap
#
# DRY BYPASS
#
# When the S-4 is physically disconnected, ``hapax-tts-s4-playback``
# has no routable target and PipeWire suspends the node. The voice
# path router in ``agents/hapax_daimonion/voice_path.py`` detects S-4
# absence via the FX device witness and routes TTS through the
# standard ``hapax-voice-fx`` chain instead.
#
# INSTALL
#
#   cp config/pipewire/hapax-tts-to-s4.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pactl list short sinks | grep hapax-tts-s4-send
#   pw-link -o hapax-tts-s4-playback  # shows linked to S-4 USB input

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "TTS → S-4 self-modulation send"
            capture.props = {
                node.name        = "hapax-tts-s4-send"
                node.nick        = "TTS→S-4 Send"
                media.class      = Audio/Sink
                audio.position   = [ FL FR ]
                node.passive     = true
            }
            playback.props = {
                node.name        = "hapax-tts-s4-playback"
                node.nick        = "TTS→S-4 Playback"
                target.object    = "alsa_output.usb-Torso_Electronics_S-4"
                audio.format     = S32
                audio.rate       = 48000
                audio.channels   = 2
                audio.position   = [ FL FR ]
            }
        }
    }
]
