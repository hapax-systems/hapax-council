# S-4 wet voice return — analog insert return leg (mk5 IN 3/4).
#
# TOPOLOGY (post-L-12/MPC):
#   Hapax TTS (dry) -> voice-fx -> loudnorm -> mk5 OUT 3/4 (pro-output AUX2/3)
#     -> S-4 line in 1/2 -> [S-4 Material=Bypass: granular/filter/color/space]
#     -> S-4 line out 1/2 -> mk5 IN 3/4 (pro-input AUX2/3) -> THIS NODE
#     -> hapax-livestream-tap -> broadcast-master -> broadcast-normalized -> OBS
#
# Only the S-4-PROCESSED (wet) voice reaches broadcast; the dry send exits to the
# S-4 and never enters livestream-tap. A fast lookahead limiter clamps any analog/USB
# transient before the +6 dB broadcast-master makeup. The reconciler owns the
# mk5 capture_AUX2/3 -> input_AUX2/3 links and the playback -> livestream-tap links.
#
# Safety pattern (hapax-audio-routing-check Invariant 8): node.passive=true +
# node.dont-reconnect=true so a missing mk5 never lets WirePlumber bind a webcam mic.

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "S-4 wet voice return (mk5 IN 3/4) -> livestream"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            filter.graph = {
                nodes = [
                    { type = builtin label = mixer name = gain_wet_l control = { "Gain 1" = 1.0 } }
                    { type = builtin label = mixer name = gain_wet_r control = { "Gain 1" = 1.0 } }
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "wet_clamp"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -3.0
                          "Release time (s)" = 0.01
                      }
                    }
                ]
                inputs = [ "gain_wet_l:In 1" "gain_wet_r:In 1" ]
                links = [
                    { output = "gain_wet_l:Out" input = "wet_clamp:Input 1" }
                    { output = "gain_wet_r:Out" input = "wet_clamp:Input 2" }
                ]
                outputs = [ "wet_clamp:Output 1" "wet_clamp:Output 2" ]
            }
            capture.props = {
                node.name = "hapax-voice-wet-capture"
                node.description = "Hapax S-4 wet voice return (mk5 capture_AUX2/3)"
                target.object = "alsa_input.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-input-0"
                node.passive = true
                stream.dont-remix = true
                node.dont-reconnect = true
                node.dont-move = true
                state.restore = false
                audio.channels = 2
                audio.position = [ AUX2 AUX3 ]
            }
            playback.props = {
                node.name = "hapax-voice-wet-playback"
                node.description = "Hapax S-4 wet voice -> livestream-tap"
                node.autoconnect = false
                audio.channels = 2
                audio.position = [ FL FR ]
                node.passive = false
            }
        }
    }
]
