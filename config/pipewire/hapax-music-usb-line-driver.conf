# Hapax music USB IN line-driver — Phase 1 USB-vs-analog bias correction
#
# ARCHITECTURAL ROLE
#   Substitutes for the analog channel-strip TRIM stage that L-12 USB IN
#   lacks. Music-loudnorm + music-duck deliver -18 dBFS peak (PRE_NORM
#   target) to this stage; this stage applies +27 dB makeup to land the
#   signal where the L-12 LINE-input-trim-at-unity calibration expected.
#   See WET_PATH_USB_BIAS_MUSIC_DB in shared/audio_loudness.py.
#
# WHY THIS IS NOT A NORMALIZER
#   This stage is NOT a level normalizer (still keeps -18 LUFS-I integrated
#   for compliance audit). It is a USB-IN-to-physical-channel gain matcher,
#   operationally analogous to the L-12's analog LINE-input trim. Phase 3
#   per-source LV2 LUFS-targeting normalizers replace music-loudnorm but do
#   NOT replace this stage — the bias correction lives downstream of pre-norm.
#
# CONSTANTS
#   Input gain (dB) = 27.0   (matches WET_PATH_USB_BIAS_MUSIC_DB)
#   Limit (dB)      = -1.0   (true-peak protection — clips nothing in nominal
#                              operation since input is at -18 dBFS, output
#                              with +27 makeup peaks at +9 dBFS WITHOUT the
#                              limiter — limiter catches transient surge if
#                              source briefly exceeds the spec PRE_NORM cap)
#   Release time (s) = 0.05  (matches MASTER_LIMITER_RELEASE_MS / 1000 — fast
#                              enough to recover from transients, slow enough
#                              not to pump on sustained loud passages)
#
# Spec: docs/superpowers/specs/2026-04-23-livestream-audio-unified-architecture-design.md §10

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-music-usb-line-driver"
            node.description = "Hapax music USB IN line-driver (+27 dB analog-trim substitute)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "music_line_driver"
                      control = {
                          "Input gain (dB)" = 27.0
                          "Limit (dB)"      = -1.0
                          "Release time (s)" = 0.05
                      }
                    }
                ]
                inputs  = [ "music_line_driver:Input 1"  "music_line_driver:Input 2"  ]
                outputs = [ "music_line_driver:Output 1" "music_line_driver:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-music-usb-line-driver"
                node.description = "Hapax music USB IN line-driver (input — music-duck-playback target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-music-usb-line-driver-playback"
                node.description = "Hapax music USB IN line-driver → L-12 USB IN"
                target.object = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40"
                node.passive = false
                audio.channels = 2
                audio.position = [ RL RR ]
                stream.dont-remix = true
            }
        }
    }
]
