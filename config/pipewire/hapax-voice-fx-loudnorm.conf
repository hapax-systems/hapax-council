# Hapax TTS loudness chain - audited passthrough 2026-05-22; mk5/S-4 update 2026-06-05
#
# The former fast_lookahead_limiter_1913 loudnorm stage is disabled on this
# live route. On 2026-05-22 the loaded LADSPA filter-chain accepted input but
# emitted digital silence on the authorized public TTS route. For broadcast
# TTS, silence is a live failure; the downstream broadcast-master limiter
# remains the active level safety boundary.
#
# This file therefore uses two unity builtin mixers as an audibility-preserving
# passthrough. The route is still fail-closed by policy: playback autoconnect
# is disabled and hapax-audio-reconciler is the only owner of the mk5 OUT
# AUX2/AUX3 dry-send links into the S-4 analog insert.
#
# Do not reintroduce an active LADSPA limiter here without a live audibility
# smoke proving non-silence at hapax-loudnorm-playback, mk5 OUT AUX2/AUX3, and
# the S-4 wet return at mk5 IN AUX2/AUX3.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-loudnorm"
            node.description = "Hapax TTS Loudnorm (audited passthrough to mk5 OUT AUX2/AUX3 / S-4 insert)"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = builtin name = pass_l label = mixer
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin name = pass_r label = mixer
                      control = { "Gain 1" = 1.0 } }
                ]
                inputs  = [ "pass_l:In 1" "pass_r:In 1" ]
                outputs = [ "pass_l:Out"  "pass_r:Out"  ]
            }

            capture.props = {
                node.name = "hapax-loudnorm-capture"
                node.description = "Hapax TTS Loudnorm (input - voice-fx-playback target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-loudnorm-playback"
                node.description = "Hapax TTS Loudnorm -> mk5 OUT AUX2/AUX3 (S-4 dry send)"
                node.autoconnect = false
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }
]
