# hapax-music-duck-mk5 — dedicated mk5-native music ducker.
#
# segment-audio-hosting-readiness (2026-06-07). Body mirrors
# config/pipewire/generated/pipewire/music-duck-mk5.conf (chain_kind=duck in
# config/audio-topology.yaml node id music-duck-mk5). Inserted between
# hapax-music-loudnorm and the hapax-livestream-tap software sum so
# hapax-audio-ducker.service can apply the SSOT duck depth (operator-VAD -12 dB,
# TTS/hosting-segment -8 dB, deepest-duck-wins; shared/audio_loudness.py) to the
# CONTENT music bed only — never the operator path.
#
# WHY a dedicated node (not the loudnorm gain, not the legacy hapax-music-duck):
#   - co-opting hapax-music-loudnorm's 0.35 passthrough gain is forbidden +
#     pinned (tests/pipewire/test_music_loudnorm_invariants.py).
#   - the legacy hapax-music-duck.conf targets the retired L-12 USB return
#     (alsa_output...ZOOM_Corporation_L-12...analog-surround-40) — dead hardware.
#   This node targets nothing directly: node.autoconnect=false, so
#   hapax-audio-reconciler owns the FL/FR links per config/hapax/audio-link-map.conf
#   (hapax-music-loudnorm-playback -> hapax-music-duck-mk5 -> hapax-livestream-tap).
#
# FAIL-OPEN: default Gain 1 = 1.0 is transparent passthrough. A dead/dormant
# hapax-audio-ducker leaves the bed at full level; music is never silenced.
# The daemon writes duck_l/duck_r "Gain 1" via pw-cli at runtime.
#
# DEPLOY SEQUENCING (alpha actuation — NOT this lane):
#   This node must EXIST in the live graph BEFORE the regenerated
#   config/hapax/audio-link-map.conf is applied: the reconciler skips links to
#   absent ports, and the old direct music-loudnorm -> livestream-tap link has
#   been removed from the map. Deploy this conf to
#   ~/.config/pipewire/pipewire.conf.d/ and reload PipeWire, THEN let the
#   reconciler pick up the new link map. Verify: pactl list sinks short | grep
#   hapax-music-duck-mk5, then a live audibility smoke proving non-silence at
#   hapax-music-duck-mk5-playback and hapax-livestream-tap, and that operator-VAD
#   ducks the bed -12 dB.
#
# Install: copy to ~/.config/pipewire/pipewire.conf.d/ then
#   systemctl --user restart pipewire
# Roll back: rm the file + restart pipewire, and revert the music-bed leg in
#   config/hapax/audio-link-map.conf (regenerate from a reverted audio-topology.yaml).

context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-music-duck-mk5"
            node.description = "Music duck inserted between hapax-music-loudnorm and the livestream-tap software sum"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = builtin name = duck_l label = mixer
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin name = duck_r label = mixer
                      control = { "Gain 1" = 1.0 } }
                ]
                inputs  = [ "duck_l:In 1" "duck_r:In 1" ]
                outputs = [ "duck_l:Out"  "duck_r:Out"  ]
            }

            capture.props = {
                node.name = "hapax-music-duck-mk5"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-music-duck-mk5-playback"
                node.passive = false

                node.autoconnect = false
                stream.dont-remix = true
            }
        }
    }
]
