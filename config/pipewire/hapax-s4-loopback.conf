# S-4 USB content loopback — disabled until route authority.
#
# Creates a virtual sink ``hapax-s4-content`` without livestream egress.
# The S-4 direct tap is under-specified and must not be live by omission.
#
# SIGNAL FLOW
#
#   S-4 USB out (ALSA: alsa_output.usb-Elektron_Torso*)
#       │
#       ▼
#   hapax-s4-content (loopback capture sink)
#       │
#       ▼
#   hapax-s4-tap (loopback playback) ──▶ no live target by default
#
# A future bounded activation task may choose and prove a route. Until then,
# the WirePlumber deny hook also rejects stale hapax-s4-tap links to
# ``hapax-livestream-tap``.
#
# INSTALL
#
#   cp config/pipewire/hapax-s4-loopback.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pactl list short sinks | grep hapax-s4-content
#
# REFERENCES
#
# - spec §4 R3 (USB-direct parallel routing)
# - plan Phase 1 (PipeWire loopback configs)
# - config/audio-topology.yaml (s4-loopback descriptor)

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "S-4 USB Audio (Torso Elektron)"
            capture.props = {
                node.name        = "hapax-s4-content"
                node.nick        = "S-4 Content"
                media.class      = Audio/Sink
                audio.position   = [ FL FR ]
                node.passive     = true
            }
            playback.props = {
                node.name        = "hapax-s4-tap"
                node.nick        = "S-4 Tap"
                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.passive = true
                audio.format     = S32
                audio.rate       = 44100
                audio.channels   = 2
                audio.position   = [ FL FR ]
            }
        }
    }
]
