# S-4 USB content loopback — evilpet-s4-routing Phase 1 (R3 wiring)
#
# Creates a virtual sink ``hapax-s4-content`` that routes the
# Elektron Torso S-4 USB stereo output to ``hapax-livestream-tap`` as
# a parallel content path (NOT serial after Evil Pet).
#
# SIGNAL FLOW
#
#   S-4 USB out (ALSA: alsa_output.usb-Elektron_Torso*)
#       │
#       ▼
#   hapax-s4-content (loopback capture sink)
#       │
#       ▼
#   hapax-s4-tap (loopback playback) ──▶ hapax-livestream-tap
#
# The operator (or a wireplumber rule) targets the S-4 USB output at
# ``hapax-s4-content`` so its audio appears in the livestream-tap
# alongside L6 main mix, vinyl, voice-fx, etc. — without serial
# processing through Evil Pet.
#
# INSTALL
#
#   cp config/pipewire/hapax-s4-loopback.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pactl list short sinks | grep hapax-s4-content
#
# REFERENCES
#
# - spec §4 R3 (USB-direct parallel routing)
# - plan Phase 1 (PipeWire loopback configs)
# - config/audio-topology.yaml (s4-loopback descriptor)

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "S-4 USB Audio (Torso Elektron)"
            capture.props = {
                node.name        = "hapax-s4-content"
                node.nick        = "S-4 Content"
                media.class      = Audio/Sink
                audio.position   = [ FL FR ]
                node.passive     = true
            }
            playback.props = {
                node.name        = "hapax-s4-tap"
                node.nick        = "S-4 Tap"
                target.object    = "hapax-livestream-tap"
                audio.format     = S32
                audio.rate       = 48000
                audio.channels   = 2
                audio.position   = [ FL FR ]
            }
        }
    }
]
