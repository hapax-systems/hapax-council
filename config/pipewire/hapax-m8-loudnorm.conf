# Hapax M8 instrument loudness sink — wet, normalized, L-12-routed.
#
# Architectural inversion 2026-05-02 per operator directives:
# 1. NORMALIZED — multi-stage chain (sc4m compressor + plate reverb +
#    fast_lookahead_limiter), not just a true-peak limiter. Targets
#    -18 LUFS-I integrated, -1.5 dBTP true-peak.
# 2. L-12 GATED — playback routes to the L-12 USB return sink, not
#    direct to hapax-livestream-tap. NOTHING goes straight to stream;
#    everything passes through the L-12 mixer first. Inverts the prior
#    "vacuous L-12 satisfaction" design (which has been deprecated).
# 3. WET — plate reverb adds character so the M8 sits in the broadcast
#    mix instead of sounding mechanical/dry. Operator: "Nothing should
#    be DRY".
#
# Chain stages (in order):
#   M8 UAC → loopback → hapax-m8-loudnorm sink
#         → sc4m_1916 compressor (RMS, -16 dB threshold, 3:1, 5ms attack,
#           250ms release, 4dB knee, -1dB makeup) — wideband LUFS reduction
#         → plate_1423 reverb (3.5s reverb, 0.40 damping, 0.18 wet mix)
#           — subtle space, anti-DRY character
#         → fast_lookahead_limiter_1913 (-1.5 dBTP, 0.2s release) — safety
#         → L-12 USB return (FL/FR of analog-surround-40 sink)
#         → L-12 main bus → L-12 USB capture → broadcast
#
# Wet/dry: ~18% wet on plate reverb. Conservative — character without
# losing the M8's percussive transient definition. Operator can lower
# the wet mix via the plate `dry/wet mix` control if reverb tail
# competes with M8 internal effects.
#
# M8 master fader on the device should sit conservative (~75% of max);
# overdriving the M8 still hits the limiter but the compressor and
# plate reverb fight back if signal is too hot.
#
# Cross-input policy: ALL stream inputs (M8, future Polyend, Steam Deck,
# any external instrument) follow this template — multi-stage wet
# chain into L-12 USB return, never direct-to-stream.

context.modules = [
    # Filter chain: M8 audio in → sc4m comp → plate reverb → limiter → L-12
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-m8-loudnorm"
            node.description = "Hapax M8 Loudnorm (sc4m+plate+limiter, -18 LUFS / -1.5 dBTP, L-12-routed)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # Stage 1: wideband compressor (LUFS-targeting).
                    # sc4m_1916 is MONO — instantiate per channel like
                    # the PC-loudnorm chain does.
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "m8_comp_l"
                      control = {
                          "RMS/peak" = 0.4
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 250
                          "Threshold level (dB)" = -16
                          "Ratio (1:n)" = 3
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = -1
                      }
                    }
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "m8_comp_r"
                      control = {
                          "RMS/peak" = 0.4
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 250
                          "Threshold level (dB)" = -16
                          "Ratio (1:n)" = 3
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = -1
                      }
                    }
                    # Stage 2: plate reverb (anti-DRY character, subtle).
                    # plate_1423 is mono-input / stereo-output; we keep
                    # channels separate by using two parallel plates and
                    # taking only the "Left output" from each. Loses the
                    # plate's natural stereo spread but preserves M8's
                    # original stereo image.
                    { type = ladspa
                      plugin = "plate_1423"
                      label = "plate"
                      name = "m8_reverb_l"
                      control = {
                          "Reverb time" = 3.5
                          "Damping" = 0.40
                          "Dry/wet mix" = 0.18
                      }
                    }
                    { type = ladspa
                      plugin = "plate_1423"
                      label = "plate"
                      name = "m8_reverb_r"
                      control = {
                          "Reverb time" = 3.5
                          "Damping" = 0.40
                          "Dry/wet mix" = 0.18
                      }
                    }
                    # Stage 3: brickwall true-peak limiter (safety floor).
                    # fast_lookahead_limiter_1913 is stereo (Input 1/2,
                    # Output 1/2).
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "m8_limiter"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -1.5
                          "Release time (s)" = 0.20
                      }
                    }
                ]
                links = [
                    # Compressor → plate (per channel)
                    { output = "m8_comp_l:Output"        input = "m8_reverb_l:Input" }
                    { output = "m8_comp_r:Output"        input = "m8_reverb_r:Input" }
                    # Plate → limiter (use "Left output" from each plate
                    # to map cleanly onto stereo limiter inputs)
                    { output = "m8_reverb_l:Left output" input = "m8_limiter:Input 1" }
                    { output = "m8_reverb_r:Left output" input = "m8_limiter:Input 2" }
                ]
                inputs  = [ "m8_comp_l:Input"      "m8_comp_r:Input"      ]
                outputs = [ "m8_limiter:Output 1"  "m8_limiter:Output 2"  ]
            }

            capture.props = {
                node.name = "hapax-m8-loudnorm"
                node.description = "Hapax M8 Loudnorm (input — M8 UAC capture target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-m8-loudnorm-playback"
                node.description = "Hapax M8 Loudnorm → L-12 USB return"
                # Route into L-12 USB playback (FL/FR = first stereo USB return).
                # Operator can re-fader on the L-12 hardware itself.
                target.object = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40"
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }

    # Loopback: M8 UAC source → hapax-m8-loudnorm input. The wireplumber
    # rule at config/wireplumber/54-hapax-m8-instrument.conf binds the
    # M8 USB device to this loopback's capture target.
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Hapax M8 → loudnorm capture"
            capture.props = {
                node.name = "hapax-m8-instrument-capture"
                target.object = "alsa_input.usb-Dirtywave_M8_16558390-02.analog-stereo"
                node.passive = false
                stream.dont-remix = true
            }
            playback.props = {
                node.name = "hapax-m8-instrument-playback"
                target.object = "hapax-m8-loudnorm"
                node.passive = false
                audio.position = [ FL FR ]
            }
        }
    }
]
