# Voice-FX preset: telephone-narrowband
#
# Aesthetic: classic G.711 / POTS telephone band. Highpass at 300 Hz
# + lowpass at 3400 Hz constrains the voice to the narrow telephone
# band; a +6 dB peak at 1.5 kHz adds the characteristic POTS
# resonance; a -2 dB cut at 500 Hz creates the hollow midrange the
# legacy phone network produced via its codec + transformer chain.
#
# Preset family: cc-task ``voice-fx-chain-aesthetic-presets-tranche``.
# JR packet evidence base: voice-fx-broadcast-best-practices-2026-05-04.
#
# Activation protocol: see voice-fx-vinyl-warmth.conf header.
#
# Use case: vintage / institutional / "agent on the line" register.
# Pairs naturally with stimmung-responsive ``tension``-axis lift.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-voice-fx"
            node.description = "Hapax Voice FX — telephone-narrowband preset"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Layer 1: Highpass at 300 Hz (telephone low edge) ──
                    { type = builtin name = hp_l label = bq_highpass
                      control = { "Freq" = 300.0 "Q" = 0.707 } }
                    { type = builtin name = hp_r label = bq_highpass
                      control = { "Freq" = 300.0 "Q" = 0.707 } }

                    # ── Layer 2: Lowpass at 3400 Hz (telephone high edge) ──
                    { type = builtin name = lp_l label = bq_lowpass
                      control = { "Freq" = 3400.0 "Q" = 0.707 } }
                    { type = builtin name = lp_r label = bq_lowpass
                      control = { "Freq" = 3400.0 "Q" = 0.707 } }

                    # ── Layer 3: POTS resonance peak at 1.5 kHz (+6 dB) ──
                    # The narrow midrange-bump that everyone recognizes as
                    # "telephone voice" — the legacy carbon-mic + transformer
                    # chain emphasized this band.
                    { type = builtin name = pots_l label = bq_peaking
                      control = { "Freq" = 1500.0 "Q" = 1.4 "Gain" = 6.0 } }
                    { type = builtin name = pots_r label = bq_peaking
                      control = { "Freq" = 1500.0 "Q" = 1.4 "Gain" = 6.0 } }

                    # ── Layer 4: Mid-low cut at 500 Hz (-2 dB) ──
                    # The hollow band the legacy phone codec produced.
                    { type = builtin name = hollow_l label = bq_peaking
                      control = { "Freq" = 500.0 "Q" = 1.0 "Gain" = -2.0 } }
                    { type = builtin name = hollow_r label = bq_peaking
                      control = { "Freq" = 500.0 "Q" = 1.0 "Gain" = -2.0 } }
                ]
                links = [
                    { output = "hp_l:Out"     input = "lp_l:In" }
                    { output = "lp_l:Out"     input = "pots_l:In" }
                    { output = "pots_l:Out"   input = "hollow_l:In" }
                    { output = "hp_r:Out"     input = "lp_r:In" }
                    { output = "lp_r:Out"     input = "pots_r:In" }
                    { output = "pots_r:Out"   input = "hollow_r:In" }
                ]
                inputs  = [ "hp_l:In" "hp_r:In" ]
                outputs = [ "hollow_l:Out" "hollow_r:Out" ]
            }

            capture.props = {
                node.name = "hapax-voice-fx-capture"
                node.description = "Hapax Voice FX (input) — telephone-narrowband"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-voice-fx-playback"
                node.description = "Hapax Voice FX (output) — telephone-narrowband"
                target.object = "hapax-loudnorm-capture"
            }
        }
    }
]
