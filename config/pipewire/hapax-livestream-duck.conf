# hapax-livestream-duck — broadcast-bound TTS-driven ducker.
#
# Audio normalization PR-2 (plan
# docs/superpowers/plans/2026-04-21-audio-normalization-ducking-plan.md).
# Strategy doc §4.2 row 1: -10 dB duck on hapax-livestream while TTS is
# playing, recover within 250 ms of TTS stop.
#
# Architecture:
#   hapax-livestream (loopback) → hapax-livestream-duck (this filter-chain)
#       → Ryzen analog out → L6 ch 5 (hardware) → broadcast
#
# Default gain: 1.0 (transparent pass-through). PR-3's TtsDuckController
# polls /dev/shm/hapax-compositor/voice-state.json and writes the
# duck-gain via PipeWire's control-interface socket when tts_active
# flips true. Gain control is a builtin mixer with one input port.
#
# Install: copy to /etc/pipewire/pipewire.conf.d/ then
#   systemctl --user restart pipewire
# Verify: pactl list sinks short | grep hapax-livestream-duck
# Roll back: rm the file + restart pipewire (livestream falls back to
# the un-ducked path if config/audio-topology.yaml's target_object is
# also reverted).

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "Hapax Livestream Duck"
            media.name        = "Hapax Livestream Duck"
            filter.graph = {
                nodes = [
                    {
                        type   = builtin
                        name   = duck_gain
                        label  = mixer
                        control = { "Gain 1" = 1.0 }
                    }
                ]
            }
            capture.props = {
                node.name        = "hapax-livestream-duck"
                node.description = "Hapax Livestream Duck"
                media.class      = "Audio/Sink"
            }
            playback.props = {
                node.target = "alsa_output.pci-0000_73_00.6.analog-stereo"
            }
        }
    }
]

# Control-interface socket (PipeWire control protocol).
# PR-3's TtsDuckController writes "Gain 1" via this socket to flip
# between 1.0 (no duck) and 0.316 (-10 dB duck).
context.exec = [
    { path = "/usr/bin/true" args = "" }
]
