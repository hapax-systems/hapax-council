# PipeWire drop-in config — ReSpeaker USB Mic Array v2.0 on hapax-ai
#
# Install path on the Pi: ~/.config/pipewire/pipewire.conf.d/51-respeaker.conf
# Pre-staged 2026-04-15 (epsilon) for Friday 2026-04-17 arrival.
# Plan reference: relay context 2026-04-15-epsilon-pi-fleet-deployment-plan.md §4
#
# What this does:
# 1. Pins the ReSpeaker as the default capture source (/dev/respeaker-mic-array via udev)
# 2. Publishes the cleaned 1-channel DSP output to the LAN via module-roc-sink
#    so the workstation can receive it in real-time (<50 ms)
# 3. Applies an RNNoise filter chain to further denoise on the Pi side (optional;
#    the ReSpeaker's XVF-3000 already does AEC + beamforming + noise suppression
#    in hardware, so RNNoise is belt-and-suspenders)
# 4. Routes operator voice from the workstation back to the Pi via module-roc-source
#    so hapax-ai-asr can consume the Yeti-post-AEC stream for Whisper

context.modules = [
    # --- ROC sink: stream ReSpeaker → workstation ---
    {   name = libpipewire-module-roc-sink
        args = {
            fec.code = rs8m                       # Reed-Solomon 8-mic, low CPU
            remote.ip = 192.168.68.80             # workstation
            remote.source.port = 10001            # audio data port
            remote.repair.port = 10002            # FEC repair port
            sink.name = "roc-sink.room-respeaker"
            sink.props = {
                node.name = "room-respeaker"
                node.description = "Room audio — ReSpeaker DSP-processed"
                media.class = "Audio/Sink"
            }
        }
    }

    # --- ROC source: receive operator-yeti from workstation ---
    {   name = libpipewire-module-roc-source
        args = {
            fec.code = rs8m
            local.ip = 0.0.0.0
            local.source.port = 10011
            local.repair.port = 10012
            source.name = "roc-source.operator-yeti"
            source.props = {
                node.name = "operator-yeti"
                node.description = "Operator Yeti (post-AEC from workstation)"
                media.class = "Audio/Source"
            }
        }
    }

    # --- RNNoise denoiser filter chain on ReSpeaker input ---
    # Optional. The ReSpeaker XVF-3000 already denoises in hardware; this is
    # a second pass on whatever residual broadband noise remains.
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "ReSpeaker RNNoise post-filter"
            media.name = "respeaker-rnnoise"
            filter.graph = {
                nodes = [
                    {   type = ladspa
                        name = rnnoise
                        plugin = /usr/lib/ladspa/librnnoise_ladspa.so
                        label = noise_suppressor_mono
                        control = { "VAD Threshold (%)" = 50 }
                    }
                ]
            }
            capture.props = {
                node.name = "capture.respeaker-raw"
                node.target = "alsa_input.usb-SEEED_ReSpeaker_4_Mic_Array__UAC1.0_-00.multichannel-input"
                audio.channels = 1
                audio.position = [ MONO ]
                stream.dont-remix = true
            }
            playback.props = {
                node.name = "capture.respeaker-clean"
                media.class = "Audio/Source"
                audio.channels = 1
                audio.position = [ MONO ]
            }
        }
    }
]

# --- Default source override ---
# After this config loads, set the default capture source to the cleaned chain
# so any app recording from "default" gets the post-RNNoise ReSpeaker output.
#
# Manual command post-restart:
#   pactl set-default-source capture.respeaker-clean
#
# Or add to ~/.config/pipewire/pipewire.conf.d/52-default-source.conf:
#   context.exec = [
#       { path = "pactl" args = "set-default-source capture.respeaker-clean" }
#   ]
