# Voice-FX preset: am-radio
#
# Aesthetic: AM broadcast radio. Highpass at 200 Hz + lowpass at
# 5000 Hz models the AM transmission band; a +4 dB lift at 1.8 kHz
# carries the AM intelligibility-band emphasis broadcast engineers
# always centred there to cut through atmospheric noise; a -2 dB
# low-shelf cut at 250 Hz keeps the signal from sounding muddy on
# small radios; a +2 dB high-shelf at 4 kHz adds the upper-midrange
# fizz/sibilance that AM stations historically chased to maintain
# perceived loudness on listener AM receivers.
#
# Preset family: cc-task ``voice-fx-chain-aesthetic-presets-tranche``.
# JR packet evidence base: voice-fx-broadcast-best-practices-2026-05-04.
#
# Activation protocol: see voice-fx-vinyl-warmth.conf header.
#
# Use case: announcement / spectacle / nostalgic-broadcast register.
# Pairs with operator's hardware-infused-texture aesthetic per JR
# packet finding 7 ("contemporary AI broadcast voices avoid pure
# human emulation, opting for hardware-infused texture").

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-voice-fx"
            node.description = "Hapax Voice FX — am-radio preset"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Layer 1: Highpass at 200 Hz (AM low edge) ──
                    { type = builtin name = hp_l label = bq_highpass
                      control = { "Freq" = 200.0 "Q" = 0.707 } }
                    { type = builtin name = hp_r label = bq_highpass
                      control = { "Freq" = 200.0 "Q" = 0.707 } }

                    # ── Layer 2: Lowpass at 5000 Hz (AM high edge) ──
                    { type = builtin name = lp_l label = bq_lowpass
                      control = { "Freq" = 5000.0 "Q" = 0.707 } }
                    { type = builtin name = lp_r label = bq_lowpass
                      control = { "Freq" = 5000.0 "Q" = 0.707 } }

                    # ── Layer 3: Low-shelf cut at 250 Hz (-2 dB) ──
                    # Removes the muddy band that loses on small AM speakers.
                    { type = builtin name = mud_l label = bq_lowshelf
                      control = { "Freq" = 250.0 "Q" = 0.707 "Gain" = -2.0 } }
                    { type = builtin name = mud_r label = bq_lowshelf
                      control = { "Freq" = 250.0 "Q" = 0.707 "Gain" = -2.0 } }

                    # ── Layer 4: Intelligibility lift at 1.8 kHz (+4 dB) ──
                    # The AM-broadcast signature midrange emphasis.
                    { type = builtin name = intel_l label = bq_peaking
                      control = { "Freq" = 1800.0 "Q" = 1.0 "Gain" = 4.0 } }
                    { type = builtin name = intel_r label = bq_peaking
                      control = { "Freq" = 1800.0 "Q" = 1.0 "Gain" = 4.0 } }

                    # ── Layer 5: AM fizz at 4 kHz (+2 dB high-shelf) ──
                    # The apparent-loudness lift AM stations chased.
                    { type = builtin name = fizz_l label = bq_highshelf
                      control = { "Freq" = 4000.0 "Q" = 0.707 "Gain" = 2.0 } }
                    { type = builtin name = fizz_r label = bq_highshelf
                      control = { "Freq" = 4000.0 "Q" = 0.707 "Gain" = 2.0 } }
                ]
                links = [
                    { output = "hp_l:Out"   input = "lp_l:In" }
                    { output = "lp_l:Out"   input = "mud_l:In" }
                    { output = "mud_l:Out"  input = "intel_l:In" }
                    { output = "intel_l:Out" input = "fizz_l:In" }
                    { output = "hp_r:Out"   input = "lp_r:In" }
                    { output = "lp_r:Out"   input = "mud_r:In" }
                    { output = "mud_r:Out"  input = "intel_r:In" }
                    { output = "intel_r:Out" input = "fizz_r:In" }
                ]
                inputs  = [ "hp_l:In" "hp_r:In" ]
                outputs = [ "fizz_l:Out" "fizz_r:Out" ]
            }

            capture.props = {
                node.name = "hapax-voice-fx-capture"
                node.description = "Hapax Voice FX (input) — am-radio"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-voice-fx-playback"
                node.description = "Hapax Voice FX (output) — am-radio"
                target.object = "hapax-loudnorm-capture"
            }
        }
    }
]
