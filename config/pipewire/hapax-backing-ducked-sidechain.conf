# Hapax YT bundle Phase 3 (#145) — backing-mix sidechain reverse ducker.
#
# Mirror-shape of hapax-voice-over-ytube-duck.conf but the duck direction is
# reversed: when YouTube/OBS audio is active, the backing mix attenuates
# by -12 dB so YT sits forward in the broadcast bed without fighting the
# operator's instrument tracks. Closes the symmetric duck gap from spec
# §3.
#
# Historical: the backing mix used to come from the L6 PreSonus Studio
# 24c hardware. The 24c was decommissioned (2026-05); the sink name was
# renamed from ``hapax-24c-ducked`` → ``hapax-backing-ducked`` to drop
# the dead hardware reference. The sidechain ducker concept itself is
# still load-bearing.
#
# SIGNAL FLOW
#
#   backing hw mix  ──────────▶  hapax-backing-ducked (sink)
#                                       │
#                                       ▼
#                             filter-chain (sidechain compressor)
#                                       ▲
#                                       │
#               YouTube / OBS audio  ──▶ hapax-ytube-tap
#                                       │
#                                       ▼
#                             physical output
#
# INSTALL
#
#   cp config/pipewire/hapax-backing-ducked-sidechain.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pactl list short sinks | grep hapax-backing-ducked
#
# ROUTE BACKING MIX THROUGH THE DUCKER
#
# Send the main backing mix to hapax-backing-ducked instead of directly
# to the physical output. The compositor's backing capture chain can
# target this sink.
#
# TUNE THRESHOLD / RATIO (per spec §3.4)
#
# - threshold: ``-26`` dBFS — YT louder than this triggers ducking
# - ratio: ``4:1`` — moderate duck (~12 dB reduction at -14 dBFS)
# - attack: ``50`` ms (operator-tunable per spec §3.4 line 178)
# - release: ``200`` ms (operator-tunable per spec §3.4 line 178)
#
# PRE-DUCKER LOUDNESS NORMALIZATION (spec §3.4 line 179)
#
# YT input chain normalizes to LUFS=-23 (broadcast standard) BEFORE
# the sidechain so the ducker triggers on perceptual loudness, not
# raw peaks. Decision: pre-PiP compositor — keeps sidechain clean,
# accepts compositor-headroom hit. Ladspa: sc4m with Attack 50/Release
# 200 + a fixed-gain stage tuned to the operator's typical YT bed.
#
# PRINCIPLE: pairs with hapax-voice-over-ytube-duck.conf to form the
# bidirectional duck matrix. Both ducker presets can be installed
# simultaneously — they target different sinks (hapax-ytube-ducked vs
# hapax-backing-ducked).

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "Hapax Backing Reverse Ducker"
            media.name        = "Hapax Backing Reverse Ducker"

            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # Sidechain compressor — attenuates backing hw mix
                    # when YouTube/OBS audio is loud. sc4m = Steve Harris
                    # LADSPA sc4 (mono sidechain).
                    {
                        type = ladspa
                        name = duck_l
                        plugin = sc4m_1916
                        label = sc4m
                        control = {
                            "RMS/peak" = 0.5
                            "Attack time (ms)" = 50.0
                            "Release time (ms)" = 200.0
                            "Threshold level (dB)" = -26.0
                            "Ratio (1:n)" = 4.0
                            "Knee radius (dB)" = 3.0
                            "Makeup gain (dB)" = 0.0
                        }
                    }
                    {
                        type = ladspa
                        name = duck_r
                        plugin = sc4m_1916
                        label = sc4m
                        control = {
                            "RMS/peak" = 0.5
                            "Attack time (ms)" = 50.0
                            "Release time (ms)" = 200.0
                            "Threshold level (dB)" = -26.0
                            "Ratio (1:n)" = 4.0
                            "Knee radius (dB)" = 3.0
                            "Makeup gain (dB)" = 0.0
                        }
                    }
                ]
                links = [ ]
                inputs  = [ "duck_l:Left input" "duck_r:Left input" ]
                outputs = [ "duck_l:Left output" "duck_r:Left output" ]
            }

            capture.props = {
                node.name = "hapax-backing-ducked"
                node.description = "Hapax Backing Reverse Ducker (input — point backing hw mix here)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-backing-ducker-playback"
                node.description = "Hapax Backing Reverse Ducker (output — routes to default stereo)"
                node.passive = true
            }
        }
    }
]
