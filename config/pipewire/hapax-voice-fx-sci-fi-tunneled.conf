# Voice-FX preset: sci-fi-tunneled
#
# Aesthetic: long-tunnel / spacial / "voice from the deep ship".
# Highpass at 100 Hz removes rumble; a focused bandpass via wide
# peaking +2/+3 dB at 800/1200/2400 Hz creates a "tunneled" 3-band
# resonance signature without external LADSPA dependencies; a
# +2 dB high-shelf at 5 kHz preserves a thin layer of brightness
# so the voice doesn't disappear into pure midrange; a final
# narrow notch at 1500 Hz (-3 dB) creates the formant-shifted
# "alien" gap between the resonance bands.
#
# Builtin-only design (no external LADSPA reverb dependency). This
# keeps the preset shippable on any PipeWire 1.x install. For a
# fuller tunnel-tail aesthetic, the operator can layer this preset
# with the ``hapax-tts-duck`` chain's existing reverb-via-feedback
# path or add a `gverb_1216` LADSPA node in a follow-up tuning
# pass.
#
# Preset family: cc-task ``voice-fx-chain-aesthetic-presets-tranche``.
# JR packet evidence base: voice-fx-broadcast-best-practices-2026-05-04.
#
# Activation protocol: see voice-fx-vinyl-warmth.conf header.
#
# Use case: contemplative-distant / system-error / inner-monologue
# register. Per JR packet finding 7: hardware-infused texture is
# preferred over pure human emulation.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-voice-fx"
            node.description = "Hapax Voice FX — sci-fi-tunneled preset"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Layer 1: Highpass at 100 Hz ──
                    { type = builtin name = hp_l label = bq_highpass
                      control = { "Freq" = 100.0 "Q" = 0.707 } }
                    { type = builtin name = hp_r label = bq_highpass
                      control = { "Freq" = 100.0 "Q" = 0.707 } }

                    # ── Layer 2: Tunnel resonance band 1 — 800 Hz (+2 dB wide) ──
                    { type = builtin name = res1_l label = bq_peaking
                      control = { "Freq" = 800.0 "Q" = 0.7 "Gain" = 2.0 } }
                    { type = builtin name = res1_r label = bq_peaking
                      control = { "Freq" = 800.0 "Q" = 0.7 "Gain" = 2.0 } }

                    # ── Layer 3: Tunnel resonance band 2 — 1200 Hz (+3 dB) ──
                    { type = builtin name = res2_l label = bq_peaking
                      control = { "Freq" = 1200.0 "Q" = 0.9 "Gain" = 3.0 } }
                    { type = builtin name = res2_r label = bq_peaking
                      control = { "Freq" = 1200.0 "Q" = 0.9 "Gain" = 3.0 } }

                    # ── Layer 4: Formant-shift notch at 1500 Hz (-3 dB narrow) ──
                    # The alien-gap between the resonance bands.
                    { type = builtin name = notch_l label = bq_peaking
                      control = { "Freq" = 1500.0 "Q" = 2.5 "Gain" = -3.0 } }
                    { type = builtin name = notch_r label = bq_peaking
                      control = { "Freq" = 1500.0 "Q" = 2.5 "Gain" = -3.0 } }

                    # ── Layer 5: Tunnel resonance band 3 — 2400 Hz (+3 dB) ──
                    { type = builtin name = res3_l label = bq_peaking
                      control = { "Freq" = 2400.0 "Q" = 0.9 "Gain" = 3.0 } }
                    { type = builtin name = res3_r label = bq_peaking
                      control = { "Freq" = 2400.0 "Q" = 0.9 "Gain" = 3.0 } }

                    # ── Layer 6: Thin bright layer at 5 kHz (+2 dB high-shelf) ──
                    { type = builtin name = bright_l label = bq_highshelf
                      control = { "Freq" = 5000.0 "Q" = 0.707 "Gain" = 2.0 } }
                    { type = builtin name = bright_r label = bq_highshelf
                      control = { "Freq" = 5000.0 "Q" = 0.707 "Gain" = 2.0 } }
                ]
                links = [
                    { output = "hp_l:Out"     input = "res1_l:In" }
                    { output = "res1_l:Out"   input = "res2_l:In" }
                    { output = "res2_l:Out"   input = "notch_l:In" }
                    { output = "notch_l:Out"  input = "res3_l:In" }
                    { output = "res3_l:Out"   input = "bright_l:In" }
                    { output = "hp_r:Out"     input = "res1_r:In" }
                    { output = "res1_r:Out"   input = "res2_r:In" }
                    { output = "res2_r:Out"   input = "notch_r:In" }
                    { output = "notch_r:Out"  input = "res3_r:In" }
                    { output = "res3_r:Out"   input = "bright_r:In" }
                ]
                inputs  = [ "hp_l:In" "hp_r:In" ]
                outputs = [ "bright_l:Out" "bright_r:Out" ]
            }

            capture.props = {
                node.name = "hapax-voice-fx-capture"
                node.description = "Hapax Voice FX (input) — sci-fi-tunneled"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-voice-fx-playback"
                node.description = "Hapax Voice FX (output) — sci-fi-tunneled"
                target.object = "hapax-loudnorm-capture"
            }
        }
    }
]
