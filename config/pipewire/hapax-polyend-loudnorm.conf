# Hapax Polyend instrument loudness sink — fail-closed optional capture.
#
# Polyend-class instruments expose USB audio + MIDI but no display
# protocol. The compositor ward renders aggregate waveform and note-grid
# activity; this PipeWire chain keeps the matching audio path level-safe.
#
# Chain:
#   Polyend UAC source -> hapax-polyend-loudnorm
#   -> paired sc4m_1916 compressor
#   -> fast_lookahead_limiter_1913
#
# This branch intentionally does not autoconnect to hapax-livestream-tap.
# A future route-policy row must own any broadcast activation.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-polyend-loudnorm"
            node.description = "Hapax Polyend Loudnorm (sc4m+limiter direct tap)"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "polyend_comp_l"
                      control = {
                          "RMS/peak" = 0.4
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 220
                          "Threshold level (dB)" = -16
                          "Ratio (1:n)" = 3
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = -1
                      }
                    }
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "polyend_comp_r"
                      control = {
                          "RMS/peak" = 0.4
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 220
                          "Threshold level (dB)" = -16
                          "Ratio (1:n)" = 3
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = -1
                      }
                    }
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "polyend_limiter"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -1.5
                          "Release time (s)" = 0.20
                      }
                    }
                ]
                links = [
                    { output = "polyend_comp_l:Output" input = "polyend_limiter:Input 1" }
                    { output = "polyend_comp_r:Output" input = "polyend_limiter:Input 2" }
                ]
                inputs  = [ "polyend_comp_l:Input"       "polyend_comp_r:Input"      ]
                outputs = [ "polyend_limiter:Output 1"   "polyend_limiter:Output 2"  ]
            }

            capture.props = {
                node.name = "hapax-polyend-loudnorm"
                node.description = "Hapax Polyend Loudnorm (input)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-polyend-loudnorm-playback"
                node.description = "Hapax Polyend Loudnorm (fail-closed output)"
                node.autoconnect = false
                node.passive = true
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }

    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Hapax Polyend -> loudnorm capture"
            capture.props = {
                node.name = "hapax-polyend-instrument-capture"
                target.object = "alsa_input.usb-Polyend_Tracker_Mini-00.analog-stereo"
                node.passive = true
                node.dont-reconnect = true
                node.dont-move = true
                state.restore = false
                stream.dont-remix = true
            }
            playback.props = {
                node.name = "hapax-polyend-instrument-playback"
                target.object = "hapax-polyend-loudnorm"
                node.passive = false
                audio.position = [ FL FR ]
            }
        }
    }
]
