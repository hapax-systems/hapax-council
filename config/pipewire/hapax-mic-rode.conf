# Operator Rode Wireless Pro mic — mk5 IN 1 (mono) -> broadcast.
#
# TOPOLOGY: Rode -> mk5 Mic/Line/Inst in 1 (pro-input capture_AUX0, MONO)
#   -> THIS NODE (mono->stereo, gain) -> hapax-livestream-tap -> broadcast.
#
# Operator speech must NEVER be dropped (feedback_never_drop_speech). Kept
# simple + robust: unity gain, mono duplicated to FL/FR. The reconciler owns
# the mk5 capture_AUX0 -> input_AUX0 link and the playback -> livestream-tap link.
#
# Safety pattern (Invariant 8): node.passive=true + node.dont-reconnect=true so a
# missing mk5 never lets WirePlumber bind a webcam mic into the broadcast chain.

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "Operator Rode mic (mk5 IN 1) -> livestream"
            audio.rate = 48000
            filter.graph = {
                nodes = [
                    { type = builtin label = mixer name = mic_gain control = { "Gain 1" = 1.0 } }
                ]
                inputs  = [ "mic_gain:In 1" ]
                outputs = [ "mic_gain:Out" "mic_gain:Out" ]
            }
            capture.props = {
                node.name = "hapax-mic-rode-capture"
                node.description = "Operator Rode mic (mk5 capture_AUX0)"
                target.object = "alsa_input.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-input-0"
                node.passive = true
                stream.dont-remix = true
                node.dont-reconnect = true
                node.dont-move = true
                state.restore = false
                audio.channels = 1
                audio.position = [ AUX0 ]
            }
            playback.props = {
                node.name = "hapax-mic-rode-playback"
                node.description = "Operator Rode mic -> livestream-tap"
                node.autoconnect = false
                audio.channels = 2
                audio.position = [ FL FR ]
                node.passive = false
            }
        }
    }
]
