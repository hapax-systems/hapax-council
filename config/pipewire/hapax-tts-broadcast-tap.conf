# Hapax TTS -> livestream broadcast tap (MPC Live III baseline)
#
# Forward path: TTS loudnorm output -> livestream-tap. This used to live
# inside hapax-tts-duck.conf, but software ducking is retired; the MPC Live
# III now owns ducking/level interaction. The loopback keeps broadcast TTS
# audible even when the hardware MPC/L-12 return path is not represented as
# a simple PipeWire edge.
#
# Deployed copy:
#   ~/.config/pipewire/pipewire.conf.d/hapax-tts-broadcast-tap.conf

context.modules = [
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Hapax TTS -> livestream broadcast tap"
            capture.props = {
                node.name = "hapax-tts-broadcast-capture"
                target.object = "hapax-loudnorm"
                stream.capture.sink = true
                node.passive = false
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name = "hapax-tts-broadcast-playback"
                node.autoconnect = false
                target.object = "hapax-livestream-tap"
                audio.position = [ FL FR ]
                node.passive = false
            }
        }
    }
]
