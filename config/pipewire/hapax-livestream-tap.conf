# Hapax Livestream OBS-monitor tap — null-sink only (post H3 phase 1, 2026-05-03)
#
# This file declares ONLY the support.null-audio-sink. The libpipewire
# module-loopback that previously sat in this conf (forwarding tap output
# to hapax-livestream) has been migrated to a systemd one-shot pactl-load:
#
#     systemd/units/hapax-livestream-tap-loopback.service
#     scripts/hapax-livestream-tap-load
#
# Reason: PipeWire upstream issue #2791 + 3 of 6 today's audio incidents
# (2026-05-03) showed that conf-file module-loopback loads can fail in ways
# pactl-load does not — capture and playback ports link correctly but no
# signal flows through the module. The conf-file approach for null-sinks
# remains stable; only the module-loopback class migrated.
#
# Source: docs/research/2026-05-03-audio-config-hardening-unthought-of-solutions.md
#         docs/runbooks/livestream-tap-migration.md
#
# Architectural note (preserved from original 2026-04-19 conf):
#   The hapax-livestream virtual sink is a filter-chain; filter-chain sinks
#   suspend when all producer-side links are passive, which starves the
#   monitor port and silently kills OBS capture. This null-sink
#   ("hapax-livestream-tap") sits in front of hapax-livestream as a stable
#   monitor surface that does NOT suspend on passive-link accounting.
#   Clients route through the tap; the systemd-driven loopback (above)
#   forwards tap output into hapax-livestream.
#
# Pre-migration content (with both null-sink and module-loopback in this
# file) is preserved at:
#     config/pipewire/hapax-livestream-tap.conf.replaced-by-systemd-2026-05-03

context.objects = [
    {   factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "hapax-livestream-tap"
            node.description = "Hapax Livestream (OBS monitor tap)"
            media.class      = Audio/Sink
            audio.position   = [ FL FR ]
            monitor.channel-volumes = true
            monitor.passthrough     = true
            adapter.auto-port-config = {
                mode = dsp  monitor = true  position = preserve
            }
        }
    }
]
