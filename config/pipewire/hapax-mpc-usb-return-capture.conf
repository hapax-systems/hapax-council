# MPC USB return capture — interim MPC-only broadcast return (L-12 removed).
#
# ARCHITECTURE (2026-05-29): the ZOOM L-12 was physically removed. The Akai
# MPC Live III is the sole interface until the MOTU UltraLite mk5 + FadeFox
# MX12 land. The broadcast return now runs PC -> MPC -> PC entirely over the
# MPC's own 24-ch USB return:
#
#   MPC internal mixer public bus -> MPC USB out 1/2 -> host capture_AUX0/1
#
# capture_AUX0/1 carries the PUBLIC mix (music + voice + YouTube), already
# summed inside the MPC. This conf captures that stereo pair, applies a USB
# transient clamp, and forwards it to hapax-livestream-tap. It replaces the
# retired L-12 wet return (hapax-l12-usb-return-capture).
#
# PRIVATE FENCE: the private monitor mix returns on capture_AUX2/3 and is NOT
# captured here. It is fenced from every broadcast node by
# config/hapax/audio-forbidden-links.conf (defense-in-depth; the MPC public
# mix must already exclude private — operator-owned MPC mixer).
#
# INVARIANT: No dry signal enters the livestream — the audio has passed the
# MPC channel-strip DSP before it reaches the host.
#
# INTERIM: superseded by the MOTU/FadeFox migration at week's end.

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "MPC USB return -> livestream (public mix, capture_AUX0/1)"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            filter.graph = {
                nodes = [
                    # MPC public mix (music + voice + YouTube) - already summed
                    # inside the MPC, returned as a stereo pair on AUX0/1.
                    { type = builtin label = mixer name = gain_public_l
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin label = mixer name = gain_public_r
                      control = { "Gain 1" = 1.0 } }

                    # USB transient gate — catches isochronous glitch spikes
                    # before they hit the +16 dB broadcast-master makeup.
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "usb_clamp"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -3.0
                          "Release time (s)" = 0.01
                      }
                    }
                ]
                inputs = [
                    "gain_public_l:In 1"   # AUX0  MPC USB out 1 (public mix L)
                    "gain_public_r:In 1"   # AUX1  MPC USB out 2 (public mix R)
                ]
                links = [
                    { output = "gain_public_l:Out"  input = "usb_clamp:Input 1" }
                    { output = "gain_public_r:Out"  input = "usb_clamp:Input 2" }
                ]
                outputs = [ "usb_clamp:Output 1" "usb_clamp:Output 2" ]
            }
            capture.props = {
                node.name = "hapax-mpc-usb-return-capture"
                node.description = "Hapax MPC USB return (public mix, AUX0/1)"
                target.object = "alsa_input.usb-Akai_Professional_MPC_LIVE_III_B-00.pro-input-0"
                stream.dont-remix = true
                node.dont-reconnect = true
                node.dont-move = true
                state.restore = false
                audio.channels = 2
                audio.position = [ AUX0 AUX1 ]
            }
            playback.props = {
                node.name = "hapax-mpc-usb-return-playback"
                node.autoconnect = false
                audio.channels = 2
                audio.position = [ FL FR ]
                node.passive = false
            }
        }
    }
]
