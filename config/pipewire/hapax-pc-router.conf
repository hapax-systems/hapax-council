# hapax-pc-router — PC audio fork point (Phase 3 PC volume isolation)
#
# Null-sink with monitor.passthrough enabled. Apps targeting hapax-pc-loudnorm
# will be retargeted here in PR B. In PR A this node is dormant.
#
# Two filter-chain subscribers read the monitor port:
#   hapax-pc-monitor  — operator headphone path (Yeti, private, off L-12)
#   hapax-pc-broadcast — L-12 broadcast path (RL/RR, same as pc-loudnorm)
#
# Loudness constants (shared/audio_loudness.py):
#   hapax-pc-monitor  : PC_MONITOR_TARGET_LUFS_I=-14.0, TRUE_PEAK=-1.0 dBTP
#   hapax-pc-broadcast: PC_BROADCAST_TARGET_LUFS_I=-18.0, PEAK_DBFS=-18.0
#
# Constitutional: feedback_l12_equals_livestream_invariant

context.objects = [
    {   factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "hapax-pc-router"
            node.description = "Hapax PC Router (fork point, Phase 3 PC isolation)"
            media.class      = Audio/Sink
            audio.position   = [ FL FR ]
            audio.rate       = 48000
            monitor.channel-volumes = true
            monitor.passthrough     = true
            adapter.auto-port-config = {
                mode = dsp  monitor = true  position = preserve
            }
        }
    }
]

context.modules = [
    # ── Monitor path ─────────────────────────────────────────────────────
    # Reads hapax-pc-router monitor → true-peak limit -1 dBTP → Yeti headphone.
    # Fail-closed: node.dont-fallback prevents L-12 fallback when Yeti absent.
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name        = "hapax-pc-monitor"
            node.description = "Hapax PC Monitor (headphone limiter, Yeti target)"
            media.class      = "Audio/Sink"
            audio.rate       = 48000
            audio.channels   = 2
            audio.position   = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type  = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label  = "fastLookaheadLimiter"
                      name   = "monitor_limiter"
                      control = {
                          "Input gain (dB)"   = 0.0
                          "Limit (dB)"        = -1.0
                          "Release time (s)"  = 0.10
                      }
                    }
                ]
                inputs  = [ "monitor_limiter:Input 1"  "monitor_limiter:Input 2"  ]
                outputs = [ "monitor_limiter:Output 1" "monitor_limiter:Output 2" ]
            }

            capture.props = {
                node.name        = "hapax-pc-monitor"
                node.description = "Hapax PC Monitor (capture — reads pc-router monitor)"
                media.class      = "Audio/Sink"
                stream.capture.sink = true
                target.object    = "hapax-pc-router"
                stream.dont-remix = true
                state.restore    = false
            }
            playback.props = {
                node.name        = "hapax-pc-monitor-playback"
                node.description = "Hapax PC Monitor → Blue Yeti headphone"
                target.object    = "alsa_output.usb-Blue_Microphones_Yeti_Stereo_Microphone_REV8-00.analog-stereo"
                audio.channels   = 2
                audio.position   = [ FL FR ]
                stream.dont-remix = true
                node.dont-fallback  = true
                node.dont-reconnect = true
                node.dont-move      = true
                node.linger         = true
                state.restore       = false
            }
        }
    }

    # ── Broadcast path ────────────────────────────────────────────────────
    # Reads hapax-pc-router monitor → -18 dBFS limit → L-12 USB return RL/RR.
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name        = "hapax-pc-broadcast"
            node.description = "Hapax PC Broadcast (L-12 limiter, RL/RR)"
            media.class      = "Audio/Sink"
            audio.rate       = 48000
            audio.channels   = 2
            audio.position   = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type  = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label  = "fastLookaheadLimiter"
                      name   = "broadcast_limiter"
                      control = {
                          "Input gain (dB)"   = 0.0
                          "Limit (dB)"        = -18.0
                          "Release time (s)"  = 0.20
                      }
                    }
                ]
                inputs  = [ "broadcast_limiter:Input 1"  "broadcast_limiter:Input 2"  ]
                outputs = [ "broadcast_limiter:Output 1" "broadcast_limiter:Output 2" ]
            }

            capture.props = {
                node.name        = "hapax-pc-broadcast"
                node.description = "Hapax PC Broadcast (capture — reads pc-router monitor)"
                media.class      = "Audio/Sink"
                stream.capture.sink = true
                target.object    = "hapax-pc-router"
                stream.dont-remix = true
                state.restore    = false
            }
            playback.props = {
                node.name        = "hapax-pc-broadcast-playback"
                node.description = "Hapax PC Broadcast → L-12 USB return RL/RR"
                target.object    = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40"
                audio.channels   = 2
                audio.position   = [ RL RR ]
                stream.dont-remix = true
                node.passive     = false
                state.restore    = false
            }
        }
    }
]
