# Hapax music-source loudness sink — Phase 1.5 hot-fix 2026-04-23
#
# True lookahead limiter (fast_lookahead_limiter_1913) replaces the
# prior sc4m+hard_limiter chain. The hard_limiter_1413 is a SAMPLE
# CLIPPER (square-wave at ceiling), not a limiter — at low ceilings
# on hot program material it produced gross distortion. Swap to
# fast_lookahead_limiter_1913: stereo, 5 ms built-in lookahead,
# smooth gain reduction = no audible clipping artifacts.
#
# Output ceiling -18 dBFS calibrated to land cleanly at L-12 LINE
# input + fader unity, so Evil Pet stays in linear range and
# operator never touches the channel fader.
#
# Phase 3 will replace this with a true LUFS-targeting per-source
# pre-normalizer; this is the bridge fix while we ship that.
#
# ── INVARIANTS (do NOT hand-edit deployed conf without changing here) ──
#
# /tmp/audio-research-topology-audit.md Defect #2 (2026-05-03) caught
# out-of-band deployed-conf edits that bypassed the governed routing
# plane. Current baseline: this node exposes FL/FR playback ports, sets
# node.autoconnect=false, and hapax-audio-reconciler maps those ports to
# MPC Live III USB IN 1/2. Do not reintroduce legacy music-duck or direct
# L-12 target.object routing.
#
#   - "Limit (dB)" MUST be -18.0 — the +15 dB headroom (-3 vs -18)
#     was sized for the L-12 LINE TRIM stage that does NOT exist on
#     the USB IN path; running -3.0 sends near-clip program material
#     into the duck mixer and downstream chain.
#
# Pinned by tests/pipewire/test_music_loudnorm_invariants.py.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-music-loudnorm"
            node.description = "Hapax Music Loudnorm (true-peak limiter, -18 dBFS ceiling for L-12 line)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "music_limiter"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -18.0
                          "Release time (s)" = 0.20
                      }
                    }
                ]
                inputs  = [ "music_limiter:Input 1"  "music_limiter:Input 2"  ]
                outputs = [ "music_limiter:Output 1" "music_limiter:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-music-loudnorm"
                node.description = "Hapax Music Loudnorm (input — local-music-player target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-music-loudnorm-playback"
                node.description = "Hapax Music Loudnorm → MPC USB IN 1/2"
                node.autoconnect = false
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }
]
