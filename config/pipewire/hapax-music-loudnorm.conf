# Hapax music-source loudness sink - audited passthrough 2026-05-22; mk5 update 2026-06-05
#
# The former fast_lookahead_limiter_1913 loudnorm stage is disabled in this
# live route. On 2026-05-22 the loaded LADSPA filter-chain accepted input but
# emitted digital silence on the authorized music route. For an explicitly
# broadcast-eligible path, silent failure is worse than passing the source
# onward inside the governed route; downstream broadcast-master limiting remains
# the active level safety boundary.
#
# This file therefore uses two builtin mixers as an audibility-preserving
# passthrough, with music-only headroom from Gain 1 = 0.35. The route is still
# fail-closed by policy: playback autoconnect is disabled and
# hapax-audio-reconciler is the only owner of the livestream-tap links.
#
# ── INVARIANTS (do NOT hand-edit deployed conf without changing here) ──
#
# /tmp/audio-research-topology-audit.md Defect #2 (2026-05-03) caught
# out-of-band deployed-conf edits that bypassed the governed routing
# plane. Current mk5/S-4 baseline: this node exposes FL/FR playback ports,
# sets node.autoconnect=false, and hapax-audio-reconciler maps those ports to
# hapax-livestream-tap for the software broadcast sum. Do not reintroduce
# legacy music-duck, MPC, or direct L-12 target.object routing.
#
# Do not raise the passthrough gain above 0.35 or reintroduce an active LADSPA
# limiter here without a live audibility smoke proving non-silence at
# hapax-music-loudnorm-playback and hapax-livestream-tap.
#
# Pinned by tests/pipewire/test_music_loudnorm_invariants.py.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-music-loudnorm"
            node.description = "Hapax Music Loudnorm (audited passthrough, 0.35 gain before software sum)"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = builtin name = pass_l label = mixer
                      control = { "Gain 1" = 0.35 } }
                    { type = builtin name = pass_r label = mixer
                      control = { "Gain 1" = 0.35 } }
                ]
                inputs  = [ "pass_l:In 1" "pass_r:In 1" ]
                outputs = [ "pass_l:Out"  "pass_r:Out"  ]
            }

            capture.props = {
                node.name = "hapax-music-loudnorm"
                node.description = "Hapax Music Loudnorm (input — local-music-player target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-music-loudnorm-playback"
                node.description = "Hapax Music Loudnorm -> livestream-tap software sum"
                node.autoconnect = false
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }
]
