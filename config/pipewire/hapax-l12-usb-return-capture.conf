# L-12 MPC wet return capture - channels 9-12 (MPC TRS -> L-12)
#
# ARCHITECTURE (2026-05-03): MPC Live III + L-12 hardware-first.
# MPC Out 1/2 -> L-12 CH 9/10 (AUX8/9): content mix (music + PC + YT)
# MPC Out 3/4 -> L-12 CH 11/12 (AUX10/11): TTS voice
#
# This captures the WET return: audio has passed through both MPC DSP
# and L-12 hardware (channel strip EQ, faders, gain staging).
#
# INVARIANT: No dry signal enters the livestream.

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "L-12 MPC wet return -> livestream (ch 9-12)"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            filter.graph = {
                nodes = [
                    # MPC content mix (music + PC + YT) - stereo
                    { type = builtin label = mixer name = gain_content_l
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin label = mixer name = gain_content_r
                      control = { "Gain 1" = 1.0 } }

                    # MPC TTS voice - stereo
                    { type = builtin label = mixer name = gain_tts_l
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin label = mixer name = gain_tts_r
                      control = { "Gain 1" = 1.0 } }

                    # Stereo sum: content + TTS
                    { type = builtin label = mixer name = sum_l
                      control = {
                        "Gain 1" = 1.0  "Gain 2" = 1.0
                      } }
                    { type = builtin label = mixer name = sum_r
                      control = {
                        "Gain 1" = 1.0  "Gain 2" = 1.0
                      } }
                ]
                inputs = [
                    "gain_content_l:In 1"  # AUX8  CH9  MPC Out 1 (content L)
                    "gain_content_r:In 1"  # AUX9  CH10 MPC Out 2 (content R)
                    "gain_tts_l:In 1"      # AUX10 CH11 MPC Out 3 (TTS L)
                    "gain_tts_r:In 1"      # AUX11 CH12 MPC Out 4 (TTS R)
                ]
                links = [
                    { output = "gain_content_l:Out"  input = "sum_l:In 1" }
                    { output = "gain_content_r:Out"  input = "sum_r:In 1" }
                    { output = "gain_tts_l:Out"      input = "sum_l:In 2" }
                    { output = "gain_tts_r:Out"      input = "sum_r:In 2" }
                ]
                outputs = [ "sum_l:Out" "sum_r:Out" ]
            }
            capture.props = {
                node.name = "hapax-l12-usb-return-capture"
                node.description = "Hapax L-12 MPC wet return (ch 9-12)"
                target.object = "alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input"
                stream.dont-remix = true
                state.restore = false
                node.dont-reconnect = true
                audio.channels = 4
                audio.position = [ AUX8 AUX9 AUX10 AUX11 ]
            }
            playback.props = {
                node.name = "hapax-l12-usb-return-playback"
                node.autoconnect = false
                audio.channels = 2
                audio.position = [ FL FR ]
                node.passive = false
            }
        }
    }
]
