# YT bed loudness normalisation — B2 / High #13 (audit closeout).
#
# Creates ``hapax-yt-loudnorm`` for YouTube / browser / OBS media-bed
# sources. The software ducker path is retired; the playback side exposes
# stable FL/FR ports, disables autoconnect, and the audio reconciler maps
# those ports to MPC Live III USB IN 7/8.
#
# Target: -16 LUFS integrated / -1.0 dBTP true-peak per audit spec
# §3.4 + audit B #10 ceiling alignment. Mono SC4 (sc4m) per-channel
# for compression; STEREO fast_lookahead_limiter_1913 single-instance
# for the limiter stage. The compressors keep "Input"/"Output" port
# names; the limiter consumes both compressor outputs into its
# "Input 1"/"Input 2" stereo ports and produces "Output 1"/"Output 2".
#
# Audit B #10 (2026-05-02): swapped per-channel hard_limiter_1413
# (sample clipper at ceiling — square-wave artefact) for the
# fast_lookahead_limiter_1913 already used by the music + voice-fx
# chains (5 ms lookahead, smooth gain reduction). Ceiling preserved
# at -1.0 dBTP — only the plugin shape changed.
#
# SIGNAL FLOW
#
#   YT browser/OBS media source → hapax-yt-loudnorm (this conf)
#       → MPC USB IN 7/8 (AUX6/AUX7)
#
# INSTALL
#
#   cp config/pipewire/hapax-yt-loudnorm.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pactl list short sinks | grep hapax-yt-loudnorm
#
# ROUTE YT THROUGH THE LOUDNORM
#
#   In OBS / browser, set the media source's audio output to
#   ``Hapax YT Loudnorm`` (the loudnorm sink). The reconciler owns
#   the downstream MPC link.
#
# TUNE
#
# - Threshold (-14 dB default) — start point for YT bed compression.
#   Heavier than voice (-18 dB) because YT inputs land hotter; raise
#   toward -10 dB if the bed still sounds dynamic enough that ducks
#   feel jumpy.
# - dB limit (-1.5 default) — true-peak budget per audit spec §3.4.
#   Never set to 0 dB — risks inter-sample clipping at the encoder.
# - Ratio (4:1 default) — heavier than voice (3:1) since YT bed is
#   a "wallpaper" channel, not the focal voice.
#
# MEASURE LUFS POST-DEPLOY
#
#   pw-cat --record --target hapax-yt-loudnorm.monitor --format s16 \
#       --rate 48000 --channels 2 --latency 1024 /tmp/yt-bed-30s.wav &
#   PID=$!; sleep 30; kill $PID
#   ffmpeg -i /tmp/yt-bed-30s.wav -af loudnorm=print_format=summary -f null -
#   # Read the "Input Integrated" line — should land near -16 LUFS.
#
# REFERENCES
#
# - Audit: docs/superpowers/audits/2026-04-20-3h-work-audit-remediation.md (B2 / H#13)
# - Spec: docs/superpowers/specs/2026-04-18-youtube-broadcast-bundle-design.md §3.4
# - Sister conf: config/pipewire/hapax-voice-fx-loudnorm.conf (TTS-side equivalent — has
#   the same stereo-port bug; fix follows same sc4m + hardLimiter pattern)
# - Downstream links: ~/.config/hapax/audio-link-map.conf

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-yt-loudnorm"
            node.description = "Hapax YT bed loudness normalisation (-14 LUFS / -1.0 dBTP target — YouTube parity)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Mono SC4 compressor (sc4m_1916, label "sc4m"),
                    # instantiated twice for L/R. Mono ports "Input" /
                    # "Output" address cleanly inside per-channel link
                    # declarations.
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "comp_l"
                      control = {
                          "RMS/peak" = 0.5
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 250
                          "Threshold level (dB)" = -12
                          "Ratio (1:n)" = 4
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = 2
                      }
                    }
                    { type = ladspa
                      plugin = "sc4m_1916"
                      label = "sc4m"
                      name = "comp_r"
                      control = {
                          "RMS/peak" = 0.5
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 250
                          "Threshold level (dB)" = -12
                          "Ratio (1:n)" = 4
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = 2
                      }
                    }

                    # ── Stereo fast-lookahead limiter (single instance,
                    # one node — no L/R drift). 5 ms lookahead + smooth
                    # gain reduction so peaks compress, not clip.
                    # -1.0 dBTP ceiling preserved (audit spec §3.4 +
                    # audit B #10 alignment with master + voice chains).
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "yt_limiter"
                      control = {
                          "Input gain (dB)"  = 0.0
                          "Limit (dB)"       = -1.0
                          "Release time (s)" = 0.20
                      }
                    }
                ]
                inputs  = [ "comp_l:Input"  "comp_r:Input"  ]
                outputs = [ "yt_limiter:Output 1" "yt_limiter:Output 2" ]
                links = [
                    { output = "comp_l:Output" input = "yt_limiter:Input 1" }
                    { output = "comp_r:Output" input = "yt_limiter:Input 2" }
                ]
            }

            capture.props = {
                node.name = "hapax-yt-loudnorm"
                node.description = "Hapax YT Loudnorm (input — route YT bed sources here)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-yt-loudnorm-playback"
                node.description = "Hapax YT Loudnorm → MPC USB IN 7/8"
                node.autoconnect = false
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }
]
