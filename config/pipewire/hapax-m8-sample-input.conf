# Hapax M8 sample-input staging sink.
#
# This stable null-sink is the software-side capture bus for Hapax -> M8
# sampler recordings. Runtime capture uses agents.m8_control.sample_capture
# to load a short-lived pactl module-loopback from the selected source into
# the M8's USB audio playback sink, then unloads it when recording stops.
#
# The loopback is intentionally not declared in pipewire.conf.d. Existing
# Hapax audio policy has moved dynamic module-loopbacks to pactl-loaded
# one-shots because conf-file loopbacks can come up before WirePlumber is
# ready and silently fail to move signal. The static config here only
# creates a stable monitor surface for operator routing and OBS visibility.
#
# Default runtime route:
#
#   hapax-livestream-tap.monitor -> M8 USB audio sink
#
# Configure the Python orchestrator to use a more specific source node when
# a dedicated Reverie or daimonion voice tap exists.

context.objects = [
    {   factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "hapax-m8-sample-input"
            node.description = "Hapax M8 Sample Input (routing staging sink)"
            media.class      = Audio/Sink
            audio.position   = [ FL FR ]
            monitor.channel-volumes = true
            monitor.passthrough     = true
            adapter.auto-port-config = {
                mode = dsp  monitor = true  position = preserve
            }
        }
    }
]
