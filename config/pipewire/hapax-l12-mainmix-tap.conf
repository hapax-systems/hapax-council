# H5 Phase 2 secondary L-12 mainmix A/B tap - null-sink monitor surface only
#
# This file deliberately declares only the support.null-audio-sink that OBS
# and the A/B recorder read as:
#
#     hapax-obs-broadcast-mainmix-tap.monitor
#
# The L-12 AUX10/AUX11 -> sink loopback is loaded by the H3-style one-shot
# pactl loader in scripts/hapax-l12-mainmix-tap-load. Keeping the loopback out
# of pipewire.conf.d avoids the known conf-file module-loopback failure class
# while preserving a stable monitor surface for OBS/device persistence.
#
# Constitutional constraints:
# - software side only; the L-12 hardware scene/profile/levels are not changed
# - this tap is monitor-only and must not feed hapax-livestream-tap,
#   hapax-broadcast-master, hapax-broadcast-normalized, or RTMP
# - OBS secondary source is operator-muted/monitor-only during A/B observation

context.objects = [
    {   factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "hapax-obs-broadcast-mainmix-tap"
            node.description = "Hapax L-12 Mainmix A/B Tap (monitor-only)"
            media.class      = Audio/Sink
            audio.position   = [ FL FR ]
            monitor.channel-volumes = true
            monitor.passthrough     = true
            adapter.auto-port-config = {
                mode = dsp  monitor = true  position = preserve
            }
        }
    }
]
