# Vinyl → livestream — forward 24c Input 2 (FR = L12 mix bus with vinyl)
# to hapax-livestream-tap. Drops 24c Input 1 (FL = Cortado contact mic).
#
# Operator channel layout (confirmed 2026-04-19):
#   24c Input 1 / FL = contact mic (Cortado MKIII)
#   24c Input 2 / FR = everything else (L12 main mix: vinyl + any other sources)
#
# 2026-04-19: rewritten from module-filter-chain (builtin copy + null
# channel drop) to module-loopback with explicit audio.position mapping.
# The old filter-chain config had audio flowing through its graph but
# the output wasn't reaching the downstream sink's monitor — root cause
# unclear, suspected filter-chain channel-routing quirk with the "null"
# input drop. module-loopback with FR→FL+FR position preset is simpler
# and verified to forward.

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "Vinyl (24c Input 2 / FR) → Livestream"
            capture.props = {
                node.name      = "hapax-vinyl-capture"
                node.description = "Vinyl capture (24c Input 2 / FR)"
                target.object  = "alsa_input.usb-PreSonus_Studio_24c_SC1E24390244-00.analog-stereo"
                audio.channels = 1
                audio.position = [ FR ]
            }
            playback.props = {
                node.name      = "hapax-vinyl-playback"
                target.object  = "hapax-livestream-tap"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
]
