# Hapax Broadcast Master Bus - Filter + Normalizer
#
# This file defines the master bus processing for the hapax livestream.
# It takes the summed audio from `hapax-livestream-tap`, runs it through
# a loudnorm filter, and exposes the result as a new virtual source.
#
# This version uses the `module-remap-source` pattern verified with
# `hapax-obs-broadcast-remap.conf` to ensure OBS and other clients
# can reliably bind to the output.

context.modules = [
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Hapax Broadcast Master Bus"
            capture.props = {
                node.name = "hapax-broadcast-master-capture"
                target.object = "hapax-livestream-tap"
                stream.capture.sink = true
                node.passive = true
                audio.position = [ FL FR ]
            }
            playback.props = {
                media.class = "Audio/Source"
                node.name = "hapax-broadcast-master"
                node.description = "Hapax Broadcast Master"
                device.description = "Hapax Broadcast Master"
                device.class = "filter"
                node.virtual = true
                audio.position = [ FL FR ]
            }
        }
    },
    {
        name = libpipewire-module-filter-chain
        args = {
            node.description = "Hapax Broadcast Loudness Normalizer"
            media.class = "Audio/Filter"
            filter.graph = {
                nodes = [
                    {
                        type = ladspa
                        name = loudnorm
                        plugin = loudness_1694
                        label = loudness
                        control = {
                            "LUFSTarget" = -16.0
                        }
                    }
                ]
            }
            capture.props = {
                node.name = "hapax-broadcast-normalized-capture"
                target.object = "hapax-broadcast-master"
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name = "hapax-broadcast-normalized"
                media.class = "Audio/Source"
                audio.position = [ FL FR ]
            }
        }
    }
]
