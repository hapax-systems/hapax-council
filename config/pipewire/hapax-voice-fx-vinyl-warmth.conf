# Voice-FX preset: vinyl-warmth
#
# Aesthetic: warm tube/vinyl-record character. Soft analog roll-off
# above 8 kHz, a body lift around 800 Hz to fatten the midrange,
# subtle low-shelf warmth at 200 Hz, and a small mid pull-back at
# 2.5 kHz to round off any digital harshness. Highpass starts at
# 60 Hz (less aggressive than the default chain's 80 Hz so low
# warmth survives).
#
# Preset family: cc-task ``voice-fx-chain-aesthetic-presets-tranche``.
# JR packet evidence base: voice-fx-broadcast-best-practices-2026-05-04.
#
# Activation protocol (operator):
#   1. EITHER ln -sf this file into ~/.config/pipewire/pipewire.conf.d/
#      (only ONE voice-fx-*.conf can be active at a time — they all
#      claim the same node.name = "hapax-voice-fx" sink), OR copy the
#      contents into a hapax-voice-fx-chain.conf override
#      replacing the existing chain's filter.graph.
#   2. systemctl --user restart pipewire pipewire-pulse wireplumber
#   3. Verify: pw-cat -p test.wav --target hapax-voice-fx; the
#      broadcast capture should show the warm tone signature.
#
# Architectural notes:
# - All 5 aesthetic presets share node.name = "hapax-voice-fx" so
#   swapping does NOT require restarting hapax-daimonion.
# - capture.props.node.name = "hapax-voice-fx-capture" matches the
#   default chain so downstream consumers (hapax-loudnorm-capture
#   target) remain wired without edit.
# - Builtin biquad filters only; no LADSPA dependency.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-voice-fx"
            node.description = "Hapax Voice FX — vinyl-warmth preset"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Layer 1: Highpass at 60 Hz (preserve low warmth) ──
                    { type = builtin name = hp_l label = bq_highpass
                      control = { "Freq" = 60.0 "Q" = 0.707 } }
                    { type = builtin name = hp_r label = bq_highpass
                      control = { "Freq" = 60.0 "Q" = 0.707 } }

                    # ── Layer 2: Low-shelf warmth at 200 Hz (+3 dB) ──
                    { type = builtin name = warmth_l label = bq_lowshelf
                      control = { "Freq" = 200.0 "Q" = 0.707 "Gain" = 3.0 } }
                    { type = builtin name = warmth_r label = bq_lowshelf
                      control = { "Freq" = 200.0 "Q" = 0.707 "Gain" = 3.0 } }

                    # ── Layer 3: Tube body lift at 800 Hz (+1 dB wide) ──
                    { type = builtin name = body_l label = bq_peaking
                      control = { "Freq" = 800.0 "Q" = 0.6 "Gain" = 1.0 } }
                    { type = builtin name = body_r label = bq_peaking
                      control = { "Freq" = 800.0 "Q" = 0.6 "Gain" = 1.0 } }

                    # ── Layer 4: Pull mids back at 2.5 kHz (-1 dB) ──
                    # Reduces digital harshness without losing intelligibility.
                    { type = builtin name = mids_l label = bq_peaking
                      control = { "Freq" = 2500.0 "Q" = 1.0 "Gain" = -1.0 } }
                    { type = builtin name = mids_r label = bq_peaking
                      control = { "Freq" = 2500.0 "Q" = 1.0 "Gain" = -1.0 } }

                    # ── Layer 5: Analog high-frequency roll-off at 8 kHz ──
                    # The vinyl/tube signature — gentle treble loss above
                    # 8 kHz so the voice does not ring or hiss in modern
                    # broadcast monitors.
                    { type = builtin name = roll_l label = bq_highshelf
                      control = { "Freq" = 8000.0 "Q" = 0.707 "Gain" = -3.0 } }
                    { type = builtin name = roll_r label = bq_highshelf
                      control = { "Freq" = 8000.0 "Q" = 0.707 "Gain" = -3.0 } }
                ]
                links = [
                    { output = "hp_l:Out"     input = "warmth_l:In" }
                    { output = "warmth_l:Out" input = "body_l:In" }
                    { output = "body_l:Out"   input = "mids_l:In" }
                    { output = "mids_l:Out"   input = "roll_l:In" }
                    { output = "hp_r:Out"     input = "warmth_r:In" }
                    { output = "warmth_r:Out" input = "body_r:In" }
                    { output = "body_r:Out"   input = "mids_r:In" }
                    { output = "mids_r:Out"   input = "roll_r:In" }
                ]
                inputs  = [ "hp_l:In" "hp_r:In" ]
                outputs = [ "roll_l:Out" "roll_r:Out" ]
            }

            capture.props = {
                node.name = "hapax-voice-fx-capture"
                node.description = "Hapax Voice FX (input) — vinyl-warmth"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-voice-fx-playback"
                node.description = "Hapax Voice FX (output) — vinyl-warmth"
                target.object = "hapax-loudnorm-capture"
            }
        }
    }
]
