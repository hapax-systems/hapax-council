# ReSpeaker XVF3800 array mic profile pin.
#
# Pins the Seeed/XMOS ReSpeaker XVF3800 USB 4-Mic Array to a stable
# multichannel operator-capture role. This is an introduction fragment:
# it makes the device legible as `hapax-array-mic` without changing the
# current Rode-on-L-12 broadcast path or the default capture source.
#
# Install after the array is plugged into the host AMD 09:00.0 controller:
#
#   cp config/pipewire/hapax-respeaker-xvf3800-array-mic.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# Verify:
#
#   pactl list short cards | grep -Ei 'respeaker|xvf3800|xmos'
#   pactl list short sources | grep -Ei 'respeaker|xvf3800|hapax-array-mic'
#   pactl list cards | grep -A 3 'Active Profile' | grep -i 'pro-audio'
#
# The match patterns cover both the Seeed-branded firmware path
# (`alsa_card.usb-Seeed_Studio_ReSpeaker_XVF3800*`) and the XMOS
# reference-firmware path (`alsa_card.usb-XMOS_XVF3800_Voice_Processor*`).
# If the actual card name differs, discover it with:
#
#   pactl list short cards | grep -i 'usb-' | awk '{print $2}'
#
# Hardware references:
# - Seeed reSpeaker XVF3800 wiki: VID 0x2886 / PID 0x001a is exposed
#   by the host-control utility in decimal form (10374 / 26).
# - XMOS XVF3800 user guide: reference firmware appears as
#   "XMOS XVF3800 Voice Processor" with PID 0x4f00 or 0x4f01 depending
#   on sample-rate firmware.

monitor.alsa.rules = [
    {
        matches = [
            { device.name = "~alsa_card.usb-Seeed_Studio_ReSpeaker_XVF3800*" }
            { device.name = "~alsa_card.usb-XMOS_XVF3800_Voice_Processor*" }
            { device.name = "~alsa_card.usb-*ReSpeaker*XVF3800*" }
        ]
        actions = {
            update-props = {
                # Pro-audio exposes the full 4-in / 2-out UAC2 surface so
                # routing can use the raw mic array and optional AEC reference
                # output explicitly. Do not make it the default source here.
                api.alsa.use-acp = false
                device.profile = "pro-audio"
                device.description = "Hapax ReSpeaker XVF3800 Array Mic"
                node.nick = "hapax-array-mic"

                # Keep the array discoverable below the dedicated broadcast
                # interfaces. Selection is explicit through topology/router
                # policy, not WirePlumber auto-default behaviour.
                priority.session = 850
                priority.driver = 850
            }
        }
    }
]
