# L6 multitrack → livestream capture (v5 — per-channel pre-fader, fader-decoupled)
#
# Architecture: all per-channel PC capture levels are controlled here
# in software. Operator's L6 physical faders drive L6 Master → L12 →
# monitors; they do NOT affect PC capture. USB multitrack altset 2
# exposes each channel pre-fader, which this config relies on.
#
# Channel map (operator-confirmed 2026-04-20, Evil-Pet↔Rode swap):
#   CH1 (mono)  AUX0        Evil Pet return (Torso-S-4-modulated voice)
#   CH2 (mono)  AUX1        Contact mic
#   CH3 (mono)  AUX2        Rode Wireless (operator voice)
#   CH4 (stereo) AUX4+5     Korg Handytraxx (vinyl)
#   CH5 (stereo) AUX6+7     PC line out (Ryzen analog)
#   CH6 (mono)  AUX8        Sampler chain return (Reloop 7 → MPC Live 3
#                           → SP-404 MKII pair → MPC sampler → L6 ch6 L)
#   AUX3        discarded   (CH3 R — silent when CH3 MONO×2 is engaged)
#   AUX9        discarded   (CH6 R — silent, CH6 is mono-L)
#   AUX10/AUX11 discarded   (L6 Main Mix — intentionally dropped so
#                           physical faders don't affect broadcast)
# Torso S-4 is USB-direct (not in this L6 capture path).
#
# Monitoring: operator's single active monitor path is now
# Evil Pet → L6 CH1 → L6 Master → L12 → monitors (was CH3).
# CH1 fader up + CH3 fader down for the Evil-Pet-only monitoring
# intent. CH5 AUX SEND 1 still feeds Evil Pet (PC → modulated).
#
# Sampler wet/dry: CH6 is the DRY return. Wet (Evil-Pet-processed)
# sampler is captured through CH1 when the operator routes AUX SEND 1
# from CH6 into Evil Pet. Both paths are simultaneously available.

context.properties = {
}

# NOTE 2026-04-20: the explicit `api.alsa.pcm.source` adapter factory
# previously defined here crashed pipewire with exit code 234 whenever
# the L6 was physically disconnected (e.g. USB re-cable for channel
# swap). PipeWire auto-discovers the L6 via WirePlumber + ALSA hotplug
# when it returns; the filter-chain module below targets it by node
# name. The firmware-level multitrack altset lock (USB 1/2 + SOUND PAD 2
# on boot) keeps it at 12-channel so we don't need a software force.
#
# Downside: on cold boot without the altset lock set, L6 will come up
# stereo (2ch) instead of 12ch. Recoverable by re-running the altset
# boot combo. See docs/research/2026-04-19-l6-multitrack-mode.md.
context.objects = []

context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "L6 multitrack → livestream-tap (per-ch pre-fader sum)"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            filter.graph = {
                nodes = [
                    # Per-channel gain stages. Each mixer is 1-in / 1-out;
                    # "Gain 1" is the per-channel level knob (operator
                    # tunes in this file; no L6 fader touch required).
                    # Defaults chosen for approximate -18 dBFS broadcast
                    # target; tune up/down per source dynamics.
                    { type = builtin label = mixer name = gain_rode
                      control = { "Gain 1" = 2.0 } }   # CH1 Rode WP — voice
                    { type = builtin label = mixer name = gain_contact
                      control = { "Gain 1" = 1.5 } }   # CH2 Contact mic
                    { type = builtin label = mixer name = gain_evilpet
                      control = { "Gain 1" = 2.0 } }   # CH3 Evil Pet return
                    { type = builtin label = mixer name = gain_handy_l
                      control = { "Gain 1" = 4.0 } }   # CH4 Handytraxx L
                    { type = builtin label = mixer name = gain_handy_r
                      control = { "Gain 1" = 4.0 } }   # CH4 Handytraxx R
                    { type = builtin label = mixer name = gain_pc_l
                      control = { "Gain 1" = 1.0 } }   # CH5 PC L
                    { type = builtin label = mixer name = gain_pc_r
                      control = { "Gain 1" = 1.0 } }   # CH5 PC R
                    { type = builtin label = mixer name = gain_samp
                      control = { "Gain 1" = 2.0 } }   # CH6 Sampler (mono-L)

                    # L/R summing busses. 6 inputs each: 3 mono sources
                    # (Rode / Contact / Evil Pet) fanned to both sides +
                    # 3 stereo sources' respective L or R side.
                    { type = builtin label = mixer name = sum_l
                      control = {
                        "Gain 1" = 1.0  "Gain 2" = 1.0  "Gain 3" = 1.0
                        "Gain 4" = 1.0  "Gain 5" = 1.0  "Gain 6" = 1.0
                      } }
                    { type = builtin label = mixer name = sum_r
                      control = {
                        "Gain 1" = 1.0  "Gain 2" = 1.0  "Gain 3" = 1.0
                        "Gain 4" = 1.0  "Gain 5" = 1.0  "Gain 6" = 1.0
                      } }
                ]
                # Capture-port → per-channel gain stage.
                # NOTE 2026-04-20 swap: CH1 is now Evil Pet return, CH3 is Rode.
                inputs  = [
                    "gain_evilpet:In 1"  # AUX0  (CH1 Evil Pet return mono)
                    "gain_contact:In 1"  # AUX1  (CH2 Contact)
                    "gain_rode:In 1"     # AUX2  (CH3 Rode)
                    null                 # AUX3  (CH3 R — silent under MONO×2)
                    "gain_handy_l:In 1"  # AUX4  (CH4 Handytraxx L)
                    "gain_handy_r:In 1"  # AUX5  (CH4 Handytraxx R)
                    "gain_pc_l:In 1"     # AUX6  (CH5 PC L)
                    "gain_pc_r:In 1"     # AUX7  (CH5 PC R)
                    "gain_samp:In 1"     # AUX8  (CH6 Sampler mono-L)
                    null                 # AUX9  (CH6 R — silent, mono-only)
                    null                 # AUX10 (L6 Main Mix L — intentionally dropped)
                    null                 # AUX11 (L6 Main Mix R — intentionally dropped)
                ]
                # Internal routing: mono sources fan-out to L + R.
                links = [
                    { output = "gain_rode:Out"     input = "sum_l:In 1" }
                    { output = "gain_rode:Out"     input = "sum_r:In 1" }
                    { output = "gain_contact:Out"  input = "sum_l:In 2" }
                    { output = "gain_contact:Out"  input = "sum_r:In 2" }
                    { output = "gain_evilpet:Out"  input = "sum_l:In 3" }
                    { output = "gain_evilpet:Out"  input = "sum_r:In 3" }
                    { output = "gain_handy_l:Out"  input = "sum_l:In 4" }
                    { output = "gain_handy_r:Out"  input = "sum_r:In 4" }
                    { output = "gain_pc_l:Out"     input = "sum_l:In 5" }
                    { output = "gain_pc_r:Out"     input = "sum_r:In 5" }
                    { output = "gain_samp:Out"     input = "sum_l:In 6" }
                    { output = "gain_samp:Out"     input = "sum_r:In 6" }
                ]
                outputs = [ "sum_l:Out" "sum_r:Out" ]
            }
            capture.props = {
                node.name    = "hapax-l6-evilpet-capture"
                node.description = "Hapax L6 → livestream (per-channel pre-fader)"
                target.object = "alsa_input.usb-ZOOM_Corporation_L6-00.multichannel-input"
                audio.channels = 12
                audio.position = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 AUX8 AUX9 AUX10 AUX11 ]
            }
            playback.props = {
                node.name    = "hapax-l6-evilpet-playback"
                target.object = "hapax-livestream-tap"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
        }
    }
]
