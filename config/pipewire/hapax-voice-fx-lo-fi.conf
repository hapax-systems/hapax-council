# Voice-FX preset: lo-fi
#
# Aesthetic: lo-fi hip-hop / cassette-tape character. Mild highpass
# at 100 Hz preserves low-end body; a +2 dB low-shelf at 180 Hz
# adds cassette warmth; a +3 dB peak at 1.5 kHz pushes the
# midrange forward (cassette + lo-fi sample-rate-reduced character);
# a -2 dB notch at 3.2 kHz models the cassette-band frequency-loss
# zone; and a -4 dB high-shelf at 8 kHz drops the highs the way
# cassette tape did naturally above its self-noise floor.
#
# Preset family: cc-task ``voice-fx-chain-aesthetic-presets-tranche``.
# JR packet evidence base: voice-fx-broadcast-best-practices-2026-05-04.
#
# Activation protocol: see voice-fx-vinyl-warmth.conf header.
#
# Use case: contemplative / studied / thoughtful register. Pairs
# with stimmung-responsive ``diffusion`` lift (per JR packet
# finding 3 — distinct aesthetics emerge from modulation across
# degradation/tension/diffusion dimensions).

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-voice-fx"
            node.description = "Hapax Voice FX — lo-fi preset"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Layer 1: Mild highpass at 100 Hz ──
                    { type = builtin name = hp_l label = bq_highpass
                      control = { "Freq" = 100.0 "Q" = 0.707 } }
                    { type = builtin name = hp_r label = bq_highpass
                      control = { "Freq" = 100.0 "Q" = 0.707 } }

                    # ── Layer 2: Cassette warmth at 180 Hz (+2 dB) ──
                    { type = builtin name = warmth_l label = bq_lowshelf
                      control = { "Freq" = 180.0 "Q" = 0.707 "Gain" = 2.0 } }
                    { type = builtin name = warmth_r label = bq_lowshelf
                      control = { "Freq" = 180.0 "Q" = 0.707 "Gain" = 2.0 } }

                    # ── Layer 3: Mid-emphasis at 1.5 kHz (+3 dB) ──
                    # The forward / sample-rate-reduced character.
                    { type = builtin name = forward_l label = bq_peaking
                      control = { "Freq" = 1500.0 "Q" = 0.9 "Gain" = 3.0 } }
                    { type = builtin name = forward_r label = bq_peaking
                      control = { "Freq" = 1500.0 "Q" = 0.9 "Gain" = 3.0 } }

                    # ── Layer 4: Cassette-band dropout at 3.2 kHz (-2 dB) ──
                    { type = builtin name = dropout_l label = bq_peaking
                      control = { "Freq" = 3200.0 "Q" = 1.5 "Gain" = -2.0 } }
                    { type = builtin name = dropout_r label = bq_peaking
                      control = { "Freq" = 3200.0 "Q" = 1.5 "Gain" = -2.0 } }

                    # ── Layer 5: Cassette high-frequency loss above 8 kHz ──
                    { type = builtin name = roll_l label = bq_highshelf
                      control = { "Freq" = 8000.0 "Q" = 0.707 "Gain" = -4.0 } }
                    { type = builtin name = roll_r label = bq_highshelf
                      control = { "Freq" = 8000.0 "Q" = 0.707 "Gain" = -4.0 } }
                ]
                links = [
                    { output = "hp_l:Out"      input = "warmth_l:In" }
                    { output = "warmth_l:Out"  input = "forward_l:In" }
                    { output = "forward_l:Out" input = "dropout_l:In" }
                    { output = "dropout_l:Out" input = "roll_l:In" }
                    { output = "hp_r:Out"      input = "warmth_r:In" }
                    { output = "warmth_r:Out"  input = "forward_r:In" }
                    { output = "forward_r:Out" input = "dropout_r:In" }
                    { output = "dropout_r:Out" input = "roll_r:In" }
                ]
                inputs  = [ "hp_l:In" "hp_r:In" ]
                outputs = [ "roll_l:Out" "roll_r:Out" ]
            }

            capture.props = {
                node.name = "hapax-voice-fx-capture"
                node.description = "Hapax Voice FX (input) — lo-fi"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-voice-fx-playback"
                node.description = "Hapax Voice FX (output) — lo-fi"
                target.object = "hapax-loudnorm-capture"
            }
        }
    }
]
