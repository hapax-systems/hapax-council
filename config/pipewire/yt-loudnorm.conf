# YT bed loudness normalisation — B2 / High #13 (audit closeout).
#
# Creates ``hapax-yt-loudnorm`` upstream of the YT→24c ducker
# (``hapax-ytube-ducked`` from voice-over-ytube-duck.conf). Operators
# route the YouTube media-bed source through this sink first; the
# normalised output then targets the ducker which the voice sidechain
# attenuates when the operator speaks.
#
# Target: -16 LUFS integrated / -1.5 dBTP true-peak per audit spec
# §3.4. The SC4 + fast-lookahead-limiter chain matches the proven
# voice-fx-loudnorm.conf pattern; thresholds are tuned for YT-bed
# levels (typically arrives -14 to -10 LUFS depending on video age
# + uploader normalisation, so we compress harder than the voice
# chain to bring the variance down).
#
# SIGNAL FLOW
#
#   YT browser/OBS media source → hapax-yt-loudnorm (this conf) →
#       hapax-ytube-ducked (voice-over-ytube-duck.conf) →
#       default stereo output
#
# INSTALL
#
#   cp config/pipewire/yt-loudnorm.conf ~/.config/pipewire/pipewire.conf.d/
#   cp config/pipewire/voice-over-ytube-duck.conf \
#       ~/.config/pipewire/pipewire.conf.d/   # (if not already deployed)
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pactl list short sinks | grep -E "hapax-yt-loudnorm|hapax-ytube-ducked"
#
# ROUTE YT THROUGH THE LOUDNORM
#
#   In OBS / browser, set the media source's audio output to
#   ``Hapax YT Loudnorm`` (the loudnorm sink). The loudnorm conf's
#   playback target is hapax-ytube-ducked — so the chain is automatic
#   once both confs are deployed.
#
# TUNE
#
# - Threshold (-14 dB default) — start point for YT bed compression.
#   Heavier than voice (-18 dB) because YT inputs land hotter; raise
#   toward -10 dB if the bed still sounds dynamic enough that ducks
#   feel jumpy.
# - Limit ceiling (-1.5 dB default) — true-peak budget per audit
#   spec §3.4. Never set to 0 dB — risks inter-sample clipping at
#   the encoder output.
# - Ratio (4:1 default) — heavier than voice (3:1) since YT bed is
#   a "wallpaper" channel, not the focal voice.
#
# MEASURE LUFS POST-DEPLOY
#
#   pw-cat --record --target hapax-yt-loudnorm.monitor --format s16 \
#       --rate 48000 --channels 2 --latency 1024 /tmp/yt-bed-30s.wav &
#   PID=$!; sleep 30; kill $PID
#   ffmpeg -i /tmp/yt-bed-30s.wav -af loudnorm=print_format=summary -f null -
#   # Read the "Input Integrated" line — should land near -16 LUFS.
#
# REFERENCES
#
# - Audit: docs/superpowers/audits/2026-04-20-3h-work-audit-remediation.md (B2 / H#13)
# - Spec: docs/superpowers/specs/2026-04-18-youtube-broadcast-bundle-design.md §3.4
# - Sister conf: config/pipewire/voice-fx-loudnorm.conf (TTS-side equivalent)
# - Downstream chain: config/pipewire/voice-over-ytube-duck.conf

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-yt-loudnorm"
            node.description = "Hapax YT bed loudness normalisation (-16 LUFS / -1.5 dBTP target)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Stereo SC4 compressor (Steve Harris). YT bed is
                    # a "wallpaper" channel — heavier compression than
                    # voice keeps the duck-curve sounding smooth.
                    { type = ladspa
                      plugin = "sc4_1882"
                      label = "sc4"
                      name = "yt_comp_l"
                      control = {
                          "RMS/peak" = 0.5
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 250
                          "Threshold level (dB)" = -14
                          "Ratio (1:n)" = 4
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = 2
                      }
                    }
                    { type = ladspa
                      plugin = "sc4_1882"
                      label = "sc4"
                      name = "yt_comp_r"
                      control = {
                          "RMS/peak" = 0.5
                          "Attack time (ms)" = 5.0
                          "Release time (ms)" = 250
                          "Threshold level (dB)" = -14
                          "Ratio (1:n)" = 4
                          "Knee radius (dB)" = 4.0
                          "Makeup gain (dB)" = 2
                      }
                    }

                    # ── Fast-lookahead limiter (Steve Harris).
                    # -1.5 dBTP ceiling per audit spec §3.4 — leaves
                    # 0.5 dB headroom over the voice chain's -1.0 dB
                    # so the YT bed can never out-peak the voice.
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "yt_limit_l"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)" = -1.5
                          "Release time (s)" = 0.05
                      }
                    }
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "yt_limit_r"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)" = -1.5
                          "Release time (s)" = 0.05
                      }
                    }
                ]
                inputs  = [ "yt_comp_l:Input"  "yt_comp_r:Input"  ]
                outputs = [ "yt_limit_l:Output" "yt_limit_r:Output" ]
                links = [
                    { output = "yt_comp_l:Output" input = "yt_limit_l:Input" }
                    { output = "yt_comp_r:Output" input = "yt_limit_r:Input" }
                ]
            }

            capture.props = {
                node.name = "hapax-yt-loudnorm"
                node.description = "Hapax YT Loudnorm (input — route YT bed sources here)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-yt-loudnorm-playback"
                # Chain into the ducker — this is the load-bearing
                # decision: normalised YT bed flows to hapax-ytube-ducked
                # so the voice sidechain attenuates the NORMALISED level,
                # not the raw uploader-variance level.
                target.object = "hapax-ytube-ducked"
                node.passive = true
            }
        }
    }
]
