# Fail-closed private-monitor bridge to MPC Live III AUX8/AUX9.
The MPC owns the downstream private monitor routing. S-4 is not a
required host-side ALSA playback target for this HN-readiness path.

context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "Fail-closed private-monitor bridge to MPC Live III AUX8/AUX9.
The MPC owns the downstream private monitor routing. S-4 is not a
required host-side ALSA playback target for this HN-readiness path.
"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "hapax-private-playback"
                media.class = Audio/Sink

                target.object = "hapax-private"
                stream.capture.sink = true
                state.restore = false
                stream.dont-remix = true
            }
            playback.props = {
                node.name = "hapax-private-playback-output"

                target.object = "alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output"
                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                state.restore = false
                stream.dont-remix = true
            }
        }
    }
]
