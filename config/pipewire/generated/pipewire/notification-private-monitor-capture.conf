# Capture side for private notification monitor bridge
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.description = "Capture side for private notification monitor bridge"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "hapax-notification-private-monitor-capture"
            }
            playback.props = {
                node.name = "hapax-notification-private-monitor-capture-playback"
            target.object = "hapax-notification-private"
            }
        }
    }
]
