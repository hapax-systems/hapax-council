# S-4 USB stereo content loopback to livestream tap
context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "S-4 USB stereo content loopback to livestream tap"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "hapax-s4-content"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name = "hapax-s4-content-output"
            target.object = "hapax-livestream-tap"
            }
        }
    }
]
