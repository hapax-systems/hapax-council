# YouTube bed loudnorm routed to MPC USB IN 7/8
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-yt-loudnorm"
            node.description = "YouTube bed loudnorm routed to MPC USB IN 7/8"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "yt_loudnorm"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -18.0
                          "Release time (s)" = 0.2
                      }
                    }
                ]
                inputs  = [ "yt_loudnorm:Input 1"  "yt_loudnorm:Input 2"  ]
                outputs = [ "yt_loudnorm:Output 1" "yt_loudnorm:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-yt-loudnorm"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-yt-loudnorm-playback"

                target.object = "alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output"
                node.passive = false
                stream.dont-remix = true
            }
        }
    }
]
