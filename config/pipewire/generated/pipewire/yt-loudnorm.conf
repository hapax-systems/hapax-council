# YouTube bed loudnorm, routed into livestream-tap software sum. Broadcast eligibility of the YouTube route stays GATED (broadcast_eligible=false, blocked_until_smoke) until the real-content ducker smoke passes.
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-yt-loudnorm"
            node.description = "YouTube bed loudnorm, routed into livestream-tap software sum. Broadcast eligibility of the YouTube route stays GATED (broadcast_eligible=false, blocked_until_smoke) until the real-content ducker smoke passes."
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "yt_loudnorm"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -18.0
                          "Release time (s)" = 0.2
                      }
                    }
                ]
                inputs  = [ "yt_loudnorm:Input 1"  "yt_loudnorm:Input 2"  ]
                outputs = [ "yt_loudnorm:Output 1" "yt_loudnorm:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-yt-loudnorm"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-yt-loudnorm-playback"
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]

                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                stream.dont-remix = true
            }
        }
    }
]
