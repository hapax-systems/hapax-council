# Default multimedia role, dead-ended at PC loudnorm with no MPC/livestream egress
context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "Default multimedia role, dead-ended at PC loudnorm with no MPC/livestream egress"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "input.loopback.sink.role.multimedia"
                media.class = Audio/Sink

                device.intended-roles = [ "Music", "Movie", "Game", "Multimedia" ]
                policy.role-based.priority = 10
                policy.role-based.action.same-priority = "mix"
                policy.role-based.action.lower-priority = "mix"
                policy.role-based.preferred-target = "hapax-pc-loudnorm"
                state.restore = false
            }
            playback.props = {
                node.name = "input.loopback.sink.role.multimedia-output"

                target.object = "hapax-pc-loudnorm"
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                state.restore = false
            }
        }
    }
]
