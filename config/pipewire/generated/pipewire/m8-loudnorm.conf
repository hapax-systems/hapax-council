# M8 instrument loudnorm, disabled until route policy explicitly promotes it
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-m8-loudnorm"
            node.description = "M8 instrument loudnorm, disabled until route policy explicitly promotes it"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ AUX10 AUX11 ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "m8_loudnorm"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -18.0
                          "Release time (s)" = 0.2
                      }
                    }
                ]
                inputs  = [ "m8_loudnorm:Input 1"  "m8_loudnorm:Input 2"  ]
                outputs = [ "m8_loudnorm:Output 1" "m8_loudnorm:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-m8-loudnorm"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-m8-loudnorm-playback"

                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.passive = false
                stream.dont-remix = true
            }
        }
    }
]
