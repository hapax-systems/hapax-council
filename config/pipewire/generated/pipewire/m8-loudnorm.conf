# M8 instrument loudnorm routed through MPC/L-12 policy, not directly to stream
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-m8-loudnorm"
            node.description = "M8 instrument loudnorm routed through MPC/L-12 policy"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "m8_loudnorm"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -18.0
                          "Release time (s)" = 0.2
                      }
                    }
                ]
                inputs  = [ "m8_loudnorm:Input 1"  "m8_loudnorm:Input 2"  ]
                outputs = [ "m8_loudnorm:Output 1" "m8_loudnorm:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-m8-loudnorm"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-m8-loudnorm-playback"
                node.autoconnect = false
                target.object = "alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output"
                node.passive = true
                audio.position = [ AUX10 AUX11 ]
                stream.dont-remix = true
            }
        }
    }
]
