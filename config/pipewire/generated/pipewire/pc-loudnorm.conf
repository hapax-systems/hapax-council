# PC-wide loudnorm sink routed to L-12 USB return
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-pc-loudnorm"
            node.description = "PC-wide loudnorm sink routed to L-12 USB return"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "pc_loudnorm"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -18.0
                          "Release time (s)" = 0.2
                      }
                    }
                ]
                inputs  = [ "pc_loudnorm:Input 1"  "pc_loudnorm:Input 2"  ]
                outputs = [ "pc_loudnorm:Output 1" "pc_loudnorm:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-pc-loudnorm"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-pc-loudnorm-playback"
                target.object = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40"
                node.passive = false
                stream.dont-remix = true
            }
        }
    }
]
