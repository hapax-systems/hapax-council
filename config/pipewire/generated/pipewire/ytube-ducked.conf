# YouTube bed ducker sink
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-ytube-ducked"
            node.description = "YouTube bed ducker sink"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = builtin name = duck_l label = mixer
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin name = duck_r label = mixer
                      control = { "Gain 1" = 1.0 } }
                ]
                inputs  = [ "duck_l:In 1" "duck_r:In 1" ]
                outputs = [ "duck_l:Out"  "duck_r:Out"  ]
            }

            capture.props = {
                node.name = "hapax-ytube-ducked"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-ytube-ducked-playback"

                node.passive = false
                stream.dont-remix = true
            }
        }
    }
]
