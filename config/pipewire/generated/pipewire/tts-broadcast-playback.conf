# TTS broadcast loopback playback side into livestream tap
context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "TTS broadcast loopback playback side into livestream tap"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "hapax-tts-broadcast-playback"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name = "hapax-tts-broadcast-playback-output"
            target.object = "hapax-livestream-tap"
            }
        }
    }
]
