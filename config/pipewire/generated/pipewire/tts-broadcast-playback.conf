# Retired TTS broadcast loopback playback side (fail-closed)
context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "Retired TTS broadcast loopback playback side (fail-closed)"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "hapax-tts-broadcast-playback"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name = "hapax-tts-broadcast-playback-output"
                node.autoconnect = false
                node.passive = true
            }
        }
    }
]
