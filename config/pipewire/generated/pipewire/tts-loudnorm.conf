# TTS loudnorm capture side, output routed to TTS duck
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-loudnorm-capture"
            node.description = "TTS loudnorm capture side, output routed to TTS duck"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "tts_loudnorm"
                      control = {
                          "Input gain (dB)" = 0.0
                          "Limit (dB)"      = -18.0
                          "Release time (s)" = 0.2
                      }
                    }
                ]
                inputs  = [ "tts_loudnorm:Input 1"  "tts_loudnorm:Input 2"  ]
                outputs = [ "tts_loudnorm:Output 1" "tts_loudnorm:Output 2" ]
            }

            capture.props = {
                node.name = "hapax-loudnorm-capture"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-loudnorm-capture-playback"
                target.object = "hapax-tts-duck"
                node.passive = false
                stream.dont-remix = true
            }
        }
    }
]
