# TTS loudnorm capture side, output routed to mk5 OUT 3/4 dry send into S-4
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-loudnorm-capture"
            node.description = "TTS loudnorm capture side, output routed to mk5 OUT 3/4 dry send into S-4"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = builtin name = pass_l label = mixer
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin name = pass_r label = mixer
                      control = { "Gain 1" = 1.0 } }
                ]
                inputs  = [ "pass_l:In 1" "pass_r:In 1" ]
                outputs = [ "pass_l:Out"  "pass_r:Out"  ]
            }

            capture.props = {
                node.name = "hapax-loudnorm-capture"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-loudnorm-playback"
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]

                node.autoconnect = false
                stream.dont-remix = true
            }
        }
    }
]
