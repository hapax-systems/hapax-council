# Notification role, routed to fail-closed private notification sink
context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "Notification role, routed to fail-closed private notification sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "input.loopback.sink.role.notification"
                media.class = Audio/Sink
                device.intended-roles = [ "Notification" ]
                policy.role-based.priority = 20
                policy.role-based.action.same-priority = "mix"
                policy.role-based.action.lower-priority = "mix"
                policy.role-based.preferred-target = "hapax-notification-private"
            }
            playback.props = {
                node.name = "input.loopback.sink.role.notification-output"
            target.object = "hapax-notification-private"
            }
        }
    }
]
