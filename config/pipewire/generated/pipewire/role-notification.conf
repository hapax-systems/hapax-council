# Notification role, routed to fail-closed private notification sink
context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "Notification role, routed to fail-closed private notification sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "input.loopback.sink.role.notification"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name = "input.loopback.sink.role.notification-output"
            target.object = "hapax-notification-private"
            }
        }
    }
]
