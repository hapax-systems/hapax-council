# Option C private-monitor bridge to S-4 USB IN Track 1 input.
Per spec amendment 2026-05-02, the notification private path
shares the same S-4 USB IN target as the assistant private
path; the S-4 internal scene routes both through the same
private-monitor track.

context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "Option C private-monitor bridge to S-4 USB IN Track 1 input.
Per spec amendment 2026-05-02, the notification private path
shares the same S-4 USB IN target as the assistant private
path; the S-4 internal scene routes both through the same
private-monitor track.
"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "hapax-notification-private-playback"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name = "hapax-notification-private-playback-output"
            target.object = "alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output"
            }
        }
    }
]
