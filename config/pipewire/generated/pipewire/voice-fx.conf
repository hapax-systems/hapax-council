# Hapax voice FX input, output routed to TTS loudnorm
context.modules = [
    {  name = libpipewire-module-filter-chain
        args = {
            node.description = "Hapax voice FX input, output routed to TTS loudnorm"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "hapax-voice-fx-capture"
            }
            playback.props = {
                node.name = "hapax-voice-fx-capture-playback"
            target.object = "hapax-loudnorm-capture"
            }
        }
    }
]
