# Broadcast TTS role, routed to voice FX chain
context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "Broadcast TTS role, routed to voice FX chain"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "input.loopback.sink.role.broadcast"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name = "input.loopback.sink.role.broadcast-output"
            target.object = "hapax-voice-fx-capture"
            }
        }
    }
]
