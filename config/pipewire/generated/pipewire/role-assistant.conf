# Assistant/private TTS role, routed to fail-closed private sink
context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "Assistant/private TTS role, routed to fail-closed private sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "input.loopback.sink.role.assistant"
                media.class = Audio/Sink

                device.intended-roles = [ "Assistant" ]
                policy.role-based.priority = 40
                policy.role-based.action.same-priority = "mix"
                policy.role-based.action.lower-priority = "duck"
                policy.role-based.preferred-target = "hapax-private"
                state.restore = false
            }
            playback.props = {
                node.name = "input.loopback.sink.role.assistant-output"

                target.object = "hapax-private"
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                state.restore = false
            }
        }
    }
]
