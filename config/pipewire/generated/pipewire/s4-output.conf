# Torso S-4 pro-audio multichannel output.
Optional S-4 host-side write end. It is not the HN private-monitor
readiness target; S-4 remains downstream/MIDI in the MPC-first route.

context.objects = [
    {  factory = adapter
        args = {
            factory.name = api.alsa.pcm.sink
            node.name    = "alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output"
            media.class  = Audio/Sink
            audio.format = S32LE
            audio.channels = 10
            audio.position = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 AUX8 AUX9 ]
            api.alsa.path = "hw:CARD=S4"
            hn_private_monitor_target = false
            control_plane = "midi"
        }
    }
]
