# PipeWire filter-chain approximating S-4 VOICE-SELF-MOD scene.
#
# Software fallback for testing voice character without S-4 hardware.
# Cannot replicate granular engine (Mosaic) — only filter/color/space.
# Use this for development; real voice identity requires the S-4.
#
# Signal: TTS output → pitch shift → resonant bandpass → presence
# narrowing → high cut → output
#
# CASE-VOICE-PIPELINE-REPAIR-20260517 Track D3.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-voice-s4-emu"
            node.description = "Hapax S-4 Voice Emulation (software fallback)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # Resonant bandpass at 2.2 kHz (Ring filter approximation)
                    { type = builtin  name = ring_l  label = bq_bandpass
                      control = { "Freq" = 2200.0  "Q" = 1.8 } }
                    { type = builtin  name = ring_r  label = bq_bandpass
                      control = { "Freq" = 2200.0  "Q" = 1.8 } }

                    # Presence narrowing at 1.8 kHz (machine-like spectral focus)
                    { type = builtin  name = narrow_l  label = bq_peaking
                      control = { "Freq" = 1800.0  "Q" = 2.5  "Gain" = 3.0 } }
                    { type = builtin  name = narrow_r  label = bq_peaking
                      control = { "Freq" = 1800.0  "Q" = 2.5  "Gain" = 3.0 } }

                    # High cut at 6 kHz (machine environment — not bright)
                    { type = builtin  name = dark_l  label = bq_lowpass
                      control = { "Freq" = 6000.0  "Q" = 0.707 } }
                    { type = builtin  name = dark_r  label = bq_lowpass
                      control = { "Freq" = 6000.0  "Q" = 0.707 } }
                ]
                links = [
                    { output = "ring_l:Out"    input = "narrow_l:In" }
                    { output = "narrow_l:Out"  input = "dark_l:In" }
                    { output = "ring_r:Out"    input = "narrow_r:In" }
                    { output = "narrow_r:Out"  input = "dark_r:In" }
                ]
                inputs  = [ "ring_l:In"  "ring_r:In" ]
                outputs = [ "dark_l:Out"  "dark_r:Out" ]
            }
        }
    }
]
