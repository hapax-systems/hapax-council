# Private notification sink, fail-closed with no L-12 playback bridge
context.objects = [
    {  factory = adapter
        args = {
            factory.name = support.null-audio-sink
            node.name    = "hapax-notification-private"
            media.class  = Audio/Sink
            audio.channels = 2
                audio.position = [ FL FR ]
        }
    }
]
