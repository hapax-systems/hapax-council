# S-4 USB stereo content loopback, disabled until route policy explicitly promotes it
context.modules = [
    {  name = libpipewire-module-loopback
        args = {
            node.description = "S-4 USB stereo content loopback, disabled until route policy explicitly promotes it"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "hapax-s4-content"
                media.class = Audio/Sink

            }
            playback.props = {
                node.name = "hapax-s4-content-output"

                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.passive = true
            }
        }
    }
]
