# PipeWire loopback routing TTS voice output to S-4 hardware USB input.
#
# CASE-VOICE-PIPELINE-REPAIR-20260517 Track D4.
#
# Signal path:
#   TTS output (hapax-voice-fx-capture) → hapax-s4-voice-send (this loopback)
#     → S-4 USB Track 1 input → S-4 VOICE-SELF-MOD processing
#     → S-4 USB output → hapax-s4-content (via hapax-s4-loopback.conf)
#     → hapax-livestream-tap → broadcast chain
#
# Fail-safe: when the S-4 is absent, the dynamic audio router (agents/
# audio_router/dynamic_router.py) detects `s4_reachable = False` and
# the voice-fx chain output falls through to the software emulation
# (hapax-voice-s4-emulation.conf) or dry bypass.
#
# The operator must set the S-4 to receive USB audio on Track 1 and
# enable VOICE-SELF-MOD scene via MIDI program change (scene index 11).
# The dynamic router handles the program change automatically.
#
# INSTALL
#
#   cp config/pipewire/hapax-voice-s4-hardware.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire pipewire-pulse wireplumber
#
# VERIFY
#
#   pw-link -l | grep hapax-s4-voice-send
#   # Should show capture and playback ports
#
# IMPORTANT: This creates the loopback infrastructure only. The actual
# link from voice-fx output to this sink is managed by the dynamic
# audio router when it detects the S-4 USB device is present.

context.modules = [
    {
        name = libpipewire-module-loopback
        args = {
            node.name = "hapax-s4-voice-send"
            node.description = "TTS → S-4 hardware voice send"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            capture.props = {
                media.class = "Audio/Sink"
                node.name = "hapax-s4-voice-send"
                node.description = "TTS → S-4 hardware voice send"
                node.passive = true
            }
            playback.props = {
                node.name = "hapax-s4-voice-send-playback"
                node.description = "TTS → S-4 hardware voice send (playback)"
                # Target the S-4 USB audio input — Track 1 stereo
                # Pattern matches the Torso Elektron S-4 USB device
                target.object = "alsa_output.usb-Torso_Electronics_S-4*"
                node.dont-reconnect = true
                node.passive = true
            }
        }
    }
]
