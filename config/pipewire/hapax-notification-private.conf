# Hapax notification-private sink — fail-closed off L-12.
#
# Creates a private notification sink ``hapax-notification-private``
# for chat / desktop / system chimes.
#
# WHY THE RETARGET
#
# The prior revision targeted ``alsa_output.usb-ZOOM_Corporation_L-12
# .analog-surround-40`` (L-12 MASTER OUT). The intent was "operator-only
# analog monitor" since USB capture is pre-master-fader per-channel,
# so master-bus audio doesn't reach broadcast. But the operator
# governance directive 2026-04-21 tightened the invariant:
#
#     "Nothing should go to the L-12 that shouldn't end up in the
#      livestream." (see feedback_l12_equals_livestream_invariant.md)
#
# Anything acoustically emerging from the L-12 monitor out is at risk of
# being picked up by the room-adjacent Rode Wireless Pro (CH5 XLR), which
# IS a broadcast channel. Routing chimes to the Yeti headphone jack
# eliminates that second-order path: in-ear audio, zero acoustic bleed,
# zero broadcast risk.
#
# DESTINATION RATIONALE
#
# Options considered (see lssh-014 task note and wsjf-004):
#   - Yeti headphone jack — good private endpoint when physically present,
#     but PipeWire falls through to the default sink when the ALSA target
#     is absent.
#   - iLoud BT speaker — wireless and room-audible, therefore capable of
#     acoustic re-entry into broadcast mics.
#   - Dedicated null sink (chosen) — silent when no private monitor bridge
#     is explicitly present, but cannot leak to L-12 through target fallback.
#
# Restoring audible private notifications should add an explicit off-L-12
# monitor bridge from this sink's monitor ports to the chosen hardware.
# Do not add a direct target.object here unless the leak guard is extended
# to prove that target cannot fall through to L-12.
#
# COMPANION WirePlumber rule
#
# ``config/wireplumber/92-hapax-notification-private.conf`` retargets
# streams carrying ``media.role = "notification"`` to this sink instead
# of the default route. The WP rule is destination-agnostic (names this
# sink, not the hardware), so no change needed there.

context.objects = [
    {   factory = adapter
        args = {
            factory.name       = support.null-audio-sink
            node.name          = "hapax-notification-private"
            node.nick          = "Notify-Private"
            node.description   = "Hapax Notification Private (fail-closed null sink)"
            media.class        = "Audio/Sink"
            audio.position     = "[ FL FR ]"
            monitor.channel-volumes = true
            monitor.passthrough     = true
            adapter.auto-port-config = {
                mode = dsp  monitor = true  position = preserve
            }
        }
    }
]
