# Hapax voice effects chain
#
# Creates a virtual sink "hapax-voice-fx" that processes TTS audio through
# a vocal chain (highpass → presence EQ → compressor → limiter) before
# routing into the master loudnorm chain (`hapax-loudnorm-capture`),
# which feeds the L-12 → Evil Pet → broadcast path. The historical 24c
# analog output target was retired with the Studio 24c hardware
# (2026-05-03 cleanup). See playback.props.target.object below.
#
# To use: configure hapax-daimonion's TTS output target to
# "input.loopback.sink.role.assistant" (unchanged) — the role-based
# loopback already routes to the default sink. To route TTS through this
# FX chain instead, set the PipeWire target to "hapax-voice-fx" in
# agents/hapax_daimonion/pw_audio_output.py or via environment.
#
# All filters are PipeWire builtins — no external plugins required.
# Tune the controls below to taste.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-voice-fx"
            node.description = "Hapax Voice FX Chain"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    # ── Layer 1: High-pass (remove rumble/DC, below 80Hz) ──
                    { type = builtin name = hp_l label = bq_highpass
                      control = { "Freq" = 80.0 "Q" = 0.707 } }
                    { type = builtin name = hp_r label = bq_highpass
                      control = { "Freq" = 80.0 "Q" = 0.707 } }

                    # ── Layer 2: Low-mid cut (reduce boxiness at 350Hz) ──
                    { type = builtin name = lowmid_l label = bq_peaking
                      control = { "Freq" = 350.0 "Q" = 1.2 "Gain" = -2.0 } }
                    { type = builtin name = lowmid_r label = bq_peaking
                      control = { "Freq" = 350.0 "Q" = 1.2 "Gain" = -2.0 } }

                    # ── Layer 3: Presence boost (clarity at 3kHz) ──
                    { type = builtin name = presence_l label = bq_peaking
                      control = { "Freq" = 3000.0 "Q" = 0.9 "Gain" = 3.0 } }
                    { type = builtin name = presence_r label = bq_peaking
                      control = { "Freq" = 3000.0 "Q" = 0.9 "Gain" = 3.0 } }

                    # ── Layer 4: Air / breath (high shelf at 10kHz) ──
                    { type = builtin name = air_l label = bq_highshelf
                      control = { "Freq" = 10000.0 "Q" = 0.707 "Gain" = 2.0 } }
                    { type = builtin name = air_r label = bq_highshelf
                      control = { "Freq" = 10000.0 "Q" = 0.707 "Gain" = 2.0 } }
                ]
                links = [
                    { output = "hp_l:Out" input = "lowmid_l:In" }
                    { output = "lowmid_l:Out" input = "presence_l:In" }
                    { output = "presence_l:Out" input = "air_l:In" }
                    { output = "hp_r:Out" input = "lowmid_r:In" }
                    { output = "lowmid_r:Out" input = "presence_r:In" }
                    { output = "presence_r:Out" input = "air_r:In" }
                ]
                inputs  = [ "hp_l:In" "hp_r:In" ]
                outputs = [ "air_l:Out" "air_r:Out" ]
            }

            capture.props = {
                node.name = "hapax-voice-fx-capture"
                node.description = "Hapax Voice FX (input)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-voice-fx-playback"
                node.description = "Hapax Voice FX (output)"
                # 2026-04-21: targets hapax-loudnorm-capture (the
                # voice-fx-loudnorm filter-chain input). Per the
                # per-source normalisation audit (PR #1161, PR #1162):
                # TTS was bypassing voice-fx-loudnorm entirely and
                # landing raw on the L-12. The chain is now:
                #   daimonion → voice-fx-capture (EQ/comp/limiter)
                #     → hapax-loudnorm-capture (sc4m + hard_limiter)
                #     → Ryzen line-out (voice-fx-loudnorm.playback target)
                #     → L-12 ch 4 AUX-1 → Evil Pet L-in → Evil Pet L-out
                #     → L-12 ch 3 → Main Mix → broadcast.
                target.object = "hapax-loudnorm-capture"
            }
        }
    }
]
