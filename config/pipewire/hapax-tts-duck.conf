# Hapax TTS Duck — retired software sidechain ducking (2026-04-23)
#
# This file remains as a rollback-only mixer fixture for
# hapax-audio-ducker.service readback. The current MPC-first broadcast
# path is role.broadcast -> voice-fx -> loudnorm -> MPC USB AUX2/3 ->
# L-12 wet return -> livestream-tap. Do not reintroduce a direct
# hapax-tts-broadcast-playback -> hapax-livestream-tap bridge.
#
# DUCK DEPTHS (set by daemon)
#   Operator voice (Rode) active : Gain 1 = 0.398  (≈ -8 dB)
#   Operator silent              : Gain 1 = 1.0   (passthrough)
#
# TTS does NOT duck under itself.
#
context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-tts-duck"
            node.description = "Hapax TTS Duck (operator-VAD sidechain)"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = builtin name = duck_l label = mixer
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin name = duck_r label = mixer
                      control = { "Gain 1" = 1.0 } }
                ]
                inputs  = [ "duck_l:In 1" "duck_r:In 1" ]
                outputs = [ "duck_l:Out"  "duck_r:Out"  ]
            }

            capture.props = {
                node.name = "hapax-tts-duck"
                node.description = "Hapax TTS Duck (input — loudnorm-playback target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-tts-duck-playback"
                node.description = "Hapax TTS Duck (retired fail-closed output)"
                node.autoconnect = false
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }
]
