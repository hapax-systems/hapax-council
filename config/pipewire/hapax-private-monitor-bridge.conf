# Hapax private monitor bridge — fail-closed MPC Live III private ingress.
#
# ``hapax-private`` and ``hapax-notification-private`` remain null sinks
# in their own config files. This file is the only audible private-monitor
# bridge: it captures those sink monitors and plays them to MPC Live III USB
# input AUX8/AUX9. The MPC owns the downstream monitor routing; S-4 is not a
# required host-side ALSA playback target for this HN-readiness route.
#
# Fail-closed contract:
#   - target.object names the exact MPC Live III ALSA sink, never a default sink.
#   - absent hardware produces silence, not fallback.
#   - node.dont-fallback=true prevents WirePlumber from choosing L-12,
#     hapax-pc-loudnorm, Multimedia, or any other best/default target when
#     the MPC Live III is absent.
#   - node.dont-reconnect=true prevents an established bridge from moving
#     to another sink when the MPC Live III disappears.
#   - node.dont-move=true and state.restore=false keep pavucontrol or old
#     stream-state metadata from persisting a broad Loopback move.
#   - node.linger=true lets the stream wait silently for the MPC instead
#     of falling through to default hardware.
#
# Source monitors are expressed with ``stream.capture.sink=true`` plus
# ``target.object=<sink>`` because that is the PipeWire/WirePlumber pattern
# used elsewhere in this repo for null-sink monitor capture.

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "Hapax private monitor to MPC Live III AUX8/AUX9"
            capture.props = {
                node.name = "hapax-private-monitor-capture"
                stream.capture.sink = true
                target.object = "hapax-private"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                state.restore = false
            }
            playback.props = {
                node.name = "hapax-private-playback"
                node.nick = "Hapax Private MPC Monitor"
                node.description = "Hapax private monitor -> MPC Live III AUX8/AUX9 input"
                target.object = "alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                state.restore = false
            }
        }
    }

    {   name = libpipewire-module-loopback
        args = {
            node.description = "Hapax notification-private monitor to MPC Live III AUX8/AUX9"
            capture.props = {
                node.name = "hapax-notification-private-monitor-capture"
                stream.capture.sink = true
                target.object = "hapax-notification-private"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                state.restore = false
            }
            playback.props = {
                node.name = "hapax-notification-private-playback"
                node.nick = "Hapax Notification MPC Monitor"
                node.description = "Hapax notification-private monitor -> MPC Live III AUX8/AUX9 input"
                target.object = "alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                state.restore = false
            }
        }
    }
]
