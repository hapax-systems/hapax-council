# Hapax private monitor bridge — Option C track-fenced via S-4 USB IN.
#
# ``hapax-private`` and ``hapax-notification-private`` remain null sinks
# in their own config files. This file is the only audible private-monitor
# bridge: it captures those sink monitors and plays them to the S-4 USB IN
# multichannel-output sink, which the S-4 internal scene routes to Track 1
# → analog OUT 1/2 (operator's monitor patch). That patch is structurally
# OUTSIDE the L-12 broadcast path. This supersedes the pre-Option C Yeti
# pin (kept disabled-on-disk under
# `config/wireplumber/56-hapax-private-pin-yeti.conf.disabled-2026-05-02-option-c`
# for revert capability).
#
# Spec amendment 2026-05-02:
#   docs/superpowers/specs/2026-05-02-hapax-private-monitor-track-fenced-via-s4.md
#
# Fail-closed contract:
#   - target.object names the exact S-4 ALSA sink, never a default sink.
#   - absent hardware produces silence, not fallback.
#   - node.dont-fallback=true prevents WirePlumber from choosing L-12,
#     hapax-pc-loudnorm, Multimedia, or any other best/default target when
#     the S-4 is absent.
#   - node.dont-reconnect=true prevents an established bridge from moving
#     to another sink when the S-4 disappears.
#   - node.dont-move=true and state.restore=false keep pavucontrol or old
#     stream-state metadata from persisting a broad Loopback move.
#   - node.linger=true lets the stream wait silently for the S-4 instead
#     of falling through to default hardware.
#
# Source monitors are expressed with ``stream.capture.sink=true`` plus
# ``target.object=<sink>`` because that is the PipeWire/WirePlumber pattern
# used elsewhere in this repo for null-sink monitor capture.

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "Hapax private monitor to S-4 USB IN Track 1"
            capture.props = {
                node.name = "hapax-private-monitor-capture"
                stream.capture.sink = true
                target.object = "hapax-private"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                state.restore = false
            }
            playback.props = {
                node.name = "hapax-private-playback"
                node.nick = "Hapax Private S-4"
                node.description = "Hapax private monitor -> S-4 USB IN Track 1 input (Option C)"
                target.object = "alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                state.restore = false
            }
        }
    }

    {   name = libpipewire-module-loopback
        args = {
            node.description = "Hapax notification-private monitor to S-4 USB IN Track 1"
            capture.props = {
                node.name = "hapax-notification-private-monitor-capture"
                stream.capture.sink = true
                target.object = "hapax-notification-private"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                state.restore = false
            }
            playback.props = {
                node.name = "hapax-notification-private-playback"
                node.nick = "Hapax Notification S-4"
                node.description = "Hapax notification-private monitor -> S-4 USB IN Track 1 input (Option C)"
                target.object = "alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                state.restore = false
            }
        }
    }
]
