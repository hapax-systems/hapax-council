# In-band live caption routing (ytb-009).
#
# Per-source policy: which speakers/sources are routed into the
# live-caption JSONL stream. A future native CEA track may consume the
# same routed stream through GStreamer's cccombiner once an STT JSONL ->
# CEA packetizer exists.
#
# - allow: list of speaker tags (matches CaptionEvent.speaker).
#   The empty/unset speaker is always allowed (operator narration is
#   the default source).
# - deny: list of speaker tags to drop unconditionally. Wins over allow
#   when a tag appears in both lists.
#
# The routing layer enforces this BEFORE any broadcast caption consumer
# sees the text. Per-source consent follows the same pattern as
# `axioms/contracts/publication/*.yaml`: explicit allowlist with a
# small default-allow set for the operator's own speech.
#
# This config is read by `agents/live_captions/routing.py`.

allow:
  # Default: operator's own speech (no speaker tag set on emit).
  - oudepode
  - operator

deny:
  # Reserved for the per-guest-consent gate when the diarization
  # follow-up lands (out of scope for ytb-009 Phase 2).
  []

# Per-route fallback when a speaker is neither allow- nor deny-listed.
# 'allow' favours visibility (caption appears) — fits the SEO + a11y
# motivation for the captions track. Switch to 'deny' for events
# where consent posture should be conservative.
default: allow
