# Allowlist for `scripts/check-audio-conf-consistency.py`.
#
# Two sections:
#
#   * `orphans`        — conf basenames on disk that the gate accepts
#                        as legitimately yaml-unbacked (legacy confs
#                        kept for rollback, voice-fx variants the
#                        yaml doesn't model yet, numbered modules).
#
#   * `known_missing`  — conf basenames the gate accepts as missing
#                        even though yaml declares the chain. These
#                        are tracked under separate audit follow-on
#                        tasks; the gate's job is only to catch NEW
#                        drift, not existing-known.
#
# Both sections are operator-curated. New entries should carry a
# trailing comment explaining why the orphan / missing is acceptable
# (or what task tracks fixing it). The gate itself never auto-adds
# entries — it only consults this file.
#
# Cc-task: `audio-audit-F-precommit-yaml-conf-gate`.

orphans:
  # Global / source-split PipeWire modules — not LADSPA chain-modeled.
  - hapax-contact-mic.conf
  - hapax-quantum.conf

  # Stream-routing wraps that the yaml represents as filter_chain
  # nodes with chain_kind=None (no LADSPA conf needed). The conf
  # exists because some upstream operator workflow requires the
  # pipewire-format file even when yaml carries the params inline.
  - hapax-broadcast-master.conf
  - hapax-l12-evilpet-capture.conf
  - hapax-livestream-duck.conf
  - hapax-livestream-tap.conf
  - hapax-l12-usb-return-capture.conf  # MPC-first wet return; topology models it, conf stays hand-mirrored until generator parity.
  - hapax-l12-mainmix-tap.conf  # H5 P2 monitor-only null-sink; topology node is kind=tap, loopback is systemd/pactl-owned.
  - hapax-notification-private.conf
  - hapax-obs-broadcast-remap.conf
  - hapax-private-monitor-bridge.conf
  - hapax-stream-split.conf

  # PR A — Phase 3 PC volume isolation foundation. Single conf file
  # bundles three nodes (pc-router null-sink + pc-monitor + pc-broadcast
  # filter-chains) so they share a single PipeWire config-load event.
  # The yaml models all three nodes with hand-written params (chain_kind
  # is left None because the LADSPA control values are inlined in the
  # conf rather than generated from chain_kind/limit_db templates).
  # Tracked under cc-task `audio-pc-volume-isolation` PR A of 8.
  - hapax-pc-router.conf

  # USB line-driver — see audit finding #4 (WET_PATH_USB_BIAS).
  - hapax-music-usb-line-driver.conf

  # Legacy L-6 confs kept for rollback; superseded by L-12 nodes.
  - hapax-l6-evilpet-capture.conf

  # S-4 routing confs (s4-loopback, s4-usb-sink) — operator-monitor
  # path, not part of the yaml-modeled broadcast graph.
  - hapax-s4-loopback.conf
  - hapax-s4-usb-sink.conf

  # ReSpeaker XVF3800 profile pin — WirePlumber/ALSA card rule that exposes
  # the optional array mic as a multichannel capture surface; topology models
  # the hardware endpoints, not this policy drop-in as a filter-chain.
  - hapax-respeaker-xvf3800-array-mic.conf

  # voice-fx variants — operator-curated voice-FX presets, not
  # yaml-modeled (the yaml has a single `voice-fx` chain stub).
  - hapax-voice-fx-chain.conf  # renamed 2026-05-03 (audit-E slice 4)
  - hapax-voice-fx-loudnorm.conf  # renamed 2026-05-03 (audit-E slice 3)
  # YouTube + backing-mix sidechain ducker — dynamic gate, not yaml-modeled
  - hapax-backing-ducked.conf  # YouTube bed ducked under voice/backing events
  - hapax-backing-ducked-sidechain.conf  # sidechain feed for the ducker
  - hapax-voice-over-ytube-duck.conf  # VAD-gated voice-over-YT ramp

  # Pre-existing software-ducker remnants — superseded by MPC Live III
  # hardware ducking 2026-05-03. Files kept on disk for rollback only;
  # no yaml chain because they're functionally retired. Do not re-enable.
  - hapax-music-duck.conf  # software music ducker (retired)
  - hapax-tts-duck.conf  # software TTS ducker (retired)

  # Polyend Tracker loudnorm — operator-curated input chain, not
  # part of the broadcast yaml graph (Tracker output routes to
  # operator monitor only).
  - hapax-polyend-loudnorm.conf

  # Dirtywave M8 sampler input staging sink. The runtime loopback into
  # the M8 USB audio sink is pactl-owned by agents/m8_control/sample_capture.py
  # so the route can be restored after each bounded capture.
  - hapax-m8-sample-input.conf

known_missing:
  # tts-loudnorm is declared in audio-topology.yaml with chain_kind set,
  # but the hand-mirrored conf is still `hapax-voice-fx-loudnorm.conf`.
  # Tracked under generator/naming parity follow-on work.
  - hapax-tts-loudnorm.conf
