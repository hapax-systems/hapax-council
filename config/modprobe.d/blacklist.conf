# Hapax hardware-watchdog un-denylist (audit-w0-watchdog-arm-20260611).
#
# This file SHADOWS /usr/lib/modprobe.d/blacklist.conf (cachyos-settings):
# kmod gives an /etc/modprobe.d file with the same basename full precedence
# over the /usr/lib copy, so the vendor file is ignored entirely while this
# file exists. That is the only way to un-denylist a module — `blacklist`
# directives are cumulative across files and cannot be negated, and
# systemd-modules-load applies blacklists even to explicit modules-load.d
# entries (KMOD_PROBE_APPLY_BLACKLIST), which is why the 2026-03 podium
# attempt (modules-load.d + install-override) never loaded the module.
#
# Deliberate differences from the vendor file:
#   - sp5100_tco is NOT blacklisted: the SP5100/SB800 TCO hardware watchdog
#     is required for 24/7 unattended recovery (kernel hard-hang has no other
#     reset path). Armed via systemd RuntimeWatchdogSec — see
#     systemd/system/system.conf.d/10-hapax-watchdog.conf and
#     docs/runbooks/hardware-watchdog-sp5100.md (rollback = re-denylist).
#   - iTCO_wdt stays blacklisted (vendor default; Intel TCO, not present on
#     these AMD hosts).
#
# Maintenance: on cachyos-settings upgrades, diff the vendor file against
# this one and fold in any new entries (scripts/install-hardware-watchdog.sh
# --check reports drift of the installed copy only).

# Blacklist the Intel TCO Watchdog/Timer module
blacklist iTCO_wdt
