# Hapax — v4l2loopback module options for the M8 LCD bridge.
# See cc-task re-splay-homage-ward-m8.
#
# video_nr=15      — pin to /dev/video15 (predictable for compositor wiring)
# card_label       — surfaces in v4l2-ctl + as the device name in compositor logs
# exclusive_caps=1 — advertise OUTPUT|CAPTURE separately (fixes pipewire/gstreamer
#                    "no capabilities" rejection seen on certain video pipelines)
options v4l2loopback video_nr=15 card_label="Hapax M8 LCD" exclusive_caps=1
