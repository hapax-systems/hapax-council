# Hapax 128GB RAM tuning — updated 2026-05-13
#
# vm.swappiness=5: with 128GB RAM, swap should only be used under
# genuine pressure. Previous value of 10 allowed ~32GB to accumulate
# in swap over 2-day uptimes, causing LS gRPC stream drops and tool
# call timeouts when swapped pages were touched under load.
#
# vm.vfs_cache_pressure=75: previous value of 50 let page cache grow
# to 51GB+ and slab to 17GB+, hoarding reclaimable memory while
# process pages went to swap. 75 reclaims dentries/inodes more
# aggressively while still caching effectively.
vm.swappiness = 5
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5
vm.vfs_cache_pressure = 75
