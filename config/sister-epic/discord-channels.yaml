# Discord server channel structure — superseded refusal artifact.
#
# This file used to scaffold a Discord community server. The later Discord
# refusal brief and support-surface registry supersede that assumption: no
# community server, no role gates, no server subscriptions, no moderation
# surface, and no support channels. Discord is not a support surface.

version: 1
schema_owner: operator
operator_action_required: false
status: superseded_refusal
activation_allowed: false
superseded_by: config/support-surface-registry.json
refusal_refs:
  - docs/refusal-briefs/leverage-discord-community.md
  - docs/refusal-briefs/sponsorships-multi-user-pattern.md

server:
  activation_allowed: false
  allowed_use: none_for_support
  replacement_boundary: cross_surface_event_contract_publication_bus_only

categories: []

moderation:
  enabled: false
  operator_action_required: false
  reason: Discord community moderation is refused as a multi-user support surface.
  attack_log_path: null

publication_bus_boundary:
  support_surface_allowed: false
  one_way_publication_bus_may_be_evaluated_elsewhere: true
  required_contract: docs/superpowers/specs/2026-04-29-cross-surface-event-contract-design.md
