# Patreon tier structure — superseded refusal artifact.
#
# This file used to scaffold Patreon tiers for the sister epic. The later
# Patreon refusal brief and support-surface registry supersede that assumption:
# no Patreon account, no tiers, no role sync, no private posts, and no perk
# ladder. Keep the file only as a compatibility marker for older references.

version: 1
schema_owner: operator
operator_action_required: false
status: superseded_refusal
activation_allowed: false
superseded_by: config/support-surface-registry.json
refusal_refs:
  - docs/refusal-briefs/leverage-patreon.md
replacement_surface_ids:
  - liberapay_recurring
  - lightning_invoice_receive
  - nostr_zaps

tiers: []

constraints:
  no_patreon_account: true
  no_tiers: true
  no_perks: true
  no_role_sync: true
  no_private_posts: true
  no_name_acknowledgments: true
  no_leaderboards: true
  no_supporter_identity_public_state: true
  work_continues_regardless: true
