# Operator ratification ledger — data-owner dispositions the review plane honors.
#
# Purpose: in a single-operator estate (axiom single_user, weight 100) certain review
# finding classes are decisions that belong to the DATA OWNER, not to reviewers —
# canonically: the operator's own privacy posture. An entry here records a ratified
# decision and waives EXACTLY the (lens x file) intersection it names. Everything else
# blocks as before. Fail-closed: a malformed ledger waives NOTHING.
#
# Governance: entries are sovereign stipulations (registry-guard class). Each entry MUST
# name its decision record. Waived findings are receipted in the dossier evaluation log,
# never silent (go-gate phantom precedent).
ratifications_schema: 1
ratifications:
  - id: RAT-20260709-privacy-residual-item27
    ratified: "2026-07-09"
    authority: operator
    decision_record: "operator decision memo 2026-07-09, item 27 — disposition accept-residual (vault: 30-areas/hapax/operator-decision-memo-2026-07-09.md)"
    class: operator-privacy-residual
    lenses: [consent-provenance]
