# Ward Enhancement Profiles Registry
#
# Spec: docs/superpowers/specs/2026-04-20-homage-ward-umbrella-design.md §4
# Loaded by: shared.ward_enhancement_profile.WardEnhancementProfileRegistry
#
# Every enhancement PR touching any ward must satisfy the ward's profile:
# recognizability invariant + use-case acceptance test + category allow/deny.
# Edit this file in-repo; registry reloads on compositor restart.

wards:

  token_pole:
    recognizability_invariant: >-
      Vitruvian silhouette + token motion legible; face must not emerge
      (HARDM binding); particle burst never resolves into face-like
      clustering.
    recognizability_tests:
      - silhouette_edge_iou
      - token_motion_legibility
      - pearson_face_correlation
    use_case_acceptance_test: >-
      Operator sees token progress at >=80% accuracy; burst never reads
      as facial expression.
    acceptance_test_harness: tests/studio_compositor/test_token_pole_acceptance.py
    accepted_enhancement_categories:
      - edge_detect
      - halftone
      - chromatic_aberration
    rejected_enhancement_categories:
      - lens_distortion
      - perspective
      - kuwahara
    spatial_dynamism_approved: true
    oq_02_bound_applicable: true
    hardm_binding: true
    cvs_bindings:
      - "CVS #8 non-manipulation"
      - "CVS #16 anti-personification"

  album:
    recognizability_invariant: >-
      Album title >=80% OCR; dominant contours edge-IoU >=0.65;
      palette delta-E <=40 CIELAB; no humanoid bulges.
    recognizability_tests:
      - ocr_accuracy
      - edge_iou
      - palette_delta_e
      - pearson_face_correlation
    use_case_acceptance_test: >-
      Operator/audience identify album at glance; title extractable.
    acceptance_test_harness: tests/studio_compositor/test_album_acceptance.py
    accepted_enhancement_categories:
      - posterize
      - kuwahara
      - halftone
      - palette_extract
      - edge_detect
      - chromatic_aberration
      - scanlines
      - film_grain
    rejected_enhancement_categories:
      - lens_distortion
      - perspective
      - depth_of_field
    spatial_dynamism_approved: true
    oq_02_bound_applicable: true
    hardm_binding: false
    cvs_bindings:
      - "CVS #16 anti-personification"

  stream_overlay:
    recognizability_invariant: >-
      Text readable >=95% of time; `>>>` prefix + bracket format persists.
    recognizability_tests:
      - ocr_accuracy
      - format_preservation
    use_case_acceptance_test: >-
      Viewer reads status without squinting; format survives enhancement.
    acceptance_test_harness: tests/studio_compositor/test_stream_overlay_acceptance.py
    accepted_enhancement_categories:
      - scanlines
      - chromatic_aberration
    rejected_enhancement_categories:
      - halftone
      - posterize
      - kuwahara
    spatial_dynamism_approved: false
    oq_02_bound_applicable: true
    hardm_binding: false
    cvs_bindings: []

  sierpinski:
