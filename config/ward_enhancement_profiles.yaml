      Triangle geometry legible; no face clusters (Pearson <0.6);
      YouTube frames never composite into face.
    recognizability_tests:
      - geometric_legibility
      - pearson_face_correlation
    use_case_acceptance_test: >-
      Viewer sees pure geometry, not character.
    acceptance_test_harness: tests/studio_compositor/test_sierpinski_acceptance.py
    accepted_enhancement_categories:
