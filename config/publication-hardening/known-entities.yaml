# Known-entities registry — maps products/services to their parent companies.
#
# The entity_checker scans text for attribution patterns like
# "X's Y" or "Y by X" and flags mismatches against this registry.
# Triggered by the Codex/Anthropic misattribution incident (2026-05-09).
#
# Adding entries: every product/service name that an LLM-authored
# publication might mention should be listed under its parent company.
# Aliases (case-insensitive alternates) prevent near-miss evasion.

companies:
  Anthropic:
    products:
      - name: Claude
        aliases: [claude]
      - name: Claude Code
        aliases: [claude code, claude-code]
      - name: Claude Opus
        aliases: [claude opus]
      - name: Claude Sonnet
        aliases: [claude sonnet]
      - name: Claude Haiku
        aliases: [claude haiku]

  OpenAI:
    products:
      - name: Codex
        aliases: [codex, openai codex]
      - name: ChatGPT
        aliases: [chatgpt, chat gpt]
      - name: GPT-4
        aliases: [gpt-4, gpt4, gpt 4]
      - name: GPT-4o
        aliases: [gpt-4o, gpt4o]
      - name: GPT-3.5
        aliases: [gpt-3.5, gpt3.5]
      - name: DALL-E
        aliases: [dall-e, dalle, dall·e]
      - name: Whisper
        aliases: [openai whisper]
      - name: Sora
        aliases: [sora]
