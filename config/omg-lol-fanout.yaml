# omg.lol cross-weblog fanout configuration
#
# Operator-owned addresses that participate in the cross-weblog fanout.
# Each address fans out to every other address via the bearer-token
# API; loop-prevention is handled by the X-Hapax-Fanout-Source header
# embedded in the content.
#
# When the list is empty (the default, until the operator registers
# additional addresses), the fanout is a no-op. This is the seed
# state — operator adds addresses as they are bootstrapped.
publication_frontmatter_policy:
  status: guarded_public_fanout
  publication_allowed_without_bus: false
  direct_public_egress_allowed: false
  review_required: Claim Verification Council
  claim_ceiling: >-
    Cross-weblog fanout may repeat only already-approved public artifacts.
    It may not create new product, support, community, lifecycle-generality,
    license, or comparative claims.
  required_gates:
    - source_artifact_public_safe
    - rights_privacy_redaction_pass
    - target_surface_allowlist_pass
    - fanout_loop_prevention_present
    - claim_review_current
addresses: []
