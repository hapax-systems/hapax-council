name: Publish to GitHub Pages

# External repo: hapax-systems/hapax-assets
# This workflow file is committed to the external repo's main branch.
# On push to main, it deploys the repo contents to gh-pages via the
# actions/deploy-pages action. GitHub Pages must be enabled in repo
# settings (Settings → Pages → Source: "GitHub Actions").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/validate_manifest.py

  deploy:
    needs:
      - validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - name: Package site
        run: |
          # Exclude git + workflow metadata from the deployed artifact.
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
