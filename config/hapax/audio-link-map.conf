# hapax-audio-reconciler desired-state link map
# Format: source_port|target_port
# Lines starting with # are comments.
#
# This file is the source-controlled runtime policy installed to:
#   ~/.config/hapax/audio-link-map.conf
#
# The reconciliation daemon enforces these links continuously. The
# architecture is MPC Live III first: host audio enters the MPC over USB,
# exits the MPC over TRS, enters L-12 physical inputs, and only then
# reaches the livestream through L-12 USB capture. No dry host signal
# enters the livestream.

# MPC USB channel map (host -> MPC):
#   AUX0/1   = music
#   AUX2/3   = Hapax broadcast voice
#   AUX4/5   = PC/system audio
#   AUX6/7   = YouTube audio
#   AUX8/9   = private comms, headphone only
#   AUX10-23 = available

# MPC TRS output -> L-12 physical input:
#   MPC Out 1/2 -> L-12 CH 9/10  (AUX8/9)   = content mix
#   MPC Out 3/4 -> L-12 CH 11/12 (AUX10/11) = Hapax voice

# L-12 capture -> livestream tap (instruments / mic)
hapax-l12-evilpet-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-l12-evilpet-playback:output_FR|hapax-livestream-tap:playback_FR

# L-12 capture -> livestream tap (MPC wet return)
alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input:capture_AUX8|hapax-l12-usb-return-capture:input_AUX8
alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input:capture_AUX9|hapax-l12-usb-return-capture:input_AUX9
alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input:capture_AUX10|hapax-l12-usb-return-capture:input_AUX10
alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input:capture_AUX11|hapax-l12-usb-return-capture:input_AUX11
hapax-l12-usb-return-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-l12-usb-return-playback:output_FR|hapax-livestream-tap:playback_FR

# Livestream tap -> broadcast chain
hapax-livestream-tap:monitor_FL|hapax-broadcast-master-capture:input_FL
hapax-livestream-tap:monitor_FR|hapax-broadcast-master-capture:input_FR

# TTS chain -> MPC USB IN 3/4 (AUX2/3)
hapax-voice-fx-playback:output_FL|hapax-loudnorm-capture:playback_FL
hapax-voice-fx-playback:output_FR|hapax-loudnorm-capture:playback_FR
hapax-loudnorm-playback:output_FL|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX2
hapax-loudnorm-playback:output_FR|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX3

# Music -> loudnorm -> MPC USB IN 1/2 (AUX0/1)
hapax-music-loudnorm-playback:output_FL|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX0
hapax-music-loudnorm-playback:output_FR|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX1

# PC audio -> loudnorm -> MPC USB IN 5/6 (AUX4/5)
output.loopback.sink.role.multimedia:output_FL|hapax-pc-loudnorm:playback_FL
output.loopback.sink.role.multimedia:output_FR|hapax-pc-loudnorm:playback_FR
hapax-pc-loudnorm-playback:output_FL|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX4
hapax-pc-loudnorm-playback:output_FR|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX5

# M8 -> loudnorm -> L-12 USB return (transient; may fail when M8 is disconnected)
hapax-m8-loudnorm-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FL
hapax-m8-loudnorm-playback:output_FR|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FR

# Private and notification -> MPC USB IN 9/10 (AUX8/9), headphone only
hapax-private-playback:output_FL|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX8
hapax-private-playback:output_FR|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX9
hapax-notification-private-playback:output_FL|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX8
hapax-notification-private-playback:output_FR|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX9

# Private sink monitors -> capture bridges
hapax-private:monitor_FL|hapax-private-monitor-capture:input_FL
hapax-private:monitor_FR|hapax-private-monitor-capture:input_FR
hapax-notification-private:monitor_FL|hapax-notification-private-monitor-capture:input_FL
hapax-notification-private:monitor_FR|hapax-notification-private-monitor-capture:input_FR

# Role loopbacks
output.loopback.sink.role.assistant:output_FL|hapax-private:playback_FL
output.loopback.sink.role.assistant:output_FR|hapax-private:playback_FR
output.loopback.sink.role.notification:output_FL|hapax-notification-private:playback_FL
output.loopback.sink.role.notification:output_FR|hapax-notification-private:playback_FR
output.loopback.sink.role.broadcast:output_FL|hapax-voice-fx-capture:playback_FL
output.loopback.sink.role.broadcast:output_FR|hapax-voice-fx-capture:playback_FR

# YouTube -> loudnorm -> MPC USB IN 7/8 (AUX6/7)
hapax-yt-loudnorm-playback:output_FL|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX6
hapax-yt-loudnorm-playback:output_FR|alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output:playback_AUX7
