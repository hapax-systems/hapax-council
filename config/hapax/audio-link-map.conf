# hapax-audio-reconciler desired-state link map — MOTU UltraLite mk5 + S-4 topology.
# Source of intent: 30-areas/hapax/audio-mk5-s4-faderfox-migration-isap-2026-06-02.md
# Format: source_port|target_port. Reconciler creates these; destroys forbidden ones.
# Replaces the retired PC->MPC->L-12->PC chain (L-12/MPC/Evil Pet removed 2026-06).
#
# mk5 nodes:
#   out: alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0
#        AUX2/3 = Line out 3/4 -> S-4 line in (dry voice);  AUX10/11 = Phones (private monitor)
#   in:  alsa_input.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-input-0
#        AUX0 = Mic in 1 (Rode);  AUX2/3 = Line in 3/4 <- S-4 line out (wet voice)

# --- TTS voice: role.broadcast -> voice-fx -> loudnorm -> mk5 OUT 3/4 (dry -> S-4) ---
input.loopback.sink.role.broadcast-output:output_FL|hapax-voice-fx-capture:playback_FL
input.loopback.sink.role.broadcast-output:output_FR|hapax-voice-fx-capture:playback_FR
hapax-voice-fx-playback:output_FL|hapax-loudnorm-capture:playback_FL
hapax-voice-fx-playback:output_FR|hapax-loudnorm-capture:playback_FR
hapax-loudnorm-playback:output_FL|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX2
hapax-loudnorm-playback:output_FR|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX3

# --- S-4 wet voice return: mk5 IN 3/4 -> hapax-voice-wet -> livestream-tap ---
alsa_input.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-input-0:capture_AUX2|hapax-voice-wet-capture:input_AUX2
alsa_input.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-input-0:capture_AUX3|hapax-voice-wet-capture:input_AUX3
hapax-voice-wet-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-voice-wet-playback:output_FR|hapax-livestream-tap:playback_FR

# --- Operator Rode mic: mk5 IN 1 (mono) -> hapax-mic-rode -> livestream-tap ---
alsa_input.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-input-0:capture_AUX0|hapax-mic-rode-capture:input_AUX0
hapax-mic-rode-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-mic-rode-playback:output_FR|hapax-livestream-tap:playback_FR

# --- Music (SoundCloud) -> livestream-tap (was MPC AUX0/1) ---
hapax-music-loudnorm-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-music-loudnorm-playback:output_FR|hapax-livestream-tap:playback_FR

# --- YouTube bed -> livestream-tap (was MPC AUX6/7) ---
hapax-yt-loudnorm-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-yt-loudnorm-playback:output_FR|hapax-livestream-tap:playback_FR

# --- Broadcast spine (device-agnostic, unchanged) ---
hapax-livestream-tap:monitor_FL|hapax-broadcast-master-capture:input_FL
hapax-livestream-tap:monitor_FR|hapax-broadcast-master-capture:input_FR

# --- Private/assistant monitor -> mk5 Phones (AUX10/11) ONLY, never broadcast ---
input.loopback.sink.role.assistant-output:output_FL|hapax-private:playback_FL
input.loopback.sink.role.assistant-output:output_FR|hapax-private:playback_FR
hapax-private:monitor_FL|hapax-private-monitor-capture:input_FL
hapax-private:monitor_FR|hapax-private-monitor-capture:input_FR
hapax-private-playback:output_FL|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX10
hapax-private-playback:output_FR|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX11

# --- Notification -> fail-closed private sink (no egress) ---
input.loopback.sink.role.notification-output:output_FL|hapax-notification-private:playback_FL
input.loopback.sink.role.notification-output:output_FR|hapax-notification-private:playback_FR
