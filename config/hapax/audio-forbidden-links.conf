hapax-notification-private-playback:output_FR|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_RR

# MPC Live III baseline: PC/TTS dry outputs must not bypass MPC into L-12.
hapax-pc-loudnorm-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FL
