# hapax-audio-reconciler forbidden links — MOTU UltraLite mk5 + S-4 topology.
# Format: source_port|target_port. Reconciler destroys these; WirePlumber link-deny
# enforces them at link time. Private/default/non-livestream lanes must NEVER enter
# broadcast-bound lanes (livestream-tap, broadcast-master, or the mk5 dry-voice send
# AUX2/3 which reaches broadcast through the S-4).

# --- private/assistant -> livestream-tap (broadcast sum bus) ---
hapax-private-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-private-playback:output_FR|hapax-livestream-tap:playback_FR
hapax-private-monitor-capture:output_FL|hapax-livestream-tap:playback_FL
hapax-private-monitor-capture:output_FR|hapax-livestream-tap:playback_FR

# --- notification -> livestream-tap ---
hapax-notification-private-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-notification-private-playback:output_FR|hapax-livestream-tap:playback_FR

# --- PC / default multimedia -> livestream-tap ---
hapax-pc-loudnorm-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-pc-loudnorm-playback:output_FR|hapax-livestream-tap:playback_FR

# --- same lanes -> broadcast-master-capture (the limiter input, bypasses tap) ---
hapax-private-playback:output_FL|hapax-broadcast-master-capture:input_FL
hapax-private-playback:output_FR|hapax-broadcast-master-capture:input_FR
hapax-notification-private-playback:output_FL|hapax-broadcast-master-capture:input_FL
hapax-notification-private-playback:output_FR|hapax-broadcast-master-capture:input_FR
hapax-pc-loudnorm-playback:output_FL|hapax-broadcast-master-capture:input_FL
hapax-pc-loudnorm-playback:output_FR|hapax-broadcast-master-capture:input_FR

# --- same lanes -> mk5 dry-voice send AUX2/3 (would reach broadcast via S-4) ---
hapax-pc-loudnorm-playback:output_FL|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX2
hapax-pc-loudnorm-playback:output_FR|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX3
hapax-notification-private-playback:output_FL|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX2
hapax-notification-private-playback:output_FR|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX3

# --- private -> mk5 broadcast-relevant outputs (private only allowed on Phones AUX10/11) ---
hapax-private-playback:output_FL|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX2
hapax-private-playback:output_FR|alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0:playback_AUX3

# --- role-mixing leak guards (assistant/notification must not fall into multimedia/PC) ---
output.loopback.sink.role.assistant:output_FL|input.loopback.sink.role.multimedia:playback_FL
output.loopback.sink.role.assistant:output_FR|input.loopback.sink.role.multimedia:playback_FR
output.loopback.sink.role.notification:output_FL|input.loopback.sink.role.multimedia:playback_FL
output.loopback.sink.role.notification:output_FR|input.loopback.sink.role.multimedia:playback_FR
