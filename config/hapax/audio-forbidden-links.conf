# hapax-audio-reconciler forbidden links
# Format: source_port|target_port
#
# Installed to:
#   ~/.config/hapax/audio-forbidden-links.conf
#
# The daemon disconnects these links if they appear. Private audio must
# not reach the L-12 broadcast bus, and dry PC/TTS outputs must not bypass
# the MPC-first baseline. MPC Live III AUX8/AUX9 is the only approved
# private monitor ingress and is owned by audio-link-map.conf.

# Private playback must never reach L-12.
hapax-private-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FL
hapax-private-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FR
hapax-private-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_RL
hapax-private-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_RR
hapax-private-playback:output_FR|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FL
hapax-private-playback:output_FR|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FR
hapax-private-playback:output_FR|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_RL
hapax-private-playback:output_FR|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_RR

# Notification private must never reach L-12.
hapax-notification-private-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FL
hapax-notification-private-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FR
hapax-notification-private-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_RL
hapax-notification-private-playback:output_FL|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_RR
hapax-notification-private-playback:output_FR|alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40:playback_FL
