# Retired software direct-to-tap TTS bridge must not return.
hapax-tts-broadcast-playback:output_FL|hapax-livestream-tap:playback_FL
hapax-tts-broadcast-playback:output_FR|hapax-livestream-tap:playback_FR

# Broadcast master must take the current producer tap, not the legacy app-facing sink.
hapax-livestream:monitor_FL|hapax-broadcast-master-capture:input_FL
hapax-livestream:monitor_FR|hapax-broadcast-master-capture:input_FR
