# Voice output route map.
#
# The director and other voice-emitting subsystems should ask the
# semantic API in shared.voice_output_router for an audio sink by
# ROLE rather than hard-coding PipeWire target names. Roles are the
# fixed enum below; sink_name values are operator-curated PipeWire
# sink identifiers (the same string ``pw-cat --target=...`` accepts).
# Runtime repair 2026-05-21: private/director audio remains on the private
# null sink. ``hapax-voice-monitor`` is retired and must not be targeted.
#
# Operator can edit this file at runtime; the router reloads on
# next route() call when the file mtime advances.

schema_version: 1
roles:
  assistant:
    sink_name: hapax-private
    description: |
      Operator-private TTS path to the private null sink. It is audible only
      through the explicit private monitor bridge and never through the
      livestream chain.

  broadcast:
    sink_name: hapax-voice-fx-capture
    description: |
      Public-facing voice path through voice FX and loudnorm before the
      MPC/L-12 livestream return.

  private_monitor:
    sink_name: hapax-private
    description: |
      Local private monitor route via the private null sink. Never the same
      sink as the broadcast role.

  notification:
    sink_name: hapax-notification-private
    description: |
      Short non-speech audio (chimes, alerts). Routed through the
      private notification loopback for a separate gain stage from speech.
