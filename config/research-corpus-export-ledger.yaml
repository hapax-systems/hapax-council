      - "CITATION.cff"
      - "codemeta.json"
      - "agents/attribution/"
      - "~/hapax-state/attribution/"
    consumer_modes:
      - dataset_cards
      - grant_packets
      - artifact_bundles
      - msr_dataset_paper
      - hf_dataset_card
    default_export_status: public
    field_statuses:
      - field: doi_swhid_repo_url_citation_key
        status: public
        transform: none
        rationale: Persistent identifiers exist to be cited.
      - field: formal_author_identifier
        status: public
        transform: formal_context_only
        rationale: ORCID/formal author metadata is allowed only in formal citation fields.
      - field: api_tokens_session_cookies
        status: forbidden
        transform: block_secret_values
        rationale: Identifier minting credentials are not metadata.
      - field: local_state_path
        status: anonymized
        transform: local_path_root_redaction
        rationale: Stable state refs are enough for reproducibility.
    rights_posture:
      rights_class: operator_controlled
      license_basis: Identifier graph points at externally minted public records and repo metadata.
      public_license: CC-BY-NC-ND-4.0
      attribution_required: true
      monetization_allowed: false
      public_release_allowed: true
      notes: Formal legal-name context is allowed only where the platform requires attribution.
    automated_test_refs:
      - legal_name_to_operator_referent
      - email_address_redaction
      - secret_value_block
      - employer_material_path_block
      - non_operator_person_state_block
      - private_vault_body_drop
      - local_path_root_redaction
      - public_url_token_strip
    release_gate:
      recurring_operator_review_required: false
      bootstrap_attestation_required: true
      bootstrap_attestation_ref: legal/export-attestation:research-corpus
      blocks_on_uncertain_fields: true
    failure_mode: block_release
  - corpus_id: git_history_pr_metadata
    display_name: Git commit history and pull-request metadata
    source_refs:
      - "git log across pushable Hapax repos"
      - "GitHub pull request metadata"
      - "docs/repo-pres/repo-registry.yaml"
    consumer_modes:
      - dataset_cards
      - grant_packets
      - msr_dataset_paper
      - hf_dataset_card
    default_export_status: public
    field_statuses:
      - field: commit_sha_subject_timestamp_repo
        status: public
        transform: none
        rationale: Public git metadata is the core MSR corpus.
      - field: diff_patch
        status: public
        transform: per_repo_license_matrix
        rationale: Public code diffs inherit the repository license matrix.
      - field: pr_comments_reviews
        status: anonymized
        transform: public_github_metadata_plus_baseline_redaction
        rationale: Review text can contain private coordination or third-party mentions.
      - field: local_worktree_paths
        status: anonymized
        transform: local_path_root_redaction
        rationale: Workstation layout is not part of the dataset.
    rights_posture:
      rights_class: repo_license
      license_basis: Each repository keeps its declared license; dataset cards must expose the matrix.
      public_license: null
      attribution_required: true
      monetization_allowed: false
      public_release_allowed: true
      notes: Do not collapse per-repo licenses into a false blanket code license.
    automated_test_refs:
      - legal_name_to_operator_referent
      - email_address_redaction
      - secret_value_block
      - employer_material_path_block
      - non_operator_person_state_block
      - private_vault_body_drop
      - local_path_root_redaction
      - public_url_token_strip
    release_gate:
      recurring_operator_review_required: false
      bootstrap_attestation_required: true
      bootstrap_attestation_ref: legal/export-attestation:research-corpus
      blocks_on_uncertain_fields: true
    failure_mode: block_release
