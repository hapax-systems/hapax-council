      - "docs/research/evidence/"
      - "scripts/velocity_report_evidence_snapshot.py"
      - "~/hapax-state/publications/"
    consumer_modes:
      - dataset_cards
      - grant_packets
      - msr_dataset_paper
      - openai_safety_fellowship_packet
    default_export_status: public
    field_statuses:
      - field: aggregate_counts_windows_repo_heads
        status: public
        transform: none
        rationale: Reproducibility requires exact windows and commit ids.
      - field: raw_command_transcripts
        status: anonymized
        transform: strip_local_paths_and_private_refs
        rationale: Transcript snippets are useful only after private local state is removed.
      - field: ci_result_sets
        status: anonymized
        transform: public_pr_metadata_only
        rationale: CI data is safe when limited to public repository metadata.
      - field: unpublished_state_payloads
        status: private
        transform: exclude_unpublished_state
        rationale: Local state copies are evidence inputs, not public payloads.
    rights_posture:
      rights_class: repo_license
      license_basis: Git metadata and repo-tracked docs follow each repository license matrix.
      public_license: CC-BY-NC-ND-4.0
      attribution_required: true
      monetization_allowed: false
      public_release_allowed: true
      notes: Counts are public; raw terminal capture remains gated.
    automated_test_refs:
      - legal_name_to_operator_referent
      - email_address_redaction
      - secret_value_block
      - employer_material_path_block
      - non_operator_person_state_block
      - private_vault_body_drop
      - local_path_root_redaction
      - public_url_token_strip
    release_gate:
      recurring_operator_review_required: false
      bootstrap_attestation_required: true
      bootstrap_attestation_ref: legal/export-attestation:research-corpus
      blocks_on_uncertain_fields: true
    failure_mode: block_release
  - corpus_id: archive_sidecars
    display_name: Archive sidecars for replay, frames, captions, and clips
    source_refs:
      - "~/hapax-state/archive/"
      - "~/hapax-state/publications/"
    consumer_modes:
      - replay_kits
      - artifact_bundles
      - grant_packets
    default_export_status: aggregate_only
    field_statuses:
      - field: sidecar.segment_id_timecode_duration
        status: public
        transform: none
        rationale: Replay navigation metadata is useful without raw media.
      - field: frame_hash_clip_hash
        status: hash_only
        transform: media_digest_without_pixels
        rationale: Hashes allow joins and integrity checks without redistributing media.
      - field: captions
        status: anonymized
        transform: caption_privacy_redaction
        rationale: Captions can contain names or private utterances.
      - field: raw_audio_video_image
        status: forbidden
        transform: block_media_without_rights_and_consent
        rationale: Raw media has the highest rights and consent exposure.
    rights_posture:
      rights_class: mixed
      license_basis: Sidecar metadata may be operator-controlled; media rights are per asset/event.
      public_license: null
      attribution_required: true
      monetization_allowed: false
      public_release_allowed: true
      notes: Artifact bundles consume sidecars first and request media only through separate rights gates.
    automated_test_refs:
      - legal_name_to_operator_referent
      - email_address_redaction
      - secret_value_block
      - employer_material_path_block
      - non_operator_person_state_block
      - private_vault_body_drop
      - third_party_media_rights_block
      - local_path_root_redaction
      - private_identifier_hash
    release_gate:
      recurring_operator_review_required: false
      bootstrap_attestation_required: true
      bootstrap_attestation_ref: legal/export-attestation:research-corpus
      blocks_on_uncertain_fields: true
