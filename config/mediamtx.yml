# Studio livestream RTMP relay — feeds YouTube via ffmpeg sidecar.
# Run via scripts/mediamtx-start.sh which injects HAPAX_YOUTUBE_STREAM_KEY.
#
# Phase 5 of the camera 24/7 resilience epic.
# See docs/superpowers/specs/2026-04-12-native-rtmp-delivery-design.md

rtmp: yes
rtmpAddress: 127.0.0.1:1935

# The compositor connects on first FLV push behind a sink-local queue. Keep a
# longer read window so relay restarts do not flap during dynamic branch attach.
readTimeout: 60s
writeTimeout: 10s

# Local-only HLS preview/readiness endpoint. The studio path is available at
# http://127.0.0.1:8888/studio/index.m3u8 while an RTMP publisher is active.
hls: yes
hlsAddress: 127.0.0.1:8888
webrtc: no
srt: no
api: no

metrics: yes
metricsAddress: 127.0.0.1:9998

logLevel: info
logDestinations: [stdout]

paths:
  studio:
    source: publisher
    runOnReady: >
      ffmpeg -hide_banner -loglevel warning
      -re -i rtmp://127.0.0.1:1935/studio
      -c copy
      -f flv rtmp://a.rtmp.youtube.com/live2/${HAPAX_YOUTUBE_STREAM_KEY}
    runOnReadyRestart: yes
  mobile:
    source: publisher
