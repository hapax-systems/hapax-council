[UPower]
# apcupsd is the sole UPS shutdown-policy owner on podium. UPower may expose
# status/history, but it must not independently act on USB HID battery values.
# Recheck: busctl get-property org.freedesktop.UPower /org/freedesktop/UPower org.freedesktop.UPower CriticalAction
AllowRiskyCriticalPowerAction=true
CriticalPowerAction=Ignore
