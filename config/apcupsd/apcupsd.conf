## apcupsd.conf v1.1 ##
# Hapax podium SRT3000XLA. USB via CalDigit; NMC on sub-switch unused for now.
UPSNAME podium-srt3000xla
UPSCABLE usb
UPSTYPE usb
DEVICE
# Shutdown policy: act late. The online UPS carries the rig for a long time.
# Clean poweroff at 5 min remaining or 20% battery, whichever first.
BATTERYLEVEL 20
MINUTES 5
TIMEOUT 0
ANNOY 300
NOLOGON disable
KILLDELAY 0
NETSERVER on
NISIP 127.0.0.1
NISPORT 3551
EVENTSFILE /var/log/apcupsd.events
EVENTSFILEMAX 10
UPSCLASS standalone
UPSMODE disable
