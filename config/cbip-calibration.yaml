version: 1

# Upright-frame coordinates after ROLE_ROTATION_CW_DEG has been applied.
# Per-camera local overrides live at ~/.config/hapax/cbip-roi-{cam_id}.json.
cameras:
  overhead:
    frame_width: 1920
    frame_height: 1080
    roi_x: 0
    roi_y: 0
