# DURF (Display Under Reflective Frame) - Codex tmux pane targets
#
# Public/default capture is text-only:
#
#   tmux capture-pane -p -S -80 -t <target>
#
# Do not use Wayland/Hyprland pixel capture for the normal livestream path.
# Missing targets, stale lanes, consent-safe mode, raw bypass flags, and
# redaction matches suppress the pane before public frame rendering.

defaults:
  capture_lines: 80
  stale_after_seconds: 20
  max_visible_panes: 4

panes:
  - lane: cx-green
    tmux_target: "hapax-codex-cx-green:0.0"
    glyph: "G-//"
  - lane: cx-blue
    tmux_target: "hapax-codex-cx-blue:0.0"
    glyph: "B-|/"
  - lane: cx-amber
    tmux_target: "hapax-codex-cx-amber:0.0"
    glyph: "A-|\\"
  - lane: cx-cyan
    tmux_target: "hapax-codex-cx-cyan:0.0"
    glyph: "C-<>"
  - lane: cx-violet
    tmux_target: "hapax-codex-cx-violet:0.0"
    glyph: "V-\\\\"

redactions_documented:
  - "API key prefixes and bearer/authorization tokens"
  - "AWS key material"
  - "GitHub token prefixes"
  - "private-key blocks"
  - ".envrc and pass/hapax-secrets exposure"
  - "operator-home absolute paths"
  - "operator legal-name patterns"
  - "private/employer data markers"
