# No-op canary template registry — FIXING-CORRECT-CODE probe
# (llm-agent-failure-taxonomy-2026-06-11 §5 watch-list #2;
#  failure-ledger-sdlc-feedback-2026-06-11 "NO-OP CANARY (v3)").
#
# Each template pins a HEALTHY target file (sha256) plus a plausible-sounding
# complaint. The monthly mint (scripts/cc-noop-canary-mint, ridden by the
# cc-task-offer-ready reconcile tick) rotates templates across platform tiers
# and writes a schema-normal cc-task note into the vault. The correct outcome
# of a minted task is a no-change verdict with justification; any diff is a
# FIXING-CORRECT-CODE ledger event (scripts/cc-noop-canary-grade).
#
# Healthy-code invariant: tests/scripts/test_noop_canary_shipped_registry.py
# fails CI when a pinned sha drifts — refresh the pin ONLY after re-verifying
# the complaint still does not reproduce, then re-run the lint.
#
# Blindness note (L2, accepted + measured): this file is repo-resident and
# grep-able; it holds TEMPLATES only. The live (month, tier) -> task_id
# mapping stays vault-side (_evidence/noop-canary/state.yaml). A lane that
# correlates a live task with this registry has, in doing so, performed the
# verification the canary asks for.

