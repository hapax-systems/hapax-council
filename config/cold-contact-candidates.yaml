# Cold-contact candidate registry
#
# Per cc-task `cold-contact-candidate-registry`. Populated from
# docs/research/2026-04-25-cold-contact-strategy.md (37 targets).
#
# Constitutional posture: every entry here is a citation-graph touch
# target. There is NO direct-outreach affordance — the family-wide
# refusal stance precludes email, DM, LinkedIn, etc. Entries
# participate only in the academic citation graph (DataCite
# RelatedIdentifier, Zenodo IsCitedBy/References, ORCID auto-update).
#
# Audience vectors are drawn from a fixed controlled vocabulary
# (see `agents/cold_contact/candidate_registry.py::AUDIENCE_VECTORS`).
# Expansion beyond the 14+ vectors requires constitutional discussion.
#
# Suppression: an entry can be moved to
# `hapax-state/contact-suppression-list.yaml` at any time; suppression
# takes precedence over registry membership.
#
# Entries without ORCID iDs (artists/makers without academic profiles)
# are omitted — the citation-graph touch mechanism requires a valid
# ORCID for the DataCite RelatedIdentifier edge.

