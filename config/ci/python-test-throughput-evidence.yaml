schema_version: 1
task_id: ci-python-test-throughput-evidence-gate
status: implemented
decision: fast_pr_admission_slice_and_merge_queue_shards
decision_time: 2026-05-18T00:35:00Z
decision_reason: >-
  Self-hosted required-test adoption is deferred because the bounded experiment
  policy has no observed manual green runs. The required test check can still
  reduce PR wait by running a deterministic admission slice on pull_request
  while preserving full pytest on merge_group and main push. Merge queue full
  pytest is run in required-check shards under the stable aggregate `test`
  check name to reduce queue wall time without changing release coverage.

self_hosted_comparison:
  policy: config/ci/self-hosted-runner-experiment.yaml
  workflow: .github/workflows/self-hosted-runner-experiment.yml
  required_test_adoption: defer
  observed_manual_runs: 0
  required_gate_before_adoption:
    - three_consecutive_manual_green_runs
    - non_secret_static_slice_at_least_3x_faster_than_hosted_baseline
    - no_secret_runner_boundary_review_passed
    - bounded_cache_and_teardown_verified

hosted_reference:
  source: docs/research/2026-05-17-ci-merge-queue-required-check-audit.md
  merge_group_ci_duration_seconds_range: [833, 1031]
  merge_group_required_test_seconds_range: [811, 995]
  latest_pr_ci_samples:
    - run_id: 26001532659
      branch: codex/platform-quota-capability-receipts-20260517
      conclusion: success
      duration_seconds: 1025
    - run_id: 26000458748
      branch: codex/visual-variance-novelty-ledger
      conclusion: success
      duration_seconds: 974
    - run_id: 26000236343
      branch: codex/platform-route-registry-alignment-20260517
      conclusion: success
      duration_seconds: 914
    - run_id: 25997730258
      branch: codex/sbcl-clog-local-user-service-v0
      conclusion: success
      duration_seconds: 970

rollout_policy:
  required_check_name: test
  pull_request: pr_admission_slice
  merge_group: full_pytest_sharded
  merge_group_shards: 4
  merge_group_shard_selector: scripts/ci_select_pytest_shard.py
  merge_group_shard_unit: file_or_configured_pytest_node_prefix
  runtime_weight_source: config/ci/python-test-runtime-weights.yaml
  merge_group_duration_artifact: pytest-node-durations-shard-N-of-4
  merge_group_duration_artifact_schema: pytest_node_durations/v1
  merge_group_execution_order_first_source: config/ci/python-test-runtime-weights.yaml
  merge_group_uv_policy: frozen_sync_then_no_sync_run
  merge_group_shard_uv_cache: restore_only_explicit_pyproject_uv_lock_key
  merge_group_title_cards: serial_in_shard_4_with_status_sentinel
  merge_group_aggregate_test_checkout: skipped_for_merge_group_shards
  push_main: full_pytest
  docs_only: sentinel_success
  duplicate_post_merge_push: sentinel_success_after_successful_merge_group
  workflow_level_path_filters_for_required_check: forbidden
  branch_protection_check_name_change: forbidden

setup_cost_elimination:
  task_id: ci-setup-cost-elimination-prototype-20260518
  authority_case: CASE-SDLC-CI-THROUGHPUT-SECOND-PASS-20260518
  decision_time: 2026-05-18T23:55:00Z
  implemented:
    - moved serial title-card pytest command into test-full-shard shard 4
    - kept test-title-cards status as a merge-group sentinel check
    - skipped aggregate test checkout when merge-group shards provide validation
    - made uv cache key inputs explicit and made matrix shards restore-only
  required_check_names_changed: false
  aggregate_test_behavior: >-
    Pull requests keep the fast admission slice. Merge groups still require the
    four full pytest shards plus the serial title-card tests before the stable
    aggregate `test` check succeeds. Main push still runs full pytest unless a
    successful merge-group run already validated the same SHA.
  cache_policy:
    matrix_shards:
      restore_cache: true
      save_cache: false
      dependency_glob:
        - pyproject.toml
        - uv.lock
      safety_basis: >-
        `uv sync --extra ci --frozen` still runs in every shard, so cache hits
        are acceleration only and cannot hide missing dependency setup. Cache
        saving remains available in non-matrix uv jobs that also run explicit
        sync/install steps.
    non_matrix_uv_jobs:
      restore_cache: true
      save_cache: true
      dependency_glob:
        - pyproject.toml
        - uv.lock
  expected_setup_seconds:
    title_card_job_before_range: [55, 95]
    title_card_sentinel_after_range: [1, 3]
    merge_group_aggregate_checkout_before_range: [4, 8]
    merge_group_aggregate_checkout_after_range: [0, 0]
    removed_per_merge_group_range: [58, 103]
    not_counted: >-
      Matrix shard cache post-job save/prune/upload avoidance is intentionally
      not counted because the cost is cache-hit dependent; it should reduce
      contention on lockfile changes without affecting validation.
  prebuilt_or_self_hosted_runner_position:
    decision: defer
    reason: >-
      This slice removes hosted-runner setup cost without introducing a custom
      image or local workstation coupling. A prebuilt image or self-hosted
      runner still needs isolation, secret minimization, patching, cache bounds,
      registry or runner provenance, and live-service resource contention
      review before adoption.

pr_admission_slice:
  purpose: >-
    Keep PR admission fast enough for queue throughput while validating the CI
    policy files that make the fast/full split safe.
  command: >-
    PYTHONPATH=$PWD uv run --no-project --with pytest==9.0.2 --with pyyaml pytest
    --confcutdir=tests tests/ci/test_self_hosted_runner_experiment.py
    tests/ci/test_python_test_throughput_policy.py tests/test_ci_required_coverage_claims.py
    tests/shared/test_ci_discovery.py -q --tb=line
  preserves:
    - required test job name remains present on pull_request and merge_group
    - merge_group runs full pytest before merge via required-check shards
    - main push runs full pytest unless duplicate merge-group validation exists
    - self-hosted runner remains outside required checks
  local_receipt:
    command: >-
      PYTHONPATH=$PWD uv run --no-project --with pytest==9.0.2 --with pyyaml pytest
      --confcutdir=tests tests/ci/test_self_hosted_runner_experiment.py
      tests/ci/test_python_test_throughput_policy.py tests/test_ci_required_coverage_claims.py
      tests/shared/test_ci_discovery.py -q --tb=line
    conclusion: pass
    tests_passed: 50
    pytest_reported_seconds: 0.86
    shell_elapsed_seconds: 2

parity_status:
  self_hosted_vs_hosted: unavailable_no_self_hosted_runs
  pull_request_vs_merge_group: intentionally_not_equivalent
  safety_basis: merge_group_full_pytest_is_release_gate
