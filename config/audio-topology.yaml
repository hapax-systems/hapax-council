    pipewire_name: hapax-m8-instrument-capture
    industrial_name: chain.m8.instrument-capture
    description: M8 USB source capture side routed to M8 loudnorm
    target_object: alsa_input.usb-Dirtywave_M8_16558390-02.analog-stereo
    channels:
      count: 2
      positions: [FL, FR]
    params:
      fallback_to_l12_is_runtime_drift: true

  - id: m8-loudnorm
    kind: filter_chain
    pipewire_name: hapax-m8-loudnorm
    industrial_name: chain.m8.loudnorm
    description: M8 instrument loudnorm routed directly to livestream tap, bypassing L-12
    target_object: hapax-livestream-tap
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      bypasses_l12: true
      playback_target: hapax-livestream-tap

  - id: polyend-instrument-source
    kind: alsa_source
    pipewire_name: alsa_input.usb-Polyend_Tracker_Mini-00.analog-stereo
    industrial_name: interface.polyend.usb-in.stereo
    description: Polyend USB audio source, optional hardware endpoint
    hw: hw:Polyend,0
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional

  - id: polyend-instrument-capture
    kind: filter_chain
    pipewire_name: hapax-polyend-instrument-capture
    industrial_name: chain.polyend.instrument-capture
    description: Polyend USB source capture side routed to Polyend loudnorm
    target_object: alsa_input.usb-Polyend_Tracker_Mini-00.analog-stereo
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional
      fallback_to_l12_is_runtime_drift: true

  - id: polyend-loudnorm
    kind: filter_chain
    pipewire_name: hapax-polyend-loudnorm
    industrial_name: chain.polyend.loudnorm
    description: Polyend instrument loudnorm routed directly to livestream tap
    target_object: hapax-livestream-tap
    channels:
      count: 2
