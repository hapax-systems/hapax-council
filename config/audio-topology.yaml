    release_s: 0.20
    params:
      audit_classification: external-hardware-optional
      bypasses_l12: true
      playback_target: hapax-livestream-tap

edges:
  # Live edges the inspector can observe directly.
  - source: l12-capture
    target: l12-evilpet-capture

  - source: l12-capture
    target: l12-usb-return-capture

  - source: l12-usb-return-capture
    target: livestream-tap

  - source: l12-capture
    target: l12-mainmix-capture

  - source: l12-mainmix-capture
    target: obs-broadcast-mainmix-tap

  - source: livestream-tap
    target: broadcast-master-capture

  - source: polyend-instrument-source
    target: polyend-instrument-capture

  - source: polyend-instrument-capture
    target: polyend-loudnorm

  - source: polyend-loudnorm
    target: livestream-tap

  - source: private-sink
    target: private-monitor-capture

  - source: private-monitor-capture
    target: private-monitor-output

  - source: notification-private-sink
    target: notification-private-monitor-capture

  - source: notification-private-monitor-capture
    target: notification-private-monitor-output

  # Option C (2026-05-02 spec amendment) — canonical private-monitor route.
  # `hapax-private-playback` (and its notification sibling) writes into
  # the S-4 USB IN sink (`s4-output` carries the option_c_route annotation);
  # the S-4 internal scene `HAPAX-PRIVATE-MONITOR` routes Track 1 input
  # through the wet chain to the analog OUT 1/2 endpoint. The third edge
  # (S-4 internal scene routing) is operator-side firmware action, not
  # PipeWire-visible — recorded here as a model-only edge so the audit
  # graph reasons about the destination of the private-monitor track.
  - source: private-monitor-output
    target: s4-output

  - source: notification-private-monitor-output
    target: s4-output

  - source: s4-output
    target: s4-analog-out-1-2

  # Expected only when the M8 hardware source is present. When absent,
  # live PipeWire can expose an auto-link fallback; audit classifies that
  # runtime artifact explicitly instead of encoding it as intended graph.
  - source: m8-usb-source
    target: m8-instrument-capture

  # PR A — hapax-pc-router fork (Phase 3 PC volume isolation foundation).
  # Both subscribers read pc-router's monitor port. Dormant in PR A
  # (WirePlumber preferred-target stays on hapax-pc-loudnorm). PR B flips
  # the preferred-target so apps land on pc-router and these edges activate.
  - source: pc-router
    target: pc-monitor

  - source: pc-router
    target: pc-broadcast

  # Optional XVF3800 AEC reference loopback. This edge is absent until the
  # array is plugged in and an explicit loopback feeds the broadcast monitor
  # sum into the array's 2ch playback endpoint as far-end reference audio.
  # It does not send private audio to broadcast and does not replace the
  # Rode CH5/AUX4 broadcast mic path.
  - source: livestream-tap
    target: respeaker-xvf3800-aec-reference-output
