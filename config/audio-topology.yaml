schema_version: 3
description: |
  Canonical workstation audio topology for the live L-12 broadcast graph.

  This descriptor models the committed PipeWire/WirePlumber graph that
  drives the livestream after the L6/Ryzen-era retirement. It intentionally
  keeps the inverse L-12 safety invariant explicit:

      anything that enters the L-12 reaches broadcast; private audio leaves
      the L-12 entirely.

  The current schema has one target_object per logical node, while several
  deployed PipeWire modules expose separate capture/playback sides. For those
  nodes, params.* records the side that cannot be represented structurally yet
  (for example playback_target, capture_positions, and fail_closed).

  Schema v2 (2026-05-02): hw: fields now use symbolic ALSA card IDs
  (`hw:CARD=L12`) pinned by config/udev/rules.d/50-hapax-alsa-card-ids.rules,
  rather than numeric `hw:11` style. Numeric indices drift across reboots
  and replug order; symbolic names are stable per-device.

  Schema v3 (2026-05-02, audit F#8): filter_chain nodes accept typed
  template params (chain_kind, limit_db, bias_db, release_s,
  remap_to_rear) so the generator can emit LADSPA loudnorm / builtin
  duck / LADSPA usb-bias chains directly from YAML, eliminating the
  hand-mirror gap on respeaker-class new sources. v2 descriptors still
  parse — chain_kind defaults to None and the generic filter-chain
  template runs unchanged.

nodes:
  # L-12 hardware endpoints.
  - id: l12-capture
    kind: alsa_source
    pipewire_name: alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input
    industrial_name: interface.l12.usb-in.multichannel
    description: ZOOM LiveTrak L-12 multichannel USB capture
    hw: hw:CARD=L12
    channels:
      count: 14
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9, AUX10, AUX11, AUX12, AUX13]
    params:
      api.alsa.use-acp: false
      audit_role: l12-capture-source
    expected_scene: BROADCAST-V2
    expected_channel_assignments:
      CH1: evil-pet-in-from-monitor-a
      CH2: cortado-contact-mic
      CH3: reserve
      CH4: sampler-chain
      CH5: rode-wireless-pro-rx
      CH6: evil-pet-return-aux5
      CH7: reserve
      CH8: reserve
      CH9: mpc-content-return-l
      CH10: mpc-content-return-r
      CH11: mpc-voice-return-l
      CH12: mpc-voice-return-r
      CH13: master-l-dropped-from-broadcast
      CH14: master-r-dropped-from-broadcast

  - id: l12-usb-return
    kind: alsa_sink
    pipewire_name: alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40
    industrial_name: interface.l12.usb-out.surround40
    description: ZOOM LiveTrak L-12 USB return, FL/FR/RL/RR
    hw: surround40:CARD=L12
    channels:
      count: 4
      positions: [FL, FR, RL, RR]
    params:
      l12_return_pair: RL RR

  - id: mpc-usb-output
    kind: alsa_sink
    pipewire_name: alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output
    industrial_name: interface.mpc-live-iii.usb-out.multichannel
    description: |
      Akai MPC Live III USB multichannel playback endpoint. Under the
      MPC-first baseline, host-side broadcast sources land here first:
      music AUX0/1, Hapax voice AUX2/3, PC AUX4/5, YouTube AUX6/7.
      The MPC hardware mix exits over TRS outputs into L-12 CH9-12,
      where the wet return is captured by `hapax-l12-usb-return-capture`.
    hw: hw:CARD=MPCB
    channels:
      count: 24
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9, AUX10, AUX11, AUX12, AUX13, AUX14, AUX15, AUX16, AUX17, AUX18, AUX19, AUX20, AUX21, AUX22, AUX23]
    params:
      audit_role: mpc-first-broadcast-dsp
      host_to_mpc_channel_map: "music:AUX0/AUX1 voice:AUX2/AUX3 pc:AUX4/AUX5 youtube:AUX6/AUX7 private:AUX8/AUX9"
      hardware_forward_path: "MPC Out 1/2 -> L-12 CH9/10; MPC Out 3/4 -> L-12 CH11/12"

  - id: yeti-headphone-output
    kind: alsa_sink
    pipewire_name: alsa_output.usb-Blue_Microphones_Yeti_Stereo_Microphone_REV8-00.analog-stereo
    industrial_name: interface.yeti.monitor-output.stereo
    description: Blue Yeti headphone monitor, off-L-12 private endpoint
    hw: front:CARD=Yeti
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional
      private_monitor_endpoint: true
      forbidden_target_family: l12-broadcast

  # ReSpeaker XVF3800 USB 4-Mic Array introduction (2026-05-05).
  # Optional far-field operator capture surface. It complements the
  # current Rode-on-L-12 broadcast mic; it does not replace CH5/AUX4 or
  # become the default source until the operator explicitly promotes it.
  # Host placement: AMD 09:00.0/front-case controller, after running
  # `scripts/hapax-usb-bandwidth-preflight --device 2886:001a/0000:09:00.0`.
  - id: respeaker-xvf3800-array-source
    kind: alsa_source
    pipewire_name: alsa_input.usb-Seeed_Studio_ReSpeaker_XVF3800-00.multichannel-input
    industrial_name: interface.respeaker.array-source.multichannel
    description: ReSpeaker XVF3800 4-mic far-field array, optional operator sidechat capture
    hw: hw:CARD=XVF3800
    channels:
      count: 4
      positions: [AUX0, AUX1, AUX2, AUX3]
    params:
      audit_classification: external-hardware-optional
      operator_voice_candidate: true
      capture_role: hapax-array-mic
      replaces_broadcast_rode: false
      complements_rode: true
      default_source: false
      usb_host_controller: "0000:09:00.0"
      usb_placement: host-amd-front-controller
      privacy_risk: ambient_room_capture
      forbidden_default_route: l12-broadcast
      hardware_vad: vendor-control-unwired

  - id: respeaker-xvf3800-aec-reference-output
    kind: alsa_sink
    pipewire_name: alsa_output.usb-Seeed_Studio_ReSpeaker_XVF3800-00.multichannel-output
    industrial_name: interface.respeaker.aec-reference-output.stereo
    description: ReSpeaker XVF3800 stereo playback endpoint for optional AEC reference only
    hw: hw:CARD=XVF3800
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional
      aec_reference_endpoint: true
      aec_reference_source: hapax-livestream-tap.monitor
      not_operator_monitor: true
      not_broadcast_egress: true
      default_sink: false
      usb_host_controller: "0000:09:00.0"

  # Option C (2026-05-02 spec amendment) — S-4 analog OUT 1/2 endpoint.
  # This node is a model-only descriptor: the S-4 analog OUT 1/2 is a
  # TR line output, not a PipeWire-visible ALSA endpoint on this host.
  # Recording it lets the audit graph reason about the destination of
  # the private-monitor track, and lets the static guard
  # `scripts/audio-leak-guard.sh` confirm there's no back-path to
  # L-12 USB IN.
  #
  # The S-4 USB IN sink itself (`s4-output` below) carries the
  # `private_monitor_endpoint: true` annotation under Option C so the
  # WirePlumber pin's target_object resolves into a recognized
  # private-monitor endpoint.
  - id: s4-analog-out-1-2
    kind: tap
    pipewire_name: s4-analog-out-1-2
    industrial_name: interface.s4.analog-out.monitor12
    description: |
      Operator-monitor analog OUT 1/2 patch from the S-4. Patched into
      a non-broadcast monitor sink per spec §5 (headphone amp /
      motherboard HDA / separate USB headphone interface / hardware-
      fenced L-12 MON B). Forbidden: any L-12 channel input, any S-4
      USB IN pair, any broadcast-bound capture surface. Operator-side
      hardware patch action; software cannot enforce the destination,
      only verify no broadcast-back path exists in the PipeWire graph.
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional
      private_monitor_endpoint: true
      forbidden_target_family: l12-broadcast
      option_c_route: private-track-fenced-via-s4-out-1

  # Stable fan-out and fail-closed sinks.
  - id: livestream-tap
    kind: tap
    pipewire_name: hapax-livestream-tap
    industrial_name: bus.livestream.producer-tap
    description: Hapax livestream producer tap, upstream of broadcast master
    channels:
      count: 2
      positions: [FL, FR]
    params:
      apply_via_pactl_load: true
      systemd_unit: hapax-livestream-tap-loopback.service

  - id: livestream-legacy
    kind: tap
    pipewire_name: hapax-livestream
    industrial_name: bus.livestream.legacy-sink
    description: Legacy application-facing livestream sink retained as a null sink
    channels:
      count: 2
      positions: [FL, FR]
    params:
      retired_downstream_loopback: true

  - id: private-sink
    kind: tap
    pipewire_name: hapax-private
    industrial_name: bus.private.assistant-sink
    description: Private assistant sink, fail-closed with no L-12 playback bridge
    channels:
      count: 2
      positions: [FL, FR]
    params:
      fail_closed: true
      forbidden_target_family: l12-broadcast

  - id: notification-private-sink
    kind: tap
    pipewire_name: hapax-notification-private
    industrial_name: bus.private.notification-sink
    description: Private notification sink, fail-closed with no L-12 playback bridge
    channels:
      count: 2
      positions: [FL, FR]
    params:
      fail_closed: true
      forbidden_target_family: l12-broadcast

  - id: private-monitor-capture
    kind: filter_chain
    pipewire_name: hapax-private-monitor-capture
    industrial_name: chain.private.monitor-capture
    description: Capture side for private assistant monitor bridge
    target_object: hapax-private
    channels:
      count: 2
      positions: [FL, FR]
    params:
      stream.capture.sink: true
      state.restore: false
      stream.dont-remix: true
      private_monitor_bridge: true
      audit_classification: private-monitor-hardware-dependent

  - id: private-monitor-output
    kind: loopback
    pipewire_name: hapax-private-playback
    industrial_name: chain.private.monitor-output
    description: |
      Option C private-monitor bridge to S-4 USB IN Track 1 input.
      Per spec amendment 2026-05-02, this loopback's playback target is
      the S-4 multichannel-output sink (host-side), where the S-4
      internal scene HAPAX-PRIVATE-MONITOR routes Track 1 input through
      a wet chain and out to S-4 analog OUT 1/2. The privacy invariant
      is enforced at TRACK-OUTPUT level via the operator's analog patch
      (operator-confirmed 2026-05-02T~17:00Z).
    target_object: alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_source: hapax-private
      stream.capture.sink: true
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      node.linger: true
      state.restore: false
      stream.dont-remix: true
      fail_closed_on_target_absent: true
      private_monitor_bridge: true
      audit_classification: private-monitor-hardware-dependent
      option_c_route: private-track-fenced-via-s4-out-1

  - id: notification-private-monitor-capture
    kind: filter_chain
    pipewire_name: hapax-notification-private-monitor-capture
    industrial_name: chain.notification.monitor-capture
    description: Capture side for private notification monitor bridge
    target_object: hapax-notification-private
    channels:
      count: 2
      positions: [FL, FR]
    params:
      stream.capture.sink: true
      state.restore: false
      stream.dont-remix: true
      private_monitor_bridge: true
      audit_classification: private-monitor-hardware-dependent

  - id: notification-private-monitor-output
    kind: loopback
    pipewire_name: hapax-notification-private-playback
    industrial_name: chain.notification.monitor-output
    description: |
      Option C private-monitor bridge to S-4 USB IN Track 1 input.
      Per spec amendment 2026-05-02, the notification private path
      shares the same S-4 USB IN target as the assistant private
      path; the S-4 internal scene routes both through the same
      private-monitor track.
    target_object: alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_source: hapax-notification-private
      stream.capture.sink: true
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      node.linger: true
      state.restore: false
      stream.dont-remix: true
      fail_closed_on_target_absent: true
      private_monitor_bridge: true
      audit_classification: private-monitor-hardware-dependent
      option_c_route: private-track-fenced-via-s4-out-1

  # L-12 capture into the livestream. Only AUX1/3/4/5 are bound; raw
  # vinyl, PC return, and MASTER channels stay unbound.
  - id: l12-evilpet-capture
    kind: filter_chain
    pipewire_name: hapax-l12-evilpet-capture
    industrial_name: chain.broadcast.processor-return-capture
    description: L-12 narrowed capture, contact/sampler/rode/Evil Pet return to livestream tap
    target_object: alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_channels: 4
      capture_positions: AUX1 AUX3 AUX4 AUX5
      forbidden_capture_positions: AUX8 AUX9 AUX10 AUX11 AUX12 AUX13
      playback_target: hapax-livestream-tap
      playback_node_passive: false

  - id: l12-usb-return-capture
    kind: filter_chain
    pipewire_name: hapax-l12-usb-return-capture
    industrial_name: chain.broadcast.mpc-wet-return-capture
    description: |
      L-12 AUX8/AUX9/AUX10/AUX11 capture of MPC wet return. AUX8/9
      carry the content mix from MPC Out 1/2; AUX10/11 carry Hapax
      voice from MPC Out 3/4. This is the current path that replaces
      the retired software TTS duck/direct-tap bridge.
    target_object: alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_channels: 4
      capture_positions: AUX8 AUX9 AUX10 AUX11
      source_channel_identity: CH9/CH10 MPC content mix + CH11/CH12 MPC voice
      playback_target: hapax-livestream-tap
      playback_node: hapax-l12-usb-return-playback
      stream.dont-remix: true
      state.restore: false
      node.dont-reconnect: true
      source_dont_move: true
      sink_dont_move: true
      mpc_wet_return: true
      no_dry_signal: true

  # H5 Phase 2: secondary L-12 USB-IN A/B tap. This is monitor-only and
  # never feeds the RTMP path; OBS may add it as a muted secondary source
  # for 7-day software-vs-L-12 comparison.
  - id: l12-mainmix-capture
    kind: filter_chain
    pipewire_name: hapax-l12-mainmix-capture
    industrial_name: chain.broadcast.mainmix-capture
    description: L-12 AUX10/AUX11 secondary broadcast A/B capture, monitor-only
    target_object: alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_channels: 2
      capture_positions: AUX10 AUX11
      source_channel_identity: CH11/CH12 PC line-out pair in BROADCAST-V2
      playback_target: hapax-obs-broadcast-mainmix-tap
      stream.dont-remix: true
      state.restore: false
      node.dont-reconnect: true
      source_dont_move: true
      sink_dont_move: true
      monitor_only: true
      secondary_obs_source: true
      no_rtmp_egress: true
      operator_obs_mute_required: true
      systemd_unit: hapax-l12-mainmix-tap-loopback.service
      audit_classification: systemd-managed-loopback-shape

  - id: obs-broadcast-mainmix-tap
    kind: tap
    pipewire_name: hapax-obs-broadcast-mainmix-tap
    industrial_name: bus.broadcast.mainmix-egress-tap
    description: OBS-visible L-12 mainmix A/B monitor tap, muted secondary source only
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: systemd-managed-loopback-shape
      monitor.passthrough: true
      monitor_only: true
      secondary_obs_source: true
      no_rtmp_egress: true
      operator_obs_mute_required: true
      apply_via_pactl_load: true
      systemd_unit: hapax-l12-mainmix-tap-loopback.service

  # Broadcast master / limiter / OBS source chain.
  - id: broadcast-master-capture
    kind: filter_chain
    pipewire_name: hapax-broadcast-master-capture
    industrial_name: bus.broadcast.master-capture
    description: Livestream tap to broadcast master virtual source
    target_object: hapax-livestream-tap
    channels:
      count: 2
      positions: [FL, FR]
    params:
      playback_source: hapax-broadcast-master

  - id: broadcast-normalized-capture
    kind: filter_chain
    pipewire_name: hapax-broadcast-normalized-capture
    industrial_name: bus.broadcast.normalized-capture
    description: Broadcast master safety-net limiter capture side
    target_object: hapax-broadcast-master
    channels:
      count: 2
      positions: [FL, FR]
    params:
      playback_source: hapax-broadcast-normalized
      limiter: fast_lookahead_limiter_1913
      limit_db: -1.0

  - id: obs-broadcast-remap-capture
    kind: filter_chain
    pipewire_name: hapax-obs-broadcast-remap-capture
    industrial_name: bus.broadcast.egress-remap-capture
    description: OBS-stable capture side for hapax-broadcast-normalized
    target_object: hapax-broadcast-normalized
    channels:
      count: 2
      positions: [FL, FR]
    params:
      playback_source: hapax-obs-broadcast-remap

  # WirePlumber role loopbacks. target_object records the preferred-target
  # encoded in config/wireplumber/50-hapax-voice-duck.conf.
  - id: role-multimedia
    kind: loopback
    pipewire_name: input.loopback.sink.role.multimedia
    industrial_name: role.multimedia.loopback-sink
    description: Default multimedia role, routed through PC loudnorm
    target_object: hapax-pc-loudnorm
    channels:
      count: 2
      positions: [FL, FR]

  - id: role-notification
    kind: loopback
    pipewire_name: input.loopback.sink.role.notification
    industrial_name: role.notification.loopback-sink
    description: Notification role, routed to fail-closed private notification sink
    target_object: hapax-notification-private
    channels:
      count: 2
      positions: [FL, FR]

  - id: role-assistant
    kind: loopback
    pipewire_name: input.loopback.sink.role.assistant
    industrial_name: role.assistant.loopback-sink
    description: Assistant/private TTS role, routed to fail-closed private sink
    target_object: hapax-private
    channels:
      count: 2
      positions: [FL, FR]

  - id: role-broadcast
    kind: loopback
    pipewire_name: input.loopback.sink.role.broadcast
    industrial_name: role.broadcast.loopback-sink
    description: Broadcast TTS role, routed to voice FX chain
    target_object: hapax-voice-fx-capture
    channels:
      count: 2
      positions: [FL, FR]

  # Broadcast-bound TTS chain.
  - id: voice-fx
    kind: filter_chain
    pipewire_name: hapax-voice-fx-capture
    industrial_name: chain.voice.effects-capture
    description: Hapax voice FX input, output routed to TTS loudnorm
    target_object: hapax-loudnorm-capture
    channels:
      count: 2
      positions: [FL, FR]

  - id: tts-loudnorm
    kind: filter_chain
    pipewire_name: hapax-loudnorm-capture
    industrial_name: chain.voice.loudnorm-capture
    description: TTS loudnorm capture side, output routed to MPC USB IN 3/4
    target_object: alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      playback_positions: AUX2 AUX3
      mpc_usb_input_pair: AUX2 AUX3
      no_software_duck: true
      no_direct_livestream_tap: true
      broadcast_forward_path: mpc-usb-output l12-usb-return-capture hapax-livestream-tap

  # PC, music, YouTube, S-4, and M8 content routes.
  - id: pc-loudnorm
    kind: filter_chain
    pipewire_name: hapax-pc-loudnorm
    industrial_name: chain.desktop.loudnorm
    description: PC-wide loudnorm sink routed to MPC USB IN 5/6
    target_object: alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      playback_positions: AUX4 AUX5
      mpc_usb_input_pair: AUX4 AUX5
      notification_excluded: true

  - id: pc-router
    kind: tap
    pipewire_name: hapax-pc-router
    industrial_name: bus.desktop.router
    description: PC audio fork point — null-sink with monitor, dormant until PR B
    channels:
      count: 2
      positions: [FL, FR]
    params:
      monitor.passthrough: true
      dormant_until_pr_b: true
      audit_classification: dormant-pr-b

  - id: pc-monitor
    kind: filter_chain
    pipewire_name: hapax-pc-monitor
    industrial_name: chain.desktop.monitor
    description: Operator headphone path — limiter -1 dBTP to Yeti, private off-L-12
    target_object: hapax-pc-router
    channels:
      count: 2
      positions: [FL, FR]
    params:
      stream.capture.sink: true
      state.restore: false
      stream.dont-remix: true
      playback_target: alsa_output.usb-Blue_Microphones_Yeti_Stereo_Microphone_REV8-00.analog-stereo
      private_monitor_endpoint: true
      forbidden_target_family: l12-broadcast
      ladspa_plugin: fast_lookahead_limiter_1913
      limit_db: -1.0
      audit_classification: dormant-pr-b

  - id: pc-broadcast
    kind: filter_chain
    pipewire_name: hapax-pc-broadcast
    industrial_name: chain.desktop.broadcast
    description: L-12 broadcast path — limiter -18 dBFS to L-12 USB return RL/RR
    target_object: hapax-pc-router
    channels:
      count: 2
      positions: [FL, FR]
    params:
      stream.capture.sink: true
      state.restore: false
      stream.dont-remix: true
      playback_target: alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40
      playback_positions: RL RR
      allowed_l12_return_direction: broadcast
      ladspa_plugin: fast_lookahead_limiter_1913
      limit_db: -18.0
      dormant_until_pr_b: true
      audit_classification: dormant-pr-b

  - id: music-loudnorm
    kind: filter_chain
    pipewire_name: hapax-music-loudnorm
    industrial_name: chain.music.loudnorm
    description: Music loudnorm capture side routed to MPC USB IN 1/2
    target_object: alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      playback_positions: AUX0 AUX1
      mpc_usb_input_pair: AUX0 AUX1
      no_software_duck: true

  - id: yt-loudnorm
    kind: filter_chain
    pipewire_name: hapax-yt-loudnorm
    industrial_name: chain.youtube.loudnorm
    description: YouTube bed loudnorm routed to MPC USB IN 7/8
    target_object: alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      playback_positions: AUX6 AUX7
      mpc_usb_input_pair: AUX6 AUX7
      no_software_duck: true

  - id: s4-source
    kind: alsa_source
    pipewire_name: alsa_input.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-input
    industrial_name: interface.s4.usb-in.multichannel
    description: Torso S-4 pro-audio multichannel input
    hw: hw:CARD=S4
    channels:
      count: 10
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9]
    params:
      audit_role: external-s4-hardware-present
      audit_classification: external-hardware-optional

  - id: s4-output
    kind: alsa_sink
    pipewire_name: alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output
    industrial_name: interface.s4.usb-out.multichannel
    description: |
      Torso S-4 pro-audio multichannel output.
      Option C (2026-05-02 spec amendment): the host-side write end of
      the S-4 USB pair. WirePlumber pin
      `config/wireplumber/56-hapax-private-pin-s4-track-1.conf` targets
      this sink for `hapax-private*` streams; the S-4 internal scene
      `HAPAX-PRIVATE-MONITOR` routes Track 1 input from the
      corresponding USB IN slot through a wet chain to S-4 analog
      OUT 1/2 (operator's non-broadcast monitor patch). The privacy
      invariant is enforced at TRACK-OUTPUT level — this sink itself
      is dual-citizen (broadcast tracks 2-4 also write here), but
      Track 1's output never enters the L-12 USB IN capture chain.
    hw: hw:CARD=S4
    channels:
      count: 10
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9]
    params:
      audit_role: external-s4-hardware-present
      audit_classification: external-hardware-optional
      # Option C private-monitor endpoint annotation. The S-4 USB IN
      # sink is the host-side software entry into the private-monitor
      # Track 1 path; the S-4 internal scene plus operator analog
      # patch enforce the privacy invariant at the track-output level.
      private_monitor_endpoint: true
      private_monitor_track: 1
      option_c_route: private-track-fenced-via-s4-out-1

  - id: s4-loopback
    kind: loopback
    pipewire_name: hapax-s4-content
    industrial_name: chain.s4.content-loopback
    description: S-4 USB stereo content loopback to livestream tap
    target_object: hapax-livestream-tap
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audio.format: S32
      audio.rate: 48000
      playback_node: hapax-s4-tap

  - id: m8-usb-source
    kind: alsa_source
    pipewire_name: alsa_input.usb-Dirtywave_M8_16558390-02.analog-stereo
    industrial_name: interface.m8.usb-in.stereo
    description: Dirtywave M8 USB audio source, optional hardware endpoint
    hw: hw:M8,0
    channels:
      count: 2
