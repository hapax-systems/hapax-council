schema_version: 3
description: |
  Canonical workstation audio topology for the live broadcast graph.

  CURRENT (2026-06-02): the ZOOM L-12, Akai MPC Live III, and Evil Pet hardware
  have been retired from the broadcast path. The MOTU UltraLite mk5 is the PC
  interface; Torso S-4 is an analog voice insert (mk5 OUT 3/4 -> S-4 -> mk5 IN
  3/4); Rode mic lands on mk5 IN 1; livestream-tap is the software sum bus; and
  private monitor audio is fenced to mk5 Phones AUX10/11 only. Legacy L-12/MPC
  nodes remain below as historical descriptors until their code-facing epics are
  removed, but the route-map generator selects the mk5 nodes when present.

  This descriptor models the committed PipeWire/WirePlumber graph that
  drives the livestream after the L6/Ryzen-era retirement. It intentionally
  keeps the inverse safety invariant explicit:

      anything that enters the broadcast return reaches broadcast; private
      audio leaves the broadcast path entirely.

  The current schema has one target_object per logical node, while several
  deployed PipeWire modules expose separate capture/playback sides. For those
  nodes, params.* records the side that cannot be represented structurally yet
  (for example playback_target, capture_positions, and fail_closed).

  Schema v2 (2026-05-02): hw: fields now use symbolic ALSA card IDs
  (`hw:CARD=L12`) pinned by config/udev/rules.d/50-hapax-alsa-card-ids.rules,
  rather than numeric `hw:11` style. Numeric indices drift across reboots
  and replug order; symbolic names are stable per-device.

  Schema v3 (2026-05-02, audit F#8): filter_chain nodes accept typed
  template params (chain_kind, limit_db, bias_db, release_s,
  remap_to_rear) so the generator can emit LADSPA loudnorm / builtin
  duck / LADSPA usb-bias chains directly from YAML, eliminating the
  hand-mirror gap on respeaker-class new sources. v2 descriptors still
  parse — chain_kind defaults to None and the generic filter-chain
  template runs unchanged.

nodes:
  # L-12 hardware endpoints.
  - id: l12-capture
    kind: alsa_source
    pipewire_name: alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input
    industrial_name: interface.l12.usb-in.multichannel
    description: ZOOM LiveTrak L-12 multichannel USB capture
    hw: hw:CARD=L12
    channels:
      count: 14
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9, AUX10, AUX11, AUX12, AUX13]
    params:
      api.alsa.use-acp: false
      audit_role: l12-capture-source
      audit_classification: retired-l12-history
    expected_scene: BROADCAST-V2
    expected_channel_assignments:
      CH1: evil-pet-in-from-monitor-a
      CH2: cortado-contact-mic
      CH3: reserve
      CH4: sampler-chain
      CH5: rode-wireless-pro-rx
      CH6: evil-pet-return-aux5
      CH7: reserve
      CH8: reserve
      CH9: mpc-content-return-l
      CH10: mpc-content-return-r
      CH11: mpc-voice-return-l
      CH12: mpc-voice-return-r
      CH13: master-l-dropped-from-broadcast
      CH14: master-r-dropped-from-broadcast

  - id: l12-usb-return
    kind: alsa_sink
    pipewire_name: alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40
    industrial_name: interface.l12.usb-out.surround40
    description: ZOOM LiveTrak L-12 USB return, FL/FR/RL/RR
    hw: surround40:CARD=L12
    channels:
      count: 4
      positions: [FL, FR, RL, RR]
    params:
      l12_return_pair: RL RR
      audit_classification: retired-l12-history

  - id: mpc-usb-output
    kind: alsa_sink
    pipewire_name: alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.pro-output-0
    industrial_name: interface.mpc-live-iii.usb-out.multichannel
    description: |
      Akai MPC Live III USB multichannel playback endpoint. Under the
      MPC-first baseline, host-side broadcast sources land here first:
      SoundCloud/music AUX0/1, public livestream TTS AUX2/3,
      YouTube bed AUX6/7, and private TTS monitor AUX8/9. AUX4/5, AUX10/11,
      notifications, instruments, PC/default multimedia, and other
      under-specified producers are disabled/fail-closed until a bounded
      activation task explicitly promotes them.

      INTERIM (2026-05-29, L-12 physically removed): the MPC is the sole
      interface until the MOTU UltraLite mk5 + FadeFox MX12 land. The MPC
      internal mixer now returns two stereo busses to the host over its own
      24-ch USB return (see mpc-usb-return): the public mix (music + voice +
      YouTube) on capture_AUX0/1 is broadcast-bound; the private monitor mix
      on capture_AUX2/3 is operator-monitor-only and fenced from broadcast.
      The live PipeWire ALSA profile is the MPC Pro profile (`pro-output-0`);
      the older `multichannel-output` node name stays listed only as a
      deny-policy legacy alias for PC USB 5/6 fail-closed protection.
    hw: hw:CARD=MPCB
    channels:
      count: 24
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9, AUX10, AUX11, AUX12, AUX13, AUX14, AUX15, AUX16, AUX17, AUX18, AUX19, AUX20, AUX21, AUX22, AUX23]
    params:
      audit_role: mpc-first-broadcast-dsp
      host_to_mpc_channel_map: "music-soundcloud:AUX0/AUX1 public-tts:AUX2/AUX3 pc:disabled/fail-closed youtube:AUX6/AUX7 notification:disabled private-tts:AUX8/AUX9 other:disabled"
      legacy_pipewire_names: alsa_output.usb-Akai_Professional_MPC_LIVE_III_B-00.multichannel-output
      legacy_private_monitor_endpoint: true
      private_monitor_positions: AUX8 AUX9
      legacy_private_monitor_route: private-monitor-via-mpc-live-iii
      hardware_forward_path: "MPC Out 1/2 -> host capture_AUX0/1 (public mix, broadcast); MPC Out 3/4 -> host capture_AUX2/3 (private monitor, fenced) [interim, L-12 removed 2026-05-29]"
      interim_l12_removed: true

  - id: mpc-usb-return
    kind: alsa_source
    pipewire_name: alsa_input.usb-Akai_Professional_MPC_LIVE_III_B-00.pro-input-0
    industrial_name: interface.mpc-live-iii.usb-in.multichannel
    description: |
      Akai MPC Live III USB multichannel capture (24-ch return). Interim
      MPC-only baseline (L-12 removed 2026-05-29): the MPC internal mixer
      returns two stereo busses to the host —
        capture_AUX0/1 = public mix (music + voice + YouTube), broadcast-bound
        capture_AUX2/3 = private monitor mix, NEVER broadcast-bound
      capture_AUX4..23 are unbound/reserved. The public pair is captured by
      mpc-usb-return-capture and summed into livestream-tap; the private pair
      is fenced out of every broadcast node by audio-forbidden-links
      (defense-in-depth — the MPC public mix must already exclude private,
      which is operator-owned). Superseded by the MOTU/FadeFox migration.
    hw: hw:CARD=MPCB
    channels:
      count: 24
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9, AUX10, AUX11, AUX12, AUX13, AUX14, AUX15, AUX16, AUX17, AUX18, AUX19, AUX20, AUX21, AUX22, AUX23]
    params:
      audit_role: mpc-usb-return-source
      public_return_positions: AUX0 AUX1
      private_return_positions: AUX2 AUX3
      interim_l12_removed: true

  - id: mk5-output
    kind: alsa_sink
    pipewire_name: alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0
    industrial_name: interface.mk5.usb-out.multichannel
    description: |
      MOTU UltraLite mk5 pro-audio multichannel playback endpoint. Current
      broadcast topology uses AUX2/3 as the dry voice send to the S-4 analog
      insert and AUX10/11 as the private operator Phones monitor. No default,
      PC, private, or notification route may target AUX2/3.
    hw: hw:CARD=UltraLitemk5
    channels:
      count: 12
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9, AUX10, AUX11]
    params:
      audit_role: mk5-broadcast-interface
      voice_dry_send_positions: AUX2 AUX3
      private_monitor_positions: AUX10 AUX11
      private_monitor_endpoint: true
      private_monitor_route: private-monitor-via-mk5-phones
      retired_replacement_for: mpc-usb-output

  - id: mk5-input
    kind: alsa_source
    pipewire_name: alsa_input.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-input-0
    industrial_name: interface.mk5.usb-in.multichannel
    description: |
      MOTU UltraLite mk5 pro-audio multichannel capture endpoint. AUX0 is the
      Rode Wireless Pro operator mic (physical input 1); AUX1 is the Cortado MKIII
      contact mic (physical input 2, perceptual/quarantine — see
      config/perception-registry.yaml cortado.hw_source; supersedes the retired
      L-12 CH2 mapping); AUX2/3 are the wet S-4 analog insert return.
    hw: hw:CARD=UltraLitemk5
    channels:
      count: 10
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9]
    params:
      audit_role: mk5-broadcast-interface
      operator_mic_position: AUX0
      contact_mic_position: AUX1
      s4_wet_return_positions: AUX2 AUX3
      retired_replacement_for: mpc-usb-return

  - id: yeti-headphone-output
    kind: alsa_sink
    pipewire_name: alsa_output.usb-Blue_Microphones_Yeti_Stereo_Microphone_REV8-00.analog-stereo
    industrial_name: interface.yeti.monitor-output.stereo
    description: Blue Yeti headphone monitor, off-L-12 private endpoint
    hw: front:CARD=Yeti
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional
      private_monitor_endpoint: true
      forbidden_target_family: l12-broadcast

  # ReSpeaker XVF3800 USB 4-Mic Array introduction (2026-05-05).
  # Optional far-field operator capture surface. It complements the
  # current Rode-on-L-12 broadcast mic; it does not replace CH5/AUX4 or
  # become the default source until the operator explicitly promotes it.
  # Host placement: AMD 09:00.0/front-case controller, after running
  # `scripts/hapax-usb-bandwidth-preflight --device 2886:001a/0000:09:00.0`.
  - id: respeaker-xvf3800-array-source
    kind: alsa_source
    pipewire_name: alsa_input.usb-Seeed_Studio_ReSpeaker_XVF3800-00.multichannel-input
    industrial_name: interface.respeaker.array-source.multichannel
    description: ReSpeaker XVF3800 4-mic far-field array, optional operator sidechat capture
    hw: hw:CARD=XVF3800
    channels:
      count: 4
      positions: [AUX0, AUX1, AUX2, AUX3]
    params:
      audit_classification: external-hardware-optional
      operator_voice_candidate: true
      capture_role: hapax-array-mic
      replaces_broadcast_rode: false
      complements_rode: true
      default_source: false
      usb_host_controller: "0000:09:00.0"
      usb_placement: host-amd-front-controller
      privacy_risk: ambient_room_capture
      forbidden_default_route: l12-broadcast
      hardware_vad: vendor-control-unwired

  - id: respeaker-xvf3800-aec-reference-output
    kind: alsa_sink
    pipewire_name: alsa_output.usb-Seeed_Studio_ReSpeaker_XVF3800-00.multichannel-output
    industrial_name: interface.respeaker.aec-reference-output.stereo
    description: ReSpeaker XVF3800 stereo playback endpoint for optional AEC reference only
    hw: hw:CARD=XVF3800
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional
      aec_reference_endpoint: true
      aec_reference_source: hapax-livestream-tap.monitor
      not_operator_monitor: true
      not_broadcast_egress: true
      default_sink: false
      usb_host_controller: "0000:09:00.0"

  # Legacy S-4 analog OUT 1/2 descriptor.
  # This node is a model-only descriptor: the S-4 analog OUT 1/2 is a
  # TR line output, not a PipeWire-visible ALSA endpoint on this host.
  # HN private-monitor readiness no longer targets S-4 USB audio; S-4 is
  # downstream/MIDI in the MPC-first path.
  - id: s4-analog-out-1-2
    kind: tap
    pipewire_name: s4-analog-out-1-2
    industrial_name: interface.s4.analog-out.monitor12
    description: |
      Operator-monitor analog OUT 1/2 patch from the S-4. Patched into
      a non-broadcast monitor sink per spec §5 (headphone amp /
      motherboard HDA / separate USB headphone interface / hardware-
      fenced L-12 MON B). Forbidden: any L-12 channel input, any S-4
      USB IN pair, any broadcast-bound capture surface. Operator-side
      hardware patch action; software cannot enforce the destination,
      only verify no broadcast-back path exists in the PipeWire graph.
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional
      legacy_private_monitor_endpoint: true
      forbidden_target_family: l12-broadcast
      legacy_option_c_route: private-track-fenced-via-s4-out-1

  # Stable fan-out and fail-closed sinks.
  - id: livestream-tap
    kind: tap
    pipewire_name: hapax-livestream-tap
    industrial_name: bus.livestream.producer-tap
    description: Hapax livestream producer tap, upstream of broadcast master
    channels:
      count: 2
      positions: [FL, FR]
    params:
      apply_via_pactl_load: true
      systemd_unit: hapax-livestream-tap-loopback.service

  - id: livestream-legacy
    kind: tap
    pipewire_name: hapax-livestream
    industrial_name: bus.livestream.legacy-sink
    description: Legacy application-facing livestream sink retained as a null sink
    channels:
      count: 2
      positions: [FL, FR]
    params:
      retired_downstream_loopback: true

  - id: private-sink
    kind: tap
    pipewire_name: hapax-private
    industrial_name: bus.private.assistant-sink
    description: Private assistant sink, fail-closed with no L-12 playback bridge
    channels:
      count: 2
      positions: [FL, FR]
    params:
      fail_closed: true
      forbidden_target_family: l12-broadcast

  - id: notification-private-sink
    kind: tap
    pipewire_name: hapax-notification-private
    industrial_name: bus.private.notification-sink
    description: Private notification sink, fail-closed with no L-12 playback bridge
    channels:
      count: 2
      positions: [FL, FR]
    params:
      fail_closed: true
      forbidden_target_family: l12-broadcast

  - id: private-monitor-capture
    kind: filter_chain
    pipewire_name: hapax-private-monitor-capture
    industrial_name: chain.private.monitor-capture
    description: Capture side for private assistant monitor bridge
    target_object: hapax-private
    channels:
      count: 2
      positions: [FL, FR]
    params:
      stream.capture.sink: true
      state.restore: false
      stream.dont-remix: true
      private_monitor_bridge: true
      audit_classification: private-monitor-hardware-dependent

  - id: private-monitor-output
    kind: loopback
    pipewire_name: hapax-private-playback
    industrial_name: chain.private.monitor-output
    description: |
      Fail-closed private-monitor bridge to MOTU UltraLite mk5 Phones
      AUX10/AUX11. This is operator-monitor-only and never broadcast-bound.
    target_object: alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_source: hapax-private
      stream.capture.sink: true
      node.autoconnect: false
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      node.linger: true
      state.restore: false
      stream.dont-remix: true
      fail_closed_on_target_absent: true
      private_monitor_bridge: true
      audit_classification: private-monitor-hardware-dependent
      playback_positions: AUX10 AUX11
      mk5_output_pair: AUX10 AUX11
      private_monitor_route: private-monitor-via-mk5-phones

  - id: notification-private-monitor-capture
    kind: filter_chain
    pipewire_name: hapax-notification-private-monitor-capture
    industrial_name: chain.notification.monitor-capture
    description: Disabled capture side for notification monitor bridge
    channels:
      count: 2
      positions: [FL, FR]
    params:
      stream.capture.sink: true
      state.restore: false
      stream.dont-remix: true
      private_monitor_bridge: false
      disabled_until_route_authority: true
      monitor_capture_target: disabled
      audit_classification: private-monitor-hardware-dependent

  - id: notification-private-monitor-output
    kind: loopback
    pipewire_name: hapax-notification-private-playback
    industrial_name: chain.notification.monitor-output
    description: |
      Disabled notification monitor bridge. Notifications remain
      fail-closed at hapax-notification-private and must not share the
      private TTS MPC AUX8/AUX9 ingress until notification-private audio
      has explicit route authority.
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_source: hapax-notification-private
      stream.capture.sink: true
      node.autoconnect: false
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      node.linger: true
      state.restore: false
      stream.dont-remix: true
      fail_closed_on_target_absent: true
      private_monitor_bridge: false
      disabled_until_route_authority: true
      audit_classification: private-monitor-hardware-dependent
      playback_positions: disabled
      mpc_usb_input_pair: disabled
      private_monitor_route: disabled-notification-private

  # L-12 capture into the livestream. Only AUX1/3/4/5 are bound; raw
  # vinyl, PC return, and MASTER channels stay unbound.
  - id: l12-evilpet-capture
    kind: filter_chain
    pipewire_name: hapax-l12-evilpet-capture
    industrial_name: chain.broadcast.processor-return-capture
    description: L-12 narrowed capture, contact/sampler/rode/Evil Pet return to livestream tap
    target_object: alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_channels: 4
      capture_positions: AUX1 AUX3 AUX4 AUX5
      forbidden_capture_positions: AUX8 AUX9 AUX10 AUX11 AUX12 AUX13
      playback_target: hapax-livestream-tap
      playback_node_passive: false
      audit_classification: retired-l12-history

  # [ORPHANED 2026-05-29] L-12 physically removed; this wet-return node no
  # longer has hardware. It is retained only so the deny-policy forbidden
  # cross-product and history stay intact for the MOTU/FadeFox migration to
  # clean up. The live broadcast return is now mpc-usb-return-capture. The
  # deployed conf is quarantined; this node is NOT in the desired link map.
  - id: l12-usb-return-capture
    kind: filter_chain
    pipewire_name: hapax-l12-usb-return-capture
    industrial_name: chain.broadcast.l12-wet-return-capture
    description: |
      [ORPHANED, L-12 removed 2026-05-29] L-12 AUX8/AUX9/AUX10/AUX11 capture
      of the MPC wet return via the L-12. Superseded by mpc-usb-return-capture
      (direct MPC USB return). Retained for forbidden-link history until the
      MOTU/FadeFox migration retires the L-12 model entirely.
    target_object: alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_channels: 4
      capture_positions: AUX8 AUX9 AUX10 AUX11
      source_channel_identity: CH9/CH10 MPC content mix + CH11/CH12 MPC voice
      playback_target: hapax-livestream-tap
      playback_node: hapax-l12-usb-return-playback
      stream.dont-remix: true
      state.restore: false
      node.dont-reconnect: true
      source_dont_move: true
      sink_dont_move: true
      mpc_wet_return: true
      no_dry_signal: true
      interim_orphaned: true

  # Interim MPC-only broadcast return (2026-05-29, L-12 removed). Captures the
  # MPC public mix (music + voice + YouTube, summed inside the MPC) on
  # pro-input-0 capture_AUX0/1 and sums it into livestream-tap. Replaces the
  # orphaned L-12 wet return above. The private monitor mix on capture_AUX2/3
  # is intentionally NOT captured here and is fenced from broadcast by
  # audio-forbidden-links. Superseded by the MOTU/FadeFox migration.
  - id: mpc-usb-return-capture
    kind: filter_chain
    pipewire_name: hapax-mpc-usb-return-capture
    industrial_name: chain.broadcast.mpc-usb-return-capture
    description: |
      MPC USB return capture (interim, L-12 removed 2026-05-29). Captures the
      MPC public mix on pro-input-0 capture_AUX0/1 (music + voice + YouTube,
      pre-summed inside the MPC) and forwards the stereo pair to livestream-tap
      via hapax-mpc-usb-return-playback. No dry signal: the audio has passed
      MPC channel-strip DSP. The private monitor mix on capture_AUX2/3 is
      excluded by construction and fenced from broadcast in audio-forbidden-links.
    target_object: alsa_input.usb-Akai_Professional_MPC_LIVE_III_B-00.pro-input-0
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_channels: 2
      capture_positions: AUX0 AUX1
      source_channel_identity: CH (public) MPC mix music+voice+youtube on USB out 1/2
      playback_target: hapax-livestream-tap
      playback_node: hapax-mpc-usb-return-playback
      stream.dont-remix: true
      state.restore: false
      node.dont-reconnect: true
      source_dont_move: true
      sink_dont_move: true
      mpc_wet_return: true
      no_dry_signal: true
      interim_l12_removed: true

  # H5 Phase 2: secondary L-12 USB-IN A/B tap. This is monitor-only and
  # never feeds the RTMP path; OBS may add it as a muted secondary source
  # for 7-day software-vs-L-12 comparison.
  - id: l12-mainmix-capture
    kind: filter_chain
    pipewire_name: hapax-l12-mainmix-capture
    industrial_name: chain.broadcast.mainmix-capture
    description: L-12 AUX10/AUX11 secondary broadcast A/B capture, monitor-only
    target_object: alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_channels: 2
      capture_positions: AUX10 AUX11
      source_channel_identity: CH11/CH12 PC line-out pair in BROADCAST-V2
      playback_target: hapax-obs-broadcast-mainmix-tap
      stream.dont-remix: true
      state.restore: false
      node.dont-reconnect: true
      source_dont_move: true
      sink_dont_move: true
      monitor_only: true
      secondary_obs_source: true
      no_rtmp_egress: true
      operator_obs_mute_required: true
      systemd_unit: hapax-l12-mainmix-tap-loopback.service
      audit_classification: systemd-managed-loopback-shape

  - id: obs-broadcast-mainmix-tap
    kind: tap
    pipewire_name: hapax-obs-broadcast-mainmix-tap
    industrial_name: bus.broadcast.mainmix-egress-tap
    description: OBS-visible L-12 mainmix A/B monitor tap, muted secondary source only
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: systemd-managed-loopback-shape
      monitor.passthrough: true
      monitor_only: true
      secondary_obs_source: true
      no_rtmp_egress: true
      operator_obs_mute_required: true
      apply_via_pactl_load: true
      systemd_unit: hapax-l12-mainmix-tap-loopback.service

  # Broadcast master / limiter / OBS source chain.
  - id: broadcast-master-capture
    kind: filter_chain
    pipewire_name: hapax-broadcast-master-capture
    industrial_name: bus.broadcast.master-capture
    description: Livestream tap to broadcast master virtual source
    target_object: hapax-livestream-tap
    channels:
      count: 2
      positions: [FL, FR]
    params:
      playback_source: hapax-broadcast-master

  - id: broadcast-normalized-capture
    kind: filter_chain
    pipewire_name: hapax-broadcast-normalized-capture
    industrial_name: bus.broadcast.normalized-capture
    description: Broadcast master safety-net limiter capture side
    target_object: hapax-broadcast-master
    channels:
      count: 2
      positions: [FL, FR]
    params:
      playback_source: hapax-broadcast-normalized
      limiter: fast_lookahead_limiter_1913
      limit_db: -1.0

  - id: obs-broadcast-remap-capture
    kind: filter_chain
    pipewire_name: hapax-obs-broadcast-remap-capture
    industrial_name: bus.broadcast.egress-remap-capture
    description: OBS-stable capture side for hapax-broadcast-normalized
    target_object: hapax-broadcast-normalized
    channels:
      count: 2
      positions: [FL, FR]
    params:
      playback_source: hapax-obs-broadcast-remap

  # Role loopbacks. target_object records the preferred-target generated into
  # config/pipewire/generated/pipewire/role-*.conf; WirePlumber's
  # 50-hapax-voice-duck.conf only carries the minimal role policy anchors.
  - id: role-multimedia
    kind: loopback
    pipewire_name: input.loopback.sink.role.multimedia
    industrial_name: role.multimedia.loopback-sink
    description: Default multimedia role, dead-ended at PC loudnorm with no MPC/livestream egress
    target_object: hapax-pc-loudnorm
    channels:
      count: 2
      positions: [FL, FR]
    params:
      device.intended-roles: '[ "Music", "Movie", "Game", "Multimedia" ]'
      policy.role-based.priority: 10
      policy.role-based.action.same-priority: mix
      policy.role-based.action.lower-priority: mix
      policy.role-based.preferred-target: hapax-pc-loudnorm
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      state.restore: false

  - id: role-notification
    kind: loopback
    pipewire_name: input.loopback.sink.role.notification
    industrial_name: role.notification.loopback-sink
    description: Notification role, routed to fail-closed private notification sink
    target_object: hapax-notification-private
    channels:
      count: 2
      positions: [FL, FR]
    params:
      device.intended-roles: '[ "Notification" ]'
      policy.role-based.priority: 20
      policy.role-based.action.same-priority: mix
      policy.role-based.action.lower-priority: mix
      policy.role-based.preferred-target: hapax-notification-private
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      state.restore: false

  - id: role-assistant
    kind: loopback
    pipewire_name: input.loopback.sink.role.assistant
    industrial_name: role.assistant.loopback-sink
    description: Assistant/private TTS role, routed to fail-closed private sink
    target_object: hapax-private
    channels:
      count: 2
      positions: [FL, FR]
    params:
      device.intended-roles: '[ "Assistant" ]'
      policy.role-based.priority: 40
      policy.role-based.action.same-priority: mix
      policy.role-based.action.lower-priority: duck
      policy.role-based.preferred-target: hapax-private
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      state.restore: false

  - id: role-broadcast
    kind: loopback
    pipewire_name: input.loopback.sink.role.broadcast
    industrial_name: role.broadcast.loopback-sink
    description: Broadcast TTS role, routed to voice FX chain
    target_object: hapax-voice-fx-capture
    channels:
      count: 2
      positions: [FL, FR]
    params:
      device.intended-roles: '[ "Broadcast" ]'
      policy.role-based.priority: 40
      policy.role-based.action.same-priority: mix
      policy.role-based.action.lower-priority: duck
      policy.role-based.preferred-target: hapax-voice-fx-capture
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      state.restore: false

  # Broadcast-bound TTS chain.
  - id: voice-fx
    kind: filter_chain
    pipewire_name: hapax-voice-fx-capture
    industrial_name: chain.voice.effects-capture
    description: Hapax voice FX input, output routed to TTS loudnorm
    target_object: hapax-loudnorm-capture
    channels:
      count: 2
      positions: [FL, FR]

  - id: tts-loudnorm
    kind: filter_chain
    pipewire_name: hapax-loudnorm-capture
    industrial_name: chain.voice.loudnorm-capture
    description: TTS loudnorm capture side, output routed to mk5 OUT 3/4 dry send into S-4
    target_object: alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      playback_node: hapax-loudnorm-playback
      playback_positions: AUX2 AUX3
      mk5_output_pair: AUX2 AUX3
      node.autoconnect: false
      audibility_passthrough: true
      audibility_passthrough_reason: 2026-05-22 live smoke found fast_lookahead_limiter_1913 emitted silence on the public TTS route
      no_software_duck: true
      no_direct_livestream_tap: true
      broadcast_forward_path: mk5-output s4-analog-insert voice-wet hapax-livestream-tap

  - id: voice-wet
    kind: filter_chain
    pipewire_name: hapax-voice-wet-capture
    industrial_name: chain.voice.s4-wet-return
    description: S-4 wet voice return from mk5 IN 3/4 into livestream-tap
    target_object: alsa_input.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-input-0
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_positions: AUX2 AUX3
      playback_node: hapax-voice-wet-playback
      playback_target: hapax-livestream-tap
      stream.dont-remix: true
      state.restore: false
      node.dont-reconnect: true
      s4_wet_return: true

  - id: mic-rode
    kind: filter_chain
    pipewire_name: hapax-mic-rode-capture
    industrial_name: chain.operator.rode-mic
    description: Rode Wireless Pro operator mic from mk5 IN 1 into livestream-tap
    target_object: alsa_input.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-input-0
    channels:
      count: 2
      positions: [FL, FR]
    params:
      capture_positions: AUX0
      playback_node: hapax-mic-rode-playback
      playback_target: hapax-livestream-tap
      operator_voice_never_drop: true

  # PC, music, YouTube, S-4, and M8 content routes.
  - id: pc-loudnorm
    kind: filter_chain
    pipewire_name: hapax-pc-loudnorm
    industrial_name: chain.desktop.loudnorm
    description: PC-wide loudnorm sink, fail-closed with no hardware or broadcast egress
    target_object: null
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      playback_positions: disabled
      mpc_usb_input_pair: disabled
      node.autoconnect: false
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      notification_excluded: true
      fail_closed: true

  - id: pc-router
    kind: tap
    pipewire_name: hapax-pc-router
    industrial_name: bus.desktop.router
    description: "[QUARANTINED] PC audio fork point — was dormant Phase 3 PC volume isolation"
    channels:
      count: 2
      positions: [FL, FR]
    params:
      monitor.passthrough: true
      quarantined: true
      quarantine_reason: "Dormant PC broadcast path has no AuthorityCase for activation; conf removed to prevent accidental L-12/livestream exposure"

  - id: pc-monitor
    kind: filter_chain
    pipewire_name: hapax-pc-monitor
    industrial_name: chain.desktop.monitor
    description: "[QUARANTINED] Operator headphone path — was limiter -1 dBTP to Yeti"
    target_object: hapax-pc-router
    channels:
      count: 2
      positions: [FL, FR]
    params:
      stream.capture.sink: true
      state.restore: false
      stream.dont-remix: true
      playback_target: alsa_output.usb-Blue_Microphones_Yeti_Stereo_Microphone_REV8-00.analog-stereo
      private_monitor_endpoint: true
      forbidden_target_family: l12-broadcast
      ladspa_plugin: fast_lookahead_limiter_1913
      limit_db: -1.0
      quarantined: true
      quarantine_reason: "Dormant PC monitor path; conf removed with pc-router quarantine"

  - id: pc-broadcast
    kind: filter_chain
    pipewire_name: hapax-pc-broadcast
    industrial_name: chain.desktop.broadcast
    description: "[QUARANTINED] L-12 broadcast path — was limiter -18 dBFS to L-12 USB return RL/RR"
    target_object: hapax-pc-router
    channels:
      count: 2
      positions: [FL, FR]
    params:
      stream.capture.sink: true
      state.restore: false
      stream.dont-remix: true
      playback_target: alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40
      playback_positions: RL RR
      allowed_l12_return_direction: broadcast
      ladspa_plugin: fast_lookahead_limiter_1913
      limit_db: -18.0
      quarantined: true
      quarantine_reason: "Dormant PC broadcast to L-12 has no AuthorityCase; conf removed to prevent accidental livestream exposure"

  - id: music-loudnorm
    kind: filter_chain
    pipewire_name: hapax-music-loudnorm
    industrial_name: chain.music.loudnorm
    description: Music loudnorm capture side routed into livestream-tap software sum
    target_object: hapax-music-duck-mk5
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      playback_target: hapax-music-duck-mk5
      node.autoconnect: false
      audibility_passthrough: true
      audibility_passthrough_gain: 0.35
      audibility_passthrough_reason: 2026-05-22 live music route used builtin passthrough after LADSPA silence risk; 2026-06-05 pins source to deployed audibility-preserving gain
      no_software_duck: true

  # mk5-native dedicated music ducker (segment-audio-hosting-readiness 2026-06-07).
  # Inserted between hapax-music-loudnorm and the livestream-tap software sum so
  # hapax-audio-ducker.service can apply the SSOT duck depth (operator-VAD -12 dB,
  # TTS/hosting-segment -8 dB, deepest-duck-wins) WITHOUT co-opting the loudnorm
  # node's 0.35 passthrough gain (forbidden, pinned) and WITHOUT reviving the
  # retired L-12-era hapax-music-duck (which targeted the dead L-12 USB return).
  # node.autoconnect=false → hapax-audio-reconciler owns the FL/FR sum links.
  # Default Gain 1 = 1.0 (transparent) so a dormant/dead daemon fails OPEN
  # (music never silenced). Targets the CONTENT path only — never the operator mic.
  - id: music-duck-mk5
    kind: filter_chain
    pipewire_name: hapax-music-duck-mk5
    industrial_name: chain.music.duck
    description: Music duck inserted between hapax-music-loudnorm and the livestream-tap software sum
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: duck
    params:
      playback_node: hapax-music-duck-mk5-playback
      playback_target: hapax-livestream-tap
      node.autoconnect: false
      mk5_native_replacement_for: hapax-music-duck
      operator_voice_never_drop_passthrough: true
      no_software_duck: false

  - id: yt-loudnorm
    kind: filter_chain
    pipewire_name: hapax-yt-loudnorm
    industrial_name: chain.youtube.loudnorm
    description: |
      YouTube bed loudnorm, routed into livestream-tap software sum. Broadcast
      eligibility of the YouTube route stays GATED (broadcast_eligible=false,
      blocked_until_smoke) until the real-content ducker smoke passes.
    target_object: hapax-livestream-tap
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      playback_target: hapax-livestream-tap
      node.autoconnect: false
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      broadcast_eligibility_gated: blocked_until_smoke
      no_software_duck: true

  - id: s4-source
    kind: alsa_source
    pipewire_name: alsa_input.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-input
    industrial_name: interface.s4.usb-in.multichannel
    description: Torso S-4 pro-audio multichannel input
    hw: hw:CARD=S4
    channels:
      count: 10
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9]
    params:
      audit_role: external-s4-hardware-present
      audit_classification: external-hardware-optional

  - id: s4-output
    kind: alsa_sink
    pipewire_name: alsa_output.usb-Torso_Electronics_S-4_fedcba9876543220-03.multichannel-output
    industrial_name: interface.s4.usb-out.multichannel
    description: |
      Torso S-4 pro-audio multichannel output.
      Optional S-4 host-side write end. It is not the HN private-monitor
      readiness target; S-4 remains downstream/MIDI in the MPC-first route.
    hw: hw:CARD=S4
    channels:
      count: 10
      positions: [AUX0, AUX1, AUX2, AUX3, AUX4, AUX5, AUX6, AUX7, AUX8, AUX9]
    params:
      audit_role: external-s4-hardware-present
      audit_classification: external-hardware-optional
      hn_private_monitor_target: false
      control_plane: midi

  - id: s4-loopback
    kind: loopback
    pipewire_name: hapax-s4-content
    industrial_name: chain.s4.content-loopback
    description: S-4 USB stereo content loopback, disabled until route policy explicitly promotes it
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audio.format: S32
      audio.rate: 44100
      playback_node: hapax-s4-tap
      disabled_until_route_authority: true
      no_direct_livestream_tap: true

  - id: m8-usb-source
    kind: alsa_source
    pipewire_name: alsa_input.usb-Dirtywave_M8_16558390-02.analog-stereo
    industrial_name: interface.m8.usb-in.stereo
    description: Dirtywave M8 USB audio source, optional hardware endpoint
    hw: hw:M8,0
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional

  - id: m8-instrument-capture
    kind: filter_chain
    pipewire_name: hapax-m8-instrument-capture
    industrial_name: chain.m8.instrument-capture
    description: M8 USB source capture side routed to M8 loudnorm
    target_object: alsa_input.usb-Dirtywave_M8_16558390-02.analog-stereo
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional
      fallback_to_l12_is_runtime_drift: true
      optional_branch_state_space: present absent inactive reconnecting failed
      absent_state: absent
      node.autoconnect: false
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      node.linger: true
      state.restore: false
      stream.dont-remix: true
      fail_closed_on_target_absent: true

  - id: m8-loudnorm
    kind: filter_chain
    pipewire_name: hapax-m8-loudnorm
    industrial_name: chain.m8.loudnorm
    description: M8 instrument loudnorm, disabled until route policy explicitly promotes it
    channels:
      count: 2
      positions: [AUX10, AUX11]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      audit_classification: external-hardware-optional
      no_direct_livestream_tap: true
      node.autoconnect: false
      allowed_l12_return_direction: broadcast
      playback_positions: AUX10 AUX11
      playback_target: disabled
      disabled_until_route_authority: true
      reconciler_owned_handoff: true
      broadcast_forward_path: disabled

  - id: polyend-instrument-source
    kind: alsa_source
    pipewire_name: alsa_input.usb-Polyend_Tracker_Mini-00.analog-stereo
    industrial_name: interface.polyend.usb-in.stereo
    description: Polyend USB audio source, optional hardware endpoint
    hw: hw:Polyend,0
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional

  - id: polyend-instrument-capture
    kind: filter_chain
    pipewire_name: hapax-polyend-instrument-capture
    industrial_name: chain.polyend.instrument-capture
    description: Polyend USB source capture side routed to Polyend loudnorm
    target_object: alsa_input.usb-Polyend_Tracker_Mini-00.analog-stereo
    channels:
      count: 2
      positions: [FL, FR]
    params:
      audit_classification: external-hardware-optional
      fallback_to_l12_is_runtime_drift: true
      node.autoconnect: false
      node.dont-fallback: true
      node.dont-reconnect: true
      node.dont-move: true
      state.restore: false

  - id: polyend-loudnorm
    kind: filter_chain
    pipewire_name: hapax-polyend-loudnorm
    industrial_name: chain.polyend.loudnorm
    description: Polyend instrument loudnorm, fail-closed until route policy owns broadcast activation
    channels:
      count: 2
      positions: [FL, FR]
    chain_kind: loudnorm
    limit_db: -18.0
    release_s: 0.20
    params:
      audit_classification: external-hardware-optional
      no_direct_livestream_tap: true
      node.autoconnect: false
      blocked_until_route_policy_owner: true

edges:
  # Live edges the inspector can observe directly.

  # Current mk5/S-4 broadcast path.
  - source: voice-fx
    target: tts-loudnorm

  - source: tts-loudnorm
    target: mk5-output

  - source: mk5-input
    target: voice-wet

  - source: voice-wet
    target: livestream-tap

  - source: mk5-input
    target: mic-rode

  - source: mic-rode
    target: livestream-tap

  - source: music-loudnorm
    target: music-duck-mk5

  - source: music-duck-mk5
    target: livestream-tap

  - source: yt-loudnorm
    target: livestream-tap

  # Retired MPC-only broadcast return (2026-05-29, L-12 removed; superseded
  # 2026-06-02): retained as history, not selected by the route-map generator.
  - source: mpc-usb-return
    target: mpc-usb-return-capture

  - source: mpc-usb-return-capture
    target: livestream-tap

  # [ORPHANED 2026-05-29] L-12 removed; the edges below describe the retired
  # L-12 return path (no hardware). Retained for history until the MOTU/FadeFox
  # migration; NOT a live broadcast path.
  - source: l12-capture
    target: l12-evilpet-capture

  - source: l12-capture
    target: l12-usb-return-capture

  - source: l12-usb-return-capture
    target: livestream-tap

  - source: l12-capture
    target: l12-mainmix-capture

  - source: l12-mainmix-capture
    target: obs-broadcast-mainmix-tap

  - source: livestream-tap
    target: broadcast-master-capture

  - source: polyend-instrument-source
    target: polyend-instrument-capture

  - source: polyend-instrument-capture
    target: polyend-loudnorm

  - source: private-sink
    target: private-monitor-capture

  - source: private-monitor-capture
    target: private-monitor-output

  # Canonical private-monitor route: private TTS writes to mk5 Phones AUX10/11.
  - source: private-monitor-output
    target: mk5-output

  # Expected only when the M8 hardware source is present. When absent,
  # live PipeWire can expose an auto-link fallback; audit classifies that
  # runtime artifact explicitly instead of encoding it as intended graph.
  - source: m8-usb-source
    target: m8-instrument-capture

  - source: m8-instrument-capture
    target: m8-loudnorm

  # QUARANTINED — formerly Phase 3 PC volume isolation edges. Conf removed;
  # reactivation requires a new AuthorityCase. Edges retained so the
  # topology descriptor stays self-consistent with the quarantined nodes.
  - source: pc-router
    target: pc-monitor

  - source: pc-router
    target: pc-broadcast

  # Optional XVF3800 AEC reference loopback. This edge is absent until the
  # array is plugged in and an explicit loopback feeds the broadcast monitor
  # sum into the array's 2ch playback endpoint as far-end reference audio.
  # It does not send private audio to broadcast and does not replace the
  # Rode CH5/AUX4 broadcast mic path.
  - source: livestream-tap
    target: respeaker-xvf3800-aec-reference-output
