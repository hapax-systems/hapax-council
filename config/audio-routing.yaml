    generated_artifact_owner: hand_mirrored
    artifact_refs:
      - config/pipewire/s4-usb-sink.conf
      - config/pipewire/hapax-s4-loopback.conf

  - source_id: m8-instrument
    producer: dirtywave-m8
    role: instrument
    pipewire_node: hapax-m8-loudnorm
    target_chain:
