    provenance_required: true
    provenance_refs:
      - config/audio-routing.yaml#m8-instrument
    evidence_refs:
      - config/audio-topology.yaml#m8-loudnorm
      - test:canonical-audio-topology
    pre_normalization:
      target_lufs_i: -18.0
      constant_ref: PRE_NORM_TARGET_LUFS_I
    ducked_by:
      - operator_voice
