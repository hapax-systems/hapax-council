artifacts:
  - path: config/pipewire/hapax-stream-split.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#assistant-private
    reason: Private and legacy livestream null sinks exist today as hand-authored conf; generation waits for Phase 6 parity.
  - path: config/pipewire/hapax-private-monitor-bridge.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#assistant-private
    reason: Hardware-dependent private monitor bridge is policy-covered but remains hand-mirrored until generated fail-closed bridge parity exists.
  - path: config/pipewire/hapax-notification-private.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#notification-private
    reason: Notification null sink is policy-covered and fail-closed; generation waits for parity.
  - path: config/wireplumber/50-hapax-voice-duck.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#broadcast-tts
    reason: Role preferred-target policy is the main routing policy artifact and must be generated in a later pass.
  - path: config/wireplumber/92-hapax-notification-private.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#notification-private
    reason: Notification role policy mirrors the private notification route.
  - path: config/wireplumber/10-default-sink-ryzen.conf
    status: non_round_trippable
    owner: config/audio-routing.yaml#multimedia-default
    reason: Default sink pin is environment policy; it is documented here but not generated until a host-profile layer exists.
  - path: config/wireplumber/54-hapax-m8-instrument.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#m8-instrument
    reason: M8 autolink policy is route-policy owned but hardware-optional.
  - path: config/pipewire/voice-fx-chain.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#broadcast-tts
    reason: Broadcast voice FX chain mirrors role.broadcast policy.
  - path: config/pipewire/voice-fx-loudnorm.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#broadcast-tts
    reason: TTS loudnorm constants must cite shared/audio_loudness.py.
  - path: config/pipewire/hapax-tts-duck.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#broadcast-tts
    reason: TTS duck chain mirrors explicit broadcast voice route.
  - path: config/pipewire/hapax-pc-loudnorm.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#multimedia-default
    reason: Multimedia default remains non-broadcast-eligible by policy even though topology reaches the L-12 return.
  - path: config/pipewire/hapax-music-loudnorm.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#music-bed
    reason: Music pre-normalization mirrors policy and loudness constants.
  - path: config/pipewire/hapax-music-duck.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#music-bed
    reason: Music ducking mirrors shared ducking constants.
  - path: config/pipewire/yt-loudnorm.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#youtube-bed
    reason: YouTube bed remains blocked from broadcast eligibility until real-content smoke and provenance pass.
  - path: config/pipewire/ytube-over-24c-duck.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#youtube-bed
    reason: YouTube duck chain is policy-covered but not broadcast-eligible by default.
  - path: config/pipewire/yt-over-24c-duck.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#youtube-bed
    reason: Legacy YouTube duck artifact remains policy-covered while migration settles.
  - path: config/pipewire/hapax-l12-evilpet-capture.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#l12-evilpet-capture
    reason: Narrowed L-12 capture is policy-bearing and mirrored from topology until route generator parity.
  - path: config/pipewire/s4-usb-sink.conf
    status: non_round_trippable
    owner: config/audio-routing.yaml#s4-content
    reason: S-4 hardware endpoint depends on live enumeration and host profile; policy row owns eligibility but conf generation waits.
  - path: config/pipewire/hapax-s4-loopback.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#s4-content
    reason: S-4 content route is policy-covered and explicitly broadcast-eligible only with provenance.
  - path: config/pipewire/hapax-m8-loudnorm.conf
    status: hand_mirrored
    owner: config/audio-routing.yaml#m8-instrument
    reason: M8 route is hardware-optional and explicitly fails closed on fallback drift.

follow_ons:
  - id: audio-routing-policy-conf-generator-parity
    reason: Generate hand-mirrored PipeWire/WirePlumber artifacts into config/pipewire/generated and diff against current confs.
  - id: audio-routing-policy-live-graph-evidence
    reason: Feed route-policy provenance into broadcast-audio-health-producer after generated artifact parity exists.
