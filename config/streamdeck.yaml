# Stream Deck key map (LRR Phase 8 item 6).
#
# Each entry maps a Stream Deck key (0-indexed from top-left, left-to-right
# then top-to-bottom) to a logical command-registry dispatch. The adapter
# routes supported commands through the central Logos control surface
# (`logos-api` on :8051, compositor UDS, or another explicit local handler).
# Frontend-only commands from the retired Tauri relay fail closed until they
# gain a supported production route.
#
# Editable: add / re-order / change labels without restarting. The adapter
# re-reads on start; a SIGHUP rescan can be wired in later if useful.

bindings:
  - key: 0
    command: studio.camera_profile.set
    args: { profile: hero_operator }
    label: Operator
  - key: 1
    command: studio.camera_profile.set
    args: { profile: hero_turntable }
    label: Turntable
  - key: 2
    command: studio.camera_profile.set
    args: { profile: hero_screen }
    label: Screen
  - key: 3
    command: studio.camera_profile.set
    args: { profile: balanced }
    label: Balanced

  - key: 4
    command: studio.stream_mode.toggle
    args: {}
    label: Stream Mode
  - key: 5
    command: studio.private.enable
    args: {}
    label: Private

  - key: 6
    command: studio.activity.override
    args: { activity: react }
    label: React
  - key: 7
    command: studio.activity.override
    args: { activity: vinyl }
    label: Vinyl
  - key: 8
    command: studio.activity.override
    args: { activity: study }
    label: Study

  - key: 9
    command: research.condition.open
    args: {}
    label: RC Open
  - key: 10
    command: research.condition.close
    args: {}
    label: RC Close

  - key: 11
    command: attention_bid.dismiss
    args: {}
    label: Not Now

  - key: 12
    command: operator.quality.rate
    args:
      rating: 3
      rating_axis: overall
      source_surface: streamdeck
      evidence_refs: ["control:stream_deck.key.12", "task:ytb-QM5"]
      note: "quick post-session quality rating"
    label: Q3
  - key: 13
    command: operator.quality.rate
    args:
      rating: 4
      rating_axis: overall
      source_surface: streamdeck
      evidence_refs: ["control:stream_deck.key.13", "task:ytb-QM5"]
      note: "quick post-session quality rating"
    label: Q4
  - key: 14
    command: operator.quality.rate
    args:
      rating: 5
      rating_axis: overall
      source_surface: streamdeck
      evidence_refs: ["control:stream_deck.key.14", "task:ytb-QM5"]
      note: "quick post-session quality rating"
    label: Q5
