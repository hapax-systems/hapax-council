context.modules = [
    {
        name = libpipewire-module-echo-cancel
        args = {
            # Physical mic to capture from (Blue Yeti)
            capture.props = {
                node.name = "echo_cancel_capture"
                node.description = "Echo Cancel Capture"
                target.object = "alsa_input.usb-Blue_Microphones_Yeti_Stereo_Microphone_REV8-00.analog-stereo"
            }
            # Virtual source that applications read from (AEC-cleaned audio)
            source.props = {
                node.name = "echo_cancel_source"
                node.description = "Echo Cancel Source"
            }
            # Internal stream that sends audio to the real speaker (Studio 24c)
            playback.props = {
                node.name = "echo_cancel_playback"
                node.description = "Echo Cancel Playback"
                target.object = "alsa_output.usb-PreSonus_Studio_24c_SC1E24390244-00.analog-stereo"
            }
            # Physical speaker sink to monitor for echo reference (Studio 24c)
            sink.props = {
                node.name = "echo_cancel_sink"
                node.description = "Echo Cancel Sink"
                target.object = "alsa_output.usb-PreSonus_Studio_24c_SC1E24390244-00.analog-stereo"
            }
            library.name = aec/libspa-aec-webrtc
            aec.args = {
                webrtc.gain_controller = false
                webrtc.noise_suppression = false
                webrtc.extended_filter = true
            }
        }
    }
]
