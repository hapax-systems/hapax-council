# Shutdown KillMode hardening — 2026-05-03
#
# Bug 2 RCA: 8 of 27 daimonion process exits today were SEGV core-dumps from
# native worker thread pools outliving Python main thread during shutdown:
#   - libgomp gomp_barrier_wait_end (OpenMP)
#   - mediapipe::ThreadPool::WorkerThread (vision)
#   - tokenizers.abi3.so rayon-core (tokenizers)
#
# KillMode=mixed sends SIGTERM to PID 1 (preserves graceful-shutdown handlers
# in run_inner.py:_main_async finally), then SIGKILL to remaining children
# after TimeoutStopSec. Zero behavior change during normal operation.

[Service]
KillMode=mixed
TimeoutStopSec=5s
