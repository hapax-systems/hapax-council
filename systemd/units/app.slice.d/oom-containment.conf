[Slice]
# Aggregate backstop for interactive/user app workloads. Per-lane tmux scopes
# may be tighter at runtime; this reserves enough headroom that an agent or
# browser runaway does not exhaust host RAM/swap before login/network/resolver
# daemons can stay alive.
MemoryHigh=80G
MemoryMax=104G
MemorySwapMax=8G
