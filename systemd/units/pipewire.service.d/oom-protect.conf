[Service]
# User managers cannot lower child OOM scores. Start at the manager's valid
# score, then synchronously ask the root enforcer to apply the protected score.
OOMScoreAdjust=100
ExecStartPost=-/usr/bin/sudo -n /usr/local/sbin/hapax-oom-score-enforce --apply-unit %n
MemoryLow=512M
MemoryMin=256M
