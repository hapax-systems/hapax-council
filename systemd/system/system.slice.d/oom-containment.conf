[Slice]
# Reserve 24 GiB of the recovery plane before user workloads reclaim it. This
# is a deliberate partial floor below the observed 28.8 GiB repair peak so the
# 128 GiB host retains a bounded budget for UID 1000 and kernel overhead.
MemoryHigh=infinity
MemoryMax=infinity
MemorySwapMax=infinity
MemoryLow=24G
MemoryMin=12G
