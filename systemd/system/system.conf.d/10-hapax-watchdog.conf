# Hapax hardware-watchdog arming (audit-w0-watchdog-arm-20260611).
# PID 1 opens /dev/watchdog0 (sp5100_tco, see config/modules-load.d/
# hapax-watchdog.conf) and pets it every RuntimeWatchdogSec/2; a kernel or
# PID-1 hard-hang longer than 60s hard-resets the host. 60s chosen for the
# first arm in this estate: podium routinely runs load-avg >15, and a
# spurious reset on the production rig is worse than 30 extra seconds of
# hang. Tighten to 30s only after a clean multi-week soak (journal free of
# watchdog close/reopen noise). RebootWatchdogSec (default 10min) also
# becomes effective with the hardware present.
# Rollback: docs/runbooks/hardware-watchdog-sp5100.md (re-denylist).
[Manager]
RuntimeWatchdogSec=60s
