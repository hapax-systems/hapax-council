# Provision v4l2loopback devices for the Studio Compositor and Camera Sidecars
#
# Devices:
# video42: Main OBS composited virtual camera output (from studio-compositor)
# video-c920-desk: Loopback for c920-desk camera
# video-c920-room: Loopback for c920-room camera
# video-c920-overhead: Loopback for c920-overhead camera
# video-brio: Loopback for brio camera
#
# video_nr is chosen arbitrarily high to avoid clashing with physical devices.
# exclusive_caps=1 is required for Chrome/WebRTC and OBS to recognize the format.
options v4l2loopback devices=5 video_nr=42,43,44,45,46 card_label="Hapax Compositor","Camera Desk","Camera Room","Camera Overhead","Camera Brio" exclusive_caps=1
