# Custom gitleaks rules for PII detection (supplements built-in rules)
# Used by CI secrets-scan job and local pre-commit checks

title = "hapax PII rules"

[[rules]]
id = "operator-full-name"
description = "Operator full name"
regex = '''(?i)Ryan\s+Kleeberger'''
tags = ["pii", "name"]
[rules.allowlist]
# Formal-address-required contexts per operator referent directive 2026-04-24:
# CITATION.cff `authors:`, codemeta.json `author:`, .zenodo.json `creators:`.
# These are the only repository surfaces where legal name is permitted; body
# text in NOTICE.md / READMEs / scripts / agents must use the non-formal
# referent (The Operator / Oudepode / OTO).
paths = [
  '''hooks/''',
  '''tests/''',
  '''docs/audits/''',
  '''\.gitleaks\.toml''',
  '''^CITATION\.cff$''',
  '''^codemeta\.json$''',
  '''^\.zenodo\.json$''',
]

[[rules]]
id = "operator-location"
description = "Operator location"
regex = '''Minneapolis[- ]St\.?\s*Paul'''
tags = ["pii", "location"]
[rules.allowlist]
paths = ['''hooks/''', '''tests/''', '''\.gitleaks\.toml''']

[[rules]]
id = "home-directory-path"
description = "Home directory absolute path (reveals username)"
regex = '''/home/hapax/'''
tags = ["pii", "path"]
[rules.allowlist]
paths = [
  '''.gitignore''',
  '''CLAUDE\.md''',
  '''hooks/''',
  '''\.claude/''',
  '''\.gitleaks\.toml''',
  '''systemd/''',
  '''process-compose\.yaml''',
  '''scripts/''',
  '''tests/''',
  '''agents/''',
  '''docs/superpowers/''',
  '''docs/audits/''',
  '''^assets/quake/maps/screwm(?:-research|-rnd)?(?:-(?:light|vis))?\.log$''',
  '''^docs/research/2026-04-20-delta-queue-flow-organization\.md$''',
  '''^docs/research/2026-04-20-dynamic-livestream-audit-catalog\.md$''',
  '''^docs/research/2026-04-20-homage-scrim-1-algorithmic-intelligence\.md$''',
  '''^docs/research/2026-04-20-vinyl-broadcast-mode-d-granular-instrument\.md$''',
  '''^docs/research/2026-04-21-audio-systems-live-audit\.md$''',
  '''^docs/streaming/2026-04-10-stream-audit-plan\.md$''',
  '''skills/''',
  '''data/''',
  '''shared/''',
  '''config/''',
]

[[rules]]
id = "browsing-data-path"
description = "Browsing or audio capture data path"
regex = '''rag-sources/(chrome|audio)/'''
tags = ["pii", "browsing"]
[rules.allowlist]
paths = [
  '''hooks/''',
  '''tests/''',
  '''\.gitleaks\.toml''',
  '''^agents/chrome_sync\.py$''',
  '''^agents/consent_audit\.py$''',
  '''^axioms/constitutive-rules\.yaml$''',
  '''^docs/plans/2026-03-08-ambient-audio-pipeline-design\.md$''',
  '''^docs/plans/2026-03-08-ambient-audio-pipeline-plan\.md$''',
  '''^docs/plans/2026-03-08-rag-phase4-design\.md$''',
  '''^docs/plans/2026-03-08-rag-phase4-plan\.md$''',
  '''^docs/plans/2026-03-14-studio-ingestion-pipeline-design\.md$''',
  '''^docs/superpowers/exposition/level-3-governance-architecture\.md$''',
]

# Allow known false positives
[allowlist]
paths = [
  '''LICENSE''',
  '''CITATION\.cff''',
  '''\.gitleaksignore''',
  '''node_modules/''',
  '''\.venv/''',
]
