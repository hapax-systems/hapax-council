schema_version: 2
pack_id: cross-surface-public-legibility-pack
generated_at: "2026-07-06T00:00:00Z"
authority_case: CASE-CAPACITY-ROUTING-001
status: draft_frontmatter_only
publication_allowed: false
review_required: claim_verification_council

spine: |
  Hapax Systems builds evidence-bound software for governing AI-agent work.
  Public copy must orient readers to shipped surfaces, license boundaries, and
  claim ceilings before it describes research ambition. The portfolio is split
  deliberately: agentgov is the MIT adoption commons, Reins is the
  source-available product front door, hapax-spine is source-available runtime
  mechanism, hapax-council is source-visible research/runtime apparatus, and
  hapax-constitution is the governance and metadata authority.

publication_bus_policy: |
  omg.lol weblog, /now, statuslog, pastebin, purl, RSS, Mastodon, Bluesky,
  Are.na, DOI/archive, and related fanout surfaces are publication-bus
  channels. Drafts may name target surfaces only when the target list, rights
  gate, privacy gate, source refs, redaction posture, and claim ceiling are
  present. No GitHub README or draft may imply direct public egress.

prohibited_language:
  - cheesy or sales-led copy
  - community, tribe, followers, perks, exclusive access, or subscriber promises
  - unsupported autonomous write authority
  - unsupported general lifecycle automation
  - unsupported public support or SLA language
  - whole-portfolio open-source claims
  - unreviewed comparative superiority claims
  - private operator identity or family/medical narrative

source_ref_policy: |
  Every factual public claim about shipped behavior, research output, public
  events, artifacts, grants, revenue, or comparison must carry a source ref.
  Unsourced claims are removed or held for review.

variants:
  github_org_profile:
    surface: github_org_profile
    max_length_chars: 6000
    publication_allowed: true
    source_of_truth: hapax-constitution:sdlc.render.org_profile_readme
    claim_ceiling: |
      May describe shipped read paths, command preview, governed dispatch,
      evidence ledgers, and source-visible inspection surfaces. Must not claim
      autonomous write authority, full general lifecycle coverage, unrestricted
      portability, comparative ranking against other systems, or staffed
      community support.

  weblog:
    surface: omg_weblog
    max_length_chars: 2500
    publication_allowed: false
    target_surfaces:
      - omg-weblog
      - omg-lol-weblog-bearer-fanout
      - omg-lol-statuslog
      - omg-lol-now
      - omg-lol-pastebin
      - omg-lol-purl
      - omg-lol-web
      - bridgy-webmention-publish
      - mastodon-post
      - bluesky-post
      - arena-post
      - zenodo-doi
      - internet-archive-ias3
    required_gates:
      - claim_verification_council_review
      - source_refs_present
      - rights_privacy_redaction_pass
      - publication_bus_surface_allowlist_pass
      - no_direct_public_egress
    text: |
      Hapax Systems publishes evidence-bound software for governing AI-agent
      work. The public portfolio separates adoption commons, source-available
      product/runtime surfaces, source-visible research apparatus, and
      public-domain evidence artifacts. The point is not another harness page;
      the point is a system that treats authority, claims, refusals, and public
      egress as inspectable engineering objects.

  statuslog:
    surface: omg_statuslog
    max_length_chars: 500
    publication_allowed: false
    required_gates:
      - current_state_source_ref
      - no_support_or_engagement_promise
      - publication_bus_surface_allowlist_pass
    text: |
      Hapax Systems: evidence-bound AI-agent governance. Current public copy
      is held behind claim review; no direct public egress.

  support_page:
    surface: support_offer_page
    max_length_chars: 1500
    publication_allowed: false
    required_gates:
      - no_perk_language
      - no_sla_language
      - commercial_terms_review
    text: |
      Support or payment links, if present, do not create access, influence,
      priority, roadmap commitments, license expansion, consulting, or a
      support entitlement. Commercial terms require a separate cleared path.
