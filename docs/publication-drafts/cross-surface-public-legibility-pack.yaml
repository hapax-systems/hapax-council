spine: |
  Hapax is a single-operator externalized executive function — a personal
  operating environment that runs 24/7, combining 190+ specialized agents,
  a live audiovisual compositor, voice interaction, and formal governance
  under one constitutional framework. It is a research instrument for
  studying how one person can build and sustain a coherent ambient
  intelligence system, not an AI streamer setup or a creator business stack.

prohibited_language:
  - parasocial (community, family, tribe, followers)
  - perk (tier, reward, exclusive access, member benefit)
  - request (please support, help me, donate, fund)
  - expert-system (AI assistant, smart home, productivity tool)
  - false-promise (will change, revolutionary, disrupting)

source_ref_policy: |
  Every claim about research output, public events, artifacts, grants, or
  revenue must carry at least one source ref. Unsourced claims are
  prohibited in all variants.

