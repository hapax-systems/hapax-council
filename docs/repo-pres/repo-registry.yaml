# repo-registry.yaml — canonical license-class and value-partition source of truth
#
# Per cc-task `repo-pres-license-policy` (decision recorded
# 2026-04-25T18:00Z): per-repo license divergence is settled here, NOT
# in `LICENSE` files (which are derivatives of this matrix). The
# `hapax_sdlc render --check` command consumes this file to validate
# that each repo's `LICENSE`, `CITATION.cff` (`license:` field), and
# `codemeta.json` (`license` URL) all agree on the SPDX identifier.
#
# Drift is treated as a CI failure (the eventual hapax-sdlc renderer
# will fail-fast); for the council-local audit, see
# `scripts/check-license-policy.py`.
#
# AGPL-3 is flagged as anti-pattern: AGPL assumes downstream
# contributors, contradicting the `single_user` axiom. AGPL-3 must be
# absent from all repos in this registry.

schema_version: 1

repos:
  - name: hapax-council
    license: PolyForm-Strict-1.0.0
    expected_github_license_detection: NOASSERTION
    license_url: https://polyformproject.org/licenses/strict/1.0.0/
    value_partition: internal_apparatus
    license_posture: "Source-visible strict research/runtime artifact; not open source."
    rationale: Runtime code; single-operator stance.

  - name: hapax-officium
    license: PolyForm-Strict-1.0.0
    expected_github_license_detection: NOASSERTION
    license_url: https://polyformproject.org/licenses/strict/1.0.0/
    value_partition: internal_apparatus
    license_posture: "Strict source-visible runtime artifact pending product boundary."
    rationale: Runtime code; single-operator stance.

  - name: hapax-watch
    license: PolyForm-Strict-1.0.0
    expected_github_license_detection: NOASSERTION
    license_url: https://polyformproject.org/licenses/strict/1.0.0/
    value_partition: internal_apparatus
    license_posture: "Single-operator device bridge; not a general biometric app."
    rationale: Runtime code (Wear OS app); single-operator stance.

  - name: hapax-phone
    license: PolyForm-Strict-1.0.0
    expected_github_license_detection: NOASSERTION
    license_url: https://polyformproject.org/licenses/strict/1.0.0/
    value_partition: internal_apparatus
    license_posture: "Single-operator device bridge; not a general biometric app."
    rationale: Runtime code (Android app); single-operator stance.

  - name: hapax-mcp
    license: MIT
    expected_github_license_detection: MIT
    license_url: https://opensource.org/licenses/MIT
    value_partition: internal_apparatus
    license_posture: "Permissive MCP ecosystem bridge; not a general-purpose MCP library."
    rationale: |
      MCP ecosystem norm; downstream MCP clients require permissive
      license to integrate. Ecosystem-pragmatic exception to the
      otherwise-uniform PolyForm Strict policy.

  - name: hapax-constitution
    license: CC-BY-NC-ND-4.0
    # Post-split expectation: two license authority files make licensee
    # report NOASSERTION. Live main still detects Apache-2.0 (the known
    # split-license blocker); that divergence stays covered by the
    # check-public-surface-claims waiver until the split lands.
    expected_github_license_detection: NOASSERTION
    license_url: https://creativecommons.org/licenses/by-nc-nd/4.0/
    value_partition: evidence_artifact
    license_posture: |
      Split posture: specification text and publication metadata are
      CC-BY-NC-ND-4.0; runnable hapax-sdlc tooling is Apache-2.0 and must
      be described separately.
    rationale: |
      Specification / docs surface; preserves attribution + non-
      commercial + no-derivatives. Not runtime code.

  - name: agentgov
    license: MIT
    expected_github_license_detection: MIT
    license_url: https://opensource.org/licenses/MIT
    value_partition: adoption_commons
    license_posture: |
      Permissive adoption wedge for governance hooks only. Does not license
      Hapax council internals or create support/community obligations.
    rationale: Standalone public hook package for AI coding agents.

  - name: hapax-spine
    license: BUSL-1.1
    expected_github_license_detection: NOASSERTION
    license_url: https://spdx.org/licenses/BUSL-1.1
    value_partition: commercial_moat
    license_posture: |
      Source-available under BUSL-1.1; not Open Source until the change
      license/date applies. Commercial/hosted-service rights reserved.
    rationale: Extracted runtime mechanism and commercial product core.

  - name: reins
    license: BUSL-1.1
    expected_github_license_detection: NOASSERTION
    license_url: https://spdx.org/licenses/BUSL-1.1
    value_partition: commercial_moat
    license_posture: |
      Source-available under BUSL-1.1; current claim ceiling is
      read/preview/cockpit, not full mutation cockpit.
    rationale: Public product/front-door cockpit and commercial moat.

  - name: hapax-coord
    license: PolyForm-Strict-1.0.0
    expected_github_license_detection: NOASSERTION
    license_url: https://polyformproject.org/licenses/strict/1.0.0/
    value_partition: internal_apparatus
    license_posture: |
      Private or strict internal coordination apparatus; no public product,
      support, or adoption claim unless a separate boundary is ratified.
    rationale: Operator coordination surface, not a standalone public product.

  - name: hapax-research-ledger
    license: CC0-1.0
    expected_github_license_detection: CC0-1.0
    license_url: https://spdx.org/licenses/CC0-1.0
    value_partition: evidence_artifact
    license_posture: |
      Public-domain data posture for ledger observations only; does not
      license runtime code or Reins/council internals.
    rationale: Public evidence/artifact output.

  - name: distro-work
    license: PolyForm-Strict-1.0.0
    expected_github_license_detection: NOASSERTION
    license_url: https://polyformproject.org/licenses/strict/1.0.0/
    value_partition: internal_apparatus
    license_posture: "Personal/system-maintenance scripts; not a Hapax Systems public product."
    rationale: Runtime scripts; single-operator stance.

upstream_clones:
  # These repos are local clones whose upstream license MUST NOT be
  # relicensed. They are excluded from the policy gate.
  - name: tabbyAPI
    upstream: theroyallab/tabbyAPI
    license: Apache-2.0
    note: "Upstream license preserved; never relicensed locally."
  - name: atlas-voice-training
    upstream: briankelley/atlas-voice-training
    license: MIT
    note: "Upstream license preserved; never relicensed locally."

assets_repos:
  # Asset repos carry per-asset license declarations rather than a
  # single repo-level license; the per-asset declarations live in
  # `_manifest.yaml` + `provenance.yaml` files within the repo.
  - name: hapax-assets
    license_policy: per-asset (BSD-3-Clause / CC-BY-SA-4.0)
    value_partition: evidence_artifact
    license_posture: |
      Per-asset license posture; preserve upstream notices rather than
      implying a single repo-level license.
    rationale: |
      BitchX = BSD-3-Clause (modified-or-not OK), Px437 IBM VGA =
      CC-BY-SA-4.0 (unmodified-only). See provenance.yaml siblings.

anti_patterns:
  - license: AGPL-3.0
    why: |
      AGPL assumes downstream contributors and a network-service-
      modification redistribution model. Both contradict the
      single_user axiom (no auth, no roles, no multi-user code) and
      the full-automation-or-no-engagement directive (the operator is
      the only formal-action actor). AGPL-3 MUST be absent from every
      repo in `repos:` above.
