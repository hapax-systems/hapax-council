# Value-proposition registry (seed).
# source: value-prop mapping re-evaluation 2026-07-09, workflow wf_545c8c48-dd2
# status: active_control_seed; SSOT question deferred — council holds the seed.
# checker: scripts/check-value-prop-registry.py (v1 structural checks C1/C2/C3/C6/C8),
#   wired into the ci.yml public_surface_freshness job.
# normalization from the draft:
#   - row semantic-visual-grammar-air carried `competitive_claims`; renamed to
#     `comparative_claims` to match the field name every other row uses.
#   - row composite-capability-assembly (evidence_visibility=vault) listed
#     org-profile/readme target surfaces; moved to maturity_note as deferred placements
#     (C6: vault evidence bars readme/profile/weblog placement until a public projection).
schema_version: 1
status: proposed_value_prop_registry_draft
date: "2026-07-08"
supersedes: 'matrix plan "Value Propositions" table (19 rows) + Feature-To-Benefit schema (0 populated rows)'
join_keys:
  surface_ids: docs/repo-pres/public-surface-registry.yaml
  repo_rows: hapax-constitution sdlc/render/repos.yaml
  license_pins: docs/repo-pres/repo-registry.yaml (expected_github_license_detection precedent)
maturity_semantics: >-
  Binary present|planned; maturity_note carries mixed states. planned->present flips ride
  freshness_source trigger predicates registered here, never prose edits.
defaults: {freshness_ttl_s: 1800, stale_behavior: block_public_current, evidence_visibility: public}

audiences:  # weights judgment-ranked until an audience-signal source is wired
  hn_technical: {weight: 100, tone: "skeptical, concrete, numbers-with-caveats"}
  directors: {weight: 95, tone: "operational, sober; pilot over platform promise"}
  oss_adopters: {weight: 90, tone: "narrow and practical"}
  harness_builders: {weight: 88, tone: "inspectable mechanism, not generic framework"}
  compliance_reviewers: {weight: 85, note: "split from extant enterprise-92; owed procurement benefit (SBOM/provenance mapping) currently expressed nowhere", tone: "procurement-clean; no certification/warranty"}
  researchers: {weight: 85, tone: "precise, caveated, n=1 honest"}
  privacy_ai_safety_auditors: {weight: 82, tone: "no impossible-to-leak or truth-oracle claims"}
  technical_auditors: {weight: 82}
  governance_auditors: {weight: 82}
  license_auditors: {weight: 82}
  system_integrators: {weight: 80}
  capability_routing_researchers: {weight: 80, status: added, note: "created by assembly annex + harness-capability-contract-v2 + 182/182 asserted-scores finding; NO public landing surface — not claimable until a docs projection exists"}
  bsl_evaluators: {weight: 78, note: "split from extant enterprise-92; served by license mechanics + reins --demo"}
  funders: {weight: 72, note: "raised from 65: DOI live, CC0 ledger, no-perk FUNDING.yml, docs/applications/"}
  second_operator_pilot_candidates: {weight: 68, status: added_planned, note: "moat T8 falsifier structurally requires one; no surface recruits them"}
  mcp_integrators: {weight: 65, note: "lowered from 70; P2 bridge fully served by rendered preamble"}
  skeptical_readers: {weight: 100, note: "alias of hn_technical for START_HERE routing"}
  downstream_web: {weight: 50}
  operators: {weight: 40}
  management_reviewers: {weight: 40}

constraints:  # registry-level bindings; check script enforces on rows AND rendered surfaces
  - id: banned-absolutes
    rule: >-
      'cannot lie' / 'structurally impossible' / 'structurally cannot' / 'proves what happens' /
      product-negation-as-pitch banned on all surfaces (matrix plan council language ban);
      applies to registry prose itself.
  - id: benchmark-release-language
    rule: >-
      BINDING (reins-competitive-preference-benchmark-2026-06-30): no superiority-form public
      claim ('exceeds', 'leads the field', 'un-beaten') until the first-run preference runbook
      executes with a fresh user/agent and copy cites the resulting receipts; DC/RM/DS cells
      never quotable as superiority; design-stage cells never 'exceed'.
  - id: anti-descope
    rule: >-
      BINDING: registry rows and fold policy must not trim own-paradigm scope to the
      comparator-intersection feature set (benchmark Anti-Descope Language).
  - id: anti-mimicry
    rule: "No category-membership framing ('like X but governed'); continuity never phrased in standards-injection vocabulary."
  - id: comparative-claim-hygiene
    rule: >-
      Every comparative-absence claim carries evidence_level + scout_date + pinned comparator
      versions, else status=docs_internal — symmetric with the CVC/OKF discipline. Stale scout
      pin => hold_docs_internal. (Spec Kit releases near-daily; benchmark cells 1/2/5 already stale.)
  - id: embargo-lexicon
    terms:
      measured: "embargoed on capability/routing copy until learning-eligible outcomes move posteriors"
      signed_tamper_evident: "embargoed on evidence/receipt copy until receipt-integrity lands (AVSDLC receipts unsigned+expired; three panes share one intent_hash)"
      stranger_usable: "embargoed; say '<1s fixture render [SV]' + Gate-13 sec-6 bounded statement (MIXED ~55-60% vocabulary recovery)"
      algebraically_verifiable: "dropped unless bound to a named test mechanism"
      cost_savings: "never without ValueEvent oracle join (outcome-ledger T5/T6 shadow embargo)"
      leads_the_field: "docs-internal until preference-runbook receipt exists"
  - id: org-link-lint
    rule: "hapax-systems org links only; ryanklee paths never seed copy (non-negotiable rule 1) — machine-checked, not prose"
  - id: vault-evidence
    rule: >-
      evidence_visibility=vault artifacts (preference benchmark, Gate-13 receipt, assembly annex)
      are not citable in public copy until a public projection exists — applied uniformly.
  - id: pii-screen
    rule: >-
      Any copy quoting axioms/registry.yaml or frozen axiom snapshots (hapax-axioms,
      hapax-refusals) requires a PII-screen receipt first: executive_function axiom text
      contains operator medical details.
  - id: spine-copy-gate
    rule: >-
      ALL spine copy placements estate-wide (including rows witnessed-only-learning,
      edt-fairness) inherit the hapax-spine row gate: D1 fix + public-posture decision +
      P1 README rewrite BEFORE public exposure.

registry:
  - value_proposition_id: evidence-bound-portfolio
    rank: 1
    implementation_maturity: present
    tangible_benefit: "Readers see what is shipped, reserved, and evidence-gated — and what evidence a stronger claim would require"
    priority_weight: 100
    audience_ids: {hn_technical: 100, compliance_reviewers: 85, privacy_ai_safety_auditors: 82, funders: 72}
    technical_items:
      - "hapax-systems org profile (registry-rendered rows)"
      - "constitution sdlc/render/repos.yaml (14 repos: reader_promise/reader_value/claim_ceiling/primary_audience)"
      - "docs/repo-pres/public-surface-registry.yaml + merge-blocking public_surface_freshness gate (ci.yml:175; all-green needs; gate-manifest.yaml:230)"
      - "publication hardening lint"
    claim_ceiling_ref: ceiling.portfolio_not_validity
    claim_ceiling: >-
      No full-system-validity or open-source-portfolio implication. 'Signed/tamper-evident'
      adjectives EMBARGOED until receipt-integrity lands.
    required_pairings:
      - "'no false green' ships with merge-gate scoping disclosure (blockers render visibly; gates fail closed on the SDLC merge path — not an all-claims guarantee)"
    evidence_level: SV
    competitive_position: "SDLC automation/policy-as-code comparator: visible blockers + disconfirmation + scoped no-false-green; avoid compliance theater"
    target_surfaces: [org-profile-lede, council-readme, council-docs]
    freshness_source: "scripts/github-public-surface-reconcile.py receipt generated_at (must include every intended public repo)"
    freshness_ttl_s: 1800
    stale_behavior: block_public_current

  - value_proposition_id: honest-dark-observability
    rank: 2
    implementation_maturity: present
    tangible_benefit: "Absence renders as absence — no fabricated data, no display scalars, unmeasured shows as unmeasured"
    priority_weight: 100
    audience_ids: {hn_technical: 100, directors: 95, harness_builders: 88, privacy_ai_safety_auditors: 82}
    technical_items:
      - "16 /read/* routes render absence as absence, never fabricated [SV, guard-tested]"
      - "no display scalars (reins internal/model/dispatch_no_scalar_test.go)"
      - "value_status three-state honesty (measured/projected/absent)"
      - "preference benchmark 2026-06-30 [vault-private — NOT citable in public copy]"
    claim_ceiling_ref: ceiling.per_surface_honesty
    claim_ceiling: >-
      Per-surface honesty, not a system-wide truth guarantee. Required caveats: turn feed
      fixture-only, blocks always dark, :dynamics hand-seeded, :traces ~10s latency.
      BINDING (benchmark Release/Public-Claim Language): no superiority form on any public
      surface until the first-run preference runbook executes (fresh user/agent) and copy cites
      its receipts — public copy limited to capability-descriptive evidence-tagged language
      ('renders absence as absence [SV, guard-tested]').
    evidence_level: SV
    evidence_visibility: mixed_public_guards_vault_benchmark
    comparative_claims:
      - {claim: "only un-beaten shared dimension in the 2026-06-30 preference benchmark", evidence_level: DC, scout_date: "2026-06-30", status: docs_internal, flip_trigger: "preference-runbook receipt + public projection of the benchmark"}
    competitive_position: >-
      The plan-named differentiator vs Reins-like dashboards ('honest-dark projection cockpit')
      and vs SDLC/policy-as-code (scoped 'no false green'). Never glossy command-center or
      fake-action language.
    target_surfaces: [reins-readme-one-benefit, org-profile-portfolio-line, council-docs]
    freshness_source: "CI green on absence-guard tests + dispatch_no_scalar_test.go at HEAD; superiority claims gated on preference-runbook receipt"
    freshness_ttl_s: 1800
    stale_behavior: block_public_current

  - value_proposition_id: reins-cockpit
    rank: 3
    implementation_maturity: present
    tangible_benefit: "Operators inspect estate state and command previews before granting authority; staged write roadmap with machine-checkable triggers"
    priority_weight: 100
