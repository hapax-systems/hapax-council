      - "M0 governed-verb witnessed-apply seam landed (reins-dev#5, 7 verbs); provider send STUBBED, COMMAND app unmounted — stub named in any copy"
      - "estate-wide multi-layer read fold; staged M0/M1/M2 roadmap with machine-checkable triggers"
