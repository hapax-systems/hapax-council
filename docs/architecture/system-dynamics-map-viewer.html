    },

    {

      "docs": [

    },
    {

      "resolution": 3,
      "status": "candidate",
      "summary": "Future graph authoring or workflow editing could use React Flow.",

      "docs": [

    },
    {
      "id": "view-to-sigma",
      "source": "view-manifest",
      "target": "sigma",
      "relation": "future_large_graph_projection",

      "status": "candidate",
      "summary": "Very large simple graph projections may use Sigma.",

}
  </script>
  <script src="./vendor/cytoscape-3.34.0.min.js"></script>
  <script>
    const layerColors = {
      "context-up": "rgb(13, 148, 136)",
      "decision": "rgb(37, 99, 235)",
      "execution-down": "rgb(217, 119, 6)",
      "semantic-core": "rgb(124, 58, 237)",
      "observation-state": "rgb(220, 38, 38)",
      "rendering": "rgb(22, 163, 74)"
    };

    const statusColors = {
      asserted: "rgb(31, 41, 55)",
      inferred: "rgb(79, 70, 229)",
      observed: "rgb(220, 38, 38)",
      simulated: "rgb(217, 119, 6)",
      rendered: "rgb(22, 163, 74)",
      candidate: "rgb(107, 114, 128)"
    };

    let cy;
    let seed;
    let activeLayout = "cose";

    function className(value) {
      return String(value).toLowerCase().replace(/[^a-z0-9_-]+/g, "-");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function docsHtml(docs) {
      if (!docs || docs.length === 0) {
        return "<p>No external documentation link recorded.</p>";
      }
      return `<div class="doc-links">${docs.map((doc) => `<a href="${escapeHtml(doc.url)}" target="_blank" rel="noreferrer">${escapeHtml(doc.label)}</a>`).join("")}</div>`;
    }

    function listHtml(items) {
      if (!items || items.length === 0) {
        return "<p>No hardening note recorded.</p>";
      }
      return `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }

    function pillHtml(data) {
      const values = [data.layer, data.status, data.kind, `resolution ${data.resolution}`].filter(Boolean);
      return `<div class="pill-row">${values.map((value) => `<span class="pill">${escapeHtml(value)}</span>`).join("")}</div>`;
    }

    function renderNodePanel(data) {
      document.getElementById("panel").innerHTML = `
        <h2 class="panel-title">${escapeHtml(data.label)}</h2>
        <div class="panel-meta">${escapeHtml(data.id)}</div>
        ${pillHtml(data)}
        <div class="section"><h3>Summary</h3><p>${escapeHtml(data.summary)}</p></div>
        <div class="section"><h3>Context</h3><p>${escapeHtml(data.context)}</p></div>
        <div class="section"><h3>Hardening</h3>${listHtml(data.hardening)}</div>
        <div class="section"><h3>Documentation</h3>${docsHtml(data.docs)}</div>
      `;
    }

    function renderEdgePanel(data) {
      const source = seed.nodes.find((node) => node.id === data.source)?.label || data.source;
      const target = seed.nodes.find((node) => node.id === data.target)?.label || data.target;
      document.getElementById("panel").innerHTML = `
        <h2 class="panel-title">${escapeHtml(source)} -> ${escapeHtml(target)}</h2>
        <div class="panel-meta">${escapeHtml(data.id)}</div>
        ${pillHtml(data)}
        <div class="section"><h3>Relation</h3><p>${escapeHtml(data.relation)}</p></div>
        <div class="section"><h3>Summary</h3><p>${escapeHtml(data.summary)}</p></div>
        <div class="section"><h3>Confidence</h3><p>${escapeHtml(data.confidence ?? "unknown")}</p></div>
        <div class="section"><h3>Documentation</h3>${docsHtml(data.docs)}</div>
      `;
    }

    function renderInitialPanel() {
      const dmn = seed.nodes.find((node) => node.id === seed.entrypoint) || seed.nodes[0];
      renderNodePanel(dmn);
    }

    function renderCheckboxes() {
      const layers = seed.layers.map((layer) => layer.id);
      document.getElementById("layer-filters").innerHTML = layers.map((id) => {
        const layer = seed.layers.find((item) => item.id === id);
        return `<label class="check"><input type="checkbox" data-filter="layer" value="${escapeHtml(id)}" checked><span>${escapeHtml(layer?.label || id)}</span></label>`;
      }).join("");

      document.getElementById("status-filters").innerHTML = seed.status_kinds.map((id) => (
        `<label class="check"><input type="checkbox" data-filter="status" value="${escapeHtml(id)}" checked><span>${escapeHtml(id)}</span></label>`
      )).join("");
    }

    function renderLegend() {
      document.getElementById("legend").innerHTML = seed.layers.map((layer) => `
        <div class="legend-item">
          <span class="swatch" style="background: ${layerColors[layer.id] || "rgb(107, 114, 128)"}"></span>
          <span>${escapeHtml(layer.label)}</span>
        </div>
      `).join("");
    }

    function checkedValues(type) {
      return new Set(Array.from(document.querySelectorAll(`input[data-filter="${type}"]:checked`)).map((input) => input.value));
    }

    function elementText(data) {
      return [
        data.id,
        data.label,
        data.kind,
        data.layer,
        data.status,
        data.summary,
        data.context,
        data.relation,
        ...(data.docs || []).map((doc) => `${doc.label} ${doc.url}`),
        ...(data.hardening || [])
      ].join(" ").toLowerCase();
    }

    function applyFilters() {
      const maxResolution = Number(document.getElementById("resolution").value);
      const scale = seed.view_scales.find((item) => item.resolution === maxResolution);
      const search = document.getElementById("search").value.trim().toLowerCase();
      const layers = checkedValues("layer");
      const statuses = checkedValues("status");

      document.getElementById("resolution-label").textContent = scale ? `- ${scale.label}` : "";

      cy.batch(() => {
        cy.nodes().forEach((node) => {
          const data = node.data();
          const visible = layers.has(data.layer)
            && statuses.has(data.status)
            && Number(data.resolution) <= maxResolution
            && (!search || elementText(data).includes(search));
          node.toggleClass("hidden", !visible);
        });

        cy.edges().forEach((edge) => {
          const data = edge.data();
          const edgeVisible = layers.has(data.layer)
            && statuses.has(data.status)
            && Number(data.resolution) <= maxResolution
            && edge.source().visible()
            && edge.target().visible()
            && (!search || elementText(data).includes(search) || elementText(edge.source().data()).includes(search) || elementText(edge.target().data()).includes(search));
          edge.toggleClass("hidden", !edgeVisible);
        });
      });

      const visibleNodes = cy.nodes().filter((node) => !node.hasClass("hidden")).length;
      const visibleEdges = cy.edges().filter((edge) => !edge.hasClass("hidden")).length;
      document.getElementById("counts").textContent = `${visibleNodes} nodes / ${visibleEdges} edges`;
    }

    function layoutOptions(name) {
      const common = {
        name,
        animate: true,
        animationDuration: 280,
        fit: true,
        padding: 44
      };
      if (name === "cose") {
        return {
          ...common,
          idealEdgeLength: 108,
          nodeOverlap: 16,
          refresh: 16,
          randomize: false,
          componentSpacing: 76
        };
      }
      if (name === "breadthfirst") {
        return {
          ...common,
          directed: true,
          roots: cy.$id("dmn"),
          spacingFactor: 1.28
        };
      }
      return common;
    }

    function runLayout(name = activeLayout) {
      activeLayout = name;
      document.querySelectorAll("[data-layout]").forEach((button) => {
        button.classList.toggle("active", button.dataset.layout === name);
      });
      cy.elements().not(".hidden").layout(layoutOptions(name)).run();
    }

    function buildElements(data) {
      const nodes = data.nodes.map((node) => ({
        group: "nodes",
        data: node,
        classes: [`layer-${className(node.layer)}`, `status-${className(node.status)}`].join(" ")
      }));
      const edges = data.edges.map((edge) => ({
        group: "edges",
        data: edge,
        classes: [`layer-${className(edge.layer)}`, `status-${className(edge.status)}`].join(" ")
      }));
      return [...nodes, ...edges];
    }

    function stylesheet() {
      const base = [
        {
          selector: "node",
          style: {
            "background-color": "rgb(75, 85, 99)",
            "border-color": "rgb(17, 24, 39)",
            "border-width": 2,
            "color": "rgb(17, 24, 39)",
            "font-size": 10,
            "font-weight": 700,
            "height": "mapData(resolution, 1, 5, 56, 30)",
            "label": "data(label)",
            "min-zoomed-font-size": 7,
            "overlay-opacity": 0,
            "text-background-color": "rgb(255, 255, 255)",
            "text-background-opacity": 0.84,
            "text-background-padding": 3,
            "text-margin-y": -8,
            "text-wrap": "wrap",
            "text-max-width": 96,
            "width": "mapData(resolution, 1, 5, 56, 30)"
          }
        },
        {
          selector: "edge",
          style: {
            "curve-style": "bezier",
            "font-size": 8,
            "label": "data(relation)",
            "line-color": "rgb(107, 114, 128)",
            "min-zoomed-font-size": 8,
            "opacity": 0.76,
            "target-arrow-color": "rgb(107, 114, 128)",
            "target-arrow-shape": "triangle",
            "text-background-color": "rgb(255, 255, 255)",
            "text-background-opacity": 0.82,
            "text-background-padding": 2,
            "text-rotation": "autorotate",
            "width": "mapData(confidence, 0.65, 1, 1, 3)"
          }
        },
        {
          selector: ".hidden",
          style: {
            "display": "none"
          }
        },
        {
          selector: ":selected",
          style: {
            "border-color": "rgb(217, 119, 6)",
            "border-width": 5,
            "line-color": "rgb(217, 119, 6)",
            "target-arrow-color": "rgb(217, 119, 6)"
          }
        },
        {
          selector: ".status-candidate",
          style: {
            "border-style": "dashed"
          }
        },
        {
          selector: ".status-observed",
          style: {
            "shape": "round-rectangle"
          }
        },
        {
          selector: ".status-rendered",
          style: {
            "shape": "diamond"
          }
        }
      ];

      const layerStyles = Object.entries(layerColors).flatMap(([layer, color]) => ([
        {
          selector: `node.layer-${className(layer)}`,
          style: {
            "background-color": color
          }
        },
        {
          selector: `edge.layer-${className(layer)}`,
          style: {
            "line-color": color,
            "target-arrow-color": color
          }
        }
      ]));

      const statusStyles = Object.entries(statusColors).map(([status, color]) => ({
        selector: `.status-${className(status)}`,
        style: {
          "border-color": color
        }
      }));

      return [...base, ...layerStyles, ...statusStyles];
    }

    async function loadSeed() {
      const inlineSeed = JSON.parse(document.getElementById("seed-data").textContent);
      if (location.protocol === "file:") {
        return inlineSeed;
      }
      try {
        const response = await fetch("./system-dynamics-map.seed.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return await response.json();
      } catch (error) {
        console.warn("Falling back to embedded seed data.", error);
        return inlineSeed;
      }
    }

    async function init() {
      if (!window.cytoscape) {
        document.getElementById("cy").innerHTML = '<div class="error">Cytoscape.js did not load. Check that ./vendor/cytoscape-3.34.0.min.js is present.</div>';
        return;
      }

      seed = await loadSeed();
      renderCheckboxes();
      renderLegend();

      cy = cytoscape({
        container: document.getElementById("cy"),
        elements: buildElements(seed),
        layout: layoutOptions("cose"),
        maxZoom: 2.4,
        minZoom: 0.25,
        style: stylesheet(),
        wheelSensitivity: 0.18
      });

      cy.on("tap", "node", (event) => renderNodePanel(event.target.data()));
      cy.on("tap", "edge", (event) => renderEdgePanel(event.target.data()));
      cy.on("tap", (event) => {
        if (event.target === cy) {
          renderInitialPanel();
        }
      });

      window.systemDynamicsMapRuntime = {
        activeLayout: () => activeLayout,
        selectNode: (id) => {
          const node = cy.$id(id);
          if (node.empty()) {
            throw new Error(`Unknown node: ${id}`);
          }
          cy.elements().unselect();
          node.select();
          renderNodePanel(node.data());
          return node.data();
        },
        visibleCounts: () => ({
          edges: cy.edges().filter((edge) => !edge.hasClass("hidden")).length,
          nodes: cy.nodes().filter((node) => !node.hasClass("hidden")).length
        })
      };

      document.getElementById("search").addEventListener("input", () => {
        applyFilters();
      });
      document.getElementById("resolution").addEventListener("input", () => {
        applyFilters();
      });
      document.querySelectorAll("input[data-filter]").forEach((input) => {
        input.addEventListener("change", () => {
          applyFilters();
          runLayout(activeLayout);
        });
      });
      document.querySelectorAll("[data-layout]").forEach((button) => {
        button.addEventListener("click", () => runLayout(button.dataset.layout));
      });
      document.getElementById("fit").addEventListener("click", () => {
        cy.fit(cy.elements().not(".hidden"), 44);
      });

      renderInitialPanel();
      applyFilters();
      cy.ready(() => {
        cy.$id(seed.entrypoint).select();
        setTimeout(() => cy.fit(cy.elements().not(".hidden"), 44), 80);
      });
    }

    init().catch((error) => {
      document.getElementById("cy").innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
