  - surface: data_exhaust
    venue: US-WA
    instrument: consumer_health_or_biometric_data
    g2_verdict: DARK
    citation: >
      Washington My Health My Data Act, Chapter 19.373 RCW. RCW
      19.373.030 restricts collection and sharing of consumer health data
      without specified-purpose consent; RCW 19.373.070 makes sale or offer
      to sell consumer health data unlawful without separate valid
      authorization; the definition of consumer health data includes vital
      signs, biometric data, genetic data, and precise location indicating
      health services. See
      https://app.leg.wa.gov/RCW/default.aspx?cite=19.373&full=true.
    authority_basis: statute
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      WA-MHMD is broader than classical biometric statutes and can catch
      health-adjacent telemetry, vital signs, location, inferred health
      status, and related model features. Treat WA health/biometric data as
      held.
    open_questions:
      - "Whether any operator telemetry is consumer health data under RCW 19.373.010"
      - "Whether a buyer-facing package can avoid collection/share/sale of consumer health data"
      - "Whether authorization and six-year retention requirements could ever be operationalized for this surface"
    blocks_surfaces:
      - data_exhaust
    source_task: 20260628-registry-phase6-data-exhaust-subtree

  - surface: data_exhaust
    venue: US
    instrument: data_broker_sensitive_personal_data_transfer
    g2_verdict: DARK
    citation: >
      Protecting Americans' Data from Foreign Adversaries Act of 2024,
      15 USC Chapter 123. Section 9901 prohibits data brokers from making
      personally identifiable sensitive data of a United States individual
      available to a foreign adversary country or controlled entity, and
      defines data broker by valuable-consideration transfer of data not
      collected directly from individuals. See
      https://uscode.house.gov/view.xhtml?edition=prelim&path=%2Fprelim%40title15%2Fchapter123
      and the FTC PADFAA page at
      https://www.ftc.gov/legal-library/browse/statutes/protecting-americans-data-foreign-adversaries-act-2024-padfaa.
    authority_basis: statute
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      First-party operator-only data may not fit PADFAA's data-broker
      definition if directly collected from the individual, but any
      third-party, non-operator, purchased, aggregated, or onward-resold
      dataset creates data-broker analysis. Buyer screening must exclude
      foreign-adversary countries and controlled entities before any future
      non-DARK posture.
    open_questions:
      - "Whether the seller is a data broker for each package and buyer path"
      - "Whether any field is personally identifiable sensitive data under 15 USC §9901(c)(7)"
      - "Whether buyer ownership, control, headquarters, domicile, or direction creates foreign-adversary control"
      - "Whether DOJ data-security-program or state data-broker laws add stricter buyer restrictions"
    blocks_surfaces:
      - data_exhaust
      - REQ-20260630-mondlc-data-exhaust-b2b-licensing-path
    source_task: 20260628-registry-phase6-data-exhaust-subtree

