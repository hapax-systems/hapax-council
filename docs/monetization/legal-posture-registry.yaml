    instrument: direct_invited_model_safety_universal_jailbreak_bounty
    g2_verdict: DARK
    citation: >
      Anthropic Claude Help Center, Model Safety Bug Bounty Program,
      Mar. 16, 2026:
      https://support.claude.com/en/articles/12119250-model-safety-bug-bounty-program.
      The program is run through HackerOne, is application/invite gated,
      limits the free model alias to authorized red-teaming activities,
      requires NDA participation, and pays up to $35,000 for novel
      universal jailbreaks meeting Anthropic's criteria.
    authority_basis: tos_clause
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      Candidate direct-lab route only. This row does not cover independent
      public disclosure, scraping, account abuse, infrastructure testing,
      or any activity outside the accepted participant scope. It remains
      DARK until program acceptance, NDA compliance, scope control, and
      operator signature are documented.
    open_questions:
      - "Has the operator been accepted into Anthropic's HackerOne-backed program and signed the required NDA?"
      - "Is the planned submission limited to the authorized program scope and model alias?"
      - "Does the repro package avoid exporting code, tooling, data, or technology outside the direct program channel?"
      - "Has the operator signed the legal-posture row after reviewing current program terms?"
    blocks_surfaces:
      - bug_bounty
      - REQ-20260628-ai-redteam-bug-bounty-play
    source_task: 20260628-registry-phase3-bug-bounty-subtree

