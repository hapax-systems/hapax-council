  - surface: white_label
    venue: US-FTC
    instrument: multi_tenant_without_contractual_isolation
    g2_verdict: DARK
    citation: >
      FTC, AI Companies: Uphold Your Privacy and Confidentiality
      Commitments, Jan. 9, 2024:
      https://www.ftc.gov/policy/advocacy-research/tech-at-ftc/2024/01/ai-companies-uphold-your-privacy-confidentiality-commitments.
      Model-as-a-service companies can face FTC liability when they fail
      to honor privacy and confidentiality commitments to users and
      customers.
    authority_basis: agency_guidance
    review_date: "2026-06-30"
    freshness_ttl_days: 180
    operator_signed: false
    operator_sign_date: null
    notes: >
      Tenant isolation is a legal prerequisite for white-label B2B service.
      No customer prompts, files, outputs, embeddings, logs, eval data,
      fine-tuning corpus, support tickets, or derived artifacts may cross
      tenants unless the customer contract and notice explicitly authorize
      that use. Lack of isolation is DARK even if the business opportunity
      looks attractive.
    open_questions:
      - "What storage, logging, embedding, eval, support, and backup boundaries enforce tenant separation?"
      - "Do contracts prohibit cross-customer training, retrieval, or reuse unless expressly authorized?"
      - "Are deletion, export, incident notice, and subprocessor terms documented?"
    blocks_surfaces:
      - white_label
    source_task: 20260628-registry-phase5-white-label-subtree

