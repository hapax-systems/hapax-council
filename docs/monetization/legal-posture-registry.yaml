  # ── Data Exhaust ─────────────────────────────────────────────────────
  - surface: data_exhaust
    venue: "*"
    instrument: "*"
    g2_verdict: DARK
    citation: >
      No research completed. BIPA/CUBI/WA-MHMD self-sale gray zone,
      PADFAA data-broker registration, and deidentification standard
      (HIPAA Safe Harbor vs Expert Determination analog) unresearched.
      See phase 6 (registry-phase6-data-exhaust-subtree).
    authority_basis: no_research
    review_date: "2026-06-30"
    freshness_ttl_days: 180
    operator_signed: false
    operator_sign_date: null
    notes: >
      Data-exhaust monetization is the most jurisdictionally fragmented
      surface. IL BIPA, TX CUBI, WA MHMD all have private rights of
      action. "Self-sale" (selling data you generated about yourself) is
      a gray zone under these statutes.
    open_questions:
      - "BIPA/CUBI/WA-MHMD self-sale gray zone — does operator-generated data trigger?"
      - "PADFAA data-broker registration threshold"
      - "Deidentification standard for AI-generated behavioral data"
      - "State-by-state data sale notification requirements"
    blocks_surfaces:
      - data_exhaust
    source_task: 20260628-registry-phase0-schema-and-honest-dark-gate

