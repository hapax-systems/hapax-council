      train competing AI models, or resell the Services except as
      expressly approved by Anthropic.
    authority_basis: tos_clause
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      This is a legal/contract DARK row, not a commercial unattractiveness
      row. A white-label cognitive-labor plant that competes with Claude
