  - surface: white_label
    venue: US-FTC
    instrument: undisclosed_ai_b2b_service
    g2_verdict: DARK
    citation: >
      FTC Act Section 5:
      https://www.ftc.gov/legal-library/browse/statutes/federal-trade-commission-act;
      Air AI settlement release, March 24, 2026:
      https://www.ftc.gov/news-events/news/press-releases/2026/03/air-ai-its-owners-will-be-banned-marketing-business-opportunities-settle-ftc-charges-company-misled;
      Cox Media Group active-listening settlement release, May 21, 2026:
      https://www.ftc.gov/news-events/news/press-releases/2026/05/ftc-require-cox-media-group-two-other-firms-pay-nearly-1-million-settle-charges-they-deceived.
    authority_basis: agency_guidance
    review_date: "2026-06-30"
    freshness_ttl_days: 180
    operator_signed: false
    operator_sign_date: null
    notes: >
      DARK when the customer would reasonably understand the offering as
      human labor, bespoke human review, or a non-AI service, or when
      AI-powered performance, earnings, accuracy, privacy, or consent claims
      are unsubstantiated. This is a legal deception risk, not a margin or
      sales-quality objection.
    open_questions:
      - "What exact customer-facing copy describes the work and the degree of AI use?"
      - "Are performance, earnings, accuracy, speed, or refund claims substantiated?"
      - "Does the service touch regulated professional domains such as legal, medical, financial, employment, credit, or housing decisions?"
