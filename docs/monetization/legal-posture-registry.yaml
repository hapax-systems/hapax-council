    open_questions:
      - "Whether a concrete Polymarket-branded U.S. venue is separately CFTC-registered and available to the operator"
      - "Whether state-law blocks, Minnesota posture, tax treatment, and platform terms still fail g2 even on a registered U.S. venue"
      - "Whether any data/feed use relies on nonpublic, scraped, or terms-restricted Polymarket data"
    blocks_surfaces:
      - prediction_market
      - prediction_market_trading
    source_task: 20260628-registry-phase2-prediction-market-subtree

  - surface: prediction_market
    venue: US-MN
    instrument: ndcvb_manipulation_detection_feed_non_trading
    g2_verdict: DARK
    citation: >
      Internal struck-register authority:
      REQ-20260628-arbitrage-struck-and-blocked-register preserves only
      the NDCVB manipulation-detection feed outside prediction-market
      trading. Minnesota Laws 2026, Chapter 97, Article 8, §609.7615
      prohibits direct data, information, or verification services to a
      prediction market when known to be used to allow or settle prohibited
      wagers. CFTC Learn & Protect materials distinguish trading event
      contracts from market surveillance and accountability duties. See
      https://www.revisor.mn.gov/laws/2026/0/Session%2BLaw/Chapter/97/
      and https://www.cftc.gov/LearnandProtect/PredictionMarkets.
    authority_basis: operator_judgment
    review_date: "2026-06-30"
    freshness_ttl_days: 60
    operator_signed: false
    operator_sign_date: null
    notes: >
      Boundary row: NDCVB manipulation detection is not a wager, not
      automated trading, not market making, not settlement, and not position
      management. The feed remains DARK until a concrete buyer/use case is
      screened. It must not be sold directly to a prediction market for
      pricing, settlement, event listing, geolocation, payment, or enabling
      consumers to make wagers, and it must not feed a Hapax trading bot.
    open_questions:
      - "Who is the buyer: regulator/compliance/research user, or a prediction-market operator/trader?"
      - "Will the feed be used to allow, price, settle, market, or facilitate wagers?"
      - "Does the feed use only public/authorized market data and comply with platform market-data terms?"
      - "Does the feed avoid investment-advice, market-manipulation, insider-information, and deceptive-marketing risks?"
      - "Has the operator signed a non-trading package definition?"
    blocks_surfaces:
      - prediction_market
      - REQ-ndcvb-as-a-service
      - ndcvb_manipulation_detection_feed
    source_task: 20260628-registry-phase2-prediction-market-subtree

