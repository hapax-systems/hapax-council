      See https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-E/section-164.514
      and https://www.hhs.gov/hipaa/for-professionals/special-topics/de-identification/index.html.
    authority_basis: regulation
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      Deidentification is a prerequisite standard, not a g2 pass. Any later
      PARTIAL row needs an expert-determination-style artifact, retained
      methodology, k-anonymity/reidentification risk review, and contract
      terms forbidding reidentification and onward sale.
    open_questions:
      - "Which fields survive minimization after removing direct, device, location, communication, health, biometric, and secret-value identifiers?"
      - "What quantitative reidentification threshold is acceptable for this single-operator corpus?"
      - "Who signs the expert-determination-style analysis and how is it renewed?"
      - "Whether buyer-side joins can reidentify the operator despite aggregate packaging"
    blocks_surfaces:
      - data_exhaust
      - REQ-20260630-mondlc-data-exhaust-b2b-licensing-path
    source_task: 20260628-registry-phase6-data-exhaust-subtree

