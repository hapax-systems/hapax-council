  # regulated activity. Per-venue rows will be added by subtree research.
  - surface: receive_only_rail
    venue: "*"
    instrument: "*"
    g2_verdict: DARK
    citation: >
      Receive-only rails are wired (10/10 per rails-capability-matrix.md)
      but legal entity bootstrap (Wyoming SMLLC + DBA + EIN) is incomplete.
      Rails cannot legally accept revenue without the entity. Individual
      per-platform ToS compliance and per-venue tax obligations
      unresearched.
    authority_basis: no_research
    review_date: "2026-06-30"
    freshness_ttl_days: 365
    operator_signed: false
    operator_sign_date: null
    notes: >
      Lower volatility than aggressive surfaces. Primary blocker is legal
      entity bootstrap, not venue-specific bans. Per-platform ToS review
      needed but platforms generally permit individual recipients.
    open_questions:
      - "Wyoming SMLLC + DBA + EIN bootstrap status"
      - "Per-platform ToS compliance for receive-only"
      - "Per-venue tax reporting obligations (1099-K thresholds, state nexus)"
    blocks_surfaces:
      - receive_only_rail
    source_task: 20260628-registry-phase0-schema-and-honest-dark-gate
