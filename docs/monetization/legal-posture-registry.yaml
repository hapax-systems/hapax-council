  # ── Whistleblower ────────────────────────────────────────────────────
  - surface: whistleblower
    venue: "*"
    instrument: "*"
    g2_verdict: DARK
    citation: >
      No research completed. SEC original-information doctrine
      (public-source disqualification), 18 USC §873 extortion tripwire,
      and file-to-government-first obligation unresearched. Note: Digital
      Realty Trust v. Somers (2018) is anti-retaliation, NOT eligibility —
      prior mis-citation to fix. See phase 4
      (registry-phase4-whistleblower-subtree).
    authority_basis: no_research
    review_date: "2026-06-30"
    freshness_ttl_days: 180
    operator_signed: false
    operator_sign_date: null
    notes: >
      Frozen rule: file-to-government-first. The prior citation of Digital
      Realty Trust v. Somers (2018) as eligibility precedent is wrong — it
      addresses anti-retaliation under Dodd-Frank §922, not
      original-information eligibility under SEC Rule 21F-4(b)(3).
    open_questions:
      - "SEC original-information doctrine — public-source disqualification scope"
      - "18 USC §873 extortion tripwire — boundary between tip and threat"
      - "Dodd-Frank §922 eligibility vs anti-retaliation (fix Digital Realty mis-citation)"
      - "File-to-government-first obligation — procedural requirements"
    blocks_surfaces:
      - whistleblower
    source_task: 20260628-registry-phase0-schema-and-honest-dark-gate

