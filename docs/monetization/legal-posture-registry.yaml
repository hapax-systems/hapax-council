  - surface: bug_bounty
    venue: US-DMCA
    instrument: dmca_1201_security_testing_direct_disclosure
    g2_verdict: DARK
    citation: >
      17 USC 1201(a), (j), Circumvention of copyright protection systems:
      https://uscode.house.gov/view.xhtml?req=%28title%3A17+section%3A1201+edition%3Aprelim%29.
      Section 1201(j) defines security testing around good-faith testing,
      investigation, or correction of security flaws with owner/operator
      authorization, and considers whether information is used to promote
      security or shared directly with the developer.
    authority_basis: statute
    review_date: "2026-06-30"
    freshness_ttl_days: 180
    operator_signed: false
    operator_sign_date: null
    notes: >
      Candidate direct authorized security-testing route only. Pure
      text-prompt model-safety testing may not involve a technological
      protection measure, but any bypass of access controls, DRM, paywalls,
      API limits, or infrastructure protections needs fresh review. This
      remains DARK until authorization and scope are documented and signed.
    open_questions:
      - "Does the candidate require bypassing any technological measure controlling access to a copyrighted work or platform resource?"
