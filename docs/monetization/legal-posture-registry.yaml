  - surface: data_exhaust
    venue: US-IL
    instrument: biometric_identifier_or_information
    g2_verdict: DARK
    citation: >
      Illinois BIPA, 740 ILCS 14/10 and 14/15. Section 15 requires written
      notice, purpose/retention disclosure, and written release before
      collection/obtaining; Section 15(c) bars selling, leasing, trading, or
      otherwise profiting from a person's or customer's biometric identifier
      or biometric information. See
      https://www.ilga.gov/documents/legislation/ilcs/documents/074000140k10.htm
      and https://www.ilga.gov/documents/legislation/ilcs/documents/074000140K15.htm.
    authority_basis: statute
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      BIPA is a hard DARK row for biometric sale/profit until separate
      counsel-level authority proves a narrow route. The row covers both
      biometric identifiers and information based on identifiers used to
      identify an individual.
    open_questions:
      - "Whether any proposed feature is outside BIPA's biometric identifier/information definitions"
      - "Whether transformed biometric-derived features remain based on identifiers used to identify"
      - "Whether any non-sale disclosure exception applies to a specific package"
    blocks_surfaces:
      - data_exhaust
    source_task: 20260628-registry-phase6-data-exhaust-subtree

  - surface: data_exhaust
    venue: US-TX
    instrument: biometric_identifier
    g2_verdict: DARK
    citation: >
      Texas Capture or Use of Biometric Identifier Act, Tex. Bus. & Com.
      Code §503.001. The Texas Attorney General summarizes CUBI as requiring
