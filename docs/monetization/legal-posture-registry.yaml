  - surface: prediction_market
    venue: US-MN
    instrument: event_contract_or_prediction_market_wager
    g2_verdict: DARK
    citation: >
      Minn. Stat. 609.755 makes making a bet a misdemeanor; Minn. Stat.
      609.75 subd. 2 defines a bet as a bargain for gain or loss of money,
      property, or benefit dependent on chance even when chance is accompanied
      by skill. Minnesota House Research H.F. 4437 summary, Mar. 30, 2026,
      describes prediction-market shares and states the bill specifies those
      shares are not the securities/commodities exclusion from "bet" and would
      be treated as illegal gambling.
      https://www.revisor.mn.gov/statutes/cite/609.755;
      https://www.revisor.mn.gov/statutes/cite/609.75;
      https://www.house.mn.gov/hrd/bs/94/HF4437.pdf.
    authority_basis: statute
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      Minnesota is the operator state input for current planning. This row is
      a conservative fail-closed trading block for prediction-market wagers or
      event-contract participation by a Minnesota operator. It does not block
      non-trading, read-only readiness or manipulation-detection feeds that do
      not place positions, accept wagers, advertise prediction markets, or
      receive value from a prediction-market trade.
    open_questions:
      - "Whether CFTC-regulated event contracts preempt any state restriction for a specific platform/instrument."
      - "Whether a non-trading prediction-market intelligence feed has separate legal posture outside wagering."
      - "Whether phase 2 identifies any Minnesota-safe, counsel-approved prediction-market-adjacent instrument."
    blocks_surfaces:
      - prediction_market
      - prediction_market_trading
    source_task: 20260628-registry-phase1-operator-state-of-residence-confirmation

  # -- Prediction Market Phase 2 Rows ----------------------------------
  # These rows keep all operator trading DARK, preserve the Minnesota
  # strike, and split non-trading manipulation-detection feeds from
  # position-taking.
  - surface: prediction_market
    venue: US-MN
    instrument: operator_prediction_market_trading
    g2_verdict: DARK
    citation: >
      Minnesota Laws 2026, Chapter 97, Article 8, amends Minn. Stat.
      609.75 subd. 3 and creates Minn. Stat. 609.7615 effective
      August 1, 2026. Section 609.7615 defines prediction markets and
      makes specified prediction-market hosting, facilitation, data,
      support, and advertising activity felony conduct. Minn. Stat.
      609.755 separately makes making a bet a misdemeanor. See
      https://www.revisor.mn.gov/laws/2026/0/Session%2BLaw/Chapter/97/,
      https://www.revisor.mn.gov/statutes/cite/609.755, and
      https://www.revisor.mn.gov/statutes/cite/609.75.
    authority_basis: statute
    review_date: "2026-06-30"
    freshness_ttl_days: 60
    operator_signed: false
    operator_sign_date: null
    notes: >
      Standing Minnesota strike. The operator's current residence input is
      Minnesota, confirmed 2026-06-28. No new authority in this task
      overturns the RED/DARK posture for operator trading, automated
      position-taking, market making, accepting wagers, settlement, pricing,
      or value received from a prediction-market trade.
    open_questions:
      - "Whether federal preemption litigation eventually reaches and binds Minnesota"
      - "Whether any counsel-approved non-wager instrument can be separated from prediction-market trading"
      - "Whether Minnesota's August 1, 2026 effective date changes only enforcement timing or also present planning posture"
    blocks_surfaces:
      - prediction_market
      - prediction_market_trading
      - automated_prediction_market_trading
    source_task: 20260628-registry-phase2-prediction-market-subtree

  - surface: prediction_market
    venue: US-CFTC
    instrument: regulated_event_contract_trading
    g2_verdict: DARK
    citation: >
      CFTC, Understanding Prediction Markets and Event Contracts:
      https://www.cftc.gov/LearnandProtect/PredictionMarkets. CFTC,
      Prediction Markets; Public Interest Determinations, 91 Fed. Reg.
      35806 (June 12, 2026):
      https://www.federalregister.gov/documents/2026/06/12/2026-11854/prediction-markets-public-interest-determinations.
      CFTC Staff Advisory No. 25-36:
      https://www.cftc.gov/csl/25-36/download.
    authority_basis: regulation
    review_date: "2026-06-30"
    freshness_ttl_days: 60
    operator_signed: false
    operator_sign_date: null
    notes: >
      Federal regulation does not create a Hapax g2 pass. CFTC materials
      describe event contracts as typically swaps, DCM/SEF obligations,
      self-certification, core-principle duties, manipulation surveillance,
      and Special Rule review for event contracts involving gaming or
      unlawful federal/state activity. State-preemption litigation is
      unsettled across circuits and venues, so no operator trading row is
      upgraded.
    open_questions:
      - "Whether a specific event contract is self-certified, approved, under CFTC review, or subject to a suspension request"
      - "Whether the contract involves gaming or activity unlawful under federal or state law"
      - "Whether state-law preemption is binding in the operator venue"
      - "Whether the platform, broker, and contract terms support the intended activity without insider/manipulation exposure"
    blocks_surfaces:
      - prediction_market
      - prediction_market_trading
    source_task: 20260628-registry-phase2-prediction-market-subtree

  - surface: prediction_market
    venue: US-IRS
    instrument: section_1256_event_contract_tax_position
    g2_verdict: DARK
    citation: >
      26 USC §1256 requires mark-to-market treatment for covered section
      1256 contracts and defines categories including regulated futures
      contracts and nonequity options:
      https://uscode.house.gov/view.xhtml?edition=prelim&num=0&req=granuleid%3AUSC-prelim-title26-section1256.
      IRS Form 6781 is used for gains and losses on section 1256 contracts:
      https://www.irs.gov/forms-pubs/about-form-6781.
    authority_basis: statute
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      No affirmative row treats prediction-market event contracts as
      section 1256 contracts for Hapax. A §1256 position would create
      mark-to-market and 60/40 reporting consequences and may be fact,
      platform, and contract dependent. Tax classification uncertainty is a
      gate, not a clearance source.
    open_questions:
      - "Whether the IRS issues event-contract-specific guidance or reporting instructions"
      - "Whether a concrete platform issues tax forms consistent with §1256 treatment"
      - "Whether a CPA/counsel memo supports §1256, capital, ordinary, or wagering treatment for a concrete contract"
      - "Whether year-end mark-to-market exposure is acceptable even if a later event resolves adversely"
    blocks_surfaces:
      - prediction_market
      - prediction_market_trading
      - tax_reporting
    source_task: 20260628-registry-phase2-prediction-market-subtree

  - surface: prediction_market
    venue: US-IRS
    instrument: obbba_165d_wagering_loss_cap
    g2_verdict: DARK
    citation: >
      26 USC §165(d) now allows a deduction equal to 90 percent of wagering
      losses during the taxable year and only to the extent of wagering
      gains:
      https://uscode.house.gov/view.xhtml?edition=prelim&num=0&req=granuleid%3AUSC-prelim-title26-section165.
      IRS IRB 2026-19 states that OBBBA §70114(a), Pub. L. 119-21,
      amended §165(d) to impose the 90 percent wagering-loss limit:
      https://www.irs.gov/irb/2026-19_IRB.
    authority_basis: statute
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      If event-contract activity is treated as wagering, OBBBA/§165(d)
      creates tax drag and possible phantom-income exposure because only
      90 percent of wagering losses are deductible against wagering gains
      for taxable years beginning after 2025. The non-trading NDCVB feed
      does not place positions and should not create wagering gains/losses;
      that distinction is why it is represented separately.
    open_questions:
      - "Whether any prediction-market contract is wagering for federal tax purposes"
      - "Whether state gambling classification affects federal tax reporting posture"
      - "Whether gross trading volume, fees, and data costs create additional recordkeeping or deduction issues"
      - "Whether a CPA memo is required before any taxable event-contract position"
    blocks_surfaces:
      - prediction_market
      - prediction_market_trading
      - tax_reporting
    source_task: 20260628-registry-phase2-prediction-market-subtree

