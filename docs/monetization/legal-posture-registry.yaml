  # ── Data Exhaust Phase 6 Rows ───────────────────────────────────────
  # These rows intentionally remain DARK. They distinguish candidate
  # non-biometric/deidentified paths from held biometric, reidentifiable,
  # data-broker, and struck tiers, but they do not create legal clearance.
  - surface: data_exhaust
    venue: "*"
    instrument: non_biometric_operational_telemetry
    g2_verdict: DARK
    citation: >
      No affirmative legal clearance or operator signature for B2B
      licensing. Candidate scope is limited to first-party, non-biometric
      operational telemetry only; the path still requires data inventory,
      minimization, buyer-screening, permitted-use contract terms, and a
      later operator-signed legal/ethical ruling. See
      docs/monetization/data-exhaust-legal-posture-research.md.
    authority_basis: operator_judgment
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      This is the only plausible first tranche. It excludes biometrics,
      consumer health data, precise location, private communications,
      secret values, non-operator person data, raw samples, and anything
      reasonably linkable to the operator or another person.
    open_questions:
      - "Exact telemetry inventory and field-level sensitive-data classification"
      - "Buyer acceptance terms: permitted use, no surveillance, no reidentification, no resale"
      - "State privacy and data-broker registration analysis for any intended buyer venue"
      - "Operator signature on a bounded package definition"
    blocks_surfaces:
      - data_exhaust
      - REQ-20260630-mondlc-data-exhaust-b2b-licensing-path
    source_task: 20260628-registry-phase6-data-exhaust-subtree

  - surface: data_exhaust
    venue: "*"
    instrument: deidentified_aggregate_operational_telemetry
    g2_verdict: DARK
    citation: >
      45 CFR §164.514(a)-(b) and HHS OCR de-identification guidance define
      Expert Determination and Safe Harbor methods for HIPAA PHI, including
      the "no reasonable basis" identifiability standard, but those are not
      themselves commercial B2B licensing clearance for Hapax telemetry.
      See https://www.ecfr.gov/current/title-45/subtitle-A/subchapter-C/part-164/subpart-E/section-164.514
      and https://www.hhs.gov/hipaa/for-professionals/special-topics/de-identification/index.html.
    authority_basis: regulation
    review_date: "2026-06-30"
    freshness_ttl_days: 90
    operator_signed: false
    operator_sign_date: null
    notes: >
      Deidentification is a prerequisite standard, not a g2 pass. Any later
      PARTIAL row needs an expert-determination-style artifact, retained
      methodology, k-anonymity/reidentification risk review, and contract
      terms forbidding reidentification and onward sale.
    open_questions:
      - "Which fields survive minimization after removing direct, device, location, communication, health, biometric, and secret-value identifiers?"
      - "What quantitative reidentification threshold is acceptable for this single-operator corpus?"
      - "Who signs the expert-determination-style analysis and how is it renewed?"
      - "Whether buyer-side joins can reidentify the operator despite aggregate packaging"
    blocks_surfaces:
      - data_exhaust
      - REQ-20260630-mondlc-data-exhaust-b2b-licensing-path
    source_task: 20260628-registry-phase6-data-exhaust-subtree

