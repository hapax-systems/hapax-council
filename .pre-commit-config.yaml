repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: experiment-freeze
        name: Experiment path freeze check
        entry: scripts/experiment-freeze-check
        language: script
        always_run: true
        pass_filenames: false
