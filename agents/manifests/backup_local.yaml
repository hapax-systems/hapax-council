id: backup_local
name: Local Backup
version: "1.0.0"
category: observability
reports_to: operator
peers: [backup_remote]
depends_on: []

purpose: Tier 1 daily backup to the NAS restic repository — dumps PostgreSQL with pg_dumpall, snapshots Qdrant, exports n8n, then runs restic backup.
inputs:
  - PostgreSQL databases
  - Qdrant snapshots
  - n8n workflows
  - Docker volume metadata
  - filesystem paths
outputs:
  - NAS restic snapshots at /mnt/nas/backups/restic
capabilities:
  - restic_backup
  - postgres_dump
  - qdrant_snapshot
schedule:
  type: timer
  systemd_unit: hapax-backup-local.timer
  interval: daily
model: null

autonomy: full
decision_scope: Execute backup to local repository. Cannot modify source data.
escalation_target: operator
axiom_bindings:
  - axiom_id: executive_function
    implications: [ex-routine-007]
    role: subject
raci:
  - task: backup
    role: responsible

health_group: null
service_tier: 1

timer_display:
  schedule_label: "Daily 03:00"
  purpose: "NAS restic backup (Postgres + Qdrant + files)"

narrative: |
  The Local Backup agent runs the Tier 1 daily backup pipeline. It first
  dumps PostgreSQL with pg_dumpall using the current service user, takes Qdrant
  collection snapshots, exports n8n workflows, and captures Docker volume
  metadata. It then runs restic to back up the configured path set, including
  the llm-stack file tree, to /mnt/nas/backups/restic. This is the first line of
  defense against data loss.
