id: llm_backup
name: LLM Stack Backup
version: "1.0.0"
category: observability
reports_to: operator
peers: [backup_local, backup_remote]
depends_on: []

purpose: Deprecated compatibility receipt for the retired standalone LLM stack backup lane. Active coverage lives in backup_local and backup_remote.
inputs:
  - Legacy llm-backup timer invocation
outputs:
  - Deprecation receipt in the systemd journal
capabilities:
  - backup_deprecation_receipt
schedule:
  type: timer
  systemd_unit: llm-backup.timer
  interval: weekly
model: null

autonomy: full
decision_scope: Log the retired backup path and point at the canonical backup lanes. Cannot execute backups or modify backed-up data.
escalation_target: operator
axiom_bindings:
  - axiom_id: executive_function
    implications: [ex-routine-007]
    role: subject
raci:
  - task: backup
    role: responsible

health_group: null
service_tier: 2

timer_display:
  schedule_label: "Weekly Sun 02:00"
  purpose: "Deprecated LLM backup compatibility receipt"

narrative: |
  The LLM Stack Backup agent is retained only as a compatibility receipt for
  the retired standalone LLM-stack backup script. It does not create backup
  artifacts. Canonical LLM-stack data protection is owned by the Tier 1 local
  and Tier 2 remote backup agents, which capture PostgreSQL, Qdrant, n8n,
  Docker metadata, system configuration, and the llm-stack file tree.
