id: backup_remote
name: Remote Backup
version: "1.0.0"
category: observability
reports_to: operator
peers: [backup_local]
depends_on: [backup_local]

purpose: Retired Backblaze B2 remote backup receipt — no routine timer is expected after the 2026-06-06 offsite-policy decision.
inputs:
  - Operator retirement decision
  - Historical B2 backup records
outputs:
  - Retirement receipt
capabilities:
  - backup_retirement_receipt
schedule:
  type: on-demand
  systemd_unit: hapax-backup-remote.service
  interval: retired
model: null

autonomy: advisory
decision_scope: Document the retired B2 lane. Must not run automatically, enable timers, prune, upload, or modify backup repositories.
escalation_target: operator
axiom_bindings:
  - axiom_id: corporate_boundary
    implications: [cb-key-001]
    role: subject
raci:
  - task: backup
    role: responsible

health_group: null
service_tier: 3

timer_display:
  schedule_label: "Retired 2026-06-06"
  purpose: "Backblaze B2 remote backup retained only as a historical receipt"

narrative: |
  The Remote Backup agent is retired as a required routine lane. On 2026-06-06
  the operator selected Google Drive critical offsite backup as the canonical
  offsite path and retired broad Backblaze B2 coverage rather than raising the
  B2 storage cap. The service file may remain as a historical/manual receipt,
  but no `hapax-backup-remote.timer` should be installed, enabled, or expected
  by health policy.
