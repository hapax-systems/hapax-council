id: backup_remote
name: Remote Backup
version: "1.0.0"
category: observability
reports_to: operator
peers: [backup_local]
depends_on: [backup_local]

purpose: Tier 2 weekly backup to Backblaze B2 — offsite restic coverage with the same service-native staging as Tier 1.
inputs:
  - PostgreSQL databases
  - Qdrant snapshots
  - n8n workflows
  - Docker volume metadata
  - filesystem paths
outputs:
  - B2 restic snapshots
capabilities:
  - restic_backup
  - b2_upload
schedule:
  type: timer
  systemd_unit: hapax-backup-remote.timer
  interval: weekly
model: null

autonomy: full
decision_scope: Replicate local backups to B2. Cannot modify local repository.
escalation_target: operator
axiom_bindings:
  - axiom_id: executive_function
    implications: [ex-routine-007]
    role: subject
  - axiom_id: corporate_boundary
    implications: [cb-key-001]
    role: subject
raci:
  - task: backup
    role: responsible

health_group: null
service_tier: 1

timer_display:
  schedule_label: "Weekly Wed 04:00"
  purpose: "Offsite restic backup to Backblaze B2"

narrative: |
  The Remote Backup agent handles Tier 2 offsite coverage. It performs the same
  service-native staging as Tier 1, then writes a restic snapshot to Backblaze
  B2 for geographic redundancy. It uses credentials from the pass password
  store and does not depend on the retired llm-backup compatibility receipt.
