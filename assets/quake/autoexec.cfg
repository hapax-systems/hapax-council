// Screwm tower DarkPlaces defaults.
r_glsl_postprocess 1
r_glsl_postprocess_uservec1_enable 1
r_glsl_postprocess_uservec2_enable 1
r_glsl_postprocess_uservec3_enable 1
r_glsl_postprocess_uservec4_enable 1

// UserVec1: atmo_darken, prismatic_refract, color_temp, dust
r_glsl_postprocess_uservec1 "0.22 0.28 0.06 0.006"

// UserVec2: mortar_lines, edge_glow, posterize, sharpen
r_glsl_postprocess_uservec2 "0.05 0.18 0 0.03"

// UserVec3: fisheye, noise, halftone, threshold
r_glsl_postprocess_uservec3 "0 0.006 0 0"

// UserVec4: emboss/kaleidoscope, invert, mask, thermal
r_glsl_postprocess_uservec4 "0 0 0 0"

r_glsl_saturation 0.92
r_ambient 18

r_bloom 1
r_bloom_blur 4
r_bloom_brighten 1.15
r_bloom_resolution 320
r_bloom_colorscale "0.8 0.7 0.6"
r_bloom_colorsubtract "0.10 0.10 0.10"

r_shadow_realtime_world 1
r_shadow_realtime_dlight 1
r_fog_clear 0

// Hapax DarkPlaces fork hook: update in-world BSP textures from live raw BGRA
// producers. Slot 1 is the generic AoA media sphere; slots 2-7 are camera wards.
// Slot 8 is the first Cairo/Pango text ward mount.
hapax_live_texture_enable 1
hapax_live_texture_name progs/aoa_sphere.mdl_0
hapax_live_texture_path /dev/shm/hapax-compositor/quake-live-yt.bgra
hapax_live_texture_width 2048
hapax_live_texture_height 1024
hapax_live_texture2_enable 1
hapax_live_texture2_name cam_bop
hapax_live_texture2_path /dev/shm/hapax-compositor/quake-live-cam-brio-operator.bgra
hapax_live_texture2_width 1920
hapax_live_texture2_height 1080
hapax_live_texture3_enable 1
hapax_live_texture3_name cam_brm
hapax_live_texture3_path /dev/shm/hapax-compositor/quake-live-cam-brio-room.bgra
hapax_live_texture3_width 1920
hapax_live_texture3_height 1080
hapax_live_texture4_enable 1
hapax_live_texture4_name cam_bsy
hapax_live_texture4_path /dev/shm/hapax-compositor/quake-live-cam-brio-synths.bgra
hapax_live_texture4_width 1920
hapax_live_texture4_height 1080
hapax_live_texture5_enable 1
hapax_live_texture5_name cam_cdk
hapax_live_texture5_path /dev/shm/hapax-compositor/quake-live-cam-c920-desk.bgra
hapax_live_texture5_width 1920
hapax_live_texture5_height 1080
hapax_live_texture6_enable 1
hapax_live_texture6_name cam_crm
hapax_live_texture6_path /dev/shm/hapax-compositor/quake-live-cam-c920-room.bgra
hapax_live_texture6_width 1920
hapax_live_texture6_height 1080
hapax_live_texture7_enable 1
hapax_live_texture7_name cam_cov
hapax_live_texture7_path /dev/shm/hapax-compositor/quake-live-cam-c920-overhead.bgra
hapax_live_texture7_width 1920
hapax_live_texture7_height 1080
hapax_live_texture8_enable 1
hapax_live_texture8_name w09
hapax_live_texture8_path /dev/shm/hapax-compositor/quake-live-ticker-grounding.bgra
hapax_live_texture8_width 1344
hapax_live_texture8_height 176

// Default camera posture is reviewable: fixed, no bob, no idle sway. DarkPlaces
// requires `set` for project-local cvars; bare names are not created reliably.
set screwm_camera_orbit 0
set screwm_camera_file_control 1
set screwm_player_noclip_control 1
set screwm_csqc_review_camera 1
set screwm_csqc_review_path 1
set screwm_csqc_manual_camera 1
set screwm_csqc_native_controller 0
set screwm_csqc_native_hold_s 20
set screwm_csqc_native_speed 1.0

joy_enable 1
joy_index 1
joy_axisforward 1
joy_axisside 0
joy_axisyaw 3
joy_axispitch 4
joy_axisup -1
joy_sensitivityforward -1
joy_sensitivityside 1
joy_sensitivityyaw 1.15
joy_sensitivitypitch 0.90
joy_deadzoneforward 0.12
joy_deadzoneside 0.12
joy_deadzoneyaw 0.14
joy_deadzonepitch 0.14
joy_x360_axisforward 1
joy_x360_axisside 0
joy_x360_axisyaw 2
joy_x360_axispitch 3
joy_x360_axisup -1
joyadvancedupdate
bind JOY5 +movedown
bind JOY6 +moveup
freelook 1
cl_bob 0
cl_rollangle 0
v_idlescale 0
fov 90

viewsize 120
scr_viewsize 120
crosshair 0
r_drawviewmodel 0
scr_centertime 0
scr_sbaralpha 0
sbar_alpha_bg 0
sbar_alpha_fg 0
sbar_hudselector 0
sbar_x 10000
sbar_y 10000
scr_infobar_height 0
scr_infobartime_off 0
scr_showbrand 0
scr_showpause 0
showfps 0
showtime 0
cl_showfps 0
cl_showtime 0
cl_showdate 0
cl_showspeed 0
cl_shownet 0

// Ward identity belongs to the scroom geometry. The CSQC text overlay is
// retained only as an opt-in diagnostic layer; the lightfield is the live
// in-scroom ward coupling.
set screwm_csqc_overlay 0
set screwm_csqc_lightfield 1
set screwm_review_fill_light 1

map screwm
