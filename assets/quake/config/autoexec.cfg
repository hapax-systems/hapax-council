// Screwm tower DarkPlaces defaults.
r_glsl_postprocess 1
r_glsl_postprocess_uservec1_enable 1
r_glsl_postprocess_uservec2_enable 1
r_glsl_postprocess_uservec3_enable 1
r_glsl_postprocess_uservec4_enable 1

// UserVec1: atmo_darken, prismatic_refract, color_temp, dust
r_glsl_postprocess_uservec1 "0.7 1.0 0.25 0.04"

// UserVec2: mortar_lines, edge_glow, posterize, unused
r_glsl_postprocess_uservec2 "0.12 0.5 0 0"

// UserVec3: fisheye, noise, halftone, threshold
r_glsl_postprocess_uservec3 "0 0.03 0 0"

// UserVec4: emboss/kaleidoscope, invert, mask, thermal
r_glsl_postprocess_uservec4 "0 0 0 0"

r_glsl_saturation 0.75

r_bloom 1
r_bloom_blur 6
r_bloom_brighten 3
r_bloom_resolution 320
r_bloom_colorscale "1.2 0.9 0.7"
r_bloom_colorsubtract "0.04 0.04 0.04"

r_shadow_realtime_world 1
r_shadow_realtime_dlight 1
r_fog_clear 0

map screwm
