// Screwm/Scroom DarkPlaces defaults.
r_glsl_postprocess 0
r_glsl_postprocess_uservec1_enable 1
r_glsl_postprocess_uservec2_enable 1
r_glsl_postprocess_uservec3_enable 1
r_glsl_postprocess_uservec4_enable 1

// Diagnostic-only screen postprocess. Release-grade Screwm expression is bound
// to world geometry via CSQC light/receiver routes, not the fourth wall.
set screwm_qc_screen_postprocess 0

// UserVec1: room_absorption, prismatic_drift, temperature_bias, dust
r_glsl_postprocess_uservec1 "0 0 0 0"

// UserVec2: scan_field, edge_glow, posterize, sharpen
r_glsl_postprocess_uservec2 "0 0 0 0"

// UserVec3: spatial_warp, signal_noise, halftone, threshold
r_glsl_postprocess_uservec3 "0 0 0 0"

// UserVec4: emboss/kaleidoscope, invert, mask, thermal
r_glsl_postprocess_uservec4 "0 0 0 0"

r_fullbright 0
r_glsl_saturation 1.12
r_ambient 8
r_fullbright_directed 1
r_fullbright_directed_ambient 0.25

// Global engine bloom creates detached smears in the black receiver substrate.
// Reintroduce glow through entity/compositor-bound drift, not full-frame bloom.
r_bloom 0
r_bloom_blur 6
r_bloom_brighten 2.20
r_bloom_resolution 320
r_bloom_colorscale "0.62 1.00 1.18"
r_bloom_colorsubtract "0.06 0.06 0.08"

r_shadow_realtime_world 1
r_shadow_realtime_dlight 1
// Dlight shadows are a global DarkPlaces switch, so CSQC must first enter the
// shadow-budget path that emits a small drift-driven key/rim/floor set instead
// of shadowing every ward/property/diagnostic light.
r_shadow_realtime_dlightshadows 1
r_shadow_shadowmapping 1
r_fog_clear 0

// Hapax DarkPlaces fork hook: update in-world BSP textures from live raw BGRA
// producers. Slot 1 is the generic AoA media sphere; slots 2-7 are camera wards.
// Slot 8 is the compositor-authored ward atlas. Slots 9-11 are direct
// synthwave ticker wards. Slot 12 is the Reverie substrate after receiver-local
// drift wrapping; slots 15-17 are direct IR camera ward textures. These must
// not be throttled by atlas storage when used in-world.
hapax_live_texture_enable 1
hapax_live_texture_name progs/aoa_sphere.mdl_0
hapax_live_texture_path /dev/shm/hapax-compositor/quake-live-yt.bgra
hapax_live_texture_width 2048
hapax_live_texture_height 1024
hapax_live_texture2_enable 1
hapax_live_texture2_name cam_bop
hapax_live_texture2_path /dev/shm/hapax-compositor/quake-live-cam-brio-operator.bgra
hapax_live_texture2_width 1280
hapax_live_texture2_height 720
hapax_live_texture3_enable 1
hapax_live_texture3_name cam_brm
hapax_live_texture3_path /dev/shm/hapax-compositor/quake-live-cam-brio-room.bgra
hapax_live_texture3_width 1280
hapax_live_texture3_height 720
hapax_live_texture4_enable 1
hapax_live_texture4_name cam_bsy
hapax_live_texture4_path /dev/shm/hapax-compositor/quake-live-cam-brio-synths.bgra
hapax_live_texture4_width 1280
hapax_live_texture4_height 720
hapax_live_texture5_enable 1
