// Default camera posture is reviewable: fixed, no bob, no idle sway. DarkPlaces
// requires `set` for project-local cvars; bare names are not created reliably.
set screwm_camera_orbit 0
set screwm_camera_file_control 1
set screwm_csqc_manual_camera 1
set screwm_player_noclip_control 1
set screwm_csqc_review_camera 1
set screwm_csqc_review_path 1
set screwm_csqc_native_controller 0
set screwm_csqc_native_hold_s 20
set screwm_csqc_native_speed 1.0

joy_enable 1
joy_index 1
joy_axisforward 1
joy_axisside 0
joy_axisyaw 3
joy_axispitch 4
joy_axisup -1
joy_sensitivityforward -1
joy_sensitivityside 1
joy_sensitivityyaw 1.15
joy_sensitivitypitch 0.90
joy_deadzoneforward 0.12
joy_deadzoneside 0.12
joy_deadzoneyaw 0.14
joy_deadzonepitch 0.14
joy_x360_axisforward 1
joy_x360_axisside 0
joy_x360_axisyaw 2
joy_x360_axispitch 3
joy_x360_axisup -1
joyadvancedupdate
bind JOY5 +movedown
bind JOY6 +moveup
freelook 1
cl_bob 0
cl_rollangle 0
v_idlescale 0
fov 90

viewsize 120
scr_viewsize 120
crosshair 0
r_drawviewmodel 0
scr_centertime 0
scr_sbaralpha 0
sbar_alpha_bg 0
sbar_alpha_fg 0
sbar_hudselector 0
sbar_x 10000
sbar_y 10000
scr_infobar_height 0
scr_infobartime_off 0
scr_showbrand 0
scr_showpause 0
showfps 0
showtime 0
cl_showfps 0
cl_showtime 0
cl_showdate 0
cl_showspeed 0
cl_shownet 0

// Ward identity belongs to the scroom geometry. The CSQC text overlay is
// retained only as an opt-in diagnostic layer; the lightfield is the live
// in-scroom ward coupling.
set screwm_csqc_overlay 0
set screwm_csqc_lightfield 1
set screwm_csqc_diagnostic_lightfield 0
set screwm_csqc_effect_lightfield 1
set hapax_drift_enable 1
// GPU drift-field sampler (daemon-fed /dev/shm BGRA → world-XY-projected drift modulation).
// Neutral when absent (grey128 fallback); modulates flagged drift_ surfaces when present.
set hapax_driftfield_enable 1
// GPU GEOMETRIC drift — deform the SHAPE of container + content geometry (live-tunable,
// reaches lit + shadow passes). amp=container displacement; content=entity amplitude scale;
// swirl=curl-noise operator weight; freq/speed=spatial/temporal scale.
set hapax_drift_geo_amp 24
set hapax_drift_geo_ampmax 36
set hapax_drift_geo_freq 0.015
set hapax_drift_geo_speed 0.25
set hapax_drift_geo_swirl 1.0
set hapax_drift_geo_content 5
set screwm_csqc_full_expression_field 1
set screwm_csqc_shadow_budget 1
set screwm_csqc_surface_grid_overlay 0
set screwm_csqc_roaming_surface_pulses 0
// Drift-gate threshold for per-ward lights (wards.qc screwm_add_ward_light): a ward
// lights only when its own (active + presence*0.7) exceeds this. Higher => fewer
// wards lit+shadowed at once => cheaper shadows. Start conservative; lower live to
// fill more of the room once the shadowed-dlight fps budget is confirmed.
set screwm_ward_light_gate 0.08
set screwm_csqc_material_field 1
set screwm_csqc_theatre_spots 0
set screwm_review_fill_light 1

map screwm
