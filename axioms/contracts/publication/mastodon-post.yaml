surface: mastodon-post
state_kinds:
  - broadcast.boundary
  - chronicle.high_salience
  - governance.enforcement
  - omg.weblog
  - shorts.upload
  - velocity.digest
redactions:
  - operator_profile.*
  - operator_identity.*
  - operator_legal_name
  - chronicle.private_moments
rate_limit:
  per_hour: 6
  per_day: 30
cadence_hint: "Per-instance limit 300 req / 5min; plenty of headroom"
