# Enforcement Exceptions Registry
#
# Components with documented axiom exceptions. Each entry specifies which
# axiom/implication is excepted, why, what compensating controls exist,
# and when the exception should be reviewed.
#
# Read by axiom_enforcer.py to skip enforcement for approved paths.
# Each exception should have a corresponding operator precedent in
# axioms/precedents/seed/.

exceptions:
  - id: exception-gemini-live
    component: agents/hapax_daimonion/gemini_live.py
    axiom_id: corporate_boundary
    implication_id: cb-llm-001
    reason: >
      Gemini Live provides speech-to-speech capability via WebSocket that
      cannot be routed through LiteLLM proxy. Direct Google API access is
      required for the real-time audio streaming protocol.
    compensating_controls:
      - API key stored in pass (not env file)
      - Usage traced in Langfuse via manual spans
      - Fallback to local Pipecat pipeline when API unavailable
    approved_by: operator
    approved_at: "2026-03-13"
    review_interval: quarterly
    next_review: "2026-06-13"

  - id: exception-ntfy-direct
    component: shared/notify.py
    axiom_id: corporate_boundary
    implication_id: cb-network-001
    reason: >
      ntfy notification service runs on localhost:8090 but may be configured
      to use ntfy.sh cloud relay for mobile push. Direct HTTP POST required
      for notification delivery.
    compensating_controls:
      - Default to localhost (no cloud dependency)
      - Graceful degradation if ntfy unreachable
      - No sensitive data in notification payloads
    approved_by: operator
    approved_at: "2026-03-13"
    review_interval: quarterly
    next_review: "2026-06-13"

  - id: exception-tavily-scout
    component: shared/tavily_client.py
    axiom_id: corporate_boundary
    implication_id: cb-network-001
    reason: >
      Shared Tavily web-intelligence client supports horizon scanning,
      demo research, capability discovery, publication/citation research,
      and operator-directed coding research. This is an intentional external
      API dependency for current open-web facts, extraction, crawl/map, and
      research tasks.
    compensating_controls:
      - API key loaded from TAVILY_API_KEY or pass; no committed credential values
      - Requests go through shared guardrails rejecting private mail, transcripts, corporate content, and token-like strings
      - Usage ledger records request hashes and URL hosts, not raw private query text
      - Per-lane monthly/daily credit budgets and local cache are enforced
      - Codex MCP access uses the repo-owned hapax_tavily_mcp_server proxy by default, not direct upstream Tavily MCP bypasses
      - Scheduled Scout resolves Tavily credentials inside the shared client and does not export TAVILY_API_KEY from the watchdog
      - Existing consent/monetization gates remain on broadcast-facing web affordances
    approved_by: operator
    approved_at: "2026-03-13"
    review_interval: quarterly
    next_review: "2026-06-13"

  - id: exception-open-meteo
    component: agents/weather_sync.py
    axiom_id: corporate_boundary
    implication_id: cb-network-001
    reason: >
      Weather sync agent fetches public meteorological data from Open-Meteo
      free API (no authentication required). Data grounds imagination context
      and the env.weather_conditions affordance.
    compensating_controls:
      - No API key required (no credential exposure risk)
      - Data is public meteorological data, no PII sent
      - Results written to local RAG and /dev/shm only
      - Runs on hourly systemd timer (not continuous)
      - Silent degradation when API unreachable
    approved_by: operator
    approved_at: "2026-04-03"
    review_interval: quarterly
    next_review: "2026-07-03"

  - id: exception-duckduckgo-instant
    component: agents/reverie/content_injector.py
    axiom_id: corporate_boundary
    implication_id: cb-network-001
    reason: >
      Content injector uses DuckDuckGo Instant Answers API for web search
      results rendered on the visual surface. Capability discovery now uses
      the shared Tavily client under exception-tavily-scout.
    compensating_controls:
      - No API key or account required
      - Query is imagination narrative (no personal data)
      - Results rendered to local visual surface only
      - Caller-gated on affordance pipeline recruitment score
      - consent_required=True on world.* and knowledge.web_search affordances
    approved_by: operator
    approved_at: "2026-04-03"
    review_interval: quarterly
    next_review: "2026-07-03"
