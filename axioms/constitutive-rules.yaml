# Constitutive Rules (§4.3)
#
# Explicit "X counts as Y in context C" mappings. Each rule assigns
# institutional status to brute facts (files on disk). Defeating
# conditions implement defeasible logic (Governatori & Rotolo).
#
# These were previously implicit in path conventions, frontmatter
# parsing, and agent logic. Making them explicit enables auditable
# governance chains and coherence checking.

rules:
  # ── Source service classification (ingest agent) ──────────────────
  - id: cr-source-gdrive
    brute_pattern: "rag-sources/gdrive/*"
    institutional_type: gdrive-data
    context: ingest
    match_type: path
    linked_implications: [it-consent-001]
    description: "Files in rag-sources/gdrive/ count as Google Drive data"

  - id: cr-source-gmail
    brute_pattern: "rag-sources/gmail/*"
    institutional_type: personal-communication
    context: ingest
    match_type: path
    linked_implications: [it-consent-001, it-consent-002]
    description: "Files in rag-sources/gmail/ count as personal communication"

  - id: cr-source-gcalendar
    brute_pattern: "rag-sources/gcalendar/*"
    institutional_type: calendar-data
    context: ingest
    match_type: path
    linked_implications: [it-consent-001]
    description: "Files in rag-sources/gcalendar/ count as calendar data"

  - id: cr-source-proton
    brute_pattern: "rag-sources/proton/*"
    institutional_type: personal-communication
    context: ingest
    match_type: path
    linked_implications: [it-consent-001, it-consent-002]
    description: "Files in rag-sources/proton/ count as personal communication"

  - id: cr-source-audio
    brute_pattern: "rag-sources/audio/*"
    institutional_type: ambient-audio
    context: perception
    match_type: path
    defeating_conditions:
      - field: face_count
        description: "Audio with face_count becomes personal data requiring consent"
        override_type: personal-inference
    linked_implications: [it-environmental-001]
    description: "Files in rag-sources/audio/ count as ambient audio (environmental)"

  # ── Document type classification (frontmatter) ────────────────────
  - id: cr-doctype-profile-fact
    brute_pattern: ""
    institutional_type: profile-fact
    context: profile
    match_type: frontmatter
    match_field: doc_type
    match_value: profile-fact
    linked_implications: [it-consent-001]
    description: "Files with doc_type: profile-fact count as profile facts"

  - id: cr-doctype-briefing
    brute_pattern: ""
    institutional_type: briefing
    context: executive-function
    match_type: frontmatter
    match_field: doc_type
    match_value: briefing
    linked_implications: []
    description: "Files with doc_type: briefing count as system briefings"

  # ── Carrier fact classification ───────────────────────────────────
  - id: cr-carrier-flag
    brute_pattern: ""
    institutional_type: carrier-fact
    context: carrier-dynamics
    match_type: frontmatter
    match_field: carrier
    match_value: "true"
    linked_implications: [it-consent-001]
    description: "Files with carrier: true count as carrier facts (DD-26)"

  # ── Consent classification ────────────────────────────────────────
  - id: cr-consent-active
    brute_pattern: ""
    institutional_type: consented-data
    context: consent
    match_type: frontmatter
    match_field: consent_contract
    match_value: active
    description: "Files with consent_contract: active count as consented data"

  - id: cr-consent-label-present
    brute_pattern: ""
    institutional_type: labeled-data
    context: consent
    match_type: frontmatter_exists
    match_field: consent_label
    description: "Files with consent_label in frontmatter count as labeled data (DD-11)"

  # ── Environmental vs. personal boundary (spec gap #1) ─────────────
  - id: cr-environmental-observation
    brute_pattern: ""
    institutional_type: environmental-observation
    context: perception
    match_type: frontmatter
    match_field: observation_type
    match_value: environmental
    defeating_conditions:
      - field: enables_reidentification
        value: "true"
        override_type: personal-inference
        description: >
          Environmental observation that enables re-identification counts
          as personal inference requiring consent (spec gap #1)
    linked_implications: [it-environmental-001, it-consent-001]
    description: "Environmental observations that may cross into personal inference"

  # ── Consent contract substrate (Phase 2 wiring per cc-task ────────
  # `coherence-orphan-implications-catalog`). The contract YAML files
  # at `axioms/contracts/contract-*.yaml` ARE the consent-contract
  # substrate — their schema embodies three it-* implications:
  #
  # - `scope:` field → it-scope-001 (enumerated data categories)
  # - `visibility_mechanism:` field → it-inspect-001 (subject inspection)
  # - file existence + deletability → it-revoke-001 (revocation surface)
  #
  # Removing the file = revoking the contract; downstream consumers
  # check file presence at runtime.
  - id: cr-consent-contract-file
    brute_pattern: "axioms/contracts/contract-*.yaml"
    institutional_type: consent-contract
    context: consent
    match_type: path
    linked_implications: [it-scope-001, it-inspect-001, it-revoke-001]
    description: >
      Files matching `axioms/contracts/contract-*.yaml` count as
      consent contracts. Their schema embodies the scope (data
      categories), inspection mechanism, and revocation surface
      (file deletion = revocation).

  # ── PerceptionBackend → it-backend-001 ────────────────────────────
  # Modules under `agents/hapax_daimonion/backends/*.py` are the
  # PerceptionBackend implementations. They count as
  # data-ingestion-pathways for the purposes of it-backend-001
  # (consent verification before updating Behaviors).
  - id: cr-perception-backend-module
    brute_pattern: "agents/hapax_daimonion/backends/*.py"
    institutional_type: perception-backend
    context: perception
    match_type: path
    linked_implications: [it-backend-001]
    description: >
      Files matching `agents/hapax_daimonion/backends/*.py` count as
      PerceptionBackend implementations. They must verify an active
      consent contract before updating Behaviors or persisting state
      about non-operator persons (it-backend-001).

  # ── Derived/inferred state classification ─────────────────────────
  # Files with `inferred: true` frontmatter declare derived state
  # about a non-operator person, requiring consent-contract scope
  # coverage per it-inference-001.
  - id: cr-inferred-state-frontmatter
    brute_pattern: ""
    institutional_type: inferred-personal-state
    context: perception
    match_type: frontmatter
    match_field: inferred
    match_value: "true"
    linked_implications: [it-inference-001, it-consent-001]
    description: >
      Files with `inferred: true` count as derived/inferred state
      about a non-operator person, requiring consent-contract scope
      coverage (it-inference-001).

  # ── Configuration file defaults (ex-config-001) ───────────────────
  # Files at `config/*.yaml` ARE the operator-environment configuration
  # surface. They count as configuration-file under ex-config-001
  # (must have comprehensive defaults that work in the operator's
  # environment without mandatory customization).
  - id: cr-config-yaml
    brute_pattern: "config/*.yaml"
    institutional_type: configuration-file
    context: configuration
    match_type: path
    linked_implications: [ex-config-001]
    description: >
      Files at `config/*.yaml` count as operator-environment config
      surface; must have comprehensive defaults per ex-config-001.
