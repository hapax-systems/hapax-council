# Hapax stream/private virtual sinks.
#
# ``hapax-livestream`` is the legacy application-facing sink retained for
# compatibility. Broadcast producers should normally write to
# ``hapax-livestream-tap``; the tap forwards here for older clients.
#
# ``hapax-private`` is intentionally fail-closed: it is a PipeWire null
# sink with no downstream hardware playback loopback. Role.assistant and
# other private producers can target a stable sink name without risking
# fallback to the default L-12 broadcast path when the intended private
# monitor hardware is absent. Restoring an audible private monitor should
# be done by adding an explicit off-L-12 monitor bridge, never by routing
# this sink to L-12 or the default output.

# 2026-04-21: removed the `hapax-livestream-playback` loopback that
# piped hapax-livestream → Ryzen. With Phase A1 fix (AUX10/11 PC dropped
# from broadcast capture) AND the Evil Pet loop now on AUX B → CH6
# (AUX5), the loopback created a closed feedback circle:
#
#   hapax-livestream → Ryzen → L-12 CH11/12 → AUX B → Evil Pet
#     → L-12 CH6/AUX5 → filter-chain capture → hapax-livestream → LOOP
#
# hapax-livestream is now a pure null-sink. Apps (compositor tap, TTS,
# YT, etc.) still write to it; OBS reads hapax-livestream.monitor.
# Nothing pipes its content downstream to hardware.

context.objects = [
    {   factory = adapter
        args = {
            factory.name       = support.null-audio-sink
            node.name          = "hapax-livestream"
            node.description   = "Hapax Livestream"
            media.class        = "Audio/Sink"
            audio.position     = "[ FL FR ]"
            monitor.channel-volumes = true
        }
    }
    {   factory = adapter
        args = {
            factory.name       = support.null-audio-sink
            node.name          = "hapax-private"
            node.description   = "Hapax Private (fail-closed null sink)"
            media.class        = "Audio/Sink"
            audio.position     = "[ FL FR ]"
            monitor.channel-volumes = true
            monitor.passthrough     = true
            adapter.auto-port-config = {
                mode = dsp  monitor = true  position = preserve
            }
        }
    }
]
