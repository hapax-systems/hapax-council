# Hapax Broadcast Master Bus — Phase 1 safety-net limiter
#
# This file defines the master bus processing for the hapax livestream.
# It taps `hapax-livestream-tap` (the summed source bus), runs the sum
# through a brick-wall true-peak-aware lookahead limiter, and exposes
# the result as `hapax-broadcast-normalized` (the source OBS reads).
#
# DESIGN — unified livestream audio architecture, Phase 1 (2026-04-23)
# Spec:    docs/superpowers/specs/2026-04-23-livestream-audio-unified-architecture-design.md
# Plan:    docs/superpowers/plans/2026-04-23-livestream-audio-unified-architecture-plan.md
#
# WHAT CHANGED IN PHASE 1
#
# Prior revision: dual sc4m_1916 compressor (threshold -16, ratio 3:1,
# makeup +6) followed by hard_limiter_1413 (-1.0 dB ceiling). The
# compressor was the primary loudness control, the limiter was a peak
# stop. This shape made the master responsible for level shaping AND
# protection — and operator pumping incidents (UNKNOWNTRON 2026-04-23)
# traced to compressor interaction with already-compressed source
# loudnorm chains.
#
# Phase 1 design: master is a SAFETY NET only. No compression at master
# level — peak limiting only. Loudness shaping moves to per-source
# pre-normalizers (Phase 3). The single fast_lookahead_limiter_1913
# instance handles both channels with built-in 5 ms lookahead and our
# fast 50 ms release.
#
# CONSTANTS — DO NOT HAND-EDIT
#
# All numeric values here MUST match `shared/audio_loudness.py`. To
# change: edit the constants module, regenerate (Phase 6 will
# automate this; for Phase 1 it is a manual mirror).
#
#   Limit (dB)        = -1.0   (matches EGRESS_TRUE_PEAK_DBTP)
#   Release time (s)  = 0.05   (matches MASTER_LIMITER_RELEASE_MS / 1000)
#   Input gain (dB)   = 16.0   (matches MASTER_INPUT_MAKEUP_DB; corrected
#                                2026-05-10 after a +19 dB incident pass
#                                overfit a quiet window. A follow-up hot
#                                passage hit -9.1 LUFS-I and -0.1 dBTP,
#                                proving the master was too hot. +16 dB keeps
#                                the observed hot passage just inside the
#                                health band while preserving the master
#                                limiter as a safety net.)
#
# WHY fast_lookahead_limiter_1913
#
# - Stereo (single instance, one node — no L/R drift).
# - Built-in 5 ms lookahead (catches inter-sample-peak overshoot).
# - Configurable release (we use 50 ms, fast enough for transient
#   recovery, slow enough not to pump on sustained loud passages).
# - Sample-peak (not true-peak), so set Limit -1.0 dB to land near
#   -0.5 dBTP after typical inter-sample peaks. YouTube true-peak
#   ceiling is -1.0 dBTP; we have headroom.
# - Phase 7 metering will measure actual TP and surface any drift.
#
# OBS BINDING
#
# OBS audio source MUST bind to `hapax-broadcast-normalized` (or its
# remap, `hapax-obs-broadcast-remap`). Not `hapax-livestream:monitor`
# (that bypasses the master). Verify post-deploy:
#   pw-link -l | grep -A1 OBS
# Phase 2 introduces a string-stable ingest sink so this binding
# survives PipeWire restarts without operator touch.

context.modules = [
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Hapax Broadcast Master Bus"
            capture.props = {
                node.name = "hapax-broadcast-master-capture"
                target.object = "hapax-livestream-tap"
                stream.capture.sink = true
                # Audit B-extra (2026-05-02): keep the master loopback as
                # an active driver of the tap monitor port so the chain
                # never suspends when only passive downstream readers
                # (broadcast-normalized → obs-broadcast-remap) are
                # attached. With passive=true, the support.null-audio-sink
                # tap could end up with all-passive consumers and stop
                # publishing, which would silently kill OBS capture during
                # idle periods (the original tap-conf bug pattern).
                #
                # NOTE on the operator-reported "livestream-tap.monitor
                # reads -inf" symptom: that turned out to be a `pw-cat
                # --record --target <sink>.monitor` measurement artefact
                # specific to support.null-audio-sink monitor ports
                # (verified 2026-05-02 — parecord on the same monitor
                # reads real signal at the expected level; pw-cat reads
                # near-silent regardless of passive state). Use
                # `parecord --device=hapax-livestream-tap.monitor` (or
                # parec) for monitor-port debugging, NOT pw-cat. The chain
                # is correct; the pw-cat path is the broken probe.
                node.passive = false
                audio.position = [ FL FR ]
            }
            playback.props = {
                media.class = "Audio/Source"
                node.name = "hapax-broadcast-master"
                node.description = "Hapax Broadcast Master"
                device.description = "Hapax Broadcast Master"
                device.class = "filter"
                node.virtual = true
                audio.position = [ FL FR ]
            }
        }
    },
    {
        name = libpipewire-module-filter-chain
        args = {
            node.description = "Hapax Broadcast Safety-Net Limiter"
            media.class = "Audio/Filter"
            filter.graph = {
                nodes = [
                    { type = ladspa
                      plugin = "fast_lookahead_limiter_1913"
                      label = "fastLookaheadLimiter"
                      name = "master_limiter"
                      control = {
                          "Input gain (dB)" = 16.0
                          "Limit (dB)"      = -1.0
                          "Release time (s)" = 0.05
                      }
                    }
                ]
                inputs  = [ "master_limiter:Input 1"  "master_limiter:Input 2"  ]
                outputs = [ "master_limiter:Output 1" "master_limiter:Output 2" ]
            }
            capture.props = {
                node.name = "hapax-broadcast-normalized-capture"
                target.object = "hapax-broadcast-master"
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name = "hapax-broadcast-normalized"
                media.class = "Audio/Source"
                audio.position = [ FL FR ]
            }
        }
    }
]
