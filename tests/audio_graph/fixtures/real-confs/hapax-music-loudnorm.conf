# Hapax music-source loudness sink - audited passthrough 2026-05-22; mk5 update 2026-06-05
#
# The former fast_lookahead_limiter_1913 loudnorm stage is disabled in this
# live route after the loaded LADSPA filter-chain emitted digital silence.
# Two builtin mixers preserve audibility while retaining music-only headroom
# from Gain 1 = 0.35 before the reconciler-owned software sum.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-music-loudnorm"
            node.description = "Hapax Music Loudnorm (audited passthrough, 0.35 gain before software sum)"
            media.class = "Audio/Sink"
            audio.rate = 44100
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = builtin name = pass_l label = mixer
                      control = { "Gain 1" = 0.35 } }
                    { type = builtin name = pass_r label = mixer
                      control = { "Gain 1" = 0.35 } }
                ]
                inputs  = [ "pass_l:In 1" "pass_r:In 1" ]
                outputs = [ "pass_l:Out"  "pass_r:Out"  ]
            }

            capture.props = {
                node.name = "hapax-music-loudnorm"
                node.description = "Hapax Music Loudnorm (input — local-music-player target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-music-loudnorm-playback"
                node.description = "Hapax Music Loudnorm -> livestream-tap software sum"
                node.autoconnect = false
                node.passive = false
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
            }
        }
    }
]
