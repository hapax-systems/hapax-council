# Hapax TTS Duck — Phase 4 sidechain ducking (2026-04-23)
#
# Inserted between hapax-loudnorm-capture (TTS chain output) and the
# L-12 USB return. Two mono mixers with controllable Gain 1.
# hapax-audio-ducker.service writes duck gain when operator voice is
# active — TTS yields to operator speech.
#
# DUCK DEPTHS (set by daemon)
#   Operator voice (Rode) active : Gain 1 = 0.398  (≈ -8 dB)
#   Operator silent              : Gain 1 = 1.0   (passthrough)
#
# TTS does NOT duck under itself.
#
# 2026-04-26 amendment — TTS-to-broadcast forward path (incident fix).
# Adds a `libpipewire-module-loopback` that taps `hapax-tts-duck`
# monitor and writes into `hapax-livestream-tap` (OBS source). The
# 2026-04-25 channel-narrow on `hapax-l12-evilpet-capture.conf`
# (14 channels → AUX1/3/4/5) protected the inverse direction (broadcast
# must not loop back into capture) but also dropped the L-12 USB-return
# pair where TTS lands. Without this loopback, daimonion synthesizes
# audio that reaches the L-12 console but never reaches the livestream —
# a regression of `feedback_l12_equals_livestream_invariant`.

context.modules = [
    {
        name = libpipewire-module-filter-chain
        args = {
            node.name = "hapax-tts-duck"
            node.description = "Hapax TTS Duck (operator-VAD sidechain)"
            media.class = "Audio/Sink"
            audio.rate = 48000
            audio.channels = 2
            audio.position = [ FL FR ]

            filter.graph = {
                nodes = [
                    { type = builtin name = duck_l label = mixer
                      control = { "Gain 1" = 1.0 } }
                    { type = builtin name = duck_r label = mixer
                      control = { "Gain 1" = 1.0 } }
                ]
                inputs  = [ "duck_l:In 1" "duck_r:In 1" ]
                outputs = [ "duck_l:Out"  "duck_r:Out"  ]
            }

            capture.props = {
                node.name = "hapax-tts-duck"
                node.description = "Hapax TTS Duck (input — loudnorm-playback target)"
                media.class = "Audio/Sink"
            }
            playback.props = {
                node.name = "hapax-tts-duck-playback"
                node.description = "Hapax TTS Duck → L-12 USB"
                target.object = "alsa_output.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.analog-surround-40"
                node.passive = false
                audio.channels = 2
                audio.position = [ RL RR ]
                stream.dont-remix = true
            }
        }
    }
    # Forward path: TTS → livestream broadcast tap (OBS source).
    # Restores `feedback_l12_equals_livestream_invariant` after the
    # 2026-04-25 capture-channel narrow. Parallel to the L-12 USB
    # output above; both fire on every TTS clip.
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Hapax TTS → livestream broadcast tap"
            capture.props = {
                node.name = "hapax-tts-broadcast-capture"
                target.object = "hapax-tts-duck"
                stream.capture.sink = true
                node.passive = false
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name = "hapax-tts-broadcast-playback"
                target.object = "hapax-livestream-tap"
                audio.position = [ FL FR ]
                node.passive = false
            }
        }
    }
]
