# Contact mic + mixer-master virtual sources — L-12 edition
#
# Replaces the 24c-based original (disabled 2026-04-21 after Studio 24c
# was retired in favor of Zoom LiveTrak L-12). DSP consumers bind to
# named virtual sources `contact_mic` and `mixer_master`; this conf
# creates both from the L-12 14-channel multichannel-input.
#
# Consumers (do not break these):
#   - agents/hapax_daimonion/backends/contact_mic.py → ContactMicBackend
#     reads "contact_mic" source via pw-record (scratch/typing/tapping
#     classification for presence engine + cross-modal IR fusion).
#   - agents/hapax_daimonion/backends/mixer_input.py → reads
#     "mixer_master" source via pw-record.
#   - agents/hapax_daimonion/cpal/stt_source_resolver.py →
#     VOICE_SOURCE_CONTACT_MIC binds to "contact_mic".
#
# L-12 channel → virtual-source mapping (derived from
# hapax-l12-evilpet-capture.conf):
#   AUX1  (CH2 XLR, phantom bank 1-4)   = Cortado contact mic
#   AUX12 (MASTER L, post-master-fader) = mix of everything
#   AUX13 (MASTER R)                    = "
#
# `stream.dont-remix = true` pins the capture to the named aux channel
# only. `node.passive = true` prevents these loopbacks from being picked
# as default-source by WirePlumber's auto-link policy (critical — the
# whole room-mic-hijack class of bugs was caused by passive=false
# captures falling through to cam mics when their target went missing).

context.modules = [
    # Contact microphone (Cortado MKIII) — L-12 CH2 / AUX1 (phantom-bank 1-4, +48V)
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Contact Microphone (Cortado)"
            capture.props = {
                audio.position = [ aux1 ]
                stream.dont-remix = true
                node.target = "alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input"
                node.passive = true
                node.dont-reconnect = true
            }
            playback.props = {
                node.name = "contact_mic"
                node.description = "Contact Microphone (Cortado)"
                media.class = "Audio/Source"
                audio.position = [ MONO ]
            }
        }
    }
    # Mixer master output — L-12 AUX12 (MASTER L, post-master-fader).
    # Mono source so consumers get the same interface as before; we
    # pick AUX12 (L) rather than downmix L+R because mixer_input.py
    # doesn't need stereo and single-channel avoids any remix cost.
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Mixer Master Output"
            capture.props = {
                audio.position = [ aux12 ]
                stream.dont-remix = true
                node.target = "alsa_input.usb-ZOOM_Corporation_L-12_8253FFFFFFFFFFFF9B5FFFFFFFFFFFFF-00.multichannel-input"
                node.passive = true
                node.dont-reconnect = true
            }
            playback.props = {
                node.name = "mixer_master"
                node.description = "Mixer Master Output"
                media.class = "Audio/Source"
                audio.position = [ MONO ]
            }
        }
    }
]
