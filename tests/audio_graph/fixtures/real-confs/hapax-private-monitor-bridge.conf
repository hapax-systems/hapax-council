# Hapax private monitor bridge - fail-closed MOTU UltraLite mk5 Phones ingress.
#
# ``hapax-private`` and ``hapax-notification-private`` remain null sinks
# in their own config files. This file is the only audible private-TTS
# monitor bridge: it captures ``hapax-private`` and plays it to mk5 Phones
# AUX10/AUX11. Notifications are intentionally not bridged to the mk5 monitor
# until notification-private monitoring has separate route authority.
#
# Fail-closed contract:
#   - target.object names the exact mk5 ALSA sink, never a default sink.
#   - absent hardware produces silence, not fallback.
#   - node.dont-fallback=true prevents WirePlumber from choosing livestream,
#     hapax-pc-loudnorm, Multimedia, or any other best/default target when
#     the mk5 is absent.
#   - node.dont-reconnect=true prevents an established bridge from moving
#     to another sink when the mk5 disappears.
#   - node.dont-move=true and state.restore=false keep pavucontrol or old
#     stream-state metadata from persisting a broad Loopback move.
#   - node.linger=true lets the stream wait silently for the mk5 instead
#     of falling through to default hardware.
#
# Source monitors are expressed with ``stream.capture.sink=true`` plus
# ``target.object=<sink>`` because that is the PipeWire/WirePlumber pattern
# used elsewhere in this repo for null-sink monitor capture.

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            node.description = "Hapax private monitor to mk5 Phones AUX10/AUX11"
            capture.props = {
                node.name = "hapax-private-monitor-capture"
                stream.capture.sink = true
                target.object = "hapax-private"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                state.restore = false
            }
            playback.props = {
                node.name = "hapax-private-playback"
                node.nick = "Hapax Private mk5 Phones Monitor"
                node.description = "Hapax private monitor -> mk5 Phones AUX10/AUX11"
                target.object = "alsa_output.usb-MOTU_UltraLite-mk5_UL5LFEC2B0-00.pro-output-0"
                audio.channels = 2
                audio.position = [ FL FR ]
                stream.dont-remix = true
                node.autoconnect = false
                node.dont-fallback = true
                node.dont-reconnect = true
                node.dont-move = true
                node.linger = true
                state.restore = false
            }
        }
    }
]
