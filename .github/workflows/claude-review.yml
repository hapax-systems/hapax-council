name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip auto-fix commits to avoid review-of-a-fix loops
    if: >-
      !contains(github.event.pull_request.head.ref, '[auto-fix]') &&
      !contains(github.event.head_commit.message || '', '[auto-fix]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLAUDE_REVIEW_CONFIGURED: ${{ secrets.ANTHROPIC_API_KEY != '' || secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      REVIEW_APP_CONFIGURED: ${{ secrets.REVIEW_APP_ID != '' && secrets.REVIEW_APP_KEY != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect docs-only review change set
        id: docs
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          changed_files="$(mktemp)"
          git fetch --quiet origin "$PR_BASE_SHA" || true
          git diff --name-only "$PR_BASE_SHA"...HEAD > "$changed_files"
          sed -i '/^$/d' "$changed_files"

          changed_count="$(wc -l < "$changed_files" | tr -d ' ')"
          docs_only=true
          if [ "$changed_count" -eq 0 ]; then
            docs_only=false
          fi

          docs_only_path() {
            local path="$1"
            case "$path" in
              docs|docs/*|lab-journal|lab-journal/*|research|research/*)
                return 0
                ;;
            esac
            if [[ "$path" == *.md && "$path" != */* ]]; then
              return 0
            fi
            if [[ "$path" == axioms/*.md ]]; then
              return 0
            fi
            return 1
          }

          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if ! docs_only_path "$path"; then
              docs_only=false
              break
            fi
          done < "$changed_files"

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "changed_count=$changed_count" >> "$GITHUB_OUTPUT"

      - name: Docs-only review sentinel
        if: steps.docs.outputs.docs_only == 'true'
        run: echo "Docs-only PR; review reports success without invoking Claude."

      - uses: anthropics/claude-code-action@034cbdb008291e7eeeac420d315fc3b45fca3781
        if: env.CLAUDE_REVIEW_CONFIGURED == 'true' && steps.docs.outputs.docs_only != 'true'
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 5 --allowedTools Read,Glob,Grep"
          prompt: |
            Review this pull request for:

            1. **Bugs**: Logic errors, off-by-one, missing error handling, race conditions.
            2. **Security**: Hardcoded secrets, injection vectors, unsafe deserialization.
            3. **Axiom compliance**: Violations of the 4 constitutional axioms (single_user,
               executive_function, corporate_boundary, management_governance).
               See axioms/registry.yaml for definitions.
            4. **Type safety**: Mismatched types, missing annotations on public functions.

            Rules:
            - Only report HIGH or MEDIUM priority findings.
            - Do NOT post nitpick, style, or formatting comments (Ruff handles those).
            - Be concise. One sentence per finding, with a suggested fix if non-obvious.

            At the END of your review, you MUST output exactly one of these lines:
            VERDICT: APPROVE
            VERDICT: REQUEST_CHANGES

            Use APPROVE if there are no HIGH findings. Use REQUEST_CHANGES only for HIGH findings.

      - name: Generate app token
        if: always() && steps.claude.outcome == 'success' && env.REVIEW_APP_CONFIGURED == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEW_APP_ID }}
          private-key: ${{ secrets.REVIEW_APP_KEY }}

      - name: Submit review verdict
        if: always() && steps.claude.outcome == 'success' && env.REVIEW_APP_CONFIGURED == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Check Claude's comment for verdict
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | select(.user.login == "github-actions[bot]" or .user.type == "Bot")] | last | .body // ""')

          if echo "$COMMENTS" | grep -q "VERDICT: REQUEST_CHANGES"; then
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST -f event=REQUEST_CHANGES -f body="Claude review found issues requiring changes."
          else
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST -f event=APPROVE -f body="Claude review passed — no high-severity findings."
          fi
