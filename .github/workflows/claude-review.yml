name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REVIEW_APP_CONFIGURED: ${{ secrets.REVIEW_APP_ID != '' && secrets.REVIEW_APP_KEY != '' }}
    steps:
      - name: Detect auto-fix head commit
        id: auto_fix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          # pull_request.synchronize is not a push payload; look up the PR head
          # commit explicitly instead of reading github.event.head_commit.
          if ! message="$(gh api "repos/$HEAD_REPOSITORY/commits/$HEAD_SHA" --jq '.commit.message' 2>/dev/null)"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not read PR head commit; failing closed by skipping Claude review."
            exit 0
          fi
          if printf '%s\n' "$message" | grep -Fq '[auto-fix]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Detected [auto-fix] marker at PR head; skipping Claude review."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-fix review sentinel
        if: steps.auto_fix.outputs.skip == 'true'
        run: echo "PR head is an [auto-fix] commit; review reports success without invoking Claude."

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        if: steps.auto_fix.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Detect docs-only review change set
        if: steps.auto_fix.outputs.skip != 'true'
        id: docs
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          changed_files="$(mktemp)"
          git fetch --quiet origin "$PR_BASE_SHA" || true
          git diff --name-only "$PR_BASE_SHA"...HEAD > "$changed_files"
          sed -i '/^$/d' "$changed_files"

          changed_count="$(wc -l < "$changed_files" | tr -d ' ')"
          docs_only=true
          if [ "$changed_count" -eq 0 ]; then
            docs_only=false
          fi

          docs_only_path() {
            local path="$1"
            case "$path" in
              docs|docs/*|lab-journal|lab-journal/*|research|research/*)
                return 0
                ;;
            esac
            if [[ "$path" == *.md && "$path" != */* ]]; then
              return 0
            fi
            if [[ "$path" == axioms/*.md ]]; then
              return 0
            fi
            return 1
          }

          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if ! docs_only_path "$path"; then
              docs_only=false
              break
            fi
          done < "$changed_files"

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "changed_count=$changed_count" >> "$GITHUB_OUTPUT"

      - name: Docs-only review sentinel
        if: steps.auto_fix.outputs.skip != 'true' && steps.docs.outputs.docs_only == 'true'
        run: echo "Docs-only PR; review reports success without invoking Claude."

      - name: No-escape review hold
        if: >-
          steps.auto_fix.outputs.skip != 'true' &&
          steps.docs.outputs.docs_only != 'true'
        id: claude
        run: |
          echo "::warning::External Claude review is disabled until a no-escape route receipt exists."
          echo "review_ready=false" >> "$GITHUB_OUTPUT"

      - name: Generate app token
        if: >-
          always() &&
          steps.claude.outputs.review_ready == 'true' &&
          env.REVIEW_APP_CONFIGURED == 'true'
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ secrets.REVIEW_APP_ID }}
          private-key: ${{ secrets.REVIEW_APP_KEY }}

      - name: Submit review verdict
        if: >-
          always() &&
          steps.claude.outputs.review_ready == 'true' &&
          env.REVIEW_APP_CONFIGURED == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Check Claude's comment for verdict
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '[.[] | select(.user.login == "github-actions[bot]" or .user.type == "Bot")] | last | .body // ""')

          if echo "$COMMENTS" | grep -q "VERDICT: REQUEST_CHANGES"; then
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST -f event=REQUEST_CHANGES -f body="Claude review found issues requiring changes."
          else
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              -X POST -f event=APPROVE -f body="Claude review passed — no high-severity findings."
          fi
