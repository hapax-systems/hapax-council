name: Dependabot Auto-Merge

on: pull_request_target

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge minor/patch
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"; then
            echo "::warning::Dependabot auto-merge request failed; leaving PR for human review"
            gh label create needs-human \
              --description "Major-version dependency bump or other change requiring human review" \
              --color FBCA04 \
              --repo "$GH_REPO" \
              --force
            gh pr edit --repo "$GH_REPO" --add-label "needs-human" "${{ github.event.pull_request.html_url }}"
          fi

      - name: Ensure needs-human label exists
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create needs-human \
            --description "Major-version dependency bump or other change requiring human review" \
            --color FBCA04 \
            --repo "$GH_REPO" \
            --force

      - name: Label major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh pr edit --repo "$GH_REPO" --add-label "needs-human" "${{ github.event.pull_request.html_url }}"
