name: Pyright safety net

on:
  schedule:
    - cron: "43 9 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pyright-safety-net-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pyright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps (cairo, gobject)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository-2.0-dev gobject-introspection
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync uv ci extras and dev tools
        run: uv sync --extra ci --group dev
      - name: Run pyright
        run: uv run pyright
