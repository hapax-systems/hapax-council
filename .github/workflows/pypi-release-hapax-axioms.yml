name: "PyPI release: hapax-axioms"

on:
  push:
    tags:
      - "hapax-axioms-v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: "test (3.12 + 3.13)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/hapax-axioms
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Set Python
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install "$PYTHON_VERSION"
      - name: Install package + dev deps
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Run tests
        run: uv run pytest -q

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/hapax-axioms
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Build distributions
        run: uv build --sdist --wheel
      - name: Read package version
        id: version
        run: |
          set -eo pipefail
          v=$(grep -m1 -E '^version\s*=' pyproject.toml | sed -E 's/^version *= *"([^"]+)".*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Upload artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: hapax-axioms-dist
          path: packages/hapax-axioms/dist/
          if-no-files-found: error

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/hapax-axioms/
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: hapax-axioms-dist
          path: dist/
      - name: Publish (trusted publisher)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
          skip-existing: true
          print-hash: true
