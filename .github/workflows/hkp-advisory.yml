name: HKP Advisory

# pull_request ONLY (never merge_group): structurally non-blocking, never a
# required check / merge-queue input. Support-non-authoritative advisory comments.
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: hkp-advisory-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  hkp-advisory:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
      - name: Install system deps (cairo, gobject)
        run: |
          grep -ril 'packages.microsoft.com' /etc/apt/sources.list.d 2>/dev/null \
            | xargs -r sudo rm -f
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i '/packages.microsoft.com/d' /etc/apt/sources.list
          fi
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository-2.0-dev gobject-introspection || {
            echo "::error::HKP advisory dependencies failed to install; check apt availability for cairo and gobject packages"
            exit 1
          }
      - name: Compose and post HKP advisory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --depth=1 || true
          mapfile -t files < <(git diff --name-only "origin/$BASE_REF...HEAD" -- '*.md' || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no changed markdown; nothing to advise"
            exit 0
          fi
          body="$(uv run python scripts/hapax-hkp-ci-advisory --changed "${files[@]}")"
          if [ -n "$body" ]; then
            printf '%s\n' "$body" | gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -F body=@-
          else
            echo "no warning-severity advisory findings"
          fi
