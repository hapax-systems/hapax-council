name: audio-graph-validate

on:
  push:
    branches: [main]
    paths:
      - "shared/audio_graph/**"
      - "shared/audio_topology*.py"
      - "scripts/hapax-audio-graph-validate"
      - "tests/audio_graph/**"
      - "config/audio-topology.yaml"
      - "config/pipewire/**"
      - "config/wireplumber/**"
      - ".github/workflows/audio-graph-validate.yml"
  pull_request:
    branches: [main]
    paths:
      - "shared/audio_graph/**"
      - "shared/audio_topology*.py"
      - "scripts/hapax-audio-graph-validate"
      - "tests/audio_graph/**"
      - "config/audio-topology.yaml"
      - "config/pipewire/**"
      - "config/wireplumber/**"
      - ".github/workflows/audio-graph-validate.yml"

permissions:
  contents: read

concurrency:
  group: audio-graph-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  passive-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies (no system audio needed; pure file-read)
        run: uv sync --extra ci
      - name: Run audio_graph schema + invariant tests
        run: |
          uv run pytest tests/audio_graph/test_schema.py \
                        tests/audio_graph/test_compiler.py \
                        tests/audio_graph/test_invariants.py \
                        tests/audio_graph/test_validator.py \
                        -q --no-header
      - name: Validate config/pipewire and config/wireplumber (in-tree copies)
        run: |
          if [ -d "config/pipewire" ]; then
            uv run scripts/hapax-audio-graph-validate \
              --pipewire-conf-dir config/pipewire \
              --wireplumber-conf-dir config/wireplumber \
              --pretty > audio-graph-validate.json
            cat audio-graph-validate.json
            failures=$(uv run python -c "import json; d=json.load(open('audio-graph-validate.json')); print(len(d['decompose_failures']))")
            if [ "$failures" != "0" ]; then
              echo "::error::$failures conf(s) failed to decompose"
              exit 1
            fi
          else
            echo "config/pipewire not present; skipping in-tree decomposition"
          fi
      - name: Upload validator JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-graph-validate
          path: audio-graph-validate.json
          if-no-files-found: ignore
