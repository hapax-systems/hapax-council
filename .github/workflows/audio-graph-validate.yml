name: audio-graph-validate

on:
  push:
    branches: [main]
    paths: &audio-authority-paths
      - "shared/audio_graph/**"
      - "shared/audio_topology*.py"
      - "shared/audio_loudness*.py"
      - "shared/audio_canary*.py"
      - "shared/audio_routing_policy.py"
      - "shared/audio_control_plane.py"
      - "shared/audio_restart_proof_gate.py"
      - "scripts/hapax-audio-*"
      - "scripts/hapax-wireplumber-*"
      - "scripts/check-audio-*.py"
      - "scripts/generate-pipewire-audio-confs.py"
      - "scripts/audit-audio-topology.sh"
      - "scripts/audio-*.sh"
      - "tests/audio_graph/**"
      - "config/audio-topology.yaml"
      - "config/audio-routing.yaml"
      - "config/audio-conf-*.yaml"
      - "config/audio-current-capsule.yaml"
      - "config/pipewire/**"
      - "config/wireplumber/**"
      - "config/hapax/audio-*.conf"
      - "config/hapax/audio-*.yaml"
      - "docs/audio-topology-reference.md"
      - "docs/audio/**"
      - "hooks/scripts/*audio*"
      - ".github/workflows/audio-graph-validate.yml"
  pull_request:
    branches: [main]
    paths: *audio-authority-paths
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: audio-graph-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  passive-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - name: Install system deps (cairo, gobject)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository-2.0-dev gobject-introspection
      - name: Install dependencies (no system audio needed; pure file-read)
        run: uv sync --extra ci
      - name: Run audio_graph schema + invariant tests
        run: |
          uv run pytest tests/audio_graph/test_schema.py \
                        tests/audio_graph/test_compiler.py \
                        tests/audio_graph/test_invariants.py \
                        tests/audio_graph/test_today_regression_pins.py \
                        tests/audio_graph/test_validator.py \
                        -q --no-header
      - name: Validate config/pipewire and config/wireplumber (in-tree copies)
        run: |
          if [ -d "config/pipewire" ]; then
            uv run scripts/hapax-audio-graph-validate \
              --pipewire-conf-dir config/pipewire \
              --wireplumber-conf-dir config/wireplumber \
              --pretty > audio-graph-validate.json
            cat audio-graph-validate.json
            failures=$(uv run python -c "import json; d=json.load(open('audio-graph-validate.json')); print(len(d['decompose_failures']))")
            if [ "$failures" != "0" ]; then
              echo "::error::$failures conf(s) failed to decompose"
              exit 1
            fi
          else
            echo "config/pipewire not present; skipping in-tree decomposition"
          fi
      - name: Check generator freshness (route maps + WirePlumber deny policy + source confs)
        run: |
          uv run python scripts/generate-pipewire-audio-confs.py \
            --check --check-route-maps --check-wireplumber-deny-policy --check-source-confs
      - name: Run audio routing policy + topology + inspector + deny tests
        run: |
          uv run pytest tests/shared/test_audio_routing_policy.py \
                        tests/scripts/test_hapax_audio_routing_check.py \
                        tests/shared/test_canonical_audio_topology.py \
                        tests/shared/test_audio_topology_inspector.py \
                        tests/docs/test_audio_current_capsule.py \
                        -q --no-header
      - name: Check audio AuthorityCase metadata
        run: uv run python scripts/check-audio-authority-case.py --strict
      - name: Check audio current-capsule freshness
        run: uv run python scripts/check-audio-current-capsule-staleness.py
      - name: Upload validator JSON
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: audio-graph-validate
          path: audio-graph-validate.json
          if-no-files-found: ignore
