version: 2
# Anti-pileup invariants:
# - open-pull-requests-limit caps each ecosystem at 2 concurrent open PRs.
#   Without this cap, a freeze-lift admits dozens of dep PRs in seconds —
#   the exact pattern that triggered the 2026-05-01 pileup.
# - groups bundle related deps into single PRs to reduce queue churn.
# - rebase-strategy: disabled prevents rebase storms when many dep PRs
#   are open simultaneously (CI re-runs on every rebase, multiplying CI
#   load). Manual rebase via gh pr update-branch when ready to land.
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    groups:
      python-dev:
        dependency-type: "development"
      python-prod:
        dependency-type: "production"

  - package-ecosystem: "pnpm"
    directory: "/hapax-logos"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    groups:
      hapax-logos-dev:
        dependency-type: "development"
      hapax-logos-prod:
        dependency-type: "production"

  - package-ecosystem: "pnpm"
    directory: "/vscode"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    rebase-strategy: "disabled"
    groups:
      vscode-dev:
        dependency-type: "development"
      vscode-prod:
        dependency-type: "production"
